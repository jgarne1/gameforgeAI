<!DOCTYPE html><html><head><title>Tic Tac Toe</title><style>body{font-family:Arial;text-align:center}#b{display:grid;grid-template-columns:repeat(3,100px);gap:6px;justify-content:center}.c{width:100px;height:100px;border:2px solid #111;font-size:42px;display:flex;align-items:center;justify-content:center;cursor:pointer}button{padding:8px;margin:8px}</style></head><body><h2>Tic Tac Toe</h2><div id="s"></div><button onclick="newGame(true)">New Game</button><div id="b"></div><script>
const GAME_META={id:'tictactoe',name:'Tic Tac Toe',minPlayers:1,maxPlayers:2,seats:2};let players=['X','O'];setTimeout(()=>{if(window.GAME_PLAYERS){window.GAME_PLAYERS.forEach((p,i)=>players[i]=p.name)}draw()},100);let board=Array(9).fill(''),turn=0,over=false;
function draw(){s.innerText=over?'Game over':players[turn]+"'s turn";b.innerHTML='';board.forEach((v,i)=>{let d=document.createElement('div');d.className='c';d.innerText=v;d.onclick=()=>move(i,true);b.appendChild(d)})}
function move(i,send){if(over||board[i])return;board[i]=turn===0?'X':'O';if(win(board[i])){s.innerText=players[turn]+' wins!';over=true}else if(!board.includes('')){s.innerText='Tie!';over=true}else turn=1-turn;draw();if(send)sendMove({type:'state',board,turn,over})}
function win(p){return[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(a=>a.every(i=>board[i]===p))}
function newGame(send){board=Array(9).fill('');turn=0;over=false;draw();if(send)sendMove({type:'state',board,turn,over})}
window.sendMove=d=>parent.postMessage({type:'move',data:d},'*');window.onMove=d=>{if(d.type==='state'){board=d.board;turn=d.turn;over=d.over;draw()}};draw();</script></body></html>
