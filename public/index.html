<!DOCTYPE html><html><head><title>GameForge AI</title><style>
body{font-family:Arial;margin:0;background:#f3f3f3;color:#222}.wrap{display:grid;grid-template-columns:1fr 260px;min-height:100vh}.main{padding:16px}.side{background:#fff;border-left:2px solid #ccc;padding:12px;position:sticky;top:0;height:100vh;overflow:auto}.card{background:#fff;border:1px solid #bbb;border-radius:10px;padding:12px;margin:10px 0}button,input,select{padding:8px;margin:4px;border-radius:7px}button{cursor:pointer}.gameBtn{display:block;width:100%;text-align:left;margin:6px 0}.selected{background:#dff0ff!important}.seat{display:inline-block;border:1px solid #888;border-radius:8px;padding:10px;margin:6px;background:#fafafa;min-width:120px}.empty{background:#fff}.filled{background:#e8ffe8}.owner{font-weight:bold}.chatBox{height:160px;overflow:auto;background:#fffbea;border:1px solid #aaa;padding:8px;text-align:left}.userItem{border-bottom:1px solid #ddd;padding:6px;cursor:pointer}.userItem:hover{background:#eee}iframe{width:100%;height:650px;border:3px solid #333;border-radius:10px;background:#fff}#gameArea{margin-top:20px}
</style></head><body><div class="wrap"><div class="main">
<h1>GameForge AI</h1>
<div class="card" id="auth"><h3>Account</h3><input id="user" placeholder="username"><input id="pass" type="password" placeholder="password"><button onclick="register()">Create Account</button><button onclick="login()">Login</button><button onclick="logout()">Logout</button><span id="authStatus"></span> <a href="/admin" target="_blank">Admin</a></div>
<div class="card"><h3>Create / Join Room</h3><label><input type="checkbox" id="privateRoom"> Private room</label><br><button onclick="createRoom()">Create Room</button><input id="roomCode" placeholder="room code"><button onclick="joinRoom()">Join Room</button><button onclick="leaveRoom()">Leave Room</button><p>Room: <b id="roomLabel">None</b></p></div>
<div class="card" id="roomPanel"><h3>Room</h3><p id="roomHelp">Create or join a room first.</p><div id="roomPeople"></div><div id="ownerControls"></div><h3>1) Select a Game</h3><p><b>Pick a game first.</b> Seats will appear after a game is selected.</p><div id="gameList"></div><div id="tableArea"><h3>2) Sit at the Table</h3><div id="seats"></div><button id="startBtn" onclick="startGame()">Start Game</button></div><div><h3>Room Chat</h3><div class="chatBox" id="chat"></div><input id="chatText" placeholder="message"><button onclick="sendChat()">Send</button></div></div>
<div id="gameArea"><h2>Game Area</h2><p id="gameHint">The started game appears here for seated players.</p><iframe id="gameFrame"></iframe></div>
</div><div class="side"><h3>Logged In Users</h3><div id="presence"></div></div></div>
<script>
let me=localStorage.getItem('gf_user')||'';let admin=localStorage.getItem('gf_admin')==='true';let socket=null;let currentRoom=null;let room=null;let games=[];
async function loadGames(){games=await (await fetch('/api/games')).json();drawGames()}
function connect(){if(socket&&socket.readyState===1)return;socket=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);socket.onopen=()=>socket.send(JSON.stringify({type:'hello',username:me}));socket.onmessage=e=>{let m=JSON.parse(e.data);if(m.type==='presence')drawPresence(m.users,m.rooms);if(m.type==='roomJoined'||m.type==='roomUpdate'){room=m.room;currentRoom=room.id;drawRoom();if(m.scroll)scrollToArea(m.scroll)}if(m.type==='chat')drawChat(m.chat);if(m.type==='roomClosed'){alert('Room closed');room=null;currentRoom=null;drawRoom()}if(m.type==='gameMove'){let f=document.getElementById('gameFrame');if(f.contentWindow&&f.contentWindow.onMove)f.contentWindow.onMove(m.data)}}}
async function register(){let r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.value,password:pass.value})});let d=await r.json();if(d.error)return alert(d.error);setLogin(d)}
async function login(){let r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.value,password:pass.value})});let d=await r.json();if(d.error)return alert(d.error);setLogin(d)}
function setLogin(d){me=d.user.username;admin=!!d.admin;localStorage.setItem('gf_user',me);localStorage.setItem('gf_admin',admin);authStatus.innerText='Logged in as '+me;connect();setTimeout(()=>socket.send(JSON.stringify({type:'hello',username:me})),300)}
function logout(){me='';admin=false;localStorage.removeItem('gf_user');localStorage.removeItem('gf_admin');authStatus.innerText='Logged out'; if(socket)socket.send(JSON.stringify({type:'hello',username:''}))}
function createRoom(){connect();socket.onopen=socket.onopen||(()=>{});setTimeout(()=>socket.send(JSON.stringify({type:'createRoom',private:privateRoom.checked})),100)}
function joinRoom(code){connect();let c=(code||roomCode.value||'').toUpperCase();setTimeout(()=>socket.send(JSON.stringify({type:'joinRoom',roomId:c})),100)}
function leaveRoom(){if(socket)socket.send(JSON.stringify({type:'leaveRoom'}));room=null;currentRoom=null;drawRoom()}
function selectGame(id){socket.send(JSON.stringify({type:'selectGame',gameId:id}))}
function sit(i){socket.send(JSON.stringify({type:'sit',seat:i}))}
function startGame(){socket.send(JSON.stringify({type:'startGame'}))}
function passOwner(to){socket.send(JSON.stringify({type:'passOwner',to}))}
function closeRoom(){if(confirm('Close room?'))socket.send(JSON.stringify({type:'closeRoom'}))}
function sendChat(){let t=chatText.value.trim();if(t){socket.send(JSON.stringify({type:'chat',text:t}));chatText.value=''}}
function drawGames(){let g=document.getElementById('gameList');g.innerHTML='';games.forEach(x=>{let b=document.createElement('button');b.className='gameBtn '+(room&&room.selectedGame&&room.selectedGame.id===x.id?'selected':'');b.innerText=x.name+' ('+x.minPlayers+'-'+x.maxPlayers+' players)';b.onclick=()=>selectGame(x.id);g.appendChild(b)})}
function drawRoom(){roomLabel.innerText=room?room.id:'None';roomHelp.innerText=room?(room.private?'Private room - join by code only':'Public room - users can click your name to join'):'Create or join a room first.';drawGames();roomPeople.innerHTML=room?'<b>People in room:</b> '+room.players.join(', '):'';ownerControls.innerHTML='';if(room&&room.owner===me){ownerControls.innerHTML='<p class="owner">You are room owner</p><button onclick="closeRoom()">Close Room</button><br>Pass ownership: '+room.players.map(p=>p!==me?'<button onclick="passOwner(\''+p+'\')">'+p+'</button>':'').join('')}
let s=document.getElementById('seats');s.innerHTML='';if(room&&room.selectedGame){room.seats.forEach((seat,i)=>{let d=document.createElement('div');d.className='seat '+(seat?'filled':'empty');d.innerHTML='<b>Seat '+(i+1)+'</b><br>'+(seat?seat.name:'Open')+'<br><button onclick="sit('+i+')">Sit</button>';s.appendChild(d)});startBtn.style.display=room.owner===me?'inline-block':'none';}else{startBtn.style.display='none';s.innerHTML='<i>Select a game to create seats.</i>'}
if(room&&room.started&&room.selectedGame){let seated=room.seats.filter(Boolean);let mySeated=seated.some(x=>x.name===me);gameHint.innerText=mySeated?'You are seated. Play below.':'You are watching. Sit at a new table later.';let frame=gameFrame;let players=room.seats.map((x,i)=>x?{seat:i,name:x.name}:null).filter(Boolean);frame.onload=()=>{try{frame.contentWindow.GAME_PLAYERS=players}catch(e){}};frame.src='/games/'+room.selectedGame.file;scrollToArea('game');}drawChat(room?room.chat:[])}
function drawChat(items){chat.innerHTML=(items||[]).map(x=>'<div><b>'+x.user+':</b> '+escapeHtml(x.text)+'</div>').join('');chat.scrollTop=chat.scrollHeight}
function drawPresence(users,rooms){let p=document.getElementById('presence');p.innerHTML='';users.forEach(u=>{let d=document.createElement('div');d.className='userItem';d.innerHTML='<b>'+u.username+'</b><br><small>'+u.location+(u.roomId?' '+u.roomId:'')+(u.privateRoom?' 🔒':'')+'</small>';if(u.roomId&&!u.privateRoom)d.onclick=()=>joinRoom(u.roomId);p.appendChild(d)})}
function scrollToArea(a){setTimeout(()=>document.getElementById(a==='game'?'gameArea':'tableArea').scrollIntoView({behavior:'smooth',block:'start'}),150)}
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='move'&&socket){socket.send(JSON.stringify({type:'gameMove',data:e.data.data}))}});
if(me)authStatus.innerText='Logged in as '+me;connect();loadGames();drawRoom();
</script></body></html>
