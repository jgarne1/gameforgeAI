<!DOCTYPE html>
<html>
<head>
<title>GameForge AI</title>

<style>
:root{
  --bg:#0f172a;
  --panel:#1e293b;
  --panel2:#111827;
  --line:#334155;
  --blue:#3b82f6;
  --accent:#38bdf8;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

/* ===== BASE ===== */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
}

/* ===== LAYOUT ===== */
.wrap{
  display:grid;
  grid-template-columns:220px 1fr 340px;
  min-height:100vh;
}

/* ===== LEFT NAV ===== */
.nav{
  background:var(--panel2);
  border-right:2px solid var(--line);
  padding:12px;
}

.nav h2{
  margin:6px 0 12px;
  font-size:20px;
}

.nav button{
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#020617;
  color:var(--text);
  cursor:pointer;
}

.nav button:hover{
  background:#1e293b;
}

.nav button.active{
  background:var(--blue);
}

/* ===== MAIN ===== */
.main{
  padding:16px;
}

.section{
  display:none;
}

.section.active{
  display:block;
}

/* ===== RIGHT PANEL ===== */
.side{
  background:var(--panel);
  border-left:2px solid var(--line);
  padding:12px;
}

/* ===== CARDS ===== */
.card{
  background:#020617;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}

/* ===== CHAT ===== */
.chatBox{
  height:220px;
  overflow:auto;
  background:#020617;
  border:1px solid var(--line);
  padding:6px;
}

.chatInput{
  display:flex;
  gap:6px;
  margin-top:6px;
}

/* ===== GAME ===== */
iframe{
  width:100%;
  height:80vh;
  border:2px solid #000;
  border-radius:10px;
}

/* ===== SMALL ===== */
.muted{
  color:var(--muted);
  font-size:12px;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- ===== LEFT NAV ===== -->
  <div class="nav">
    <h2>GameForge</h2>

    <button onclick="showSection('home')" class="active">🏠 Home</button>
    <button onclick="showSection('rooms')">🎲 Rooms</button>
    <button onclick="showSection('games')">🕹 Games</button>
    <button onclick="showSection('pet')">🐾 Pet</button>
    <button onclick="showSection('shop')">🛒 Shop</button>
    <button onclick="showSection('inventory')">🎒 Inventory</button>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main">

    <!-- HOME -->
    <div id="home" class="section active">
      <div class="card">
        <h3>Welcome</h3>
        <p class="muted">Your dashboard hub</p>
        <div id="homePet"></div>
      </div>
    </div>

    <!-- ROOMS -->
    <div id="rooms" class="section">
      <div class="card">
        <h3>Create / Join Room</h3>
        <input id="roomCode" placeholder="code">
        <button onclick="createRoom()">Create</button>
        <button onclick="joinRoom()">Join</button>
        <button onclick="leaveRoom()">Leave</button>
        <p>Room: <b id="roomLabel">None</b></p>
      </div>

      <div class="card" id="roomPanel"></div>
    </div>

    <!-- GAMES -->
    <div id="games" class="section">
      <div class="card">
        <h3>Games</h3>
        <div id="gameList"></div>
      </div>
    </div>

    <!-- PET -->
    <div id="pet" class="section">
      <div class="card">
        <h3>Your Pet</h3>
        <div id="petPanel"></div>
      </div>
    </div>

    <!-- SHOP -->
    <div id="shop" class="section">
      <div class="card">
        <h3>Shop</h3>
        <div id="shopPanel"></div>
      </div>
    </div>

    <!-- INVENTORY -->
    <div id="inventory" class="section">
      <div class="card">
        <h3>Inventory</h3>
        <div id="inventoryPanel"></div>
      </div>
    </div>

    <!-- GAME AREA -->
    <div id="gameArea" class="card" style="display:none">
      <h3>Game</h3>
      <iframe id="gameFrame"></iframe>
    </div>

  </div>

  <!-- ===== RIGHT PANEL ===== -->
  <div class="side">

    <div class="card">
      <h3>Users</h3>
      <div id="presence"></div>
    </div>

    <div class="card">
      <h3>Chat</h3>
      <div id="chat" class="chatBox"></div>
      <div class="chatInput">
        <input id="chatText">
        <button onclick="sendChat()">Send</button>
      </div>
    </div>

  </div>

</div>
<script>
let me=localStorage.getItem('gf_user')||prompt('Username?')||'Guest';
localStorage.setItem('gf_user',me);

let socket=null;
let room=null;
let gamesData=[];
let loadedGameKey='';
let petProfile=null;
let petShop={};
let petMoves={};

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));

  document.getElementById(id).classList.add('active');

  let buttons=document.querySelectorAll('.nav button');
  buttons.forEach(b=>{
    if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+id+"'")){
      b.classList.add('active');
    }
  });
}

function connect(){
  if(socket&&socket.readyState===1)return;

  socket=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);

  socket.onopen=function(){
    socket.send(JSON.stringify({type:'hello',username:me}));
  };

  socket.onmessage=function(e){
    let m=JSON.parse(e.data);

    if(m.type==='presence')drawPresence(m.users||[],m.rooms||[]);

    if(m.type==='roomJoined'||m.type==='roomUpdate'){
      room=m.room;
      drawRoom();
      if(m.scroll==='game')showSection('games');
    }

    if(m.type==='chat')drawChat(m.chat||[]);

    if(m.type==='roomClosed'){
      alert('Room closed');
      room=null;
      loadedGameKey='';
      gameArea.style.display='none';
      drawRoom();
    }

    if(m.type==='gameMove'){
      if(gameFrame&&gameFrame.contentWindow){
        gameFrame.contentWindow.postMessage({
          type:'gameMove',
          data:m.data
        },'*');
      }
    }

    if(m.type==='error'){
      alert(m.message||m.error||'Error');
    }
  };
}

function send(obj){
  connect();

  if(socket.readyState===1){
    socket.send(JSON.stringify(obj));
  }else{
    setTimeout(()=>socket.send(JSON.stringify(obj)),200);
  }
}

async function loadGames(){
  gamesData=await (await fetch('/api/games')).json();
  drawGames();
}

function drawGames(){
  gameList.innerHTML='';

  gamesData.forEach(g=>{
    let b=document.createElement('button');
    b.style.display='block';
    b.style.width='100%';
    b.style.margin='6px 0';
    b.innerHTML='<b>'+escapeHtml(g.name)+'</b><br><span class="muted">'+g.minPlayers+'-'+g.maxPlayers+' players</span>';

    if(room&&room.selectedGame&&room.selectedGame.id===g.id){
      b.style.background='#2563eb';
      b.style.color='white';
    }

    b.onclick=function(){
      if(!room){
        alert('Create or join a room first.');
        showSection('rooms');
        return;
      }

      send({type:'selectGame',gameId:g.id});
      showSection('rooms');
    };

    gameList.appendChild(b);
  });
}

function createRoom(){
  send({type:'createRoom',private:false});
  showSection('rooms');
}

function joinRoom(code){
  let c=(code||roomCode.value||'').trim().toUpperCase();

  if(!c)return alert('Enter a room code.');

  send({type:'joinRoom',roomId:c});
  showSection('rooms');
}

function leaveRoom(){
  send({type:'leaveRoom'});
  room=null;
  loadedGameKey='';
  gameArea.style.display='none';
  drawRoom();
}

function sit(i){
  send({type:'sit',seat:i});
}

function startGame(){
  send({type:'startGame'});
}

function drawRoom(){
  roomLabel.innerText=room?room.id:'None';

  if(!room){
    roomPanel.innerHTML='<p class="muted">Create or join a room to begin.</p>';
    gameArea.style.display='none';
    return;
  }

  let html='';
  html+='<h3>Room '+escapeHtml(room.id)+'</h3>';
  html+='<p class="muted">Owner: <b>'+escapeHtml(room.owner||'')+'</b></p>';
  html+='<p>Players: '+room.players.map(escapeHtml).join(', ')+'</p>';

  if(room.selectedGame){
    html+='<h3>Selected Game</h3>';
    html+='<p><b>'+escapeHtml(room.selectedGame.name)+'</b></p>';
    html+='<h3>Seats</h3>';

    room.seats.forEach((seat,i)=>{
      html+='<div style="display:inline-block;background:#111827;border:1px solid #334155;border-radius:12px;padding:10px;margin:5px;min-width:120px;text-align:center;">';
      html+='<b>Seat '+(i+1)+'</b><br>';
      html+=seat?escapeHtml(seat.name):'<span class="muted">Open</span>';
      html+='<br><button onclick="sit('+i+')">'+(seat?'Switch Here':'Sit Here')+'</button>';
      html+='</div>';
    });

    if(room.owner===me){
      html+='<br><button onclick="startGame()" style="margin-top:10px;background:#16a34a;color:white;">Start Game</button>';
    }else{
      html+='<p class="muted">Waiting for room owner to start.</p>';
    }
  }else{
    html+='<p class="muted">Choose a game from the Games tab.</p>';
  }

  roomPanel.innerHTML=html;

  drawGames();
  maybeLoadGame();
}

async function maybeLoadGame(){
  if(!(room&&room.started&&room.selectedGame)){
    gameArea.style.display='none';
    gameFrame.removeAttribute('srcdoc');
    return;
  }

  gameArea.style.display='block';

  let key=room.id+'|'+room.selectedGame.file+'|'+room.started+'|'+room.seats.map(s=>s?s.name:'').join(',');

  if(loadedGameKey===key)return;
  loadedGameKey=key;

  let players=room.seats
    .map((s,i)=>s?{seat:i,name:s.name}:null)
    .filter(Boolean);

  let mySeatIndex=room.seats.findIndex(s=>s&&s.name===me);

  let html=await (await fetch('/games/'+room.selectedGame.file+'?v='+Date.now())).text();

  let inject=
    '<script>'+
    'window.GAME_PLAYERS='+JSON.stringify(players).replace(/</g,'\\u003c')+';'+
    'window.GAME_MY_SEAT='+JSON.stringify(mySeatIndex>=0?mySeatIndex:null)+';'+
    'window.addEventListener("message",function(event){'+
      'var msg=event.data||{};'+
      'if(msg.type==="gameMove"&&window.onMove){window.onMove(msg.data);}'+
      'if(msg.type==="gameSetup"&&window.onMove){window.onMove(msg);}'+
      'if(msg.type==="gameSaveData"&&window.onSaveData){window.onSaveData(msg.data);}'+
    '});'+
    '<\/script>';

  if(html.includes('<head>')){
    html=html.replace('<head>','<head>'+inject);
  }else{
    html=inject+html;
  }

  gameFrame.onload=function(){
    if(gameFrame.contentWindow){
      gameFrame.contentWindow.postMessage({
        type:'gameSetup',
        players:players,
        mySeat:mySeatIndex>=0?mySeatIndex:null
      },'*');
    }
  };

  gameFrame.srcdoc=html;
}

function sendChat(){
  let t=chatText.value.trim();

  if(!t)return;

  send({type:'chat',text:t});
  chatText.value='';
}

function drawChat(items){
  chat.innerHTML=(items||[])
    .map(x=>'<div><b>'+escapeHtml(x.user)+':</b> '+escapeHtml(x.text)+'</div>')
    .join('');

  chat.scrollTop=chat.scrollHeight;
}

function drawPresence(users,rooms){
  presence.innerHTML='';

  if(!users.length){
    presence.innerHTML='<p class="muted">No users online.</p>';
    return;
  }

  users.forEach(u=>{
    let d=document.createElement('div');
    d.style.borderBottom='1px solid #334155';
    d.style.padding='8px';
    d.style.cursor=u.roomId&&!u.privateRoom?'pointer':'default';

    let roomInfo=u.roomId?' · Room '+escapeHtml(u.roomId):'';

    d.innerHTML='<b>'+escapeHtml(u.username)+'</b><br><span class="muted">'+escapeHtml(u.location||'Home')+roomInfo+'</span>';

    if(u.roomId&&!u.privateRoom){
      d.onclick=function(){joinRoom(u.roomId);};
    }

    presence.appendChild(d);
  });
}

/* ===== PET ===== */

async function loadPet(){
  try{
    let res=await fetch('/api/pet/profile?user='+encodeURIComponent(me));
    let data=await res.json();

    if(!data.ok){
      homePet.innerHTML='<p class="muted">Pet unavailable.</p>';
      petPanel.innerHTML='<p class="muted">Pet unavailable.</p>';
      return;
    }

    petProfile=data.profile;
    petShop=data.shop||{};
    petMoves=data.moves||{};

    drawPet();
    drawShop();
    drawInventory();
  }catch(err){
    homePet.innerHTML='<p class="muted">Could not load pet.</p>';
  }
}

function activePet(){
  if(!petProfile)return null;
  return petProfile.pets[petProfile.activePetId];
}

function drawPet(){
  let pet=activePet();

  if(!pet){
    homePet.innerHTML='<p class="muted">No pet yet.</p>';
    petPanel.innerHTML='<p class="muted">No pet yet.</p>';
    return;
  }

  let emoji=pet.emoji||'🥚';

  let mini=
    '<div style="display:flex;gap:10px;align-items:center;">'+
      '<div style="font-size:46px;background:#1e293b;border-radius:16px;padding:10px;">'+emoji+'</div>'+
      '<div>'+
        '<h3 style="margin:0">'+escapeHtml(pet.name||'Mystery Egg')+'</h3>'+
        '<p class="muted">'+escapeHtml(pet.stage||'egg')+(pet.type?' · '+escapeHtml(pet.type):'')+'</p>'+
        '<p><b>Coins:</b> '+Number(petProfile.money||0)+'</p>'+
      '</div>'+
    '</div>';

  homePet.innerHTML=mini;

  let html=mini;

  if(pet.stage==='egg'){
    let t=pet.eggTraits||{};
    let total=Number(t.warm||0)+Number(t.cold||0)+Number(t.wet||0)+Number(t.dry||0)+Number(t.light||0)+Number(t.dark||0);

    html+='<div class="card"><h3>Egg Traits</h3>';
    html+='<p class="muted">'+total+'/18 care points to hatch.</p>';
    html+='<p>Warm '+(t.warm||0)+' · Cold '+(t.cold||0)+' · Wet '+(t.wet||0)+' · Dry '+(t.dry||0)+' · Light '+(t.light||0)+' · Dark '+(t.dark||0)+'</p>';
    html+='<button onclick="careEggRandom()">Care Egg</button>';
    html+='</div>';
  }else{
    html+='<div class="card"><h3>Stats</h3>';
    html+=petStat('Hunger',pet.needs.hunger);
    html+=petStat('Happy',pet.needs.happiness);
    html+=petStat('Energy',pet.needs.energy);
    html+=petStat('Clean',pet.needs.cleanliness);
    html+='<button onclick="petUseItem(\'berry\')">Feed Berry</button>';
    html+='<button onclick="petPlay()">Play</button>';
    html+='</div>';

    html+='<div class="card"><h3>Moves</h3>';
    (pet.moves||[]).forEach(m=>{
      let move=petMoves[m]||{name:m,type:'normal'};
      html+='<span class="badge">'+escapeHtml(move.name)+' · '+escapeHtml(move.type)+'</span> ';
    });
    html+='</div>';
  }

  petPanel.innerHTML=html;
}

function petStat(name,val){
  val=Number(val||0);
  return '<p>'+name+': <b>'+val+'</b></p>';
}

async function careEggRandom(){
  let actions=['warm','cold','wet','dry','light','dark'];
  let action=actions[Math.floor(Math.random()*actions.length)];

  let res=await fetch('/api/pet/care-egg',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:me,action:action})
  });

  let data=await res.json();
  if(data.error)return alert(data.error);

  petProfile=data.profile;
  drawPet();

  if(data.message)alert(data.message);
}

async function petUseItem(itemId){
  let res=await fetch('/api/pet/use-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:me,itemId:itemId})
  });

  let data=await res.json();
  if(data.error)return alert(data.error);

  petProfile=data.profile;
  drawPet();
  drawInventory();
}

async function petPlay(){
  let res=await fetch('/api/pet/play',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:me})
  });

  let data=await res.json();
  if(data.error)return alert(data.error);

  petProfile=data.profile;
  drawPet();
}

function drawShop(){
  if(!petShop){
    shopPanel.innerHTML='<p class="muted">Shop unavailable.</p>';
    return;
  }

  let html='';

  Object.keys(petShop).forEach(id=>{
    let item=petShop[id];

    html+='<div class="card">';
    html+='<h3>'+escapeHtml(item.name)+'</h3>';
    html+='<p class="muted">'+escapeHtml(item.description||'')+'</p>';
    html+='<p><b>'+Number(item.price||0)+' coins</b></p>';
    html+='<button onclick="buyItem(\''+id+'\')">Buy</button>';
    html+='</div>';
  });

  shopPanel.innerHTML=html;
}

async function buyItem(itemId){
  let res=await fetch('/api/pet/buy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:me,itemId:itemId})
  });

  let data=await res.json();
  if(data.error)return alert(data.error);

  petProfile=data.profile;
  drawPet();
  drawInventory();
}

function drawInventory(){
  if(!petProfile){
    inventoryPanel.innerHTML='<p class="muted">No inventory.</p>';
    return;
  }

  let inv=petProfile.inventory||{};
  let html='';

  Object.keys(inv).forEach(id=>{
    if(inv[id]<=0)return;

    let item=petShop[id]||{name:id};

    html+='<div class="card">';
    html+='<h3>'+escapeHtml(item.name)+'</h3>';
    html+='<p>x'+inv[id]+'</p>';
    html+='<button onclick="petUseItem(\''+id+'\')">Use</button>';
    html+='</div>';
  });

  if(!html)html='<p class="muted">Inventory is empty.</p>';

  inventoryPanel.innerHTML=html;
}

/* ===== SAVE BRIDGE ===== */

function handleGameSaveLoad(msg){
  let username=msg.username||me||'guest';
  let key='gf_save_'+msg.gameId+'_'+username;
  let data=null;

  try{
    data=JSON.parse(localStorage.getItem(key)||'null');
  }catch(err){
    data=null;
  }

  if(gameFrame&&gameFrame.contentWindow){
    gameFrame.contentWindow.postMessage({
      type:'gameSaveData',
      gameId:msg.gameId,
      data:data
    },'*');
  }
}

function handleGameSaveStore(msg){
  let username=msg.username||me||'guest';
  let key='gf_save_'+msg.gameId+'_'+username;

  try{
    localStorage.setItem(key,JSON.stringify(msg.data));
  }catch(err){
    alert('Save failed: '+err.message);
  }
}

window.addEventListener('message',e=>{
  let msg=e.data||{};

  if(msg.type==='move'&&socket){
    send({type:'gameMove',data:msg.data});
  }

  if(msg.type==='gameSaveLoad'){
    handleGameSaveLoad(msg);
  }

  if(msg.type==='gameSaveStore'){
    handleGameSaveStore(msg);
  }
});

/* ===== UTILS ===== */

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[c]));
}

/* ===== INIT ===== */

connect();
loadGames();
loadPet();
drawRoom();
</script>
</body>
</html>
