<script>
let me=localStorage.getItem('gf_user')||'';
let admin=localStorage.getItem('gf_admin')==='true';
let socket=null;
let currentRoom=null;
let room=null;
let games=[];
let loadedGameKey='';

function drawAuth(){
  if(me){
    loginControls.classList.add('hidden');
    loggedInControls.classList.remove('hidden');
    loggedInLabel.innerText='Logged in as '+me;
    authStatus.innerText='';
  }else{
    loginControls.classList.remove('hidden');
    loggedInControls.classList.add('hidden');
    loggedInLabel.innerText='';
  }
}

async function loadGames(){
  games=await (await fetch('/api/games')).json();
  drawGames();
}

function connect(){
  if(socket&&socket.readyState===1)return;
  socket=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);
  socket.onopen=()=>socket.send(JSON.stringify({type:'hello',username:me}));

  socket.onmessage=e=>{
    let m=JSON.parse(e.data);

    if(m.type==='presence')drawPresence(m.users||[],m.rooms||[]);

    if(m.type==='roomJoined'||m.type==='roomUpdate'){
      room=m.room;
      currentRoom=room.id;
      drawRoom();
      if(m.scroll)scrollToArea(m.scroll);
    }

    if(m.type==='chat')drawChat(m.chat);

    if(m.type==='roomClosed'){
      alert('Room closed');
      room=null;
      currentRoom=null;
      loadedGameKey='';
      drawRoom();
    }

    if(m.type==='gameMove'){
      let f=document.getElementById('gameFrame');
      if(f.contentWindow){
        f.contentWindow.postMessage({
          type:'gameMove',
          data:m.data
        }, '*');
      }
    }

    if(m.type==='error')alert(m.message||m.error||'Error');
  };
}

async function register(){
  let r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.value,password:pass.value})});
  let d=await r.json();
  if(d.error)return alert(d.error);
  setLogin(d);
}

async function login(){
  let r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.value,password:pass.value})});
  let d=await r.json();
  if(d.error)return alert(d.error);
  setLogin(d);
}

function setLogin(d){
  me=d.user.username;
  admin=!!d.admin;
  localStorage.setItem('gf_user',me);
  localStorage.setItem('gf_admin',admin);
  drawAuth();
  connect();
  setTimeout(()=>socket&&socket.send(JSON.stringify({type:'hello',username:me})),200);
}

function logout(){
  me='';
  admin=false;
  localStorage.removeItem('gf_user');
  localStorage.removeItem('gf_admin');
  drawAuth();
  if(socket)socket.send(JSON.stringify({type:'hello',username:''}));
}

function send(obj){
  connect();
  if(socket.readyState===1){
    socket.send(JSON.stringify(obj));
  }else{
    setTimeout(()=>socket.send(JSON.stringify(obj)),200);
  }
}

function createRoom(){send({type:'createRoom',private:privateRoom.checked});}
function joinRoom(code){
  let c=(code||roomCode.value||'').trim().toUpperCase();
  if(!c)return alert('Enter a room code.');
  send({type:'joinRoom',roomId:c});
}
function leaveRoom(){
  send({type:'leaveRoom'});
  room=null;
  currentRoom=null;
  loadedGameKey='';
  drawRoom();
}
function selectGame(id){
  if(!room)return alert('Create or join a room first.');
  send({type:'selectGame',gameId:id});
}
function sit(i){send({type:'sit',seat:i});}
function stand(){send({type:'stand'});}
function startGame(){send({type:'startGame'});}
function passOwner(to){send({type:'passOwner',to});}
function closeRoom(){if(confirm('Close this room for everyone?'))send({type:'closeRoom'});}
function sendChat(){
  let t=chatText.value.trim();
  if(t){
    send({type:'chat',text:t});
    chatText.value='';
  }
}

function drawGames(){
  let g=document.getElementById('gameList');
  g.innerHTML='';
  games.forEach(x=>{
    let b=document.createElement('button');
    b.className='gameBtn '+(room&&room.selectedGame&&room.selectedGame.id===x.id?'selected':'');
    b.innerHTML='<b>'+escapeHtml(x.name)+'</b><br><span class="muted">'+x.minPlayers+'-'+x.maxPlayers+' players</span>';
    b.onclick=()=>selectGame(x.id);
    g.appendChild(b);
  });
}

function drawRoom(){
  roomLabel.innerText=room?room.id:'None';
  roomPrivacy.innerHTML=room?(room.private?'<span class="pill locked">Private 🔒</span>':'<span class="pill public">Public</span>'):'';

  roomHelp.innerHTML=room
    ? (room.private?'Private room: share the code <b>'+room.id+'</b> to invite people.':'Public room: people can click your name in the sidebar to join.')
    : 'Create or join a room first.';

  drawGames();

  roomPeople.innerHTML=room?'<b>People in room:</b> '+room.players.map(escapeHtml).join(', '):'';

  ownerControls.innerHTML='';
  if(room&&room.owner===me){
    ownerControls.innerHTML='<div class="card"><p class="owner">You are the room owner.</p><button class="danger" onclick="closeRoom()">Close Room</button><br><span class="muted">Pass ownership:</span> '+room.players.map(p=>p!==me?'<button onclick="passOwner(\\''+escapeAttr(p)+'\\')">'+escapeHtml(p)+'</button>':'').join(' ')+'</div>';
  }else if(room){
    ownerControls.innerHTML='<p class="muted">Room owner: <b>'+escapeHtml(room.owner||'')+'</b></p>';
  }

  let s=document.getElementById('seats');
  s.innerHTML='';

  if(room&&room.selectedGame){
    room.seats.forEach((seat,i)=>{
      let d=document.createElement('div');
      d.className='seat '+(seat?'filled':'empty');
      d.innerHTML='<b>Seat '+(i+1)+'</b><br>'+(seat?escapeHtml(seat.name):'Open')+'<br><button onclick="sit('+i+')">'+(seat?'Switch Here':'Sit Here')+'</button>';
      s.appendChild(d);
    });

    let seatedCount=room.seats.filter(Boolean).length;

    startBtn.style.display=room.owner===me?'inline-block':'none';

    startHint.innerText=room.owner===me
      ? 'Start when the table is ready. Seated players will enter the game.'
      : 'Only the room owner can start the game.';

    if(room.selectedGame){
      startHint.innerText+=' Selected: '+room.selectedGame.name+' ('+seatedCount+'/'+room.seats.length+' seated).';
    }

  }else{
    startBtn.style.display='none';
    startHint.innerText='';
    s.innerHTML='<i>Select a game to create seats.</i>';
  }

  drawChat(room?room.chat:[]);
  maybeLoadGame();
}

async function maybeLoadGame(){
  if(!(room&&room.started&&room.selectedGame)){
    gameHint.innerText='The started game appears here for seated players.';
    gameFrame.removeAttribute('srcdoc');
    return;
  }

  let seated=room.seats.filter(Boolean);
  let mySeated=seated.some(x=>x.name===me);

  gameHint.innerText=mySeated?'You are seated. Play below.':'You are watching this table.';

  let key=room.id+'|'+room.selectedGame.file+'|'+room.started+'|'+room.seats.map(x=>x?x.name:'').join(',');
  if(loadedGameKey===key)return;

  loadedGameKey=key;

  let players=room.seats
    .map((x,i)=>x?{seat:i,name:x.name}:null)
    .filter(Boolean);

  let mySeatIndex=room.seats.findIndex(x=>x&&x.name===me);

  let html=await (await fetch('/games/'+room.selectedGame.file+'?v='+Date.now())).text();

  let inject =
    '<script>'+
    'window.GAME_PLAYERS='+JSON.stringify(players).replace(/</g,'\\u003c')+';'+
    'window.GAME_MY_SEAT='+JSON.stringify(mySeatIndex>=0?mySeatIndex:null)+';'+
    'window.addEventListener("message",function(event){'+
      'var msg=event.data||{};'+
      'if(msg.type==="gameMove"&&window.onMove){window.onMove(msg.data);}'+
      'if(msg.type==="gameSetup"&&window.onMove){window.onMove(msg);}'+
    '});'+
    '<\/script>';

  if(html.includes('<head>')){
    html=html.replace('<head>','<head>'+inject);
  }else{
    html=inject+html;
  }

  gameFrame.onload=function(){
    if(gameFrame.contentWindow){
      gameFrame.contentWindow.postMessage({
        type:'gameSetup',
        players:players,
        mySeat:mySeatIndex>=0?mySeatIndex:null
      }, '*');
    }
  };

  gameFrame.srcdoc=html;
  scrollToArea('game');
}

function drawChat(items){
  chat.innerHTML=(items||[]).map(x=>'<div><b>'+escapeHtml(x.user)+':</b> '+escapeHtml(x.text)+'</div>').join('');
  chat.scrollTop=chat.scrollHeight;
}

function drawPresence(users,rooms){
  let p=document.getElementById('presence');
  p.innerHTML='';

  if(!users.length){
    p.innerHTML='<p class="muted">No logged-in users yet.</p>';
    return;
  }

  users.forEach(u=>{
    let d=document.createElement('div');
    let canJoin=u.roomId&&!u.privateRoom;

    d.className='userItem '+(canJoin?'clickable':'')+(u.privateRoom?' private':'');

    d.innerHTML='<b>'+escapeHtml(u.username)+'</b><br><span class="roomBadge">'+escapeHtml(u.location||'Home')+(u.roomId?' · '+escapeHtml(u.roomId):'')+(u.privateRoom?' 🔒 private':'')+'</span>'+(canJoin?'<br><small>Click to join room</small>':'');

    if(canJoin)d.onclick=()=>joinRoom(u.roomId);

    p.appendChild(d);
  });
}

function scrollToArea(a){
  setTimeout(()=>document.getElementById(a==='game'?'gameArea':'tableArea').scrollIntoView({behavior:'smooth',block:'start'}),150);
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function escapeAttr(s){
  return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/</g,'');
}

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='move'&&socket){
    send({type:'gameMove',data:e.data.data});
  }
});

drawAuth();
if(me)connect();
loadGames();
drawRoom();
</script>
