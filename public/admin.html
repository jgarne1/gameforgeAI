<!DOCTYPE html><html><head><title>GameForge Admin</title><style>body{font-family:Arial;background:#f3f1ea;margin:0}.wrap{max-width:1100px;margin:auto;padding:16px}section{background:white;border:1px solid #ccc;border-radius:12px;margin:10px 0;padding:14px}button,input{padding:8px;margin:4px;border-radius:8px;border:1px solid #888}button{background:#222;color:white;cursor:pointer}.danger{background:#9b1c1c}table{width:100%;border-collapse:collapse}td,th{border:1px solid #bbb;padding:8px;text-align:left}.muted{color:#666}</style></head><body><div class="wrap"><h1>Admin</h1><p><a href="/">Back to GameForge</a></p><section><h2>Admin Login Check</h2><input id="adminUser" placeholder="your admin username"><button onclick="saveAdmin()">Use This Admin Name</button><p class="muted">Admin usernames are listed in <code>data/admins.json</code>. Default admin is <b>admin</b>.</p></section><section><h2>Users</h2><button onclick="loadUsers()">Refresh Users</button><div id="users"></div></section><section><h2>Open Rooms</h2><button onclick="loadRooms()">Refresh Rooms</button><div id="rooms"></div></section></div><script>
let admin=localStorage.getItem('gfAdminUser')||''; adminUser.value=admin;
function saveAdmin(){admin=adminUser.value.trim().toLowerCase();localStorage.setItem('gfAdminUser',admin);loadUsers();loadRooms();}
function api(url,opts={}){return fetch(url,{...opts,headers:{'Content-Type':'application/json','x-user':admin,...(opts.headers||{})}})}
async function loadUsers(){const r=await api('/api/admin/users');const d=await r.json();if(d.error){users.innerHTML='<b>'+d.error+'</b>';return;}users.innerHTML='<table><tr><th>User</th><th>Wins</th><th>Losses</th><th>Ties</th><th>Played</th><th>Favorite</th><th>Action</th></tr>'+d.users.map(u=>`<tr><td>${u.username}</td><td>${u.wins}</td><td>${u.losses}</td><td>${u.ties}</td><td>${u.gamesPlayed}</td><td>${u.favoriteGame||''}</td><td><button class="danger" onclick="delUser('${u.username}')">Delete</button></td></tr>`).join('')+'</table>';}
async function delUser(u){if(!confirm('Delete '+u+'?'))return;await api('/api/admin/users/'+u,{method:'DELETE'});loadUsers();}
async function loadRooms(){const r=await api('/api/admin/rooms');const d=await r.json();if(d.error){rooms.innerHTML='<b>'+d.error+'</b>';return;}rooms.innerHTML=d.rooms.length?d.rooms.map(room=>`<section><h3>Room ${room.id}</h3><p>Owner: ${room.owner}</p><p>Users: ${room.users.join(', ')||'none'}</p><p>Game: ${room.selectedGame||'none'}</p><button onclick="location.href='/?join=${room.id}'">Open Site</button><button class="danger" onclick="closeRoom('${room.id}')">Close Room</button></section>`).join(''):'No open rooms.';}
async function closeRoom(id){if(!confirm('Close room '+id+'?'))return;await api('/api/admin/rooms/'+id+'/close',{method:'POST'});loadRooms();}
loadUsers();loadRooms();
</script></body></html>
