<!DOCTYPE html><html><head><title>GameForge Admin</title><style>body{font-family:Arial;padding:20px;background:#f5f5f5}.card{background:white;border:1px solid #ccc;border-radius:10px;padding:14px;margin:10px 0}button{padding:6px 10px;margin:4px;background:#224f8f;color:white;border:0;border-radius:6px}.danger{background:#9b1c1c}table{border-collapse:collapse;width:100%;background:white}td,th{border:1px solid #aaa;padding:8px}</style></head><body><h1>Admin</h1><p><a href="/">Back to GameForge</a></p><div class="card"><input id="admin" placeholder="admin username"><button onclick="loadAll()">Load Admin Data</button></div><div class="card"><h2>Users</h2><div id="users"></div></div><div class="card"><h2>Open Rooms</h2><div id="rooms"></div></div><script>
function val(id){return document.getElementById(id).value.trim()} document.getElementById('admin').value=localStorage.getItem('gfUser')||'';
async function api(p,o){const r=await fetch(p,o);return r.json()} async function loadAll(){loadUsers();loadRooms()}
async function loadUsers(){const a=val('admin'); const data=await api('/api/admin/users?admin='+encodeURIComponent(a)); if(data.error){alert(data.error);return} document.getElementById('users').innerHTML='<table><tr><th>User</th><th>Stats</th><th>Favorite</th><th>Action</th></tr>'+data.map(u=>`<tr><td>${u.username}${u.admin?' ⭐':''}</td><td>${JSON.stringify(u.stats)}</td><td>${u.favoriteGame||''}</td><td><button class="danger" onclick="delUser('${u.username}')">Delete</button></td></tr>`).join('')+'</table>';}
async function delUser(u){if(!confirm('Delete '+u+'?'))return; await fetch('/api/admin/users/'+u+'?admin='+encodeURIComponent(val('admin')),{method:'DELETE'}); loadUsers();}
async function loadRooms(){const a=val('admin'); const data=await api('/api/admin/rooms?admin='+encodeURIComponent(a)); if(data.error){alert(data.error);return} document.getElementById('rooms').innerHTML='<table><tr><th>Room</th><th>Owner</th><th>Private</th><th>Users</th><th>Action</th></tr>'+data.map(r=>`<tr><td>${r.id}</td><td>${r.owner}</td><td>${r.private?'Yes':'No'}</td><td>${Object.keys(r.users||{}).join(', ')}</td><td><button onclick="location.href='/?room=${r.id}'">Join</button><button class="danger" onclick="closeRoom('${r.id}')">Close</button></td></tr>`).join('')+'</table>';}
async function closeRoom(id){await fetch('/api/admin/rooms/'+id+'/close',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({admin:val('admin')})});loadRooms();}
</script></body></html>
