<!DOCTYPE html><html><head><title>Admin</title><style>body{font-family:Arial;padding:16px}table{border-collapse:collapse}td,th{border:1px solid #999;padding:6px}button{padding:6px;margin:3px}</style></head><body><h1>Admin</h1><p>User: <input id="user" placeholder="admin username"><button onclick="loadAll()">Load</button></p><h2>Users</h2><div id="users"></div><h2>Rooms</h2><div id="rooms"></div><script>
let ws;
async function loadAll(){let u=user.value;let us=await(await fetch('/api/admin/users?user='+encodeURIComponent(u))).json();if(us.error)return alert(us.error);users.innerHTML='<table><tr><th>User</th><th>Wins</th><th>Losses</th><th>Played</th><th></th></tr>'+us.map(x=>'<tr><td>'+x.username+'</td><td>'+x.wins+'</td><td>'+x.losses+'</td><td>'+x.gamesPlayed+'</td><td><button onclick="del(\''+x.username+'\')">Delete</button></td></tr>').join('')+'</table>';let rs=await(await fetch('/api/admin/rooms?user='+encodeURIComponent(u))).json();rooms.innerHTML='<table><tr><th>Room</th><th>Owner</th><th>Private</th><th>Game</th><th></th></tr>'+rs.map(r=>'<tr><td>'+r.id+'</td><td>'+r.owner+'</td><td>'+r.private+'</td><td>'+(r.selectedGame?r.selectedGame.name:'')+'</td><td><button onclick="closeR(\''+r.id+'\')">Close</button></td></tr>').join('')+'</table>';connect()}
async function del(n){await fetch('/api/admin/users/'+n+'?user='+encodeURIComponent(user.value),{method:'DELETE'});loadAll()}
function connect(){if(ws)return;ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host);ws.onopen=()=>ws.send(JSON.stringify({type:'hello',username:user.value}))}
function closeR(id){connect();setTimeout(()=>ws.send(JSON.stringify({type:'adminClose',roomId:id})),100)}
</script></body></html>
