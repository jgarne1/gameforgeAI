<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body { font-family: Arial; text-align: center; }
#board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content:center; margin: 20px auto; }
.cell { width: 100px; height: 100px; font-size: 42px; border: 2px solid #111; display:flex; align-items:center; justify-content:center; cursor:pointer; }
</style>
</head>
<body>
<h2>Tic Tac Toe</h2>
<div id="status">Player X's turn</div>
<button onclick="newGame(true)">New Game</button>
<div id="board"></div>
<script>
let board = Array(9).fill("");
let turn = "X";
let active = true;
let wins = JSON.parse(localStorage.getItem("tttWins") || '{"X":0,"O":0,"T":0}');
const winsCombos = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function draw(){
  const b=document.getElementById("board"); b.innerHTML="";
  board.forEach((v,i)=>{ const c=document.createElement("div"); c.className="cell"; c.innerText=v; c.onclick=()=>move(i,true); b.appendChild(c); });
}
function move(i,send){
  if(!active || board[i]) return;
  board[i]=turn;
  if(check(turn)){ active=false; wins[turn]++; save(); status(turn+" wins!"); }
  else if(!board.includes("")){ active=false; wins.T++; save(); status("Tie game!"); }
  else { turn=turn==="X"?"O":"X"; status("Player "+turn+"'s turn"); }
  draw();
  if(send) sendMove({type:"move", i});
}
function check(p){ return winsCombos.some(a=>a.every(i=>board[i]===p)); }
function status(t){ document.getElementById("status").innerText=t+" | X wins: "+wins.X+" O wins: "+wins.O+" Ties: "+wins.T; }
function save(){ localStorage.setItem("tttWins", JSON.stringify(wins)); }
function newGame(send){ board=Array(9).fill(""); turn="X"; active=true; status("Player X's turn"); draw(); if(send) sendMove({type:"newGame"}); }
window.sendMove = function(data){ parent.postMessage({type:"move", data}, "*"); };
window.onMove = function(data){ if(data.type==="move") move(data.i,false); if(data.type==="newGame") newGame(false); };
status("Player X's turn"); draw();
</script>
</body>
</html>
