<!DOCTYPE html>
<html>
<head>
<title>Trouble</title>
<style>
:root{--bg:#101827;--panel:#172033;--line:#334155;--gold:#facc15;--red:#ef4444;--blue:#3b82f6;--green:#22c55e;--yellow:#facc15;--muted:#cbd5e1}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#243b55,#101827);color:white;text-align:center;overflow:hidden}
.wrap{height:650px;padding:10px;display:grid;grid-template-rows:auto 1fr auto;gap:8px}
.top,.game,.controls{background:rgba(23,32,51,.94);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 28px rgba(0,0,0,.28)}
.top{display:flex;justify-content:space-between;align-items:center;padding:9px 12px}
h2{margin:0}
button{padding:9px 12px;border-radius:12px;border:1px solid #94a3b8;background:#f8fafc;color:#111;font-weight:bold;cursor:pointer}
button.gold{background:var(--gold);border-color:var(--gold)}
button.primary{background:#60a5fa;border-color:#60a5fa}
button:disabled{opacity:.45;cursor:not-allowed}
.game{position:relative;overflow:hidden}
.board{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,#ffffff 0 22%,#dbeafe 23% 38%,#1e3a8a 39% 41%,transparent 42%);box-shadow:inset 0 0 40px rgba(0,0,0,.2)}
.space{position:absolute;width:34px;height:34px;border-radius:50%;background:#f8fafc;border:2px solid #1f2937;display:flex;align-items:center;justify-content:center;font-size:11px;color:#111}
.space.safe{box-shadow:0 0 0 4px rgba(250,204,21,.45)}
.homeSlot,.baseSlot{position:absolute;width:38px;height:38px;border-radius:50%;border:2px solid white;background:rgba(255,255,255,.22)}
.token{position:absolute;width:28px;height:28px;border-radius:50%;border:3px solid white;box-shadow:0 4px 10px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:13px;cursor:pointer;transition:.25s ease}
.token.pickable{outline:4px solid white;transform:scale(1.15)}
.token.red{background:var(--red)}.token.blue{background:var(--blue)}.token.green{background:var(--green)}.token.yellow{background:var(--yellow);color:#111}
.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:165px;height:165px;border-radius:50%;background:rgba(15,23,42,.94);border:4px solid rgba(255,255,255,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.dice{font-size:46px;font-weight:bold;background:white;color:#111;border-radius:18px;width:78px;height:62px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 0 #94a3b8}
.status{font-size:15px;font-weight:bold}
.muted{font-size:12px;color:var(--muted)}
.controls{padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.players{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.player{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:13px;padding:7px 10px;min-width:145px}
.player.turn{outline:3px solid var(--gold)}
.log{height:64px;overflow:auto;text-align:left;background:#fffbea;color:#1f2937;border-radius:12px;padding:7px;font-size:12px}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h2>Trouble</h2>
    <div>
      <span id="meLabel" class="badge"></span>
      <button class="gold" onclick="newGame(true)">New Game</button>
    </div>
  </div>

  <div class="game">
    <div id="board" class="board"></div>
    <div class="center">
      <div id="dice" class="dice">–</div>
      <div id="status" class="status">Loading players...</div>
      <div id="hint" class="muted">Roll a 6 to leave base.</div>
      <button id="rollBtn" class="primary" onclick="rollDice()">Roll Dice</button>
    </div>
  </div>

  <div class="controls">
    <div id="playersPanel" class="players"></div>
    <div id="log" class="log"></div>
  </div>
</div>

<script>
const GAME_META={id:'trouble',name:'Trouble',minPlayers:2,maxPlayers:4,seats:4};

const COLORS=['red','blue','green','yellow'];
const TRACK=40;
const PIECES=4;

let players=[];
let mySeat=null;
let state=null;
let coords=[];
let bases={};
let homes={};

function el(id){return document.getElementById(id);}
function setStatus(a,b){el('status').innerText=a;el('hint').innerText=b||'';}

window.onerror=function(msg){
  setStatus('Game error: '+msg,'Check console for details.');
};

function receiveSetup(setupPlayers,setupSeat){
  if(Array.isArray(setupPlayers)&&setupPlayers.length){
    players=setupPlayers.slice(0,4).map((p,i)=>({
      seat:p.seat,
      name:p.name||('Seat '+(p.seat+1)),
      color:COLORS[i],
      start:(i*10)%TRACK
    }));
  }

  mySeat=setupSeat;

  if(players.length<2){
    setStatus('Waiting for players...','Trouble needs 2–4 seated players.');
    drawStaticBoard();
    return;
  }

  if(!state)state=fresh();
  ensureState();
  draw();
}

function fresh(){
  let pieces={};
  players.forEach(p=>{
    pieces[p.seat]=[];
    for(let i=0;i<PIECES;i++){
      pieces[p.seat].push({where:'base',pos:null,home:null});
    }
  });

  return {
    pieces,
    turn:players[0].seat,
    dice:null,
    rolled:false,
    winner:null,
    log:['New Trouble game started. Roll a 6 to leave base.']
  };
}

function ensureState(){
  if(!state.pieces)state.pieces={};
  players.forEach(p=>{
    if(!state.pieces[p.seat]){
      state.pieces[p.seat]=[];
      for(let i=0;i<PIECES;i++)state.pieces[p.seat].push({where:'base',pos:null,home:null});
    }
  });
}

function computeCoords(){
  coords=[];
  let cx=260,cy=260,r=210;
  for(let i=0;i<TRACK;i++){
    let ang=(-90+i*(360/TRACK))*Math.PI/180;
    coords.push({x:cx+Math.cos(ang)*r-17,y:cy+Math.sin(ang)*r-17});
  }

  bases={
    red:[[52,52],[100,52],[52,100],[100,100]],
    blue:[[382,52],[430,52],[382,100],[430,100]],
    green:[[382,382],[430,382],[382,430],[430,430]],
    yellow:[[52,382],[100,382],[52,430],[100,430]]
  };

  homes={
    red:[[230,76],[230,116],[230,156],[230,196]],
    blue:[[324,230],[364,230],[404,230],[444,230]],
    green:[[252,324],[252,364],[252,404],[252,444]],
    yellow:[[76,252],[116,252],[156,252],[196,252]]
  };
}

function drawStaticBoard(){
  computeCoords();
  let b=el('board');
  b.innerHTML='';

  coords.forEach((p,i)=>{
    let s=document.createElement('div');
    s.className='space '+(i%10===0?'safe':'');
    s.style.left=p.x+'px';
    s.style.top=p.y+'px';
    s.innerText=i%10===0?'★':'';
    b.appendChild(s);
  });

  COLORS.forEach(color=>{
    bases[color].forEach(pt=>{
      let d=document.createElement('div');
      d.className='baseSlot';
      d.style.left=pt[0]+'px';
      d.style.top=pt[1]+'px';
      d.style.background=color;
      d.style.opacity='.45';
      b.appendChild(d);
    });

    homes[color].forEach(pt=>{
      let d=document.createElement('div');
      d.className='homeSlot';
      d.style.left=pt[0]+'px';
      d.style.top=pt[1]+'px';
      d.style.background=color;
      d.style.opacity='.35';
      b.appendChild(d);
    });
  });

  el('playersPanel').innerHTML='';
}

function draw(){
  if(!state||players.length<2){
    drawStaticBoard();
    return;
  }

  drawStaticBoard();
  drawTokens();
  drawPlayers();
  drawLog();

  el('meLabel').innerText=mySeat===null||mySeat===undefined?'Watching':'You are '+name(mySeat);
  el('dice').innerText=state.dice||'–';

  if(state.winner!==null){
    setStatus(name(state.winner)+' wins!','Start a new game to play again.');
    el('rollBtn').disabled=true;
    return;
  }

  setStatus('Turn: '+name(state.turn),state.turn===mySeat?'Roll, then choose a glowing piece.':'Waiting for '+name(state.turn)+'.');

  el('rollBtn').disabled=state.turn!==mySeat||state.rolled||state.winner!==null;
}

function drawTokens(){
  players.forEach(p=>{
    let arr=state.pieces[p.seat]||[];
    let legal=legalMovesForSeat(p.seat);

    arr.forEach((piece,i)=>{
      let t=document.createElement('div');
      t.className='token '+p.color+(legal.includes(i)&&p.seat===mySeat?' pickable':'');
      t.innerText=i+1;
      t.onclick=()=>movePiece(i);

      let pt=tokenPoint(p,piece,i);
      t.style.left=pt.x+'px';
      t.style.top=pt.y+'px';

      el('board').appendChild(t);
    });
  });
}

function tokenPoint(player,piece,index){
  if(piece.where==='base'){
    let pt=bases[player.color][index];
    return {x:pt[0]+5,y:pt[1]+5};
  }

  if(piece.where==='home'){
    let h=Math.min(piece.home,3);
    let pt=homes[player.color][h];
    return {x:pt[0]+5,y:pt[1]+5};
  }

  let pt=coords[piece.pos];
  let stackOffset=index*3;
  return {x:pt.x+3+stackOffset,y:pt.y+3+stackOffset};
}

function drawPlayers(){
  let html='';
  players.forEach(p=>{
    let finished=(state.pieces[p.seat]||[]).filter(x=>x.where==='home'&&x.home>=3).length;
    html+='<div class="player '+(state.turn===p.seat&&!state.winner?'turn':'')+'">'+
      '<b style="color:'+p.color+'">'+escapeHtml(p.name)+'</b><br>'+
      '<span class="muted">'+finished+'/'+PIECES+' finished'+(p.seat===mySeat?' · You':'')+'</span>'+
    '</div>';
  });
  el('playersPanel').innerHTML=html;
}

function drawLog(){
  el('log').innerHTML=state.log.slice(-5).map(x=>'• '+escapeHtml(x)).join('<br>');
  el('log').scrollTop=el('log').scrollHeight;
}

function rollDice(){
  if(state.turn!==mySeat||state.rolled||state.winner!==null)return;

  state.dice=1+Math.floor(Math.random()*6);
  state.rolled=true;
  add(name(mySeat)+' rolled a '+state.dice+'.');

  if(legalMovesForSeat(mySeat).length===0){
    add(name(mySeat)+' has no legal moves.');
    endTurn();
  }

  draw();
  sync();
}

function legalMovesForSeat(seat){
  if(!state||!state.rolled||state.turn!==seat)return [];

  let p=playerBySeat(seat);
  let dice=state.dice;
  let arr=state.pieces[seat]||[];
  let legal=[];

  arr.forEach((piece,i)=>{
    if(piece.where==='base'){
      if(dice===6 && !ownPieceAtStart(seat))legal.push(i);
      return;
    }

    if(piece.where==='track'){
      legal.push(i);
      return;
    }

    if(piece.where==='home'&&piece.home<3){
      if(piece.home+dice<=3)legal.push(i);
    }
  });

  return legal;
}

function ownPieceAtStart(seat){
  let p=playerBySeat(seat);
  return (state.pieces[seat]||[]).some(x=>x.where==='track'&&x.pos===p.start);
}

function movePiece(index){
  if(state.turn!==mySeat||state.winner!==null)return;

  let legal=legalMovesForSeat(mySeat);
  if(!legal.includes(index))return;

  let p=playerBySeat(mySeat);
  let piece=state.pieces[mySeat][index];
  let dice=state.dice;

  if(piece.where==='base'){
    piece.where='track';
    piece.pos=p.start;
    add(name(mySeat)+' entered the board.');
    bumpAt(mySeat,p.start);
  }else if(piece.where==='track'){
    let progress=trackProgress(p,piece.pos)+dice;

    if(progress>=TRACK){
      let homeIndex=progress-TRACK;
      if(homeIndex<=3){
        piece.where='home';
        piece.pos=null;
        piece.home=homeIndex;
        add(name(mySeat)+' moved into home.');
      }else{
        add('Move blocked: exact home path needed.');
        return;
      }
    }else{
      piece.pos=(piece.pos+dice)%TRACK;
      add(name(mySeat)+' moved '+dice+' spaces.');
      bumpAt(mySeat,piece.pos);
    }
  }else if(piece.where==='home'){
    piece.home+=dice;
    add(name(mySeat)+' advanced in home.');
  }

  if(checkWinner(mySeat)){
    state.winner=mySeat;
    add(name(mySeat)+' wins the game!');
  }else{
    endTurn();
  }

  draw();
  sync();
}

function trackProgress(player,pos){
  return (pos-player.start+TRACK)%TRACK;
}

function bumpAt(ownerSeat,pos){
  players.forEach(p=>{
    if(p.seat===ownerSeat)return;

    (state.pieces[p.seat]||[]).forEach(piece=>{
      if(piece.where==='track'&&piece.pos===pos){
        piece.where='base';
        piece.pos=null;
        piece.home=null;
        add(name(ownerSeat)+' bumped '+name(p.seat)+' back to base!');
      }
    });
  });
}

function checkWinner(seat){
  return (state.pieces[seat]||[]).every(x=>x.where==='home'&&x.home>=3);
}

function endTurn(){
  let i=players.findIndex(p=>p.seat===state.turn);
  state.turn=players[(i+1)%players.length].seat;
  state.dice=null;
  state.rolled=false;
}

function newGame(sendIt){
  if(players.length<2){
    setStatus('Waiting for players...','Trouble needs 2–4 seated players.');
    return;
  }

  state=fresh();
  draw();
  if(sendIt)sync();
}

function sync(){
  window.sendMove({type:'state',state});
}

window.sendMove=function(data){
  parent.postMessage({type:'move',data:data},'*');
};

window.onMove=function(data){
  if(!data)return;

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
    return;
  }

  if(data.type==='state'){
    state=data.state;
    ensureState();
    draw();
  }
};

window.addEventListener('message',function(event){
  let data=event.data||{};
  if(data.type==='gameSetup')receiveSetup(data.players,data.mySeat);
  if(data.type==='gameMove'&&window.onMove)window.onMove(data.data);
});

function playerBySeat(seat){
  return players.find(p=>p.seat===seat);
}

function name(seat){
  let p=playerBySeat(seat);
  return p?p.name:'Seat '+(Number(seat)+1);
}

function add(t){
  state.log.push(t);
  if(state.log.length>60)state.log.shift();
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

drawStaticBoard();
receiveSetup(window.GAME_PLAYERS||[],window.GAME_MY_SEAT);

setTimeout(function(){
  receiveSetup(window.GAME_PLAYERS||players||[],window.GAME_MY_SEAT);
},250);
</script>
</body>
</html>
