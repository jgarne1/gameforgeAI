<!DOCTYPE html>
<html>
<head>
<title>Trouble</title>
<style>
:root{--bg:#101827;--panel:#172033;--line:#334155;--gold:#facc15;--red:#ef4444;--blue:#3b82f6;--green:#22c55e;--yellow:#facc15;--muted:#cbd5e1}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#243b55,#101827);color:white;text-align:center;overflow:hidden}
.wrap{height:650px;padding:10px;display:grid;grid-template-rows:auto 1fr auto;gap:8px}
.top,.game,.controls{background:rgba(23,32,51,.94);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 28px rgba(0,0,0,.28)}
.top{display:flex;justify-content:space-between;align-items:center;padding:9px 12px}
h2{margin:0}
button{padding:9px 12px;border-radius:12px;border:1px solid #94a3b8;background:#f8fafc;color:#111;font-weight:bold;cursor:pointer}
button.gold{background:var(--gold);border-color:var(--gold)}
button.primary{background:#60a5fa;border-color:#60a5fa}
button:disabled{opacity:.45;cursor:not-allowed}
.game{position:relative;overflow:hidden;min-height:0}
.board{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:560px;height:430px;border-radius:28px;background:linear-gradient(135deg,#0f172a,#1e293b);border:3px solid rgba(255,255,255,.18)}
.space{position:absolute;width:30px;height:30px;border-radius:50%;background:#f8fafc;border:2px solid #1f2937;display:flex;align-items:center;justify-content:center;font-size:10px;color:#111}
.space.safe{box-shadow:0 0 0 4px rgba(250,204,21,.45)}
.homeSlot,.baseSlot{position:absolute;width:32px;height:32px;border-radius:50%;border:2px solid white;background:rgba(255,255,255,.22)}
.homeSlot{opacity:.55}
.baseSlot{opacity:.45}
.token{position:absolute;width:26px;height:26px;border-radius:50%;border:3px solid white;box-shadow:0 4px 10px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:12px;cursor:pointer;transition:.2s ease;z-index:5}
.token.pickable{outline:4px solid white;transform:scale(1.18);z-index:10}
.token.red{background:var(--red)}.token.blue{background:var(--blue)}.token.green{background:var(--green)}.token.yellow{background:var(--yellow);color:#111}
.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:132px;height:132px;border-radius:22px;background:rgba(15,23,42,.96);border:3px solid rgba(255,255,255,.32);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;z-index:20}
.dice{font-size:34px;font-weight:bold;background:white;color:#111;border-radius:14px;width:58px;height:48px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 #94a3b8}
.status{font-size:13px;font-weight:bold}
.muted{font-size:12px;color:var(--muted)}
.controls{padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.players{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.player{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:13px;padding:7px 10px;min-width:145px}
.player.turn{outline:3px solid var(--gold)}
.log{height:64px;overflow:auto;text-align:left;background:#fffbea;color:#1f2937;border-radius:12px;padding:7px;font-size:12px}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h2>Trouble</h2>
    <div>
      <span id="meLabel" class="badge"></span>
      <button class="gold" onclick="newGame(true)">New Game</button>
    </div>
  </div>

  <div class="game">
    <div id="board" class="board"></div>
    <div class="center">
      <div id="dice" class="dice">–</div>
      <div id="status" class="status">Loading players...</div>
      <div id="hint" class="muted">Roll a 6 to leave base.</div>
      <button id="rollBtn" class="primary" onclick="rollDice()">Roll</button>
    </div>
  </div>

  <div class="controls">
    <div id="playersPanel" class="players"></div>
    <div id="log" class="log"></div>
  </div>
</div>

<script>
const GAME_META={id:'trouble',name:'Trouble',minPlayers:2,maxPlayers:4,seats:4};

const COLORS=['red','blue','green','yellow'];
const TRACK=40;
const PIECES=4;

let players=[];
let mySeat=null;
let state=null;
let coords=[];
let bases={};
let homes={};

function el(id){return document.getElementById(id);}
function setStatus(a,b){el('status').innerText=a;el('hint').innerText=b||'';}

window.onerror=function(msg){
  setStatus('Game error: '+msg,'Check console for details.');
};

function receiveSetup(setupPlayers,setupSeat){
  if(Array.isArray(setupPlayers)&&setupPlayers.length){
    players=setupPlayers.slice(0,4).map((p,i)=>({
      seat:p.seat,
      name:p.name||('Seat '+(p.seat+1)),
      color:COLORS[i],
      start:(i*10)%TRACK
    }));
  }

  mySeat=setupSeat;

  if(players.length<2){
    setStatus('Waiting for players...','Trouble needs 2–4 seated players.');
    drawStaticBoard();
    return;
  }

  if(!state)state=fresh();
  ensureState();
  draw();
}

function fresh(){
  let pieces={};
  players.forEach(p=>{
    pieces[p.seat]=[];
    for(let i=0;i<PIECES;i++){
      pieces[p.seat].push({where:'base',pos:null,home:null});
    }
  });

  return {
    pieces,
    turn:players[0].seat,
    dice:null,
    rolled:false,
    winner:null,
    log:['New Trouble game started. Roll a 6 to leave base.']
  };
}

function ensureState(){
  if(!state.pieces)state.pieces={};
  players.forEach(p=>{
    if(!state.pieces[p.seat]){
      state.pieces[p.seat]=[];
      for(let i=0;i<PIECES;i++)state.pieces[p.seat].push({where:'base',pos:null,home:null});
    }
  });
}

function computeCoords(){
  coords=[];

  let left=72,top=46,right=458,bottom=354;
  let path=[];

  for(let i=0;i<10;i++)path.push([left+i*(right-left)/9,top]);
  for(let i=1;i<10;i++)path.push([right,top+i*(bottom-top)/9]);
  for(let i=1;i<10;i++)path.push([right-i*(right-left)/9,bottom]);
  for(let i=1;i<9;i++)path.push([left,bottom-i*(bottom-top)/9]);

  coords=path.slice(0,TRACK).map(p=>({x:p[0],y:p[1]}));

  bases={
    red:[[22,22],[62,22],[22,62],[62,62]],
    blue:[[476,22],[516,22],[476,62],[516,62]],
    green:[[476,326],[516,326],[476,366],[516,366]],
    yellow:[[22,326],[62,326],[22,366],[62,366]]
  };

  homes={
    red:[[210,88],[210,122],[210,156],[210,190]],
    blue:[[346,174],[380,174],[414,174],[448,174]],
    green:[[318,242],[318,276],[318,310],[318,344]],
    yellow:[[112,242],[146,242],[180,242],[214,242]]
  };
}

function drawStaticBoard(){
  computeCoords();
  let b=el('board');
  b.innerHTML='';

  coords.forEach((p,i)=>{
    let s=document.createElement('div');
    s.className='space '+(i%10===0?'safe':'');
    s.style.left=p.x+'px';
    s.style.top=p.y+'px';
    s.innerText=i%10===0?'★':'';
    b.appendChild(s);
  });

  COLORS.forEach(color=>{
    bases[color].forEach(pt=>{
      let d=document.createElement('div');
      d.className='baseSlot';
      d.style.left=pt[0]+'px';
      d.style.top=pt[1]+'px';
      d.style.background=color;
      b.appendChild(d);
    });

    homes[color].forEach(pt=>{
      let d=document.createElement('div');
      d.className='homeSlot';
      d.style.left=pt[0]+'px';
      d.style.top=pt[1]+'px';
      d.style.background=color;
      b.appendChild(d);
    });
  });

  el('playersPanel').innerHTML='';
}

function draw(){
  if(!state||players.length<2){
    drawStaticBoard();
    return;
  }

  drawStaticBoard();
  drawTokens();
  drawPlayers();
  drawLog();

  el('meLabel').innerText=mySeat===null||mySeat===undefined?'Watching':'You are '+name(mySeat);
  el('dice').innerText=state.dice||'–';

  if(state.winner!==null){
    setStatus(name(state.winner)+' wins!','Start a new game to play again.');
    el('rollBtn').disabled=true;
    return;
  }

  setStatus('Turn: '+name(state.turn),state.turn===mySeat?'Roll, then choose a glowing piece.':'Waiting for '+name(state.turn)+'.');
  el('rollBtn').disabled=state.turn!==mySeat||state.rolled||state.winner!==null;
}

function drawTokens(){
  players.forEach(p=>{
    let arr=state.pieces[p.seat]||[];
    let legal=legalMovesForSeat(p.seat);

    arr.forEach((piece,i)=>{
      let t=document.createElement('div');
      t.className='token '+p.color+(legal.includes(i)&&p.seat===mySeat?' pickable':'');
      t.innerText=i+1;
      t.onclick=()=>movePiece(i);

      let pt=tokenPoint(p,piece,i);
      t.style.left=pt.x+'px';
      t.style.top=pt.y+'px';

      el('board').appendChild(t);
    });
  });
}

function tokenPoint(player,piece,index){
  if(piece.where==='base'){
    let pt=bases[player.color][index];
    return {x:pt[0]+3,y:pt[1]+3};
  }

  if(piece.where==='home'){
    let h=Math.min(piece.home,3);
    let pt=homes[player.color][h];
    return {x:pt[0]+3,y:pt[1]+3};
  }

  let pt=coords[piece.pos];
  let stackOffset=index*2;
  return {x:pt.x+2+stackOffset,y:pt.y+2+stackOffset};
}

function drawPlayers(){
  let html='';
  players.forEach(p=>{
    let finished=(state.pieces[p.seat]||[]).filter(x=>x.where==='home'&&x.home>=3).length;
    html+='<div class="player '+(state.turn===p.seat&&!state.winner?'turn':'')+'">'+
      '<b style="color:'+p.color+'">'+escapeHtml(p.name)+'</b><br>'+
      '<span class="muted">'+finished+'/'+PIECES+' finished'+(p.seat===mySeat?' · You':'')+'</span>'+
    '</div>';
  });
  el('playersPanel').innerHTML=html;
}

function drawLog(){
  el('log').innerHTML=state.log.slice(-5).map(x=>'• '+escapeHtml(x)).join('<br>');
  el('log').scrollTop=el('log').scrollHeight;
}

function rollDice(){
  if(state.turn!==mySeat||state.rolled||state.winner!==null)return;

  state.dice=1+Math.floor(Math.random()*6);
  state.rolled=true;
  add(name(mySeat)+' rolled a '+state.dice+'.');

  if(legalMovesForSeat(mySeat).length===0){
    add(name(mySeat)+' has no legal moves.');
    endTurn();
  }

  draw();
  sync();
}

function legalMovesForSeat(seat){
  if(!state||!state.rolled||state.turn!==seat)return [];

  let p=playerBySeat(seat);
  let dice=state.dice;
  let arr=state.pieces[seat]||[];
  let legal=[];

  arr.forEach((piece,i)=>{
    if(piece.where==='base'){
      if(dice===6 && !ownPieceAtStart(seat))legal.push(i);
      return;
    }

    if(piece.where==='track'){
      legal.push(i);
      return;
    }

    if(piece.where==='home'&&piece.home<3){
      if(piece.home+dice<=3)legal.push(i);
    }
  });

  return legal;
}

function ownPieceAtStart(seat){
  let p=playerBySeat(seat);
  return (state.pieces[seat]||[]).some(x=>x.where==='track'&&x.pos===p.start);
}

function movePiece(index){
  if(state.turn!==mySeat||state.winner!==null)return;

  let legal=legalMovesForSeat(mySeat);
  if(!legal.includes(index))return;

  let p=playerBySeat(mySeat);
  let piece=state.pieces[mySeat][index];
  let dice=state.dice;

  if(piece.where==='base'){
    piece.where='track';
    piece.pos=p.start;
    add(name(mySeat)+' entered the board.');
    bumpAt(mySeat,p.start);
  }else if(piece.where==='track'){
    let progress=trackProgress(p,piece.pos)+dice;

    if(progress>=TRACK){
      let homeIndex=progress-TRACK;
      if(homeIndex<=3){
        piece.where='home';
        piece.pos=null;
        piece.home=homeIndex;
        add(name(mySeat)+' moved into home.');
      }else{
        add('Move blocked: exact home path needed.');
        return;
      }
    }else{
      piece.pos=(piece.pos+dice)%TRACK;
      add(name(mySeat)+' moved '+dice+' spaces.');
      bumpAt(mySeat,piece.pos);
    }
  }else if(piece.where==='home'){
    piece.home+=dice;
    add(name(mySeat)+' advanced in home.');
  }

  if(checkWinner(mySeat)){
    state.winner=mySeat;
    add(name(mySeat)+' wins the game!');
  }else{
    endTurn();
  }

  draw();
  sync();
}

function trackProgress(player,pos){
  return (pos-player.start+TRACK)%TRACK;
}

function bumpAt(ownerSeat,pos){
  players.forEach(p=>{
    if(p.seat===ownerSeat)return;

    (state.pieces[p.seat]||[]).forEach(piece=>{
      if(piece.where==='track'&&piece.pos===pos){
        piece.where='base';
        piece.pos=null;
        piece.home=null;
        add(name(ownerSeat)+' bumped '+name(p.seat)+' back to base!');
      }
    });
  });
}

function checkWinner(seat){
  return (state.pieces[seat]||[]).every(x=>x.where==='home'&&x.home>=3);
}

function endTurn(){
  let i=players.findIndex(p=>p.seat===state.turn);
  state.turn=players[(i+1)%players.length].seat;
  state.dice=null;
  state.rolled=false;
}

function newGame(sendIt){
  if(players.length<2){
    setStatus('Waiting for players...','Trouble needs 2–4 seated players.');
    return;
  }

  state=fresh();
  draw();
  if(sendIt)sync();
}

function sync(){
  window.sendMove({type:'state',state});
}

window.sendMove=function(data){
  parent.postMessage({type:'move',data:data},'*');
};

window.onMove=function(data){
  if(!data)return;

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
    return;
  }

  if(data.type==='state'){
    state=data.state;
    ensureState();
    draw();
  }
};

window.addEventListener('message',function(event){
  let data=event.data||{};
  if(data.type==='gameSetup')receiveSetup(data.players,data.mySeat);
  if(data.type==='gameMove'&&window.onMove)window.onMove(data.data);
});

function playerBySeat(seat){
  return players.find(p=>p.seat===seat);
}

function name(seat){
  let p=playerBySeat(seat);
  return p?p.name:'Seat '+(Number(seat)+1);
}

function add(t){
  state.log.push(t);
  if(state.log.length>60)state.log.shift();
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

drawStaticBoard();
receiveSetup(window.GAME_PLAYERS||[],window.GAME_MY_SEAT);

setTimeout(function(){
  receiveSetup(window.GAME_PLAYERS||players||[],window.GAME_MY_SEAT);
},250);
</script>

<script id="gfStandardHudScript">
(function(){
  var GAME_TITLE = 'Trouble';
  window.GAME_CONTEXT = window.GAME_CONTEXT || {username:'',roomId:'',players:[],seats:[],mySeat:-1,activePets:{}};

  function esc(s){
    return String(s==null?'':s).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});
  }

  function normPlayers(input){
    var list = input || window.GAME_PLAYERS || [];
    return (Array.isArray(list)?list:[]).map(function(p,i){
      if(typeof p==='string')return {name:p,seat:i};
      return {name:p&&p.name?p.name:('Seat '+(i+1)), seat:(p&&p.seat!=null?p.seat:i)};
    });
  }

  function absorbContext(raw){
    var data = raw || {};
    if(data.data) data = data.data;
    var ctx = window.GAME_CONTEXT || {};
    ctx.username = data.username || data.me || ctx.username || '';
    ctx.roomId = data.roomId || data.room || data.roomCode || ctx.roomId || '';
    ctx.players = normPlayers(data.players || ctx.players);
    ctx.seats = data.seats || ctx.seats || [];
    ctx.mySeat = data.mySeat!=null ? Number(data.mySeat) : (window.GAME_MY_SEAT!=null ? Number(window.GAME_MY_SEAT) : (ctx.mySeat!=null?ctx.mySeat:-1));
    ctx.activePets = data.activePets || ctx.activePets || {};
    window.GAME_CONTEXT = ctx;
    render();
  }

  function normalizePetMap(raw){
    var map={};
    if(!raw)return map;
    if(Array.isArray(raw)){
      raw.forEach(function(item){
        if(!item)return;
        var name=item.username||item.user||item.owner||item.player||item.name;
        if(name){ map[name]=item; map[String(name).toLowerCase()]=item; }
        if(item.seat!=null)map['seat:'+item.seat]=item;
      });
      return map;
    }
    Object.keys(raw).forEach(function(k){
      map[k]=raw[k];
      map[String(k).toLowerCase()]=raw[k];
    });
    return map;
  }

  function playerPet(player){
    var ctx=window.GAME_CONTEXT||{};
    var name=typeof player==='string'?player:(player&&player.name)||'';
    var seat=typeof player==='object'&&player?player.seat:null;
    var pets=normalizePetMap(ctx.activePets || ctx.pets || ctx.playerPets || {});
    return pets[name] || pets[String(name||'').toLowerCase()] || (seat!=null?pets['seat:'+seat]:null) || ctx.activePet || ctx.pet || null;
  }

  function petImage(pet){
    if(!pet)return '';
    if(typeof pet==='string')return pet;
    return pet.image || pet.img || pet.sprite || pet.photo || pet.icon || pet.src || pet.imageUrl || pet.url || '';
  }

  function render(){
    var hud=document.getElementById('gfStandardHud');
    if(!hud){
      hud=document.createElement('div');
      hud.id='gfStandardHud';
      document.body.appendChild(hud);
    }
    var ctx=window.GAME_CONTEXT||{};
    var players=normPlayers(ctx.players);
    if(!players.length && window.GAME_PLAYERS) players=normPlayers(window.GAME_PLAYERS);
    var room=ctx.roomId || '';
    var mySeat=ctx.mySeat;
    var playerHtml=players.slice(0,4).map(function(p){
      var pet=playerPet(p);
      var img=petImage(pet);
      var petName=pet && pet.name ? pet.name : '';
      var seatText='Seat '+(Number(p.seat)+1);
      var isMe=(Number(p.seat)===Number(mySeat)) || (ctx.username && p.name===ctx.username);
      return '<div class="gfHudPlayer '+(isMe?'me':'')+'">'+
        (img?'<img class="gfHudPet" src="'+esc(img)+'" alt="">':'<span class="gfHudAvatar">🎮</span>')+
        '<span class="gfHudInfo"><span class="gfHudName">'+esc(p.name||'Player')+'</span><span class="gfHudSub">'+esc(seatText+(petName?' · '+petName:''))+'</span></span>'+ 
      '</div>';
    }).join('');
    if(!playerHtml){
      playerHtml='<div class="gfHudPlayer"><span class="gfHudAvatar">🎮</span><span class="gfHudInfo"><span class="gfHudName">Solo / Local</span><span class="gfHudSub">Waiting for room context</span></span></div>';
    }
    hud.innerHTML='<div class="gfHudTitle"><b>'+esc(GAME_TITLE)+'</b><span>'+(room?'Room '+esc(room):'GameForge table')+'</span></div><div class="gfHudPlayers">'+playerHtml+'</div>';
  }

  window.addEventListener('message',function(e){
    var msg=e.data||{};
    if(msg.type==='GAME_CONTEXT' || msg.type==='gameSetup' || msg.type==='gameContext'){
      absorbContext(msg);
    }
  });

  window.addEventListener('load',function(){
    absorbContext({});
    try{ parent.postMessage({type:'gameReady'},'*'); }catch(e){}
  });

  setTimeout(function(){absorbContext({});},250);
  setTimeout(function(){absorbContext({});},900);
})();
</script>

</body>
</html>
