<!DOCTYPE html>
<html>
<head>
<title>Yahtzee</title>
<style>
body{font-family:Arial;text-align:center;background:#f4efe6;margin:0;color:#222}
#game{display:grid;grid-template-columns:1fr 460px;gap:12px;padding:12px;max-width:1250px;margin:auto}
.panel{background:#fff;border:2px solid #333;border-radius:10px;padding:10px}
#status{font-size:20px;font-weight:bold;margin:10px;min-height:28px}
#diceArea{height:160px;border:2px dashed #aaa;border-radius:12px;background:#e8f4e8;display:flex;justify-content:center;align-items:center;gap:10px}
.die{width:60px;height:60px;border:2px solid #111;border-radius:10px;background:#fff;font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:3px 4px 0 #999}
.held{background:#ffeaa7;transform:translateY(-8px)}
.roll{animation:roll .6s ease}
@keyframes roll{0%{transform:translateY(-100px) rotate(0)}70%{transform:translateY(10px) rotate(280deg)}100%{transform:translateY(0) rotate(360deg)}}
button{margin:5px;padding:8px 12px;cursor:pointer;border-radius:8px}
button:disabled{opacity:.5;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #999;padding:5px}
.activeCol{background:#fff3b0}
.scoreChoice{background:#dff0ff;cursor:pointer;font-weight:bold}
.used{background:#ddd;color:#666}
.preview{color:#777}
.small{font-size:13px;color:#555}
</style>
</head>
<body>
<h2>Yahtzee</h2>
<div id="status">Loading players...</div>

<div id="game">
  <div class="panel">
    <h3>Dice Table</h3>
    <p>You are: <b id="meLabel">Spectator</b></p>
    <p>Current Turn: <b id="turnLabel"></b></p>
    <div id="diceArea"></div>
    <button id="rollBtn" onclick="rollDice()">🎲 Roll Cup</button>
    <button onclick="newGame(true)">New Game</button>
    <p>Rolls left: <span id="rollsLeft">3</span></p>
    <p class="small">Only the current player can roll, hold dice, and choose a score. Everyone else watches live.</p>
  </div>

  <div class="panel">
    <h3>Score Sheet</h3>
    <table>
      <thead><tr id="headRow"><th>Category</th></tr></thead>
      <tbody id="sheet"></tbody>
      <tfoot><tr id="totalRow"><th>Total</th></tr></tfoot>
    </table>
  </div>
</div>

<script>
const GAME_META={id:'yahtzee',name:'Yahtzee',minPlayers:1,maxPlayers:4,seats:4};

const cats=[
  'Ones','Twos','Threes','Fours','Fives','Sixes',
  'Three Kind','Four Kind','Full House','Small Straight','Large Straight','Yahtzee','Chance'
];

let players = [{seat:0,name:'Player 1'}];
let mySeat = null;
let state = null;
let setupReceived = false;

function initPlayers(){
  if(window.GAME_PLAYERS && window.GAME_PLAYERS.length){
    receiveSetup(window.GAME_PLAYERS, window.GAME_MY_SEAT);
  }else{
    state = freshState();
    draw();
  }
}

function receiveSetup(newPlayers,newSeat){
  setupReceived = true;

  if(newPlayers && newPlayers.length){
    players = newPlayers.map(p=>({
      seat:Number(p.seat),
      name:p.name || ('Seat '+(Number(p.seat)+1))
    }));
  }

  players.sort((a,b)=>a.seat-b.seat);

  if(newSeat !== undefined && newSeat !== null){
    mySeat = Number(newSeat);
    if(!players.some(p=>p.seat===mySeat)) mySeat = null;
  }

  if(!state || !players.some(p=>p.seat===state.turn)){
    state = freshState();
  }else{
    players.forEach(p=>{
      if(!state.scores[p.seat]) state.scores[p.seat]={};
    });
  }

  draw();
}

function freshState(){
  let scores={};
  players.forEach(p=>scores[p.seat]={});
  return {
    dice:[1,1,1,1,1],
    held:[false,false,false,false,false],
    rolls:3,
    turn:players[0].seat,
    scores:scores,
    gameOver:false,
    message:'New game. '+nameOf(players[0].seat)+' goes first.'
  };
}

function draw(){
  if(!state) return;

  let myName = mySeat===null ? 'Spectator' : nameOf(mySeat);
  let turnName = nameOf(state.turn);
  let myTurn = mySeat===state.turn && !state.gameOver;

  meLabel.innerText = myName;
  turnLabel.innerText = turnName + "'s turn";
  rollsLeft.innerText = state.rolls;

  if(state.gameOver){
    status.innerText = state.message || 'Game over.';
  }else if(myTurn){
    status.innerText = 'Your turn. Roll, hold dice, then choose a score.';
  }else{
    status.innerText = turnName + "'s turn. Watching live.";
  }

  rollBtn.disabled = !myTurn || state.rolls<=0;

  diceArea.innerHTML='';
  state.dice.forEach((v,i)=>{
    let d=document.createElement('div');
    d.className='die'+(state.held[i]?' held':'');
    d.innerText=['','⚀','⚁','⚂','⚃','⚄','⚅'][v];
    d.onclick=()=>toggleHold(i);
    diceArea.appendChild(d);
  });

  drawSheet();
}

function drawSheet(){
  headRow.innerHTML='<th>Category</th>';

  players.forEach(p=>{
    let th=document.createElement('th');
    th.innerText=p.name;
    th.className=p.seat===state.turn?'activeCol':'';
    headRow.appendChild(th);
  });

  sheet.innerHTML='';

  cats.forEach(cat=>{
    let tr=document.createElement('tr');
    let name=document.createElement('td');
    name.innerText=cat;
    tr.appendChild(name);

    players.forEach(p=>{
      let td=document.createElement('td');
      let sc=state.scores[p.seat] || {};

      if(sc[cat]!==undefined){
        td.innerText=sc[cat];
        td.className='used';
      }else if(p.seat===state.turn && state.rolls<3){
        td.innerText=score(cat,state.dice);
        if(mySeat===state.turn && !state.gameOver){
          td.className='scoreChoice';
          td.onclick=()=>chooseScore(cat);
        }else{
          td.className='preview';
        }
      }else{
        td.innerText='';
      }

      tr.appendChild(td);
    });

    sheet.appendChild(tr);
  });

  totalRow.innerHTML='<th>Total</th>';

  players.forEach(p=>{
    let th=document.createElement('th');
    th.innerText=totalScore(p.seat);
    th.className=p.seat===state.turn?'activeCol':'';
    totalRow.appendChild(th);
  });
}

function rollDice(){
  if(state.gameOver || mySeat!==state.turn || state.rolls<=0) return;

  for(let i=0;i<5;i++){
    if(!state.held[i]) state.dice[i]=rand();
  }

  state.rolls--;
  state.message = nameOf(mySeat)+' rolled.';

  draw();
  animateDice();
  sync();
}

function toggleHold(i){
  if(state.gameOver || mySeat!==state.turn || state.rolls===3) return;

  state.held[i]=!state.held[i];
  state.message = state.held[i] ? nameOf(mySeat)+' held a die.' : nameOf(mySeat)+' released a die.';

  draw();
  sync();
}

function chooseScore(cat){
  if(state.gameOver || mySeat!==state.turn || state.rolls===3) return;

  if(!state.scores[state.turn]) state.scores[state.turn]={};

  let val=score(cat,state.dice);
  state.scores[state.turn][cat]=val;
  state.message = nameOf(state.turn)+' scored '+val+' in '+cat+'.';

  if(isGameOver()){
    finishGame();
  }else{
    nextTurn();
  }

  draw();
  sync();
}

function nextTurn(){
  let idx=players.findIndex(p=>p.seat===state.turn);
  if(idx<0) idx=0;

  let next=players[(idx+1)%players.length];

  state.turn=next.seat;
  state.rolls=3;
  state.held=[false,false,false,false,false];
  state.dice=[1,1,1,1,1];
  state.message += ' '+nameOf(state.turn)+' is next.';
}

function isGameOver(){
  return players.every(p=>cats.every(c=>(state.scores[p.seat]||{})[c]!==undefined));
}

function finishGame(){
  state.gameOver=true;

  let best=-1;
  let winners=[];

  players.forEach(p=>{
    let t=totalScore(p.seat);
    if(t>best){
      best=t;
      winners=[p.seat];
    }else if(t===best){
      winners.push(p.seat);
    }
  });

  state.message = winners.length===1
    ? 'Game over. '+nameOf(winners[0])+' wins with '+best+' points!'
    : 'Game over. Tie game at '+best+' points!';
}

function score(cat,d){
  let counts={};
  d.forEach(x=>counts[x]=(counts[x]||0)+1);
  let sum=d.reduce((a,b)=>a+b,0);

  if(cat==='Ones')return count(d,1)*1;
  if(cat==='Twos')return count(d,2)*2;
  if(cat==='Threes')return count(d,3)*3;
  if(cat==='Fours')return count(d,4)*4;
  if(cat==='Fives')return count(d,5)*5;
  if(cat==='Sixes')return count(d,6)*6;
  if(cat==='Three Kind')return Object.values(counts).some(x=>x>=3)?sum:0;
  if(cat==='Four Kind')return Object.values(counts).some(x=>x>=4)?sum:0;
  if(cat==='Full House')return Object.values(counts).includes(3)&&Object.values(counts).includes(2)?25:0;
  if(cat==='Small Straight')return smallStraight(d)?30:0;
  if(cat==='Large Straight')return largeStraight(d)?40:0;
  if(cat==='Yahtzee')return Object.values(counts).some(x=>x===5)?50:0;
  if(cat==='Chance')return sum;

  return 0;
}

function count(d,n){
  return d.filter(x=>x===n).length;
}

function smallStraight(d){
  let s=[...new Set(d)].sort().join('');
  return s.includes('1234')||s.includes('2345')||s.includes('3456');
}

function largeStraight(d){
  let s=[...new Set(d)].sort().join('');
  return s==='12345'||s==='23456';
}

function totalScore(seat){
  return Object.values(state.scores[seat]||{}).reduce((a,b)=>a+b,0);
}

function rand(){
  return Math.floor(Math.random()*6)+1;
}

function nameOf(seat){
  let p=players.find(x=>x.seat===seat);
  return p ? p.name : 'Seat '+(seat+1);
}

function animateDice(){
  document.querySelectorAll('.die').forEach((d,i)=>{
    if(!state.held[i]){
      d.classList.remove('roll');
      void d.offsetWidth;
      d.classList.add('roll');
    }
  });
}

function newGame(sendIt){
  state=freshState();
  draw();
  if(sendIt) sync();
}

function sync(){
  window.sendMove({type:'state',state});
}

window.sendMove=function(data){
  parent.postMessage({type:'move',data},'*');
};

window.onMove=function(data){
  if(data.type==='state'){
    state=data.state;
    draw();
  }

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
  }
};

window.addEventListener('message',function(event){
  let data=event.data || {};

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
  }
});

parent.postMessage({type:'gameReady'},'*');

setTimeout(function(){
  if(!setupReceived){
    initPlayers();
  }
},100);
</script>
</body>
</html>
