<!DOCTYPE html><html><head><title>Yahtzee Multiplayer</title><style>
body{font-family:Arial;text-align:center;background:#f4efe6;margin:0}#game{display:grid;grid-template-columns:1fr 330px;gap:12px;max-width:1100px;margin:auto;padding:12px}.panel{background:white;border:2px solid #333;border-radius:12px;padding:10px}.die{width:58px;height:58px;border:2px solid #111;border-radius:12px;background:white;font-size:32px;display:inline-flex;align-items:center;justify-content:center;margin:7px;box-shadow:3px 4px 0 #999;cursor:pointer}.held{background:#ffeaa7;transform:translateY(-10px)}.roll{animation:fall .7s ease}@keyframes fall{0%{transform:translateY(-140px) rotate(0)}50%{transform:translateY(15px) rotate(240deg)}100%{transform:translateY(0) rotate(360deg)}}#cup{font-size:18px;padding:14px 28px;border-radius:0 0 28px 28px;background:#8b5a2b;color:white;border:4px solid #4a2b12;cursor:pointer}table{width:100%;border-collapse:collapse}td,th{border:1px solid #999;padding:5px}.pick{background:#e9f6ff;cursor:pointer}.used{background:#ddd;color:#666}button{margin:4px;padding:8px 12px;border-radius:8px;cursor:pointer}#status{font-size:20px;font-weight:bold;min-height:28px;margin:8px}.score{font-weight:bold}
</style></head><body><h1>Yahtzee Cup</h1><div class="panel"><div id="status">Choose seat or CPU game.</div><button onclick="sit('p1')">Sit Player 1</button><button onclick="sit('p2')">Sit Player 2</button><button onclick="playCPU()">Play vs CPU</button><button onclick="newGame(true)">New Game</button><button onclick="resetStats()">Reset Stats</button><div>Seat: <b id="seat">None</b></div><div class="score">Wins <span id="w">0</span> | Losses <span id="l">0</span> | Ties <span id="t">0</span></div></div><div id="game"><div class="panel"><h2>Dice Table</h2><p>Roll up to 3 times. Click dice to hold, then choose a score.</p><div id="dice"></div><button id="cup" onclick="roll()">🎲 Roll Cup</button><p>Rolls left: <span id="left">3</span></p></div><div class="panel"><h2>Score Sheet</h2><table><thead><tr><th>Category</th><th>P1</th><th>P2</th></tr></thead><tbody id="sheet"></tbody><tfoot><tr><th>Total</th><th id="tp1">0</th><th id="tp2">0</th></tr></tfoot></table></div></div><script>
const cats=['Ones','Twos','Threes','Fours','Fives','Sixes','Three Kind','Four Kind','Full House','Small Straight','Large Straight','Yahtzee','Chance'];let seat=localStorage.ySeat||'', cpu=false, locked=false;let stats=JSON.parse(localStorage.yStats||'{"w":0,"l":0,"t":0}');let state=null;
function fresh(){return{dice:[1,1,1,1,1],held:[false,false,false,false,false],left:3,turn:'p1',scores:{p1:{},p2:{}},over:false,msg:'New game. Player 1 rolls first.'};}
function sit(s){seat=s;cpu=false;localStorage.ySeat=s;draw();}
function playCPU(){seat='p1';cpu=true;newGame(false);}
function newGame(b){state=fresh();locked=false;draw();if(b)send({type:'state',state});}
function draw(){document.getElementById('seat').textContent=seat?lab(seat):'None';document.getElementById('w').textContent=stats.w;document.getElementById('l').textContent=stats.l;document.getElementById('t').textContent=stats.t;if(!state){status('Choose a seat, then start a game.');return;}status(state.over?state.msg:(state.turn===seat?'Your turn. Roll the cup.':(cpu&&state.turn==='p2'?'CPU is rolling...':lab(state.turn)+' turn.')));document.getElementById('left').textContent=state.left;let d=document.getElementById('dice');d.innerHTML='';state.dice.forEach((v,i)=>{let e=document.createElement('div');e.className='die'+(state.held[i]?' held':'');e.textContent=face(v);e.onclick=()=>hold(i);d.appendChild(e);});let sh=document.getElementById('sheet');sh.innerHTML='';cats.forEach(c=>{let tr=document.createElement('tr');tr.innerHTML='<td>'+c+'</td>';['p1','p2'].forEach(p=>{let td=document.createElement('td');if(state.scores[p][c]!==undefined){td.textContent=state.scores[p][c];td.className='used';}else if(p===seat&&state.turn===seat&&state.left<3&&!state.over){td.textContent=score(c,state.dice);td.className='pick';td.onclick=()=>choose(c);}else td.textContent='';tr.appendChild(td);});sh.appendChild(tr);});document.getElementById('tp1').textContent=total('p1');document.getElementById('tp2').textContent=total('p2');}
function roll(){if(!state||locked||state.over||state.turn!==seat||state.left<=0)return;for(let i=0;i<5;i++)if(!state.held[i])state.dice[i]=rand();state.left--;state.msg=lab(seat)+' rolled.';draw();animate();send({type:'state',state});}
function animate(){document.querySelectorAll('.die').forEach((e,i)=>{if(!state.held[i]){e.classList.remove('roll');void e.offsetWidth;e.classList.add('roll');}});}
function hold(i){if(!state||state.over||state.turn!==seat||state.left===3)return;state.held[i]=!state.held[i];draw();send({type:'state',state});}
function choose(c){if(!state||state.over||state.turn!==seat||state.left===3)return;state.scores[seat][c]=score(c,state.dice);state.msg=lab(seat)+' scores '+state.scores[seat][c]+' in '+c+'.';nextTurn();draw();send({type:'state',state});if(cpu&&!state.over&&state.turn==='p2')setTimeout(cpuTurn,700);}
async function cpuTurn(){locked=true;state.held=[false,false,false,false,false];state.left=3;draw();await wait(600);for(let r=0;r<3;r++){for(let i=0;i<5;i++)if(!state.held[i])state.dice[i]=rand();state.left--;draw();animate();await wait(700);let keep=bestRepeat();state.held=state.dice.map(x=>x===keep);draw();await wait(350);}let best=bestCat('p2');state.scores.p2[best]=score(best,state.dice);state.msg='CPU scores '+state.scores.p2[best]+' in '+best+'.';nextTurn();locked=false;draw();}
function nextTurn(){if(done()){finish();return;}state.turn=state.turn==='p1'?'p2':'p1';state.left=3;state.held=[false,false,false,false,false];}
function done(){return cats.every(c=>state.scores.p1[c]!==undefined&&state.scores.p2[c]!==undefined);}
function finish(){state.over=true;let a=total('p1'),b=total('p2');state.msg=a>b?'Player 1 wins!':b>a?'Player 2 wins!':'Tie game!';record(a,b);}
function bestCat(p){let best=cats.find(c=>state.scores[p][c]===undefined),bs=-1;cats.forEach(c=>{if(state.scores[p][c]===undefined){let s=score(c,state.dice);if(s>bs){bs=s;best=c;}}});return best;}
function bestRepeat(){let c=count();let best=1,m=0;for(let n in c)if(c[n]>m){m=c[n];best=+n;}return best;}
function score(cat,d){let c=count(d),sum=d.reduce((a,b)=>a+b,0);if(cat==='Ones')return n(d,1);if(cat==='Twos')return n(d,2)*2;if(cat==='Threes')return n(d,3)*3;if(cat==='Fours')return n(d,4)*4;if(cat==='Fives')return n(d,5)*5;if(cat==='Sixes')return n(d,6)*6;if(cat==='Three Kind')return Object.values(c).some(x=>x>=3)?sum:0;if(cat==='Four Kind')return Object.values(c).some(x=>x>=4)?sum:0;if(cat==='Full House')return Object.values(c).includes(3)&&Object.values(c).includes(2)?25:0;if(cat==='Small Straight')return small(d)?30:0;if(cat==='Large Straight')return large(d)?40:0;if(cat==='Yahtzee')return Object.values(c).includes(5)?50:0;return sum;}
function count(d=state.dice){let c={};d.forEach(x=>c[x]=(c[x]||0)+1);return c;}function n(d,x){return d.filter(v=>v===x).length;}function small(d){let s=[...new Set(d)].sort().join('');return s.includes('1234')||s.includes('2345')||s.includes('3456');}function large(d){let s=[...new Set(d)].sort().join('');return s==='12345'||s==='23456';}function total(p){return Object.values(state?.scores[p]||{}).reduce((a,b)=>a+b,0);}function record(a,b){let mine=seat==='p1'?a:b,opp=seat==='p1'?b:a;if(mine>opp)stats.w++;else if(opp>mine)stats.l++;else stats.t++;localStorage.yStats=JSON.stringify(stats);}function resetStats(){stats={w:0,l:0,t:0};localStorage.yStats=JSON.stringify(stats);draw();}function rand(){return Math.floor(Math.random()*6)+1;}function face(n){return['','⚀','⚁','⚂','⚃','⚄','⚅'][n];}function lab(p){return p==='p1'?'Player 1':'Player 2';}function status(x){document.getElementById('status').textContent=x;}function wait(ms){return new Promise(r=>setTimeout(r,ms));}function send(data){window.sendMove(data);}window.sendMove=data=>parent.postMessage({type:'move',data},'*');window.onMove=data=>{if(data.type==='state'){state=data.state;draw();}};draw();
</script></body></html>
