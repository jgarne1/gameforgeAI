<!DOCTYPE html><html><head><title>Yahtzee</title><style>body{font-family:Arial;text-align:center;background:#f4efe6;margin:0}#game{display:grid;grid-template-columns:1fr 460px;gap:12px;padding:12px;max-width:1250px;margin:auto}.panel{background:#fff;border:2px solid #333;border-radius:10px;padding:10px}#status{font-size:20px;font-weight:bold;margin:10px}#diceArea{height:160px;border:2px dashed #aaa;border-radius:12px;background:#e8f4e8;display:flex;justify-content:center;align-items:center;gap:10px}.die{width:60px;height:60px;border:2px solid #111;border-radius:10px;background:#fff;font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer}.held{background:#ffeaa7;transform:translateY(-8px)}.roll{animation:roll .6s ease}@keyframes roll{0%{transform:translateY(-100px) rotate(0)}70%{transform:translateY(10px) rotate(280deg)}100%{transform:translateY(0) rotate(360deg)}}button{margin:5px;padding:8px 12px;cursor:pointer;border-radius:8px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #999;padding:5px}.activeCol{background:#fff3b0}.scoreChoice{background:#dff0ff;cursor:pointer;font-weight:bold}.used{background:#ddd}.preview{color:#777}</style></head><body><h2>Yahtzee</h2><div id="status">Loading players...</div><div id="game"><div class="panel"><h3>Dice Table</h3><p>Current Turn: <b id="turnLabel"></b></p><div id="diceArea"></div><button onclick="rollDice()">🎲 Roll Cup</button><button onclick="newGame(true)">New Game</button><p>Rolls left: <span id="rollsLeft">3</span></p><p>Click dice to hold after your first roll.</p></div><div class="panel"><h3>Score Sheet</h3><table><thead><tr id="headRow"><th>Category</th></tr></thead><tbody id="sheet"></tbody><tfoot><tr id="totalRow"><th>Total</th></tr></tfoot></table></div></div><script>
const GAME_META={id:'yahtzee',name:'Yahtzee',minPlayers:1,maxPlayers:4,seats:4};const cats=['Ones','Twos','Threes','Fours','Fives','Sixes','Three Kind','Four Kind','Full House','Small Straight','Large Straight','Yahtzee','Chance'];let players=[{seat:0,name:'Seat 1'}];let myName='';let state;
function loadPlayers(){if(window.GAME_PLAYERS&&window.GAME_PLAYERS.length)players=window.GAME_PLAYERS.map(p=>({seat:p.seat,name:p.name}));myName='';state=freshState();draw()}setTimeout(loadPlayers,120);
function freshState(){let scores={};players.forEach(p=>scores[p.seat]={});return{dice:[1,1,1,1,1],held:[false,false,false,false,false],rolls:3,turn:players[0].seat,scores,gameOver:false}}
function draw(){if(!state)return;let cur=players.find(p=>p.seat===state.turn)||players[0];turnLabel.innerText=cur.name+"'s turn";rollsLeft.innerText=state.rolls;status.innerText=state.gameOver?'Game over. Click New Game.':cur.name+"'s turn. Roll, hold dice, then choose a score.";diceArea.innerHTML='';state.dice.forEach((v,i)=>{let d=document.createElement('div');d.className='die'+(state.held[i]?' held':'');d.innerText=['','⚀','⚁','⚂','⚃','⚄','⚅'][v];d.onclick=()=>toggleHold(i);diceArea.appendChild(d)});drawSheet()}
function drawSheet(){headRow.innerHTML='<th>Category</th>';players.forEach(p=>{let th=document.createElement('th');th.innerText=p.name;th.className=p.seat===state.turn?'activeCol':'';headRow.appendChild(th)});sheet.innerHTML='';cats.forEach(cat=>{let tr=document.createElement('tr');let name=document.createElement('td');name.innerText=cat;tr.appendChild(name);players.forEach(p=>{let td=document.createElement('td');let sc=state.scores[p.seat]||{};if(sc[cat]!==undefined){td.innerText=sc[cat];td.className='used'}else if(p.seat===state.turn&&state.rolls<3){td.innerText=score(cat,state.dice);td.className='scoreChoice';td.onclick=()=>chooseScore(cat)}tr.appendChild(td)});sheet.appendChild(tr)});totalRow.innerHTML='<th>Total</th>';players.forEach(p=>{let th=document.createElement('th');th.innerText=totalScore(p.seat);th.className=p.seat===state.turn?'activeCol':'';totalRow.appendChild(th)})}
function rollDice(){if(state.gameOver||state.rolls<=0)return;for(let i=0;i<5;i++)if(!state.held[i])state.dice[i]=rand();state.rolls--;draw();document.querySelectorAll('.die').forEach((d,i)=>{if(!state.held[i]){d.classList.remove('roll');void d.offsetWidth;d.classList.add('roll')}});sync()}
function toggleHold(i){if(state.gameOver||state.rolls===3)return;state.held[i]=!state.held[i];draw();sync()}
function chooseScore(cat){if(state.gameOver||state.rolls===3)return;if(!state.scores[state.turn])state.scores[state.turn]={};state.scores[state.turn][cat]=score(cat,state.dice);if(players.every(p=>cats.every(c=>(state.scores[p.seat]||{})[c]!==undefined)))state.gameOver=true;else nextTurn();draw();sync()}
function nextTurn(){let idx=players.findIndex(p=>p.seat===state.turn);state.turn=players[(idx+1)%players.length].seat;state.rolls=3;state.held=[false,false,false,false,false];state.dice=[1,1,1,1,1]}
function score(cat,d){let counts={};d.forEach(x=>counts[x]=(counts[x]||0)+1);let sum=d.reduce((a,b)=>a+b,0);if(cat==='Ones')return count(d,1);if(cat==='Twos')return count(d,2)*2;if(cat==='Threes')return count(d,3)*3;if(cat==='Fours')return count(d,4)*4;if(cat==='Fives')return count(d,5)*5;if(cat==='Sixes')return count(d,6)*6;if(cat==='Three Kind')return Object.values(counts).some(x=>x>=3)?sum:0;if(cat==='Four Kind')return Object.values(counts).some(x=>x>=4)?sum:0;if(cat==='Full House')return Object.values(counts).includes(3)&&Object.values(counts).includes(2)?25:0;if(cat==='Small Straight')return smallStraight(d)?30:0;if(cat==='Large Straight')return largeStraight(d)?40:0;if(cat==='Yahtzee')return Object.values(counts).some(x=>x===5)?50:0;if(cat==='Chance')return sum;return 0}
function count(d,n){return d.filter(x=>x===n).length}function smallStraight(d){let s=[...new Set(d)].sort().join('');return s.includes('1234')||s.includes('2345')||s.includes('3456')}function largeStraight(d){let s=[...new Set(d)].sort().join('');return s==='12345'||s==='23456'}function totalScore(seat){return Object.values(state.scores[seat]||{}).reduce((a,b)=>a+b,0)}function rand(){return Math.floor(Math.random()*6)+1}function newGame(send){state=freshState();draw();if(send)sync()}function sync(){window.sendMove({type:'state',state})}
window.sendMove=d=>parent.postMessage({type:'move',data:d},'*');window.onMove=d=>{if(d.type==='state'){state=d.state;draw()}};
</script></body></html>
