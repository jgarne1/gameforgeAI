<!DOCTYPE html>
<html>
<head>
<title>Multiplayer Yahtzee</title>
<style>
body{font-family:Arial;text-align:center;background:#f4efe6;margin:0}
#game{display:grid;grid-template-columns:1fr 460px;gap:12px;padding:12px;max-width:1250px;margin:auto}
.panel{background:#fff;border:2px solid #333;border-radius:10px;padding:10px}
#status{font-size:20px;font-weight:bold;margin:10px}
#diceArea{height:160px;border:2px dashed #aaa;border-radius:12px;background:#e8f4e8;display:flex;justify-content:center;align-items:center;gap:10px}
.die{width:60px;height:60px;border:2px solid #111;border-radius:10px;background:#fff;font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.held{background:#ffeaa7;transform:translateY(-8px)}
.roll{animation:roll .6s ease}
@keyframes roll{0%{transform:translateY(-100px) rotate(0)}70%{transform:translateY(10px) rotate(280deg)}100%{transform:translateY(0) rotate(360deg)}}
button{margin:5px;padding:8px 12px;cursor:pointer;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #999;padding:5px}
.activeCol{background:#fff3b0}
.scoreChoice{background:#dff0ff;cursor:pointer;font-weight:bold}
.used{background:#ddd}
.preview{color:#777}
</style>
</head>
<body>

<h2>Multiplayer Yahtzee</h2>
<div id="status">Choose your seat.</div>

<div id="game">
<div class="panel">
<h3>Dice Table</h3>

<div id="seatButtons"></div>
<p>You are: <b id="meLabel">Not seated</b></p>
<p>Current Turn: <b id="turnLabel"></b></p>

<div id="diceArea"></div>

<button onclick="rollDice()">🎲 Roll Cup</button>
<button onclick="newGame(true)">New Game</button>

<p>Rolls left: <span id="rollsLeft">3</span></p>
<p>Click dice to hold after your first roll.</p>
</div>

<div class="panel">
<h3>Score Sheet</h3>
<table>
<thead>
<tr id="headRow"><th>Category</th></tr>
</thead>
<tbody id="sheet"></tbody>
<tfoot>
<tr id="totalRow"><th>Total</th></tr>
</tfoot>
</table>
</div>
</div>

<script>
const GAME_META={id:"yahtzee",name:"Yahtzee",minPlayers:1,maxPlayers:4,seats:4};

const cats=[
"Ones","Twos","Threes","Fours","Fives","Sixes",
"Three Kind","Four Kind","Full House","Small Straight","Large Straight","Yahtzee","Chance"
];

let players=["Seat 1","Seat 2","Seat 3","Seat 4"];
let activeSeats=[0,1,2,3];

if(window.GAME_PLAYERS && window.GAME_PLAYERS.length){
  activeSeats=[];
  window.GAME_PLAYERS.forEach(p=>{
    players[p.seat]=p.name || ("Seat "+(p.seat+1));
    activeSeats.push(p.seat);
  });
  activeSeats.sort((a,b)=>a-b);
}

let mySeat=null;
let state=freshState();

function freshState(){
  let scores=[{},{},{},{}];
  return {
    dice:[1,1,1,1,1],
    held:[false,false,false,false,false],
    rolls:3,
    turn:activeSeats[0] ?? 0,
    scores:scores,
    gameOver:false
  };
}

function draw(){
  drawSeats();
  document.getElementById("meLabel").innerText=mySeat===null?"Not seated":players[mySeat];
  document.getElementById("turnLabel").innerText=players[state.turn]+"'s turn";
  document.getElementById("rollsLeft").innerText=state.rolls;

  if(state.gameOver){
    document.getElementById("status").innerText="Game over. Click New Game.";
  }else if(mySeat===state.turn){
    document.getElementById("status").innerText="Your turn. Roll, hold dice, then choose a score.";
  }else{
    document.getElementById("status").innerText=players[state.turn]+"'s turn.";
  }

  let diceArea=document.getElementById("diceArea");
  diceArea.innerHTML="";
  state.dice.forEach((v,i)=>{
    let d=document.createElement("div");
    d.className="die"+(state.held[i]?" held":"");
    d.innerText=["","⚀","⚁","⚂","⚃","⚄","⚅"][v];
    d.onclick=()=>toggleHold(i);
    diceArea.appendChild(d);
  });

  drawSheet();
}

function drawSeats(){
  let box=document.getElementById("seatButtons");
  box.innerHTML="";
  activeSeats.forEach(s=>{
    let b=document.createElement("button");
    b.innerText="Sit as "+players[s];
    b.onclick=()=>{mySeat=s;draw();};
    box.appendChild(b);
  });
}

function drawSheet(){
  let head=document.getElementById("headRow");
  head.innerHTML="<th>Category</th>";
  activeSeats.forEach(s=>{
    let th=document.createElement("th");
    th.innerText=players[s];
    th.className=s===state.turn?"activeCol":"";
    head.appendChild(th);
  });

  let sheet=document.getElementById("sheet");
  sheet.innerHTML="";

  cats.forEach(cat=>{
    let tr=document.createElement("tr");
    let name=document.createElement("td");
    name.innerText=cat;
    tr.appendChild(name);

    activeSeats.forEach(s=>{
      let td=document.createElement("td");

      if(state.scores[s][cat]!==undefined){
        td.innerText=state.scores[s][cat];
        td.className="used";
      }else if(s===state.turn && state.rolls<3){
        let val=score(cat,state.dice);
        td.innerText=val;
        if(mySeat===state.turn && !state.gameOver){
          td.className="scoreChoice";
          td.onclick=()=>chooseScore(cat);
        }else{
          td.className="preview";
        }
      }else{
        td.innerText="";
      }

      tr.appendChild(td);
    });

    sheet.appendChild(tr);
  });

  let total=document.getElementById("totalRow");
  total.innerHTML="<th>Total</th>";
  activeSeats.forEach(s=>{
    let th=document.createElement("th");
    th.innerText=totalScore(s);
    th.className=s===state.turn?"activeCol":"";
    total.appendChild(th);
  });
}

function rollDice(){
  if(state.gameOver || mySeat!==state.turn || state.rolls<=0)return;

  for(let i=0;i<5;i++){
    if(!state.held[i])state.dice[i]=rand();
  }
  state.rolls--;

  draw();
  animateDice();
  sync();
}

function toggleHold(i){
  if(state.gameOver || mySeat!==state.turn || state.rolls===3)return;
  state.held[i]=!state.held[i];
  draw();
  sync();
}

function chooseScore(cat){
  if(state.gameOver || mySeat!==state.turn || state.rolls===3)return;

  state.scores[state.turn][cat]=score(cat,state.dice);

  if(checkGameOver()){
    state.gameOver=true;
  }else{
    nextTurn();
  }

  draw();
  sync();
}

function nextTurn(){
  let idx=activeSeats.indexOf(state.turn);
  let next=activeSeats[(idx+1)%activeSeats.length];

  state.turn=next;
  state.rolls=3;
  state.held=[false,false,false,false,false];
  state.dice=[1,1,1,1,1];
}

function checkGameOver(){
  return activeSeats.every(s=>cats.every(c=>state.scores[s][c]!==undefined));
}

function score(cat,d){
  let counts={};
  d.forEach(x=>counts[x]=(counts[x]||0)+1);
  let sum=d.reduce((a,b)=>a+b,0);

  if(cat==="Ones")return count(d,1)*1;
  if(cat==="Twos")return count(d,2)*2;
  if(cat==="Threes")return count(d,3)*3;
  if(cat==="Fours")return count(d,4)*4;
  if(cat==="Fives")return count(d,5)*5;
  if(cat==="Sixes")return count(d,6)*6;
  if(cat==="Three Kind")return Object.values(counts).some(x=>x>=3)?sum:0;
  if(cat==="Four Kind")return Object.values(counts).some(x=>x>=4)?sum:0;
  if(cat==="Full House")return Object.values(counts).includes(3)&&Object.values(counts).includes(2)?25:0;
  if(cat==="Small Straight")return smallStraight(d)?30:0;
  if(cat==="Large Straight")return largeStraight(d)?40:0;
  if(cat==="Yahtzee")return Object.values(counts).some(x=>x===5)?50:0;
  if(cat==="Chance")return sum;
  return 0;
}

function count(d,n){return d.filter(x=>x===n).length;}

function smallStraight(d){
  let s=[...new Set(d)].sort().join("");
  return s.includes("1234")||s.includes("2345")||s.includes("3456");
}

function largeStraight(d){
  let s=[...new Set(d)].sort().join("");
  return s==="12345"||s==="23456";
}

function totalScore(s){
  return Object.values(state.scores[s]).reduce((a,b)=>a+b,0);
}

function rand(){
  return Math.floor(Math.random()*6)+1;
}

function animateDice(){
  document.querySelectorAll(".die").forEach((d,i)=>{
    if(!state.held[i]){
      d.classList.remove("roll");
      void d.offsetWidth;
      d.classList.add("roll");
    }
  });
}

function newGame(sendIt){
  state=freshState();
  draw();
  if(sendIt)sync();
}

function sync(){
  window.sendMove({type:"state",state});
}

window.sendMove=function(data){
  parent.postMessage({type:"move",data},"*");
};

window.onMove=function(data){
  if(data.type==="state"){
    state=data.state;
    draw();
  }
};

draw();
</script>
</body>
</html>
