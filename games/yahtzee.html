<!DOCTYPE html><html><head><title>Yahtzee</title><style>body{font-family:Arial;text-align:center}.die{display:inline-flex;width:58px;height:58px;border:2px solid #111;border-radius:10px;margin:5px;align-items:center;justify-content:center;font-size:32px;background:white;box-shadow:2px 3px #999;cursor:pointer}.held{background:#ffeaa7;transform:translateY(-8px)}.roll{animation:r .6s}@keyframes r{0%{transform:translateY(-90px) rotate(0)}100%{transform:translateY(0) rotate(360deg)}}table{margin:auto;border-collapse:collapse}td,th{border:1px solid #999;padding:5px}.pick{background:#eaffea;cursor:pointer}</style></head><body><h2>Yahtzee</h2><div id="status"></div><button onclick="roll()">🎲 Roll Cup</button><button onclick="newGame(true)">New Game</button><p>Rolls left <span id="left"></span></p><div id="dice"></div><table><tbody id="sheet"></tbody></table><script>
let q=new URLSearchParams(location.search), seat=+(q.get('seat')||1), me=seat===1?'p1':'p2', turn='p1', dice=[1,1,1,1,1], held=[false,false,false,false,false], leftN=3, score={p1:{},p2:{}}, cats=['Ones','Twos','Threes','Fours','Fives','Sixes','Chance'];
function draw(){status.innerText=(turn===me?'Your turn':'Opponent turn');left.innerText=leftN;dice.innerHTML=dice.map((v,i)=>`<span class="die ${held[i]?'held':''}" onclick="hold(${i})">${'⚀⚁⚂⚃⚄⚅'[v-1]}</span>`).join('');sheet.innerHTML='<tr><th>Category</th><th>You</th><th>Opponent</th></tr>'+cats.map(c=>`<tr><td>${c}</td><td class="${turn===me&&score[me][c]==null&&leftN<3?'pick':''}" onclick="pick('${c}')">${score[me][c]??(leftN<3?calc(c):'')}</td><td>${score[me==='p1'?'p2':'p1'][c]??''}</td></tr>`).join('');}
function roll(){if(turn!==me||leftN<=0)return;dice=dice.map((v,i)=>held[i]?v:1+Math.floor(Math.random()*6));leftN--;draw();document.querySelectorAll('.die').forEach(d=>d.classList.add('roll'));sendMove({type:'state',turn,dice,held,leftN,score});}
function hold(i){if(turn!==me||leftN===3)return;held[i]=!held[i];draw();sendMove({type:'state',turn,dice,held,leftN,score});}
function pick(c){if(turn!==me||leftN===3||score[me][c]!=null)return;score[me][c]=calc(c);turn=turn==='p1'?'p2':'p1';held=[false,false,false,false,false];leftN=3;draw();sendMove({type:'state',turn,dice,held,leftN,score});}
function calc(c){let n=cats.indexOf(c)+1;if(c==='Chance')return dice.reduce((a,b)=>a+b,0);return dice.filter(x=>x===n).length*n;}
function newGame(local){turn='p1';dice=[1,1,1,1,1];held=[false,false,false,false,false];leftN=3;score={p1:{},p2:{}};draw();if(local)sendMove({type:'state',turn,dice,held,leftN,score});}
window.sendMove=d=>parent.postMessage({type:'move',data:d},'*');window.onMove=d=>{if(d.type==='state'){turn=d.turn;dice=d.dice;held=d.held;leftN=d.leftN;score=d.score;draw();}};draw();
</script></body></html>
