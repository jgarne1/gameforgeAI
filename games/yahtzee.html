<!DOCTYPE html><html><head><title>Yahtzee</title><style>body{font-family:Arial;text-align:center}.die{display:inline-block;font-size:38px;border:2px solid #111;padding:12px;margin:6px;border-radius:8px}.held{background:#ffeaa7}button{padding:8px;margin:5px}td,th{border:1px solid #999;padding:5px}table{margin:auto;border-collapse:collapse}</style></head><body><h2>Yahtzee</h2><div id="status">Roll</div><button onclick="newGame(true)">New Game</button><button onclick="roll(true)">Roll</button><div id="dice"></div><p>Rolls left: <span id="left"></span></p><table><tbody id="sheet"></tbody></table><script>const cats=['Ones','Twos','Threes','Fours','Fives','Sixes','Chance'];let st;function fresh(){return{dice:[1,1,1,1,1],held:[0,0,0,0,0],left:3,turn:'p1',scores:{p1:{},p2:{}},log:'Player 1 turn'}}function newGame(send){st=fresh();draw();if(send)sendMove({type:'state',st});}function draw(){dice.innerHTML=st.dice.map((v,i)=>`<span class="die ${st.held[i]?'held':''}" onclick="hold(${i},true)">${'⚀⚁⚂⚃⚄⚅'[v-1]}</span>`).join('');left.innerText=st.left;status.innerText=st.log;sheet.innerHTML='<tr><th>Cat</th><th>P1</th><th>P2</th></tr>'+cats.map(c=>`<tr><td>${c}</td><td onclick="score('${c}',true)">${st.scores.p1[c]??''}</td><td>${st.scores.p2[c]??''}</td></tr>`).join('');}function roll(send){if(st.left<=0)return;st.dice=st.dice.map((v,i)=>st.held[i]?v:1+Math.floor(Math.random()*6));st.left--;draw();if(send)sendMove({type:'state',st});}function hold(i,send){st.held[i]=!st.held[i];draw();if(send)sendMove({type:'state',st});}function score(c,send){if(st.scores.p1[c]!=null)return;st.scores.p1[c]=calc(c);st.log='Scored '+st.scores.p1[c];st.left=3;st.held=[0,0,0,0,0];draw();if(send)sendMove({type:'state',st});}function calc(c){let n=cats.indexOf(c)+1;if(c==='Chance')return st.dice.reduce((a,b)=>a+b,0);return st.dice.filter(x=>x===n).length*n;}window.sendMove=d=>parent.postMessage({type:'move',data:d},'*');window.onMove=d=>{if(d.type==='state'){st=d.st;draw();}};newGame(false);</script></body></html>
