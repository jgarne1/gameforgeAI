<!DOCTYPE html>
<html>
<head>
<title>Yahtzee</title>
<style>
:root{
  --bg:#1f2937;
  --panel:#ffffff;
  --felt:#25634b;
  --line:#d1d5db;
  --gold:#facc15;
  --blue:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --muted:#64748b;
  --text:#1f2937;
}
*{box-sizing:border-box}
body{
  font-family:Arial,Helvetica,sans-serif;
  text-align:center;
  background:radial-gradient(circle at top,#334155,#111827);
  margin:0;
  color:var(--text);
  overflow:hidden;
}
.wrap{
  height:100vh;
  min-height:650px;
  padding:12px;
  display:grid;
  grid-template-rows:auto auto 1fr;
  gap:10px;
}
.top,.status,.mainPanel{
  background:rgba(255,255,255,.95);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 10px 26px rgba(0,0,0,.25);
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
}
h2,h3{margin:0}
.status{
  padding:9px;
}
#status{
  font-size:20px;
  font-weight:bold;
}
.small{
  font-size:12px;
  color:var(--muted);
}
.mainPanel{
  display:grid;
  grid-template-columns:minmax(460px,1fr) minmax(480px,620px);
  gap:12px;
  padding:12px;
  min-height:0;
}
.tablePanel,.scorePanel{
  border-radius:18px;
  padding:12px;
  min-height:0;
}
.tablePanel{
  background:radial-gradient(circle,var(--felt),#123b2c);
  color:white;
  border:4px solid #5b3418;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:12px;
}
.scorePanel{
  background:#fff;
  border:2px solid #334155;
  overflow:auto;
}
.playerStrip{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
}
.playerCard{
  min-width:150px;
  padding:8px 10px;
  border-radius:14px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.24);
}
.playerCard.turn{
  outline:4px solid var(--gold);
}
.badge{
  display:inline-block;
  padding:5px 9px;
  border-radius:999px;
  background:rgba(37,99,235,.12);
  border:1px solid rgba(37,99,235,.25);
  font-size:12px;
  font-weight:bold;
}
.tableCenter{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
}
#diceArea{
  min-height:170px;
  width:min(760px,96%);
  border:3px dashed rgba(255,255,255,.38);
  border-radius:22px;
  background:rgba(255,255,255,.12);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:16px;
  padding:18px;
}
.die{
  width:86px;
  height:86px;
  border:3px solid #111827;
  border-radius:18px;
  background:linear-gradient(135deg,#fff,#e5e7eb);
  box-shadow:5px 7px 0 rgba(0,0,0,.35);
  cursor:pointer;
  position:relative;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  padding:12px;
  transition:.15s ease;
}
.die:hover{
  transform:translateY(-3px);
}
.held{
  background:linear-gradient(135deg,#fef3c7,#facc15);
  transform:translateY(-10px);
  box-shadow:5px 13px 0 rgba(0,0,0,.32);
}
.pip{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#111827;
  align-self:center;
  justify-self:center;
  opacity:0;
}
.die.v1 .p5{opacity:1}
.die.v2 .p1,.die.v2 .p9{opacity:1}
.die.v3 .p1,.die.v3 .p5,.die.v3 .p9{opacity:1}
.die.v4 .p1,.die.v4 .p3,.die.v4 .p7,.die.v4 .p9{opacity:1}
.die.v5 .p1,.die.v5 .p3,.die.v5 .p5,.die.v5 .p7,.die.v5 .p9{opacity:1}
.die.v6 .p1,.die.v6 .p3,.die.v6 .p4,.die.v6 .p6,.die.v6 .p7,.die.v6 .p9{opacity:1}
.roll{animation:roll .6s ease}
@keyframes roll{
  0%{transform:translateY(-90px) rotate(0)}
  70%{transform:translateY(12px) rotate(280deg)}
  100%{transform:translateY(0) rotate(360deg)}
}
.held.roll{
  animation:heldRoll .6s ease;
}
@keyframes heldRoll{
  0%,100%{transform:translateY(-10px)}
}
.controls{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}
button{
  margin:4px;
  padding:10px 14px;
  cursor:pointer;
  border-radius:12px;
  border:1px solid #94a3b8;
  font-weight:bold;
  background:#f8fafc;
}
button.primary{
  background:var(--blue);
  color:white;
  border-color:var(--blue);
}
button.gold{
  background:var(--gold);
  border-color:var(--gold);
}
button:disabled{
  opacity:.5;
  cursor:not-allowed;
}
.rollsBadge{
  font-size:20px;
  font-weight:bold;
  color:#fde68a;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
th,td{
  border:1px solid #cbd5e1;
  padding:7px;
}
th{
  background:#f1f5f9;
  position:sticky;
  top:0;
  z-index:2;
}
tfoot th{
  bottom:0;
}
.activeCol{
  background:#fff3b0!important;
}
.scoreChoice{
  background:#dff0ff;
  cursor:pointer;
  font-weight:bold;
}
.scoreChoice:hover{
  background:#bfdbfe;
}
.used{
  background:#e5e7eb;
  color:#475569;
}
.preview{
  color:#64748b;
  background:#f8fafc;
}
.category{
  text-align:left;
  font-weight:bold;
}
@media(max-width:950px){
  .mainPanel{
    grid-template-columns:1fr;
  }
  #diceArea{
    min-height:135px;
    gap:8px;
  }
  .die{
    width:58px;
    height:58px;
    border-radius:12px;
    padding:8px;
  }
  .pip{
    width:9px;
    height:9px;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h2>Yahtzee</h2>
    <div>
      <span id="meLabel" class="badge">Spectator</span>
      <button onclick="newGame(true)" class="gold">New Game</button>
    </div>
  </div>

  <div class="status">
    <div id="status">Loading players...</div>
    <div class="small">Roll up to 3 times, hold dice, then choose a score category.</div>
  </div>

  <div class="mainPanel">
    <div class="tablePanel">
      <div>
        <h3>Dice Table</h3>
        <div class="small">Current Turn: <b id="turnLabel"></b></div>
      </div>

      <div class="tableCenter">
        <div id="diceArea"></div>

        <div class="controls">
          <button id="rollBtn" class="primary" onclick="rollDice()">Roll Cup</button>
          <span class="rollsBadge">Rolls left: <span id="rollsLeft">3</span></span>
        </div>

        <div class="small">Only the current player can roll, hold dice, and choose a score. Everyone else watches live.</div>
      </div>

      <div id="playersPanel" class="playerStrip"></div>
    </div>

    <div class="scorePanel">
      <h3>Score Sheet</h3>
      <table>
        <thead><tr id="headRow"><th>Category</th></tr></thead>
        <tbody id="sheet"></tbody>
        <tfoot><tr id="totalRow"><th>Total</th></tr></tfoot>
      </table>
    </div>
  </div>
</div>

<script>
var GAME_META={id:'yahtzee',name:'Yahtzee',minPlayers:1,maxPlayers:4,seats:4};

var cats=[
  'Ones','Twos','Threes','Fours','Fives','Sixes',
  'Three Kind','Four Kind','Full House','Small Straight','Large Straight','Yahtzee','Chance'
];

var players=[{seat:0,name:'Player 1'}];
var mySeat=null;
var state=null;
var setupReceived=false;

function el(id){return document.getElementById(id);}

window.onerror=function(msg){
  if(el('status'))el('status').innerText='Game error: '+msg;
};

function initPlayers(){
  if(window.GAME_PLAYERS&&window.GAME_PLAYERS.length){
    receiveSetup(window.GAME_PLAYERS,window.GAME_MY_SEAT);
  }else{
    state=freshState();
    draw();
  }
}

function receiveSetup(newPlayers,newSeat){
  setupReceived=true;

  if(newPlayers&&newPlayers.length){
    players=[];
    for(var i=0;i<newPlayers.length;i++){
      players.push({
        seat:Number(newPlayers[i].seat),
        name:newPlayers[i].name||('Seat '+(Number(newPlayers[i].seat)+1))
      });
    }
  }

  players.sort(function(a,b){return a.seat-b.seat;});

  if(newSeat!==undefined&&newSeat!==null){
    mySeat=Number(newSeat);
    if(!playerExists(mySeat))mySeat=null;
  }

  if(!state||!playerExists(state.turn)){
    state=freshState();
  }else{
    for(var p=0;p<players.length;p++){
      if(!state.scores[players[p].seat])state.scores[players[p].seat]={};
    }
  }

  draw();
}

function freshState(){
  var scores={};
  for(var i=0;i<players.length;i++)scores[players[i].seat]={};

  return {
    dice:[1,1,1,1,1],
    held:[false,false,false,false,false],
    rolls:3,
    turn:players[0].seat,
    scores:scores,
    gameOver:false,
    message:'New game. '+nameOf(players[0].seat)+' goes first.'
  };
}

function draw(){
  if(!state)return;

  var myName=mySeat===null?'Spectator':nameOf(mySeat);
  var turnName=nameOf(state.turn);
  var myTurn=mySeat===state.turn&&!state.gameOver;

  el('meLabel').innerText=myName;
  el('turnLabel').innerText=turnName+"'s turn";
  el('rollsLeft').innerText=state.rolls;

  if(state.gameOver){
    el('status').innerText=state.message||'Game over.';
  }else if(myTurn){
    el('status').innerText='Your turn. Roll, hold dice, then choose a score.';
  }else{
    el('status').innerText=turnName+"'s turn. Watching live.";
  }

  el('rollBtn').disabled=!myTurn||state.rolls<=0;

  drawDice();
  drawPlayers();
  drawSheet();
}

function drawDice(){
  el('diceArea').innerHTML='';

  for(var i=0;i<state.dice.length;i++){
    var d=document.createElement('div');
    d.className='die v'+state.dice[i]+(state.held[i]?' held':'');
    d.onclick=(function(idx){return function(){toggleHold(idx);};})(i);

    for(var p=1;p<=9;p++){
      var pip=document.createElement('span');
      pip.className='pip p'+p;
      d.appendChild(pip);
    }

    el('diceArea').appendChild(d);
  }
}

function drawPlayers(){
  var html='';

  for(var i=0;i<players.length;i++){
    var p=players[i];
    html+='<div class="playerCard '+(p.seat===state.turn&&!state.gameOver?'turn':'')+'">'+
      '<b>'+escapeHtml(p.name)+'</b><br>'+
      '<span class="small">Score: '+totalScore(p.seat)+(p.seat===mySeat?' · You':'')+'</span>'+
    '</div>';
  }

  el('playersPanel').innerHTML=html;
}

function drawSheet(){
  el('headRow').innerHTML='<th>Category</th>';

  for(var i=0;i<players.length;i++){
    var th=document.createElement('th');
    th.innerText=players[i].name;
    th.className=players[i].seat===state.turn?'activeCol':'';
    el('headRow').appendChild(th);
  }

  el('sheet').innerHTML='';

  for(var c=0;c<cats.length;c++){
    var cat=cats[c];
    var tr=document.createElement('tr');
    var name=document.createElement('td');
    name.innerText=cat;
    name.className='category';
    tr.appendChild(name);

    for(var p=0;p<players.length;p++){
      var td=document.createElement('td');
      var sc=state.scores[players[p].seat]||{};

      if(sc[cat]!==undefined){
        td.innerText=sc[cat];
        td.className='used';
      }else if(players[p].seat===state.turn&&state.rolls<3){
        td.innerText=score(cat,state.dice);
        if(mySeat===state.turn&&!state.gameOver){
          td.className='scoreChoice';
          td.onclick=(function(x){return function(){chooseScore(x);};})(cat);
        }else{
          td.className='preview';
        }
      }else{
        td.innerText='';
      }

      tr.appendChild(td);
    }

    el('sheet').appendChild(tr);
  }

  el('totalRow').innerHTML='<th>Total</th>';

  for(var t=0;t<players.length;t++){
    var total=document.createElement('th');
    total.innerText=totalScore(players[t].seat);
    total.className=players[t].seat===state.turn?'activeCol':'';
    el('totalRow').appendChild(total);
  }
}

function rollDice(){
  if(state.gameOver||mySeat!==state.turn||state.rolls<=0)return;

  for(var i=0;i<5;i++){
    if(!state.held[i])state.dice[i]=rand();
  }

  state.rolls--;
  state.message=nameOf(mySeat)+' rolled.';

  draw();
  animateDice();
  sync();
}

function toggleHold(i){
  if(state.gameOver||mySeat!==state.turn||state.rolls===3)return;

  state.held[i]=!state.held[i];
  state.message=state.held[i]?nameOf(mySeat)+' held a die.':nameOf(mySeat)+' released a die.';

  draw();
  sync();
}

function chooseScore(cat){
  if(state.gameOver||mySeat!==state.turn||state.rolls===3)return;

  if(!state.scores[state.turn])state.scores[state.turn]={};

  var val=score(cat,state.dice);
  state.scores[state.turn][cat]=val;
  state.message=nameOf(state.turn)+' scored '+val+' in '+cat+'.';

  if(isGameOver()){
    finishGame();
  }else{
    nextTurn();
  }

  draw();
  sync();
}

function nextTurn(){
  var idx=-1;
  for(var i=0;i<players.length;i++){
    if(players[i].seat===state.turn)idx=i;
  }
  if(idx<0)idx=0;

  var next=players[(idx+1)%players.length];

  state.turn=next.seat;
  state.rolls=3;
  state.held=[false,false,false,false,false];
  state.dice=[1,1,1,1,1];
  state.message+=' '+nameOf(state.turn)+' is next.';
}

function isGameOver(){
  for(var p=0;p<players.length;p++){
    for(var c=0;c<cats.length;c++){
      if((state.scores[players[p].seat]||{})[cats[c]]===undefined)return false;
    }
  }
  return true;
}

function finishGame(){
  state.gameOver=true;

  var best=-1;
  var winners=[];

  for(var i=0;i<players.length;i++){
    var t=totalScore(players[i].seat);

    if(t>best){
      best=t;
      winners=[players[i].seat];
    }else if(t===best){
      winners.push(players[i].seat);
    }
  }

  state.message=winners.length===1
    ? 'Game over. '+nameOf(winners[0])+' wins with '+best+' points!'
    : 'Game over. Tie game at '+best+' points!';
}

function score(cat,d){
  var counts={};
  var sum=0;

  for(var i=0;i<d.length;i++){
    counts[d[i]]=(counts[d[i]]||0)+1;
    sum+=d[i];
  }

  if(cat==='Ones')return count(d,1)*1;
  if(cat==='Twos')return count(d,2)*2;
  if(cat==='Threes')return count(d,3)*3;
  if(cat==='Fours')return count(d,4)*4;
  if(cat==='Fives')return count(d,5)*5;
  if(cat==='Sixes')return count(d,6)*6;
  if(cat==='Three Kind')return hasCount(counts,3)?sum:0;
  if(cat==='Four Kind')return hasCount(counts,4)?sum:0;
  if(cat==='Full House')return hasExact(counts,3)&&hasExact(counts,2)?25:0;
  if(cat==='Small Straight')return smallStraight(d)?30:0;
  if(cat==='Large Straight')return largeStraight(d)?40:0;
  if(cat==='Yahtzee')return hasExact(counts,5)?50:0;
  if(cat==='Chance')return sum;

  return 0;
}

function count(d,n){
  var total=0;
  for(var i=0;i<d.length;i++)if(d[i]===n)total++;
  return total;
}

function hasCount(counts,n){
  for(var k in counts)if(counts[k]>=n)return true;
  return false;
}

function hasExact(counts,n){
  for(var k in counts)if(counts[k]===n)return true;
  return false;
}

function smallStraight(d){
  var s=uniqueSortedString(d);
  return s.indexOf('1234')>=0||s.indexOf('2345')>=0||s.indexOf('3456')>=0;
}

function largeStraight(d){
  var s=uniqueSortedString(d);
  return s==='12345'||s==='23456';
}

function uniqueSortedString(d){
  var seen={};
  var arr=[];

  for(var i=0;i<d.length;i++){
    if(!seen[d[i]]){
      seen[d[i]]=true;
      arr.push(d[i]);
    }
  }

  arr.sort();
  return arr.join('');
}

function totalScore(seat){
  var sc=state.scores[seat]||{};
  var total=0;

  for(var k in sc)total+=sc[k];

  return total;
}

function rand(){
  return Math.floor(Math.random()*6)+1;
}

function nameOf(seat){
  for(var i=0;i<players.length;i++){
    if(players[i].seat===seat)return players[i].name;
  }
  return 'Seat '+(seat+1);
}

function playerExists(seat){
  for(var i=0;i<players.length;i++){
    if(players[i].seat===seat)return true;
  }
  return false;
}

function animateDice(){
  var dice=document.querySelectorAll('.die');

  for(var i=0;i<dice.length;i++){
    if(!state.held[i]){
      dice[i].classList.remove('roll');
      void dice[i].offsetWidth;
      dice[i].classList.add('roll');
    }
  }
}

function newGame(sendIt){
  state=freshState();
  draw();
  if(sendIt)sync();
}

function sync(){
  window.sendMove({type:'state',state:state});
}

window.sendMove=function(data){
  parent.postMessage({type:'move',data:data},'*');
};

window.onMove=function(data){
  if(!data)return;

  if(data.type==='state'){
    state=data.state;
    draw();
  }

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
  }
};

window.addEventListener('message',function(event){
  var data=event.data||{};

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
  }

  if(data.type==='gameMove'&&window.onMove){
    window.onMove(data.data);
  }
});

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

parent.postMessage({type:'gameReady'},'*');

function safeBoot(){
  try{
    if(window.GAME_PLAYERS&&window.GAME_PLAYERS.length){
      receiveSetup(window.GAME_PLAYERS,window.GAME_MY_SEAT);
    }else{
      state=freshState();
      draw();
    }

    setTimeout(function(){
      if(!setupReceived&&window.GAME_PLAYERS&&window.GAME_PLAYERS.length){
        receiveSetup(window.GAME_PLAYERS,window.GAME_MY_SEAT);
      }
    },250);
  }catch(e){
    if(el('status'))el('status').innerText='Game error: '+e.message;
  }
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',safeBoot);
}else{
  safeBoot();
}
</script>
</body>
</html>
