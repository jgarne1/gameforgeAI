<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<style>
:root{
  --bg0:#020617;
  --bg1:#0f172a;
  --panel:rgba(15,23,42,.90);
  --panel2:rgba(30,41,59,.78);
  --border:rgba(56,189,248,.42);
  --borderSoft:rgba(148,163,184,.24);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#38bdf8;
  --accent2:#a78bfa;
  --x:#38bdf8;
  --o:#f59e0b;
  --good:#22c55e;
  --danger:#fb7185;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 0%,rgba(56,189,248,.20),transparent 32%),
    radial-gradient(circle at 80% 20%,rgba(167,139,250,.22),transparent 35%),
    linear-gradient(180deg,var(--bg1),var(--bg0));
  color:var(--text);
  overflow:hidden;
}
.gameShell{
  height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:10px;
  padding:10px;
}
.gameHeader,.gamePanel,.gameLog{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 16px 42px rgba(0,0,0,.32), inset 0 0 24px rgba(56,189,248,.04);
}
.gameHeader{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:10px;
  align-items:stretch;
  padding:10px;
}
.playerCard{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
  padding:9px;
  border-radius:15px;
  background:linear-gradient(135deg,rgba(15,23,42,.95),rgba(30,41,59,.72));
  border:1px solid var(--borderSoft);
  position:relative;
  overflow:hidden;
}
.playerCard:before{
  content:"";
  position:absolute;
  inset:-2px;
  opacity:.12;
  background:radial-gradient(circle at top left,var(--accent),transparent 42%);
  pointer-events:none;
}
.playerCard.active{
  border-color:var(--accent);
  box-shadow:0 0 18px rgba(56,189,248,.28), inset 0 0 16px rgba(56,189,248,.08);
}
.playerCard.o.active{
  border-color:var(--o);
  box-shadow:0 0 18px rgba(245,158,11,.26), inset 0 0 16px rgba(245,158,11,.08);
}
.petBadge{
  width:54px;
  height:54px;
  flex:0 0 54px;
  display:grid;
  place-items:center;
  border-radius:16px;
  background:rgba(2,6,23,.55);
  border:1px solid rgba(148,163,184,.25);
  z-index:1;
}
.petBadge img{
  max-width:50px;
  max-height:50px;
  object-fit:contain;
  filter:drop-shadow(0 8px 10px rgba(0,0,0,.45));
}
.petFallback{font-size:24px}
.playerInfo{min-width:0;z-index:1}
.playerName{
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.playerMeta,.petName{
  color:var(--muted);
  font-size:12px;
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.petName{color:#cbd5e1}
.centerStatus{
  width:min(250px,30vw);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:4px;
  padding:8px 10px;
  border-radius:16px;
  background:rgba(2,6,23,.45);
  border:1px solid rgba(148,163,184,.20);
}
.title{
  font-weight:1000;
  letter-spacing:.3px;
  font-size:clamp(15px,2vw,20px);
}
.statusText{
  color:#cbd5e1;
  font-size:12px;
  line-height:1.25;
}
.scoreLine{
  color:var(--muted);
  font-size:12px;
}
.gamePanel{
  min-height:0;
  display:grid;
  place-items:center;
  padding:12px;
  overflow:hidden;
}
.gameSurface{
  width:min(94vw,560px);
  height:100%;
  max-height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:22px;
  background:
    radial-gradient(circle at 50% 0%,rgba(56,189,248,.15),transparent 45%),
    linear-gradient(135deg,rgba(15,23,42,.98),rgba(2,6,23,.86));
  border:1px solid rgba(148,163,184,.20);
  padding:clamp(10px,2vh,20px);
}
.board{
  width:min(100%,68vh,430px);
  aspect-ratio:1/1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:clamp(8px,1.8vmin,14px);
  padding:clamp(10px,2vmin,18px);
  border-radius:26px;
  background:linear-gradient(145deg,rgba(56,189,248,.22),rgba(167,139,250,.16));
  border:1px solid rgba(56,189,248,.28);
  box-shadow:0 24px 60px rgba(0,0,0,.40), inset 0 0 32px rgba(255,255,255,.04);
}
.cell{
  aspect-ratio:1/1;
  min-width:0;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  border:0;
  border-radius:20px;
  background:linear-gradient(145deg,#1e293b,#020617);
  color:var(--text);
  box-shadow:inset 0 0 18px rgba(0,0,0,.70), 0 10px 20px rgba(0,0,0,.35);
  cursor:pointer;
  user-select:none;
  font-size:clamp(42px,13vmin,86px);
  line-height:1;
  font-weight:1000;
  transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
}
.cell:not(.disabled):hover{
  transform:translateY(-2px) scale(1.025);
  box-shadow:0 0 22px rgba(56,189,248,.34), inset 0 0 18px rgba(0,0,0,.58);
}
.cell.disabled{cursor:not-allowed;opacity:.96}
.cell.x{color:var(--x);text-shadow:0 0 16px rgba(56,189,248,.60)}
.cell.o{color:var(--o);text-shadow:0 0 16px rgba(245,158,11,.54)}
.cell.win{
  background:linear-gradient(145deg,rgba(34,197,94,.38),rgba(15,23,42,.95));
  box-shadow:0 0 26px rgba(34,197,94,.35), inset 0 0 20px rgba(34,197,94,.10);
}
.gameLog{
  min-height:54px;
  max-height:72px;
  overflow:auto;
  padding:8px 10px;
  color:#cbd5e1;
  font-size:12px;
  line-height:1.35;
}
.logEntry{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
button{
  border:0;
  border-radius:12px;
  padding:8px 12px;
  cursor:pointer;
  font-weight:800;
  color:#06111f;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}
button:disabled{opacity:.45;cursor:not-allowed}
@media(max-width:760px), (max-height:560px){
  .gameShell{gap:7px;padding:7px}
  .gameHeader{grid-template-columns:1fr 1fr;padding:8px}
  .centerStatus{grid-column:1 / -1;grid-row:2;width:100%;order:3}
  .petBadge{width:42px;height:42px;flex-basis:42px;border-radius:13px}
  .petBadge img{max-width:40px;max-height:40px}
  .playerMeta,.petName,.scoreLine{font-size:11px}
  .gamePanel{padding:8px}
  .gameLog{max-height:58px}
}
</style>
</head>
<body>
<div class="gameShell">
  <header class="gameHeader">
    <div id="player0" class="playerCard"></div>
    <div class="centerStatus">
      <div class="title">Tic Tac Toe</div>
      <div id="status" class="statusText">Loading players...</div>
      <div id="scoreLine" class="scoreLine">Wins: 0 - 0 · Ties: 0</div>
    </div>
    <div id="player1" class="playerCard"></div>
  </header>

  <main class="gamePanel">
    <div class="gameSurface">
      <div id="board" class="board"></div>
    </div>
  </main>

  <footer class="gameLog" id="log"><div class="logEntry">Game loaded.</div></footer>
</div>

<script>
const GAME_ID='tictactoe';
const GAME_META={id:'tictactoe',name:'Tic Tac Toe',minPlayers:2,maxPlayers:2,seats:2};

let GAME_CONTEXT={
  username:'',
  roomId:'',
  players:[],
  seats:[],
  mySeat:null,
  activePets:{}
};

let players=[
  {seat:0,name:'Player 1'},
  {seat:1,name:'Player 2'}
];
let mySeat=null;
let setupReceived=false;
let lastResultKey='';
let state=freshState();

function freshState(){
  let firstSeat=(players[0]&&Number.isFinite(Number(players[0].seat)))?Number(players[0].seat):0;
  return {
    board:['','','','','','','','',''],
    turn:firstSeat,
    marks:{},
    scores:{},
    ties:0,
    gameOver:false,
    winningLine:[],
    round:1,
    message:'New game. '+nameOf(firstSeat)+' goes first.'
  };
}

function normalizePlayers(input){
  let arr=[];

  if(Array.isArray(input)){
    input.forEach(function(p,i){
      if(!p)return;
      if(typeof p==='string'){
        arr.push({seat:i,name:p});
      }else{
        arr.push({seat:Number(p.seat!==undefined?p.seat:i),name:p.name||p.username||('Seat '+(i+1))});
      }
    });
  }

  if(!arr.length){
    arr=[{seat:0,name:'Player 1'},{seat:1,name:'Player 2'}];
  }

  arr=arr.slice(0,2).map(function(p,i){
    return {seat:Number.isFinite(Number(p.seat))?Number(p.seat):i,name:p.name||('Seat '+(i+1))};
  }).sort(function(a,b){return a.seat-b.seat;});

  while(arr.length<2){
    arr.push({seat:arr.length,name:'Waiting...'});
  }

  return arr;
}

function receiveContext(ctx){
  ctx=ctx||{};
  GAME_CONTEXT=Object.assign({},GAME_CONTEXT,ctx);

  if(ctx.players)players=normalizePlayers(ctx.players);
  if(ctx.mySeat!==undefined&&ctx.mySeat!==null){
    mySeat=Number(ctx.mySeat);
  }else{
    mySeat=null;
  }

  setupReceived=true;
  ensureStateShape();

  if(!players.some(function(p){return p.seat===state.turn;})){
    state.turn=players[0].seat;
  }

  draw();
}

function receiveSetup(newPlayers,newSeat,msg){
  receiveContext({
    username:(msg&&msg.username)||GAME_CONTEXT.username||'',
    roomId:(msg&&msg.roomId)||GAME_CONTEXT.roomId||'',
    players:newPlayers||GAME_CONTEXT.players||players,
    mySeat:newSeat,
    activePets:(msg&&msg.activePets)||GAME_CONTEXT.activePets||{}
  });
}

function ensureStateShape(){
  if(!state)state=freshState();
  if(!Array.isArray(state.board)||state.board.length!==9)state.board=['','','','','','','','',''];
  if(!state.marks)state.marks={};
  if(!state.scores)state.scores={};
  if(state.ties===undefined)state.ties=0;
  if(!state.winningLine)state.winningLine=[];
  if(!state.round)state.round=1;

  if(players[0]){
    state.marks[players[0].seat]='X';
    if(state.scores[players[0].seat]===undefined)state.scores[players[0].seat]=0;
  }
  if(players[1]){
    state.marks[players[1].seat]='O';
    if(state.scores[players[1].seat]===undefined)state.scores[players[1].seat]=0;
  }
}

function draw(){
  ensureStateShape();
  drawPlayers();
  drawBoard();
  drawScore();

  let turnName=nameOf(state.turn);
  let myTurn=mySeat===state.turn&&!state.gameOver;
  let status=document.getElementById('status');

  if(state.gameOver){
    status.innerText=state.message;
  }else if(mySeat===null){
    status.innerText=turnName+"'s turn. Watching live.";
  }else if(myTurn){
    status.innerText='Your turn. Place your mark.';
  }else{
    status.innerText=turnName+"'s turn. Waiting...";
  }
}

function drawPlayers(){
  [0,1].forEach(function(index){
    let el=document.getElementById('player'+index);
    let p=players[index]||{seat:index,name:'Waiting...'};
    let mark=index===0?'X':'O';
    let pet=GAME_CONTEXT.activePets&&GAME_CONTEXT.activePets[p.name];
    let isActive=!state.gameOver&&state.turn===p.seat;

    el.className='playerCard '+(mark==='O'?'o ':'')+(isActive?'active':'');
    el.innerHTML=
      '<div class="petBadge">'+petHtml(pet)+'</div>'+ 
      '<div class="playerInfo">'+
        '<div class="playerName">'+escapeHtml(p.name)+'</div>'+ 
        '<div class="playerMeta">Seat '+(p.seat+1)+' · '+mark+(mySeat===p.seat?' · You':'')+'</div>'+ 
        '<div class="petName">'+(pet?escapeHtml(pet.name||'Active Pet')+' Lv.'+Number(pet.level||1):'No active pet')+'</div>'+ 
      '</div>';
  });
}

function petHtml(pet){
  if(!pet)return '<span class="petFallback">✦</span>';
  let emoji=pet.emoji||'🐾';
  if(pet.image){
    return '<img src="'+escapeAttr(pet.image)+'" alt="'+escapeAttr(pet.name||'Pet')+'" onerror="this.outerHTML=\'<span class=&quot;petFallback&quot;>'+escapeHtml(emoji)+'</span>\'">';
  }
  return '<span class="petFallback">'+escapeHtml(emoji)+'</span>';
}

function drawBoard(){
  let board=document.getElementById('board');
  board.innerHTML='';
  let myTurn=mySeat===state.turn&&!state.gameOver;
  let winning={};
  (state.winningLine||[]).forEach(function(i){winning[i]=true;});

  state.board.forEach(function(value,index){
    let cell=document.createElement('button');
    cell.className='cell '+(value==='X'?'x ':value==='O'?'o ':'')+(value||!myTurn||state.gameOver?'disabled ':'')+(winning[index]?'win':'');
    cell.textContent=value;
    cell.disabled=!!(value||!myTurn||state.gameOver);
    if(!cell.disabled)cell.onclick=function(){makeMove(index);};
    board.appendChild(cell);
  });
}

function drawScore(){
  let a=players[0]?state.scores[players[0].seat]||0:0;
  let b=players[1]?state.scores[players[1].seat]||0:0;
  document.getElementById('scoreLine').innerText='Wins: '+a+' - '+b+' · Ties: '+(state.ties||0);
}

function makeMove(index){
  if(state.gameOver)return;
  if(mySeat!==state.turn)return;
  if(state.board[index])return;

  let mark=state.marks[mySeat];
  state.board[index]=mark;
  addLog(nameOf(mySeat)+' placed '+mark+'.');

  let line=getWinningLine(mark);
  if(line){
    state.gameOver=true;
    state.winningLine=line;
    state.scores[mySeat]=(state.scores[mySeat]||0)+1;
    state.message=nameOf(mySeat)+' wins! New round starting soon.';
    reportResult('win',mySeat,null);
    draw();
    sync();
    setTimeout(function(){newGame(true);},1800);
    return;
  }

  if(state.board.every(Boolean)){
    state.gameOver=true;
    state.ties=(state.ties||0)+1;
    state.message='Tie game! New round starting soon.';
    reportResult('tie',null,null);
    draw();
    sync();
    setTimeout(function(){newGame(true);},1800);
    return;
  }

  nextTurn();
  state.message=nameOf(state.turn)+' is next.';
  draw();
  sync();
}

function nextTurn(){
  let idx=players.findIndex(function(p){return p.seat===state.turn;});
  if(idx<0)idx=0;
  state.turn=players[(idx+1)%players.length].seat;
}

function getWinningLine(mark){
  let wins=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return wins.find(function(combo){return combo.every(function(i){return state.board[i]===mark;});})||null;
}

function newGame(sendIt){
  let oldScores=state&&state.scores?state.scores:{};
  let oldTies=state&&state.ties?state.ties:0;
  let nextRound=(state&&state.round?state.round:1)+1;

  state=freshState();
  state.scores=oldScores;
  state.ties=oldTies;
  state.round=nextRound;
  state.message='Round '+nextRound+'. '+nameOf(state.turn)+' goes first.';
  lastResultKey='';

  ensureStateShape();
  draw();
  addLog('Round '+nextRound+' started.');
  if(sendIt)sync();
}

function reportResult(result,winnerSeat,loserSeat){
  let key=state.round+'|'+result+'|'+winnerSeat;
  if(lastResultKey===key)return;
  lastResultKey=key;

  let winner=winnerSeat!==null&&winnerSeat!==undefined?playerBySeat(winnerSeat):null;
  let loser=null;
  if(result==='win'){
    loser=players.find(function(p){return p&&p.seat!==winnerSeat;})||null;
  }

  parent.postMessage({
    type:'gameResult',
    data:{
      game:GAME_ID,
      roomId:GAME_CONTEXT.roomId||'',
      result:result,
      winner:winner?winner.name:null,
      loser:loser?loser.name:null,
      round:state.round
    }
  },'*');
}

function sync(){
  parent.postMessage({type:'move',data:{type:'state',game:GAME_ID,state:state}},'*');
}

window.onMove=function(data){
  data=data||{};

  if(data.game&&data.game!==GAME_ID)return;

  if(data.type==='state'){
    state=data.state||state;
    ensureStateShape();
    draw();
  }

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat,data);
  }

  if(data.type==='GAME_CONTEXT'){
    receiveContext(data.data||data);
  }
};

window.addEventListener('message',function(event){
  let msg=event.data||{};

  if(msg.type==='GAME_CONTEXT'){
    receiveContext(msg.data||msg);
  }

  if(msg.type==='gameSetup'){
    receiveSetup(msg.players,msg.mySeat,msg);
  }

  if(msg.type==='gameMove'){
    window.onMove(msg.data||{});
  }
});

function playerBySeat(seat){
  return players.find(function(p){return p&&p.seat===seat;})||null;
}

function nameOf(seat){
  let p=playerBySeat(seat);
  return p?p.name:'Seat '+(Number(seat)+1);
}

function addLog(text){
  let log=document.getElementById('log');
  let div=document.createElement('div');
  div.className='logEntry';
  div.textContent=text;
  log.appendChild(div);
  while(log.children.length>6)log.removeChild(log.children[0]);
  log.scrollTop=log.scrollHeight;
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
}

function escapeAttr(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'');
}

parent.postMessage({type:'gameReady',game:GAME_ID},'*');

setTimeout(function(){
  if(!setupReceived){
    if(window.GAME_CONTEXT){
      receiveContext(window.GAME_CONTEXT);
    }else if(window.GAME_PLAYERS&&window.GAME_PLAYERS.length){
      receiveSetup(window.GAME_PLAYERS,window.GAME_MY_SEAT,{});
    }else{
      ensureStateShape();
      draw();
    }
  }
},80);
</script>
</body>
</html>
