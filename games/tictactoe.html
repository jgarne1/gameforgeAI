<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>
:root{
  --bg1:#020617;
  --bg2:#0f172a;
  --panel:#0f172acc;
  --border:#38bdf855;
  --accent:#38bdf8;
  --accent2:#a78bfa;
  --good:#22c55e;
  --danger:#ef4444;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at top, var(--bg2), var(--bg1));
  color:#e5e7eb;
  overflow:hidden;
}

.gameShell{
  height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:10px;
  padding:10px;
}

.gameHeader{
  display:flex;
  justify-content:space-between;
  gap:10px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:10px;
}

.playerCard{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  padding:8px;
  border-radius:12px;
  background:rgba(0,0,0,0.25);
  border:1px solid transparent;
}

.playerCard.active{
  border:1px solid var(--accent);
  box-shadow:0 0 10px var(--accent);
}

.petImg{
  width:40px;
  height:40px;
  object-fit:contain;
}

.playerInfo{
  display:flex;
  flex-direction:column;
  font-size:12px;
}

.playerName{
  font-weight:bold;
}

.gamePanel{
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:10px;
}

.board{
  display:grid;
  grid-template-columns:repeat(3, minmax(80px, 120px));
  gap:10px;
}

.cell{
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:bold;
  cursor:pointer;
  border-radius:12px;
  background:linear-gradient(145deg,#1e293b,#020617);
  box-shadow:inset 0 0 10px #000, 0 0 6px #000;
  transition:0.15s;
}

.cell:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px var(--accent);
}

.gameLog{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:8px;
  font-size:12px;
  max-height:60px;
  overflow:auto;
}
</style>
</head>

<body>
<div class="gameShell">

  <header class="gameHeader">
    <div id="p1" class="playerCard"></div>
    <div id="p2" class="playerCard"></div>
  </header>

  <main class="gamePanel">
    <div id="board" class="board"></div>
  </main>

  <footer class="gameLog" id="log">
    Game loaded.
  </footer>

</div>

<script>
const GAME_ID = 'tictactoe';

let GAME_CONTEXT = {
  username:'',
  roomId:'',
  players:[],
  seats:[],
  mySeat:-1,
  activePets:{}
};

let board = Array(9).fill(null);
let turn = 0;
let mySymbol = null;

const boardEl = document.getElementById('board');

for(let i=0;i<9;i++){
  const cell = document.createElement('div');
  cell.className='cell';
  cell.onclick=()=>handleMove(i);
  boardEl.appendChild(cell);
}

function handleMove(i){
  if(board[i]) return;
  if(turn !== GAME_CONTEXT.mySeat) return;

  sendMove({index:i});
}

function applyMove(index){
  if(board[index]) return;

  const symbol = turn===0 ? 'X':'O';
  board[index]=symbol;
  boardEl.children[index].textContent=symbol;

  log(symbol+" played "+index);

  if(checkWin(symbol)){
    log(symbol+" wins!");
    return;
  }

  turn = turn===0?1:0;
  updateUI();
}

function sendMove(payload){
  parent.postMessage({
    type:'move',
    data:{
      game:GAME_ID,
      action:'place',
      payload
    }
  },'*');
}

window.addEventListener('message', e=>{
  const msg = e.data || {};

  if(msg.type === 'GAME_CONTEXT' || msg.type === 'gameSetup'){
    Object.assign(GAME_CONTEXT, msg.data || msg);

    mySymbol = GAME_CONTEXT.mySeat===0 ? 'X':'O';
    updateUI();
  }

  if(msg.type === 'gameMove'){
    const move = msg.data || {};
    if(move.game !== GAME_ID) return;

    applyMove(move.payload.index);
  }
});

function updateUI(){
  renderPlayers();
}

function renderPlayers(){
  const p1 = document.getElementById('p1');
  const p2 = document.getElementById('p2');

  const players = GAME_CONTEXT.players || [];

  [p1,p2].forEach((el,i)=>{
    const name = players[i] || "Waiting...";
    const pet = GAME_CONTEXT.activePets?.[name];

    el.className = 'playerCard ' + (turn===i ? 'active':'');

    el.innerHTML = `
      ${pet ? `<img class="petImg" src="${pet.image}">` : ''}
      <div class="playerInfo">
        <div class="playerName">${name}</div>
        <div>Seat ${i+1} · ${i===0?'X':'O'}</div>
        ${pet ? `<div>${pet.name} Lv.${pet.level}</div>`:''}
      </div>
    `;
  });
}

function log(text){
  const el=document.getElementById('log');
  el.innerHTML += "<br>"+text;
  el.scrollTop=el.scrollHeight;
}

function checkWin(s){
  const w=[
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return w.some(c=>c.every(i=>board[i]===s));
}
</script>

</body>
</html>
