<!DOCTYPE html><html><head><title>Tic Tac Toe</title><style>body{font-family:Arial;text-align:center}#b{display:grid;grid-template-columns:repeat(3,100px);gap:6px;justify-content:center}.c{width:100px;height:100px;font-size:44px;border:2px solid #111;display:flex;align-items:center;justify-content:center;cursor:pointer}button{padding:8px;margin:8px}</style></head><body><h2>Tic Tac Toe</h2><div id="s">X turn</div><button onclick="newGame(true)">New Game</button><div id="b"></div><script>let board,turn,over;function newGame(send){board=Array(9).fill('');turn='X';over=false;draw();if(send)sendMove({type:'new'});}function draw(){b.innerHTML='';board.forEach((v,i)=>{let d=document.createElement('div');d.className='c';d.innerText=v;d.onclick=()=>move(i,true);b.appendChild(d)});s.innerText=over?s.innerText:turn+' turn';}function move(i,send){if(over||board[i])return;board[i]=turn;if(win(turn)){s.innerText=turn+' wins';over=true}else if(!board.includes('')){s.innerText='Tie';over=true}else turn=turn==='X'?'O':'X';draw();if(send)sendMove({type:'move',i});}function win(p){return[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(a=>a.every(i=>board[i]===p));}window.sendMove=d=>parent.postMessage({type:'move',data:d},'*');window.onMove=d=>{if(d.type==='new')newGame(false);if(d.type==='move')move(d.i,false)};newGame(false);</script></body></html>
