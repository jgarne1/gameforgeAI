<!DOCTYPE html><html><head><title>Tic Tac Toe</title><style>body{font-family:Arial;text-align:center}#b{display:grid;grid-template-columns:repeat(3,90px);gap:6px;justify-content:center}.c{width:90px;height:90px;border:2px solid #222;font-size:42px;display:flex;align-items:center;justify-content:center;cursor:pointer}button{padding:8px;margin:8px}</style></head><body><h2>Tic Tac Toe</h2><div id="s"></div><button onclick="newGame(true)">New Game</button><div id="b"></div><script>
let q=new URLSearchParams(location.search), seat=+(q.get('seat')||1), mark=seat===1?'X':'O', turn='X', board=Array(9).fill(''), over=false;
function draw(){s.innerText=over?'Game over':`You are ${mark}. Turn: ${turn}`;b.innerHTML='';board.forEach((v,i)=>{let d=document.createElement('div');d.className='c';d.innerText=v;d.onclick=()=>move(i,true);b.appendChild(d);});}
function move(i,local){if(over||board[i]||turn!==mark&&local)return;board[i]=turn;if(win(turn)){over=true;s.innerText=turn+' wins';result(turn);}else if(board.every(Boolean)){over=true;s.innerText='Tie';result('tie');}else turn=turn==='X'?'O':'X';draw();if(local)sendMove({type:'move',i});}
function win(p){return [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(a=>a.every(i=>board[i]===p));}
function newGame(local){board=Array(9).fill('');turn='X';over=false;draw();if(local)sendMove({type:'new'});}
function result(r){parent.postMessage({type:'gameResult',result:{gameId:'tictactoe',winner:r==='X'?'player1':r==='O'?'player2':null,tieUsers:r==='tie'?['player1','player2']:[]}},'*');}
window.sendMove=d=>parent.postMessage({type:'move',data:d},'*');window.onMove=d=>{if(d.type==='move')move(d.i,false);if(d.type==='new')newGame(false);};draw();
</script></body></html>
