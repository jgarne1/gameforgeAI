<!DOCTYPE html>
<html>
<head>
<title>James' Square Game</title>
<style>
:root{--bg:#0f172a;--panel:#1e293b;--line:#334155;--gold:#facc15;--muted:#cbd5e1}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#334155,#0f172a);color:white;text-align:center;overflow:hidden}
.wrap{height:650px;padding:10px;display:grid;grid-template-rows:auto auto 1fr auto;gap:8px}
.top,.status,.game,.bottom{background:rgba(30,41,59,.95);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.25)}
.top{display:flex;justify-content:space-between;align-items:center;padding:9px 12px}
h2{margin:0}
button{padding:8px 12px;border-radius:10px;border:1px solid #94a3b8;background:#f8fafc;color:#111;font-weight:bold;cursor:pointer}
button.gold{background:var(--gold);border-color:var(--gold)}
.status{padding:8px}
.statusMain{font-size:18px;font-weight:bold}
.muted{font-size:12px;color:var(--muted)}
.game{display:flex;align-items:center;justify-content:center;overflow:hidden}
.board{position:relative;width:560px;height:430px;background:linear-gradient(135deg,#f8fafc,#e2e8f0);border-radius:20px;border:4px solid #cbd5e1;box-shadow:inset 0 0 30px rgba(15,23,42,.12)}
.dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#111827;transform:translate(-50%,-50%);z-index:7;box-shadow:0 2px 4px rgba(0,0,0,.35)}
.edge{position:absolute;background:#cbd5e1;border-radius:999px;cursor:pointer;z-index:4;transition:.12s ease}
.edge:hover{background:#facc15;box-shadow:0 0 12px rgba(250,204,21,.85)}
.edge.taken{cursor:not-allowed}
.edge.h{height:8px;transform:translateY(-50%)}
.edge.v{width:8px;transform:translateX(-50%)}
.edge.danger{background:#f97316}
.box{position:absolute;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:white;opacity:.9;z-index:1;box-shadow:inset 0 0 14px rgba(0,0,0,.18)}
.box.pop{animation:pop .25s ease}
@keyframes pop{0%{transform:scale(.75);opacity:.3}100%{transform:scale(1);opacity:.9}}
.players{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:8px}
.player{min-width:130px;border-radius:13px;padding:7px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18)}
.player.turn{outline:3px solid var(--gold)}
.log{height:48px;overflow:auto;text-align:left;background:#fffbea;color:#1f2937;border-radius:10px;padding:6px;font-size:12px}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h2>James' Square Game</h2>
    <button class="gold" onclick="newGame(true)">New Game</button>
  </div>

  <div class="status">
    <div id="statusMain" class="statusMain">Loading players...</div>
    <div id="statusHelp" class="muted">Draw lines
