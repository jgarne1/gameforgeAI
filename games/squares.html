<!DOCTYPE html>
<html>
<head>
<title>James' Square Game</title>
<style>
:root{--bg:#0f172a;--panel:#1e293b;--line:#334155;--gold:#facc15;--muted:#cbd5e1}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#334155,#0f172a);color:white;text-align:center;overflow:hidden}
.wrap{height:650px;padding:10px;display:grid;grid-template-rows:auto auto 1fr auto;gap:8px}
.top,.status,.game,.bottom{background:rgba(30,41,59,.95);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.25)}
.top{display:flex;justify-content:space-between;align-items:center;padding:9px 12px}
h2{margin:0}
button{padding:8px 12px;border-radius:10px;border:1px solid #94a3b8;background:#f8fafc;color:#111;font-weight:bold;cursor:pointer}
button.gold{background:var(--gold);border-color:var(--gold)}
.status{padding:8px}
.statusMain{font-size:18px;font-weight:bold}
.muted{font-size:12px;color:var(--muted)}
.game{display:flex;align-items:center;justify-content:center;overflow:hidden}
.board{position:relative;width:560px;height:430px;background:linear-gradient(135deg,#f8fafc,#e2e8f0);border-radius:20px;border:4px solid #cbd5e1;box-shadow:inset 0 0 30px rgba(15,23,42,.12)}
.dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#111827;transform:translate(-50%,-50%);z-index:7;box-shadow:0 2px 4px rgba(0,0,0,.35)}
.edge{position:absolute;background:#cbd5e1;border-radius:999px;cursor:pointer;z-index:4;transition:.12s ease}
.edge:hover{background:#facc15;box-shadow:0 0 12px rgba(250,204,21,.85)}
.edge.taken{cursor:not-allowed}
.edge.h{height:8px;transform:translateY(-50%)}
.edge.v{width:8px;transform:translateX(-50%)}
.box{position:absolute;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:white;opacity:.9;z-index:1;box-shadow:inset 0 0 14px rgba(0,0,0,.18)}
.box.pop{animation:pop .25s ease}
@keyframes pop{0%{transform:scale(.75);opacity:.3}100%{transform:scale(1);opacity:.9}}
.players{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:8px}
.player{min-width:130px;border-radius:13px;padding:7px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18)}
.player.turn{outline:3px solid var(--gold)}
.log{height:48px;overflow:auto;text-align:left;background:#fffbea;color:#1f2937;border-radius:10px;padding:6px;font-size:12px}
</style>
</head>

<body>
<div class="wrap">
  <div class="top">
    <h2>James' Square Game</h2>
    <button class="gold" onclick="newGame(true)">New Game</button>
  </div>

  <div class="status">
    <div id="statusMain" class="statusMain">Loading players...</div>
    <div id="statusHelp" class="muted">Draw lines. Complete a box to score and go again.</div>
  </div>

  <div class="game">
    <div id="board" class="board"></div>
  </div>

  <div class="bottom">
    <div id="playersPanel" class="players"></div>
    <div id="log" class="log"></div>
  </div>
</div>

<script>
const GAME_META={id:'dots',name:"James' Square Game",minPlayers:2,maxPlayers:4,seats:4};

const ROWS=7;
const COLS=8;
const COLORS=['#ef4444','#3b82f6','#22c55e','#f59e0b'];

let players=[];
let mySeat=null;
let state=null;
let lastClaimed=[];

function el(id){
  return document.getElementById(id);
}

function setStatus(a,b){
  el('statusMain').innerText=a;
  el('statusHelp').innerText=b||'';
}

window.onerror=function(msg){
  setStatus('Game error: '+msg,'Check console for details.');
};

function receiveSetup(setupPlayers,setupSeat){
  if(Array.isArray(setupPlayers)&&setupPlayers.length){
    players=setupPlayers.slice(0,4).map(function(p,i){
      return {
        seat:p.seat,
        name:p.name||('Seat '+(p.seat+1)),
        color:COLORS[i],
        initial:(p.name||('S'+(p.seat+1))).trim().charAt(0).toUpperCase()
      };
    });
  }

  mySeat=setupSeat;

  if(players.length<2){
    setStatus('Waiting for players...',"James' Square Game needs 2–4 seated players.");
    drawEmpty();
    return;
  }

  if(!state){
    state=fresh();
  }

  draw();
}

function fresh(){
  return {
    h:{},
    v:{},
    boxes:{},
    turn:players[0].seat,
    gameOver:false,
    log:['New game started.']
  };
}

function draw(){
  if(!state||players.length<2){
    drawEmpty();
    return;
  }

  drawBoard();
  drawPlayers();
  drawLog();

  if(state.gameOver){
    setStatus('Game Over — Winner: '+getWinner(),'Start a new game to play again.');
  }else{
    setStatus(
      'Current Turn: '+name(state.turn),
      state.turn===mySeat?'Your move. Draw a line.':'Waiting for '+name(state.turn)+'.'
    );
  }
}

function drawEmpty(){
  el('board').innerHTML='';
  el('playersPanel').innerHTML='';
  el('log').innerHTML='';
}

function drawBoard(){
  let b=el('board');
  b.innerHTML='';

  let marginX=40;
  let marginY=30;
  let gapX=(560-marginX*2)/(COLS-1);
  let gapY=(430-marginY*2)/(ROWS-1);

  for(let r=0;r<ROWS-1;r++){
    for(let c=0;c<COLS-1;c++){
      let owner=state.boxes[boxKey(r,c)];

      if(owner!==undefined){
        let p=playerBySeat(owner);
        let bk=boxKey(r,c);

        let box=document.createElement('div');
        box.className='box '+(lastClaimed.includes(bk)?'pop':'');
        box.style.left=(marginX+c*gapX+6)+'px';
        box.style.top=(marginY+r*gapY+6)+'px';
        box.style.width=(gapX-12)+'px';
        box.style.height=(gapY-12)+'px';
        box.style.background=p?p.color:'#64748b';
        box.innerText=p?p.initial:'?';

        b.appendChild(box);
      }
    }
  }

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-1;c++){
      let k=hKey(r,c);
      let edge=document.createElement('div');

      edge.className='edge h '+(state.h[k]!==undefined?'taken':'');
      edge.style.left=(marginX+c*gapX+6)+'px';
      edge.style.top=(marginY+r*gapY)+'px';
      edge.style.width=(gapX-12)+'px';

      if(state.h[k]!==undefined){
        edge.style.background=colorOf(state.h[k]);
      }

      edge.onclick=function(){takeLine('h',r,c);};
      b.appendChild(edge);
    }
  }

  for(let r=0;r<ROWS-1;r++){
    for(let c=0;c<COLS;c++){
      let k=vKey(r,c);
      let edge=document.createElement('div');

      edge.className='edge v '+(state.v[k]!==undefined?'taken':'');
      edge.style.left=(marginX+c*gapX)+'px';
      edge.style.top=(marginY+r*gapY+6)+'px';
      edge.style.height=(gapY-12)+'px';

      if(state.v[k]!==undefined){
        edge.style.background=colorOf(state.v[k]);
      }

      edge.onclick=function(){takeLine('v',r,c);};
      b.appendChild(edge);
    }
  }

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let d=document.createElement('div');
      d.className='dot';
      d.style.left=(marginX+c*gapX)+'px';
      d.style.top=(marginY+r*gapY)+'px';
      b.appendChild(d);
    }
  }
}

function takeLine(type,r,c){
  if(!state||state.gameOver||state.turn!==mySeat)return;

  let store=type==='h'?state.h:state.v;
  let key=type==='h'?hKey(r,c):vKey(r,c);

  if(store[key]!==undefined)return;

  store[key]=mySeat;

  let claimed=[];
  let made=claimBoxes(type,r,c,mySeat,claimed);
  lastClaimed=claimed;

  if(made>0){
    add(name(mySeat)+' completed '+made+' box'+(made>1?'es':'')+' and goes again.');
  }else{
    nextTurn();
  }

  if(Object.keys(state.boxes).length===(ROWS-1)*(COLS-1)){
    state.gameOver=true;
    add('Game over.');
  }

  draw();
  sync();

  setTimeout(function(){
    lastClaimed=[];
    draw();
  },300);
}

function claimBoxes(type,r,c,seat,claimed){
  let made=0;
  let candidates=[];

  if(type==='h'){
    candidates.push([r-1,c]);
    candidates.push([r,c]);
  }else{
    candidates.push([r,c-1]);
    candidates.push([r,c]);
  }

  candidates.forEach(function(x){
    let br=x[0];
    let bc=x[1];

    if(br<0||br>=ROWS-1||bc<0||bc>=COLS-1)return;

    let bk=boxKey(br,bc);
    if(state.boxes[bk]!==undefined)return;

    if(boxSideCount(br,bc)===4){
      state.boxes[bk]=seat;
      claimed.push(bk);
      made++;
    }
  });

  return made;
}

function boxSideCount(r,c){
  let n=0;

  if(state.h[hKey(r,c)]!==undefined)n++;
  if(state.h[hKey(r+1,c)]!==undefined)n++;
  if(state.v[vKey(r,c)]!==undefined)n++;
  if(state.v[vKey(r,c+1)]!==undefined)n++;

  return n;
}

function drawPlayers(){
  let html='';

  players.forEach(function(p){
    html+='<div class="player '+(state.turn===p.seat&&!state.gameOver?'turn':'')+'">'+
      '<b style="color:'+p.color+'">'+escapeHtml(p.name)+'</b><br>'+
      '<span class="muted">Score: '+score(p.seat)+(p.seat===mySeat?' · You':'')+'</span>'+
    '</div>';
  });

  el('playersPanel').innerHTML=html;
}

function drawLog(){
  el('log').innerHTML=state.log.slice(-4).map(function(x){
    return '• '+escapeHtml(x);
  }).join('<br>');

  el('log').scrollTop=el('log').scrollHeight;
}

function score(seat){
  return Object.values(state.boxes).filter(function(x){
    return x===seat;
  }).length;
}

function getWinner(){
  let scores=players.map(function(p){
    return {p:p,score:score(p.seat)};
  });

  scores.sort(function(a,b){
    return b.score-a.score;
  });

  if(scores.length>1&&scores[0].score===scores[1].score){
    return 'Tie at '+scores[0].score+' boxes';
  }

  return scores[0].p.name+' with '+scores[0].score+' boxes';
}

function nextTurn(){
  let i=players.findIndex(function(p){
    return p.seat===state.turn;
  });

  state.turn=players[(i+1)%players.length].seat;
}

function newGame(sendIt){
  if(players.length<2){
    setStatus('Waiting for players...',"James' Square Game needs 2–4 seated players.");
    return;
  }

  lastClaimed=[];
  state=fresh();
  draw();

  if(sendIt)sync();
}

function sync(){
  window.sendMove({type:'state',state:state});
}

window.sendMove=function(data){
  parent.postMessage({type:'move',data:data},'*');
};

window.onMove=function(data){
  if(!data)return;

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
    return;
  }

  if(data.type==='state'){
    lastClaimed=[];
    state=data.state;
    draw();
  }
};

window.addEventListener('message',function(event){
  let data=event.data||{};

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
  }

  if(data.type==='gameMove'&&window.onMove){
    window.onMove(data.data);
  }
});

function hKey(r,c){return r+','+c;}
function vKey(r,c){return r+','+c;}
function boxKey(r,c){return r+','+c;}

function playerBySeat(seat){
  return players.find(function(p){
    return p.seat===seat;
  });
}

function colorOf(seat){
  let p=playerBySeat(seat);
  return p?p.color:'#64748b';
}

function name(seat){
  let p=playerBySeat(seat);
  return p?p.name:'Seat '+(Number(seat)+1);
}

function add(t){
  state.log.push(t);
  if(state.log.length>50)state.log.shift();
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,function(c){
    return {
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[c];
  });
}

function init(){
  drawEmpty();

  receiveSetup(window.GAME_PLAYERS||[],window.GAME_MY_SEAT);

  setTimeout(function(){
    receiveSetup(window.GAME_PLAYERS||players||[],window.GAME_MY_SEAT);

    if(el('statusMain').innerText==='Loading players...'){
      if(players.length>=2){
        if(!state)state=fresh();
        draw();
      }else{
        setStatus('Waiting for players...',"James' Square Game needs 2–4 seated players.");
        drawEmpty();
      }
    }
  },350);
}

init();
</script>


<!-- ===== GameForge Standard Compatibility HUD v1 =====
     Safe overlay: does not own chat and does not change gameplay logic.
     Reads GAME_CONTEXT/gameSetup payloads from parent and displays room, players, seats, and active pets when provided.
-->
<style id="gfStandardHudStyle">
  :root{
    --gf-hud-bg:rgba(2,6,23,.72);
    --gf-hud-panel:rgba(15,23,42,.82);
    --gf-hud-line:rgba(56,189,248,.30);
    --gf-hud-text:#e5e7eb;
    --gf-hud-muted:#94a3b8;
    --gf-hud-accent:#38bdf8;
    --gf-hud-gold:#facc15;
  }
  #gfStandardHud{
    position:fixed;
    left:10px;
    right:10px;
    top:8px;
    z-index:99990;
    pointer-events:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:8px 10px;
    border:1px solid var(--gf-hud-line);
    border-radius:18px;
    color:var(--gf-hud-text);
    background:linear-gradient(135deg,rgba(15,23,42,.78),rgba(2,6,23,.70));
    box-shadow:0 14px 38px rgba(0,0,0,.24);
    backdrop-filter:blur(8px);
    font-family:Arial,Helvetica,sans-serif;
  }
  #gfStandardHud .gfHudTitle{
    display:flex;
    flex-direction:column;
    min-width:120px;
    max-width:210px;
  }
  #gfStandardHud .gfHudTitle b{
    font-size:14px;
    letter-spacing:.2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #gfStandardHud .gfHudTitle span{
    color:var(--gf-hud-muted);
    font-size:11px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #gfStandardHud .gfHudPlayers{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:7px;
    min-width:0;
    overflow:hidden;
  }
  #gfStandardHud .gfHudPlayer{
    display:flex;
    align-items:center;
    gap:7px;
    min-width:0;
    max-width:210px;
    padding:6px 8px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.22);
    background:rgba(2,6,23,.55);
  }
  #gfStandardHud .gfHudPlayer.me{
    border-color:rgba(56,189,248,.65);
    box-shadow:0 0 16px rgba(56,189,248,.14);
  }
  #gfStandardHud .gfHudPet{
    width:28px;
    height:28px;
    border-radius:10px;
    object-fit:contain;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    flex:0 0 auto;
  }
  #gfStandardHud .gfHudAvatar{
    width:28px;
    height:28px;
    border-radius:10px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,rgba(56,189,248,.22),rgba(124,58,237,.20));
    border:1px solid rgba(255,255,255,.08);
    flex:0 0 auto;
  }
  #gfStandardHud .gfHudInfo{
    display:flex;
    flex-direction:column;
    min-width:0;
    line-height:1.1;
  }
  #gfStandardHud .gfHudName{
    font-size:12px;
    font-weight:900;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #gfStandardHud .gfHudSub{
    color:var(--gf-hud-muted);
    font-size:10px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  @media(max-width:700px){
    #gfStandardHud{left:6px;right:6px;top:6px;padding:7px;border-radius:15px;gap:6px}
    #gfStandardHud .gfHudTitle{min-width:88px;max-width:120px}
    #gfStandardHud .gfHudPlayer{max-width:120px;padding:5px 6px;gap:5px}
    #gfStandardHud .gfHudPet,#gfStandardHud .gfHudAvatar{width:24px;height:24px;border-radius:8px}
    #gfStandardHud .gfHudName{font-size:11px}
    #gfStandardHud .gfHudSub{font-size:9px}
  }
</style>
<script id="gfStandardHudScript">
(function(){
  var GAME_TITLE = 'Squares';
  window.GAME_CONTEXT = window.GAME_CONTEXT || {username:'',roomId:'',players:[],seats:[],mySeat:-1,activePets:{}};

  function esc(s){
    return String(s==null?'':s).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});
  }

  function normPlayers(input){
    var list = input || window.GAME_PLAYERS || [];
    return (Array.isArray(list)?list:[]).map(function(p,i){
      if(typeof p==='string')return {name:p,seat:i};
      return {name:p&&p.name?p.name:('Seat '+(i+1)), seat:(p&&p.seat!=null?p.seat:i)};
    });
  }

  function absorbContext(raw){
    var data = raw || {};
    if(data.data) data = data.data;
    var ctx = window.GAME_CONTEXT || {};
    ctx.username = data.username || data.me || ctx.username || '';
    ctx.roomId = data.roomId || data.room || data.roomCode || ctx.roomId || '';
    ctx.players = normPlayers(data.players || ctx.players);
    ctx.seats = data.seats || ctx.seats || [];
    ctx.mySeat = data.mySeat!=null ? Number(data.mySeat) : (window.GAME_MY_SEAT!=null ? Number(window.GAME_MY_SEAT) : (ctx.mySeat!=null?ctx.mySeat:-1));
    ctx.activePets = data.activePets || ctx.activePets || {};
    window.GAME_CONTEXT = ctx;
    render();
  }

  function normalizePetMap(raw){
    var map={};
    if(!raw)return map;
    if(Array.isArray(raw)){
      raw.forEach(function(item){
        if(!item)return;
        var name=item.username||item.user||item.owner||item.player||item.name;
        if(name){ map[name]=item; map[String(name).toLowerCase()]=item; }
        if(item.seat!=null)map['seat:'+item.seat]=item;
      });
      return map;
    }
    Object.keys(raw).forEach(function(k){
      map[k]=raw[k];
      map[String(k).toLowerCase()]=raw[k];
    });
    return map;
  }

  function playerPet(player){
    var ctx=window.GAME_CONTEXT||{};
    var name=typeof player==='string'?player:(player&&player.name)||'';
    var seat=typeof player==='object'&&player?player.seat:null;
    var pets=normalizePetMap(ctx.activePets || ctx.pets || ctx.playerPets || {});
    return pets[name] || pets[String(name||'').toLowerCase()] || (seat!=null?pets['seat:'+seat]:null) || ctx.activePet || ctx.pet || null;
  }

  function petImage(pet){
    if(!pet)return '';
    if(typeof pet==='string')return pet;
    return pet.image || pet.img || pet.sprite || pet.photo || pet.icon || pet.src || pet.imageUrl || pet.url || '';
  }

  function render(){
    var hud=document.getElementById('gfStandardHud');
    if(!hud){
      hud=document.createElement('div');
      hud.id='gfStandardHud';
      document.body.appendChild(hud);
    }
    var ctx=window.GAME_CONTEXT||{};
    var players=normPlayers(ctx.players);
    if(!players.length && window.GAME_PLAYERS) players=normPlayers(window.GAME_PLAYERS);
    var room=ctx.roomId || '';
    var mySeat=ctx.mySeat;
    var playerHtml=players.slice(0,4).map(function(p){
      var pet=playerPet(p);
      var img=petImage(pet);
      var petName=pet && pet.name ? pet.name : '';
      var seatText='Seat '+(Number(p.seat)+1);
      var isMe=(Number(p.seat)===Number(mySeat)) || (ctx.username && p.name===ctx.username);
      return '<div class="gfHudPlayer '+(isMe?'me':'')+'">'+
        (img?'<img class="gfHudPet" src="'+esc(img)+'" alt="">':'<span class="gfHudAvatar">🎮</span>')+
        '<span class="gfHudInfo"><span class="gfHudName">'+esc(p.name||'Player')+'</span><span class="gfHudSub">'+esc(seatText+(petName?' · '+petName:''))+'</span></span>'+ 
      '</div>';
    }).join('');
    if(!playerHtml){
      playerHtml='<div class="gfHudPlayer"><span class="gfHudAvatar">🎮</span><span class="gfHudInfo"><span class="gfHudName">Solo / Local</span><span class="gfHudSub">Waiting for room context</span></span></div>';
    }
    hud.innerHTML='<div class="gfHudTitle"><b>'+esc(GAME_TITLE)+'</b><span>'+(room?'Room '+esc(room):'GameForge table')+'</span></div><div class="gfHudPlayers">'+playerHtml+'</div>';
  }

  window.addEventListener('message',function(e){
    var msg=e.data||{};
    if(msg.type==='GAME_CONTEXT' || msg.type==='gameSetup' || msg.type==='gameContext'){
      absorbContext(msg);
    }
  });

  window.addEventListener('load',function(){
    absorbContext({});
    try{ parent.postMessage({type:'gameReady'},'*'); }catch(e){}
  });

  setTimeout(function(){absorbContext({});},250);
  setTimeout(function(){absorbContext({});},900);
})();
</script>

</body>
</html>
