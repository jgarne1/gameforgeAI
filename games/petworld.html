<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pet World</title>
<style>
/*
GameForge AI / PetWorld maintainer notes:
- Keep comments useful and update them when behavior changes.
- PetWorld is a direct account companion experience, not a room game.
- Primary actions must stay overlaid on the pet stage. Do not move core care/train/explore actions below the pet or into a scroll-only panel.
- Server owns profile changes. Do not permanently mutate pet/profile client-side without calling the matching API.
- Pets store only move IDs. Move data comes from /api/pet/profile.
- This layout is the "PetWorld HUD": left status/quests, center living pet stage with action dock, right utility tabs.
- Main view should be pet-first. Keep only urgent needs visible; detailed stats live in the Details tab.
- Eggs should stay mostly centered and react visually to care traits; hatched pets can wander around the stage.
- Pet reactions are client-only animations; profile changes still come from server APIs.
- Egg influence shown here explains current trait weighting, but final hatch result is still server-authoritative.
*/

:root{
  --ink:#172033;
  --muted:#64748b;
  --glass:rgba(255,255,255,.76);
  --glass2:rgba(255,255,255,.58);
  --line:rgba(255,255,255,.38);
  --blue:#2563eb;
  --blue2:#1d4ed8;
  --green:#16a34a;
  --gold:#facc15;
  --red:#dc2626;
  --purple:#7c3aed;
  --sky:#38bdf8;
  --shadow:0 24px 65px rgba(15,23,42,.14);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--ink);
  overflow:hidden;
  background:
    radial-gradient(circle at 12% 14%,rgba(56,189,248,.36),transparent 28%),
    radial-gradient(circle at 88% 14%,rgba(250,204,21,.32),transparent 25%),
    radial-gradient(circle at 50% 96%,rgba(34,197,94,.26),transparent 36%),
    linear-gradient(135deg,#dbeafe,#f8fafc 54%,#dcfce7);
}
button,input,select{font-family:inherit}

.wrap{
  height:100vh;
  min-height:700px;
  padding:12px;
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
  gap:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:22px;
  padding:9px 12px;
  box-shadow:0 18px 45px rgba(15,23,42,.10);
}
.brand h1{margin:0;font-size:23px;letter-spacing:-.8px}
.brand span{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.topRight{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.74);
  border:1px solid rgba(148,163,184,.35);
  font-size:12px;
  font-weight:900;
  color:#334155;
}

.hud{
  min-height:0;
  display:grid;
  grid-template-columns:260px minmax(0,1fr)330px;
  gap:10px;
}

.panel,.stageShell{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  border-radius:28px;
  min-height:0;
  overflow:auto;
}
.panel{padding:12px}

.stageShell{
  overflow:hidden;
  position:relative;
  display:grid;
  grid-template-rows:minmax(0,1fr)64px;
}

.petStage{
  position:relative;
  overflow:hidden;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 50% 43%,rgba(255,255,255,.96),rgba(255,255,255,.25) 32%,transparent 58%),
    linear-gradient(180deg,#93c5fd 0%,#bfdbfe 42%,#86efac 100%);
}

.clouds{
  position:absolute;inset:0;opacity:.62;pointer-events:none;
  background:
    radial-gradient(ellipse at 16% 20%,rgba(255,255,255,.9),transparent 7%),
    radial-gradient(ellipse at 27% 22%,rgba(255,255,255,.7),transparent 8%),
    radial-gradient(ellipse at 78% 17%,rgba(255,255,255,.88),transparent 8%),
    radial-gradient(ellipse at 68% 19%,rgba(255,255,255,.65),transparent 7%);
}
.sparkles{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 20% 36%,rgba(255,255,255,.9),transparent 1.2%),
    radial-gradient(circle at 72% 33%,rgba(255,255,255,.85),transparent 1%),
    radial-gradient(circle at 62% 62%,rgba(255,255,255,.8),transparent 1.2%),
    radial-gradient(circle at 34% 70%,rgba(255,255,255,.8),transparent 1%);
  animation:twinkle 2.8s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.86}}

.ground{
  position:absolute;left:0;right:0;bottom:0;height:132px;
  background:
    radial-gradient(ellipse at center,rgba(21,128,61,.42),transparent 58%),
    linear-gradient(180deg,rgba(34,197,94,.18),rgba(22,101,52,.72));
}

.aura{
  position:absolute;width:430px;height:430px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.88),rgba(255,255,255,.18) 45%,transparent 70%);
  filter:blur(2px);
  animation:auraPulse 4s ease-in-out infinite;
}
.aura.fire{background:radial-gradient(circle,rgba(254,215,170,.95),rgba(251,146,60,.23) 46%,transparent 70%)}
.aura.water{background:radial-gradient(circle,rgba(186,230,253,.95),rgba(14,165,233,.26) 46%,transparent 70%)}
.aura.nature{background:radial-gradient(circle,rgba(187,247,208,.95),rgba(34,197,94,.26) 46%,transparent 70%)}
.aura.shadow{background:radial-gradient(circle,rgba(221,214,254,.9),rgba(124,58,237,.26) 46%,transparent 70%)}
.aura.earth{background:radial-gradient(circle,rgba(254,243,199,.95),rgba(120,113,108,.26) 46%,transparent 70%)}
@keyframes auraPulse{0%,100%{transform:scale(.94);opacity:.75}50%{transform:scale(1.06);opacity:1}}

.petOrb{
  position:relative;
  width:315px;height:315px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.36);
  box-shadow:0 0 90px rgba(255,255,255,.72), inset 0 0 52px rgba(255,255,255,.54);
  z-index:2;
  cursor:pointer;
  transition:transform .8s cubic-bezier(.25,.8,.25,1), box-shadow .35s ease, background .35s ease;
  animation:floaty 3.3s ease-in-out infinite;
}

/* Hatched pets wander; eggs stay centered except for wobble/hop near hatch. */
.petOrb.wanderLeft{transform:translateX(-165px) translateY(18px) rotate(-3deg)}
.petOrb.wanderRight{transform:translateX(165px) translateY(18px) rotate(3deg)}
.petOrb.wanderNearLeft{transform:translateX(-90px) translateY(10px) rotate(-2deg)}
.petOrb.wanderNearRight{transform:translateX(90px) translateY(10px) rotate(2deg)}
.petOrb.hop{transform:translateY(-42px) scale(1.04)}
.petOrb.walking{transition:transform 2.4s cubic-bezier(.25,.8,.25,1)}
.petOrb.eggStill{transition:transform .35s ease}
.petOrb.eggWarm{box-shadow:0 0 90px rgba(251,146,60,.9), inset 0 0 52px rgba(254,215,170,.72)}
.petOrb.eggCold{box-shadow:0 0 90px rgba(125,211,252,.9), inset 0 0 52px rgba(186,230,253,.72)}
.petOrb.eggWet{box-shadow:0 0 90px rgba(14,165,233,.75), inset 0 0 52px rgba(186,230,253,.75)}
.petOrb.eggDry{box-shadow:0 0 90px rgba(217,119,6,.55), inset 0 0 52px rgba(254,243,199,.75)}
.petOrb.eggLight{box-shadow:0 0 100px rgba(250,204,21,.95), inset 0 0 56px rgba(254,249,195,.8)}
.petOrb.eggDark{box-shadow:0 0 95px rgba(124,58,237,.85), inset 0 0 52px rgba(221,214,254,.75)}
.petOrb.playful{animation:playfulFloat 2.1s ease-in-out infinite}
.petOrb.lazy,.petOrb.napping{animation:napFloat 4.8s ease-in-out infinite}
.petOrb.aggressive{animation:sharpFloat 2.2s ease-in-out infinite}
.petOrb.calm{animation:calmFloat 4s ease-in-out infinite}
.petOrb.curious{animation:curiousFloat 2.8s ease-in-out infinite}
.petOrb.moody{animation:moodyFloat 2.9s ease-in-out infinite}
.petOrb.reactHappy{animation:happyBounce .72s ease}
.petOrb.reactExcited{animation:excitedShake .78s ease}
.petOrb.reactFocus{animation:focusPulse .82s ease}
.petOrb.reactSleep{animation:sleepySettle 1.05s ease}
.petOrb.reactExplore{animation:leaveAndReturn 1.55s ease}
.petOrb.reactEgg{animation:eggReact .72s ease}
@keyframes happyBounce{0%,100%{transform:translateY(0) scale(1)}38%{transform:translateY(-34px) scale(1.08)}70%{transform:translateY(-8px) scale(1.03)}}
@keyframes excitedShake{0%,100%{transform:translateX(0) rotate(0)}18%{transform:translateX(-28px) rotate(-4deg)}36%{transform:translateX(28px) rotate(4deg)}58%{transform:translateX(-16px) rotate(-3deg)}78%{transform:translateX(14px) rotate(3deg)}}
@keyframes focusPulse{0%,100%{transform:scale(1)}45%{transform:scale(1.12)}70%{transform:scale(1.04)}}
@keyframes sleepySettle{0%,100%{transform:translateY(0) scale(1)}55%{transform:translateY(18px) scale(.96)}}
@keyframes leaveAndReturn{0%{transform:translateX(0);opacity:1}42%{transform:translateX(420px);opacity:.08}58%{transform:translateX(-420px);opacity:.08}100%{transform:translateX(0);opacity:1}}
@keyframes eggReact{0%,100%{transform:rotate(0deg) scale(1)}20%{transform:rotate(-8deg) scale(1.07)}42%{transform:rotate(8deg) scale(1.09)}68%{transform:rotate(-4deg) scale(1.04)}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes playfulFloat{0%,100%{transform:translateY(0) rotate(-2deg)}35%{transform:translateY(-20px) rotate(3deg)}70%{transform:translateY(-6px) rotate(-4deg)}}
@keyframes napFloat{0%,100%{transform:translateY(3px) scale(.99)}50%{transform:translateY(-5px) scale(1.01)}}
@keyframes sharpFloat{0%,100%{transform:translateY(0)}45%{transform:translateY(-12px) rotate(-2deg)}55%{transform:translateY(-12px) rotate(2deg)}}
@keyframes calmFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-9px) scale(1.025)}}
@keyframes curiousFloat{0%,100%{transform:translateY(0)}25%{transform:translateY(-8px) rotate(-4deg)}75%{transform:translateY(-8px) rotate(4deg)}}
@keyframes moodyFloat{0%,100%{transform:translateY(0)}20%{transform:translateY(-16px) rotate(5deg)}55%{transform:translateY(-3px) rotate(-6deg)}}

.petImg{
  position:absolute;width:210px;height:210px;object-fit:contain;z-index:2;pointer-events:none;
  filter:drop-shadow(0 20px 20px rgba(15,23,42,.25));
  animation:breatheImg 2.4s ease-in-out infinite;
}
.petImg.hide{display:none}
.petEmoji{
  font-size:136px;
  filter:drop-shadow(0 20px 20px rgba(15,23,42,.23));
  animation:breathe 2.4s ease-in-out infinite;
}
.petEmoji.hide{display:none}
.petEmoji.eggNearHatch,.petImg.eggNearHatch{animation:eggWobble 1.1s ease-in-out infinite}
.petEmoji.carePulse,.petImg.carePulse{animation:carePop .62s ease}
.petEmoji.tapPulse,.petImg.tapPulse{animation:tapBounce .44s ease}
@keyframes breathe{0%,100%{transform:scale(1) rotate(-1deg)}50%{transform:scale(1.08) rotate(1deg)}}
@keyframes breatheImg{0%,100%{transform:scale(1) rotate(-1deg)}50%{transform:scale(1.06) rotate(1deg)}}
@keyframes eggWobble{0%,100%{transform:rotate(0deg) scale(1.06)}20%{transform:rotate(-7deg) scale(1.07)}40%{transform:rotate(7deg) scale(1.08)}60%{transform:rotate(-5deg) scale(1.07)}80%{transform:rotate(5deg) scale(1.08)}}
@keyframes carePop{0%{transform:scale(1)}35%{transform:scale(1.28) rotate(-4deg)}70%{transform:scale(.98) rotate(3deg)}100%{transform:scale(1)}}
@keyframes tapBounce{0%{transform:scale(1)}45%{transform:scale(1.13) translateY(-8px)}100%{transform:scale(1)}}

.actionDock{
  position:absolute;
  left:16px;
  right:16px;
  bottom:14px;
  z-index:10;
  background:rgba(15,23,42,.55);
  border:1px solid rgba(255,255,255,.32);
  backdrop-filter:blur(16px);
  border-radius:26px;
  padding:10px;
  box-shadow:0 22px 70px rgba(15,23,42,.28);
}
.dockTop{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}
.dockTop select{
  flex:1;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.88);
  padding:9px;
  font-weight:900;
}
.dockActions{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.dockActions.egg{grid-template-columns:repeat(3,1fr)}
.dockBtn{
  min-height:58px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.28);
  color:white;
  text-align:left;
  padding:9px;
  background:rgba(255,255,255,.16);
}
.dockBtn strong{display:block;font-size:13px}
.dockBtn span{display:block;font-size:11px;opacity:.82;margin-top:2px}
.dockBtn.gold{background:linear-gradient(135deg,#facc15,#f59e0b);color:#111827}
.dockBtn.good{background:linear-gradient(135deg,#16a34a,#22c55e)}
.dockBtn.blue{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
.dockBtn.sky{background:linear-gradient(135deg,#38bdf8,#0284c7)}
.dockBtn.purple{background:linear-gradient(135deg,#7c3aed,#a855f7)}
.dockBtn.red{background:linear-gradient(135deg,#dc2626,#ef4444)}

.speech{
  z-index:3;
  margin:0;
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:900;
  color:#334155;
  background:rgba(255,255,255,.66);
  border-top:1px solid rgba(255,255,255,.45);
}

h2,h3{margin:0}
.muted{color:var(--muted);font-size:13px;line-height:1.35}

.card,.questItem,.item,.rosterCard,.detailBox,.zoneItem{
  background:rgba(255,255,255,.66);
  border:1px solid rgba(148,163,184,.28);
  border-radius:18px;
  padding:10px;
  margin:8px 0;
}
.petCard{background:var(--glass2);border:1px solid rgba(148,163,184,.28);border-radius:22px;padding:12px}
.petCard h2{font-size:22px;margin-bottom:3px}
.renameRow{display:flex;gap:7px;margin-top:10px}
input,select{min-width:0;padding:10px 12px;border-radius:14px;border:1px solid #cbd5e1;background:#fff;font-size:14px}
.renameRow input{flex:1}

button{
  padding:10px 12px;
  border-radius:14px;
  border:1px solid #cbd5e1;
  background:#fff;
  cursor:pointer;
  font-weight:900;
  transition:.15s ease;
}
button:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(15,23,42,.12)}
button.primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;border-color:var(--blue)}
button.good{background:linear-gradient(135deg,#16a34a,#22c55e);color:white;border-color:#16a34a}
button.gold{background:linear-gradient(135deg,#facc15,#f59e0b);color:#111827;border-color:#facc15}
button.purple{background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border-color:#7c3aed}
button.ghost{background:rgba(255,255,255,.65);color:#334155}
button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

.statStack{display:grid;gap:8px;margin-top:10px}
.statMini{background:rgba(255,255,255,.70);border:1px solid rgba(148,163,184,.30);border-radius:16px;padding:8px}
.statMiniTop{display:flex;justify-content:space-between;font-size:11px;color:#475569;margin-bottom:5px;font-weight:900}
.statBar{height:9px;border-radius:999px;background:#e5e7eb;overflow:hidden}
.statFill{height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,#86efac);transition:width .35s ease}
.statFill.mid{background:linear-gradient(90deg,#facc15,#fb923c)}
.statFill.low{background:linear-gradient(90deg,#ef4444,#f97316)}

.petSnapshot{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
  margin-top:10px;
}
.needCard{
  background:rgba(255,255,255,.70);
  border:1px solid rgba(148,163,184,.30);
  border-radius:16px;
  padding:9px;
}
.needCard b{
  display:flex;
  justify-content:space-between;
  gap:8px;
  font-size:12px;
  color:#334155;
  margin-bottom:6px;
}
.needHint{
  color:var(--muted);
  font-size:11px;
  margin-top:5px;
}
.eggSignal{
  background:rgba(255,255,255,.70);
  border:1px solid rgba(148,163,184,.30);
  border-radius:16px;
  padding:10px;
  margin-top:10px;
}
.eggSignal h3{font-size:15px;margin-bottom:4px}
.eggTraitChips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.eggTraitChip{
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  background:#eef2ff;
  border:1px solid #c7d2fe;
  color:#3730a3;
}

.progress{height:10px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin-top:6px}
.progressFill{height:100%;border-radius:999px;background:linear-gradient(90deg,#38bdf8,#facc15,#fb7185);transition:width .35s ease}

.quickTools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px}
.tabs button{padding:9px 6px;font-size:12px}
.tabs button.active{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}
.hidden{display:none!important}

.itemTop,.rosterTop,.questTop,.zoneTop{display:flex;justify-content:space-between;gap:8px;align-items:center}
.itemName,.rosterName{font-weight:900}
.itemDesc,.rosterDesc,.questDesc,.zoneDesc{font-size:12px;color:var(--muted);margin:5px 0 8px;line-height:1.3}

.rosterCard.active{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.14)}
.rosterRow{display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center}
.rosterAvatar{
  width:54px;height:54px;border-radius:17px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.78);border:1px solid rgba(148,163,184,.30);position:relative;overflow:hidden;font-size:30px;
}
.rosterAvatar img{width:50px;height:50px;object-fit:contain;position:absolute}
.rosterActions{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.rosterActions button{padding:7px 9px;font-size:12px}

.detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detailBox{margin:0}
.detailBox b{display:block}
.detailBox span{font-size:12px;color:var(--muted)}
.moves{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.movePill{
  padding:7px 10px;border-radius:999px;background:#eef2ff;border:1px solid #c7d2fe;
  color:#3730a3;font-size:12px;font-weight:900;
}
.eggInfluence{
  margin-top:10px;
  padding:10px;
  border-radius:16px;
  background:rgba(255,255,255,.68);
  border:1px solid rgba(148,163,184,.28);
}
.eggInfluence b{display:block;margin-bottom:4px}
.eggInfluence .hint{font-size:12px;color:var(--muted);line-height:1.35}
.eggInfluence .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.eggInfluence .tags span{font-size:11px;font-weight:900;border-radius:999px;background:#eef2ff;border:1px solid #c7d2fe;color:#3730a3;padding:5px 8px}

.log{
  height:160px;
  overflow:auto;
  background:#fffbea;
  border:1px solid #d6bd6b;
  border-radius:17px;
  padding:8px;
  font-size:12px;
  color:#1f2937;
  line-height:1.35;
}

.floatingFx{
  position:absolute;
  left:50%;
  top:36%;
  transform:translate(-50%,-50%);
  font-weight:900;
  font-size:32px;
  pointer-events:none;
  opacity:0;
  animation:floatUp 1.1s ease forwards;
  text-shadow:0 3px 10px rgba(15,23,42,.18);
  z-index:18;
}
@keyframes floatUp{0%{opacity:0;transform:translate(-50%,-20%) scale(.8)}15%{opacity:1}100%{opacity:0;transform:translate(-50%,-160%) scale(1.22)}}

.flyingItem{
  position:absolute;width:58px;height:58px;object-fit:contain;z-index:16;pointer-events:none;
  animation:itemFly .85s ease forwards;filter:drop-shadow(0 10px 10px rgba(15,23,42,.22));
}
@keyframes itemFly{0%{opacity:0;transform:translate(210px,80px) scale(.6) rotate(-18deg)}20%{opacity:1}100%{opacity:0;transform:translate(0,0) scale(1.25) rotate(16deg)}}

.toast{
  position:fixed;left:50%;bottom:22px;transform:translateX(-50%);
  background:#111827;color:#fff;border-radius:999px;padding:11px 16px;font-weight:900;
  box-shadow:0 15px 40px rgba(15,23,42,.35);opacity:0;pointer-events:none;transition:.25s ease;z-index:99;
}
.toast.show{opacity:1;bottom:32px}

.hatchOverlay,.moveOverlay{
  position:fixed;inset:0;
  background:radial-gradient(circle,rgba(255,255,255,.95),rgba(250,204,21,.85) 26%,rgba(37,99,235,.78) 70%);
  display:none;align-items:center;justify-content:center;z-index:98;color:white;text-align:center;
}
.moveOverlay{background:radial-gradient(circle,rgba(255,255,255,.92),rgba(124,58,237,.82) 30%,rgba(15,23,42,.86) 76%)}
.hatchOverlay.show,.moveOverlay.show{display:flex;animation:overlayFade 2.2s ease forwards}
.overlayBox{
  background:rgba(15,23,42,.72);border:1px solid rgba(255,255,255,.32);backdrop-filter:blur(14px);
  border-radius:30px;padding:32px;box-shadow:0 30px 80px rgba(15,23,42,.35);
}
.overlayBox .bigImg{width:150px;height:150px;object-fit:contain;animation:hatchPop 1.4s ease infinite}
.overlayBox .bigEmoji{font-size:96px;animation:hatchPop 1.4s ease infinite}
.overlayBox h1{margin:10px 0 4px}
@keyframes overlayFade{0%{opacity:0}10%{opacity:1}86%{opacity:1}100%{opacity:0}}
@keyframes hatchPop{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}

@media(max-width:1180px){
  body{overflow:auto}
  .wrap{height:auto}
  .hud{grid-template-columns:1fr}
  .panel{overflow:visible}
  .stageShell{min-height:620px}
  .petStage{min-height:520px}
}
@media(max-width:680px){
  .top{align-items:flex-start;flex-direction:column}
  .dockActions,.dockActions.egg,.quickTools,.detailGrid{grid-template-columns:1fr 1fr}
  .tabs{grid-template-columns:1fr 1fr}
  .petOrb{width:260px;height:260px}
  .petImg{width:175px;height:175px}
  .petEmoji{font-size:112px}
}
</style>
</head>

<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <h1>Pet World</h1>
      <span>Care, train, explore, complete quests, and collect companions.</span>
    </div>
    <div class="topRight">
      <span id="userBadge" class="badge">👤 Loading</span>
      <span id="coinBadge" class="badge">🪙 0</span>
      <span id="rosterBadge" class="badge">🐾 1/6</span>
      <span id="moodBadge" class="badge">🙂 Calm</span>
    </div>
  </div>

  <div class="hud">
    <div class="panel">
      <div class="petCard">
        <h2 id="petNameTitle">Mystery Egg</h2>
        <div id="petSubTitle" class="muted">Loading...</div>
        <div class="renameRow">
          <input id="renameInput" placeholder="Pet name">
          <button class="primary" onclick="renamePet()">Rename</button>
        </div>
      </div>

      <div id="statStack" class="statStack"></div>
      <div id="progressBox" class="card"></div>

      <div class="quickTools">
        <button class="ghost" onclick="setTab('quests')">✅ Quests</button>
        <button class="ghost" onclick="setTab('details')">ℹ️ Info</button>
        <button class="ghost" onclick="setTab('roster')">🐾 Roster</button>
        <button class="ghost" onclick="setTab('items')">🎒 Items</button>
        <button class="ghost" onclick="setTab('shop')">🛒 Shop</button>
        <button class="ghost" onclick="setTab('zones')">🧭 Zones</button>
      </div>

      <div style="margin-top:10px">
        <b>Journal</b>
        <div id="log" class="log"></div>
      </div>
    </div>

    <div class="stageShell">
      <div class="petStage" id="petStage">
        <div class="clouds"></div>
        <div class="sparkles"></div>
        <div class="ground"></div>
        <div id="aura" class="aura"></div>

        <div id="petOrb" class="petOrb" onclick="comfortPet()">
          <img id="petImg" class="petImg hide" src="">
          <div id="petEmoji" class="petEmoji">🥚</div>
        </div>

        <div id="floatingFx" class="floatingFx">+1</div>
        <div id="actionDock" class="actionDock"></div>
      </div>

      <div id="speech" class="speech">Loading your companion...</div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button id="questsTab" onclick="setTab('quests')" class="active">Quests</button>
        <button id="detailsTab" onclick="setTab('details')">Info</button>
        <button id="rosterTab" onclick="setTab('roster')">Roster</button>
        <button id="itemsTab" onclick="setTab('items')">Items</button>
        <button id="shopTab" onclick="setTab('shop')">Shop</button>
        <button id="zonesTab" onclick="setTab('zones')">Zones</button>
      </div>

      <div id="questsPanel"></div>
      <div id="detailsPanel" class="hidden"></div>
      <div id="rosterPanel" class="hidden"></div>
      <div id="itemsPanel" class="hidden"></div>
      <div id="shopPanel" class="hidden"></div>
      <div id="zonesPanel" class="hidden"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div id="hatchOverlay" class="hatchOverlay">
  <div class="overlayBox">
    <img id="hatchImg" class="bigImg hidden" src="">
    <div id="hatchEmoji" class="bigEmoji">🐣</div>
    <h1 id="hatchTitle">Your egg hatched!</h1>
    <p id="hatchText">A new companion has joined you.</p>
  </div>
</div>

<div id="moveOverlay" class="moveOverlay">
  <div class="overlayBox">
    <div class="bigEmoji">✨</div>
    <h1 id="moveTitle">New Move Learned!</h1>
    <p id="moveText">Your companion discovered a new move.</p>
  </div>
</div>

<script>
var GAME_META={id:'petworld',name:'Pet World',minPlayers:1,maxPlayers:1,seats:1};

var username='guest';
var profile=null;
var shop={};
var moves={};
var zones={};
var limits={maxRoster:6,newEggBaseCost:75};
var currentTab='quests';
var selectedZoneId='meadow';
var logs=[];
var localState={lastComfort:0,lastPromptAt:0,lastWanderAt:0,prompt:null};

function el(id){return document.getElementById(id);}

function getPlayerName(){
  if(window.GAME_PLAYERS&&window.GAME_PLAYERS.length){
    var s=window.GAME_MY_SEAT;
    for(var i=0;i<window.GAME_PLAYERS.length;i++){
      if(window.GAME_PLAYERS[i].seat===s)return window.GAME_PLAYERS[i].name||'guest';
    }
    return window.GAME_PLAYERS[0].name||'guest';
  }
  try{return localStorage.getItem('gf_user')||'guest'}catch(e){return 'guest'}
}

function boot(){
  username=getPlayerName();
  el('userBadge').innerText='👤 '+username;
  loadProfile();
  setInterval(tickLocalPrompt,30000);
  setInterval(tickPetLife,6500);
}

async function loadProfile(){
  try{
    var res=await fetch('/api/pet/profile?user='+encodeURIComponent(username));
    var data=await res.json();
    if(data.error){
      speak('Could not load pet: '+data.error);
      addLog('Load failed: '+data.error);
      return;
    }
    profile=data.profile;
    shop=data.shop||{};
    moves=data.moves||{};
    zones=data.zones||{};
    limits=data.limits||limits;
    if(!zones[selectedZoneId])selectedZoneId=Object.keys(zones)[0]||'meadow';
    addLog('Loaded pet profile.');
    draw();
  }catch(err){
    speak('Server error loading pet profile.');
    addLog('Error: '+err.message);
  }
}

function activePet(){
  if(!profile)return null;
  return profile.pets[profile.activePetId];
}

function draw(){
  var pet=activePet();
  if(!pet)return;
  normalizePet(pet);

  var mood=getMood(pet);
  var rosterCount=Object.keys(profile.pets||{}).length;

  el('userBadge').innerText='👤 '+username;
  el('coinBadge').innerText='🪙 '+Number(profile.money||0);
  el('rosterBadge').innerText='🐾 '+rosterCount+'/'+Number(limits.maxRoster||6);
  el('moodBadge').innerText=mood.icon+' '+mood.label;

  el('petNameTitle').innerText=pet.name||'Mystery Egg';
  el('petSubTitle').innerText=petSubtitle(pet);
  el('renameInput').value=pet.name||'';
  el('petEmoji').innerText=pet.emoji||'🥚';

  updatePetVisual(pet);

  var nearHatch=pet.stage==='egg'&&eggProgress(pet)>=80;
  el('petEmoji').classList.toggle('eggNearHatch',nearHatch);
  el('petImg').classList.toggle('eggNearHatch',nearHatch);

  setAura(pet);
  setPetPersonalityMotion(pet,mood);
  drawDock();
  drawStats();
  drawProgress();
  drawQuests();
  drawDetails();
  drawRoster();
  drawItems();
  drawShop();
  drawZones();
  drawLog();

  if(localState.prompt)speak(localState.prompt.text);
  else if(pet.stage==='egg'){
    var prog=eggProgress(pet);
    if(prog>=80)speak('The egg trembles. Something inside is ready to meet you soon.');
    else if(prog>=45)speak('The egg responds to your care. Its personality is beginning to form.');
    else speak('Your egg is listening. Every care choice nudges what it may become.');
  }else speak(idleSpeech(pet,mood));
}

function drawDock(){
  var pet=activePet();
  var html='';

  if(pet.stage==='egg'){
    html+='<div class="dockActions egg">';
    html+=dockBtn('🔥 Warm','warm','Care','gold','careEgg');
    html+=dockBtn('❄️ Cool','cold','Care','sky','careEgg');
    html+=dockBtn('💧 Mist','wet','Care','blue','careEgg');
    html+=dockBtn('🌵 Dry','dry','Care','gold','careEgg');
    html+=dockBtn('☀️ Light','light','Care','good','careEgg');
    html+=dockBtn('🌙 Shade','dark','Care','purple','careEgg');
    html+='</div>';
  }else{
    html+='<div class="dockTop"><select id="stageZoneSelect">';
    Object.keys(zones||{}).forEach(function(id){
      var z=zones[id];
      html+='<option value="'+escapeAttr(id)+'" '+(id===selectedZoneId?'selected':'')+'>'+escapeHtml(z.name)+' · Lv '+Number(z.minLevel||1)+' · ⚡ '+Number(z.energyCost||0)+'</option>';
    });
    html+='</select><button class="gold" onclick="exploreSelectedZone()">Explore</button></div>';
    html+='<div class="dockActions">';
    html+='<button class="dockBtn good" onclick="useItem(\'berry\')"><strong>🍓 Feed</strong><span>Hunger + bond</span></button>';
    html+='<button class="dockBtn blue" onclick="playPet()"><strong>🎾 Play</strong><span>Coins + XP</span></button>';
    html+='<button class="dockBtn sky" onclick="useItem(\'soap\')"><strong>🫧 Clean</strong><span>Cleanliness</span></button>';
    html+='<button class="dockBtn purple" onclick="useItem(\'nap_blanket\')"><strong>💤 Rest</strong><span>Energy</span></button>';
    html+='<button class="dockBtn red" onclick="trainPet(\'attack\')"><strong>⚔️ ATK</strong><span>Train attack</span></button>';
    html+='<button class="dockBtn blue" onclick="trainPet(\'defense\')"><strong>🛡 DEF</strong><span>Train defense</span></button>';
    html+='<button class="dockBtn sky" onclick="trainPet(\'speed\')"><strong>💨 SPD</strong><span>Train speed</span></button>';
    html+='<button class="dockBtn gold" onclick="setTab(\'quests\')"><strong>✅ Quests</strong><span>Claim rewards</span></button>';
    html+='</div>';
  }

  el('actionDock').innerHTML=html;

  var select=el('stageZoneSelect');
  if(select){
    select.onchange=function(){selectedZoneId=select.value;};
  }
}

function dockBtn(title,arg,sub,cls,fn){
  return '<button class="dockBtn '+cls+'" onclick="'+fn+'(\''+arg+'\')"><strong>'+title+'</strong><span>'+sub+'</span></button>';
}

function petSubtitle(pet){
  if((pet.stage||'egg')==='egg'){
    return 'Mystery egg · Bond '+Number(pet.affection||0)+' · '+eggProgress(pet)+'% hatch progress';
  }
  return [(pet.type||'pet')+' type','Lv '+Number((pet.stats&&pet.stats.level)||1),personalityLabel(pet.personality),'Bond '+Number(pet.affection||0)].join(' · ');
}

function drawStats(){
  var pet=activePet();
  var html='';

  if(pet.stage==='egg'){
    var strongest=strongestTrait(pet.eggTraits||{});
    var pct=eggProgress(pet);
    var labels={
      warm:'Warmth',
      cold:'Cold',
      wet:'Moisture',
      dry:'Dryness',
      light:'Light',
      dark:'Shadow'
    };

    html+='<div class="eggSignal">';
    html+='<h3>Egg Signal</h3>';
    html+='<div class="muted">'+escapeHtml(labels[strongest]||'Mystery')+' is shaping this egg. '+pct+'% hatch progress.</div>';
    html+='<div class="eggTraitChips">';
    ['warm','cold','wet','dry','light','dark'].forEach(function(k){
      var v=Number((pet.eggTraits||{})[k]||0);
      if(v>0)html+='<span class="eggTraitChip">'+escapeHtml(labels[k]||k)+' '+v+'</span>';
    });
    html+='</div>';
    html+='</div>';
  }else{
    html+='<div class="petSnapshot">';
    html+=needCard('🍽️ Hunger',pet.needs.hunger,100,'Feed when low.');
    html+=needCard('🙂 Happiness',pet.needs.happiness,100,'Play raises mood and XP.');
    html+=needCard('⚡ Energy',pet.needs.energy,100,'Rest before exploring or training.');
    html+='</div>';
  }

  el('statStack').innerHTML=html;
}

function needCard(name,val,max,hint){
  val=Number(val||0); max=Number(max||100);
  var pct=Math.max(0,Math.min(100,Math.floor((val/max)*100)));
  var cls=pct<30?'low':pct<60?'mid':'';
  return '<div class="needCard"><b><span>'+escapeHtml(name)+'</span><span>'+val+'/'+max+'</span></b><div class="statBar"><div class="statFill '+cls+'" style="width:'+pct+'%"></div></div><div class="needHint">'+escapeHtml(hint)+'</div></div>';
}

function miniStat(name,val,max){
  val=Number(val||0); max=Number(max||100);
  var pct=Math.max(0,Math.min(100,Math.floor((val/max)*100)));
  var cls=pct<30?'low':pct<60?'mid':'';
  return '<div class="statMini"><div class="statMiniTop"><span>'+escapeHtml(name)+'</span><span>'+val+'/'+max+'</span></div><div class="statBar"><div class="statFill '+cls+'" style="width:'+pct+'%"></div></div></div>';
}

function drawProgress(){
  var pet=activePet();
  var html='';
  if(pet.stage==='egg'){
    var pct=eggProgress(pet);
    html+='<b>Hatch Progress</b><div class="muted">'+traitTotal(pet.eggTraits||{})+' / 18 care points</div>';
    html+='<div class="progress"><div class="progressFill" style="width:'+pct+'%"></div></div>';
    html+=eggInfluenceCard(pet);
  }else{
    var need=Math.max(20,Number(pet.stats.level||1)*20);
    var xp=Number(pet.stats.xp||0);
    var xpPct=Math.max(0,Math.min(100,Math.floor((xp/need)*100)));
    html+='<b>Level Progress</b><div class="muted">Lv '+Number(pet.stats.level||1)+' · '+xp+' / '+need+' XP</div>';
    html+='<div class="progress"><div class="progressFill" style="width:'+xpPct+'%"></div></div>';
  }
  el('progressBox').innerHTML=html;
}

function drawQuests(){
  var quests=(profile.daily&&profile.daily.quests)||[];
  var html='<h3>Daily Quests</h3><p class="muted">Complete small goals to earn coins, items, and XP.</p>';
  if(!quests.length)html+='<p class="muted">No daily quests loaded.</p>';
  quests.forEach(function(q){
    var done=Number(q.progress||0)>=Number(q.target||1);
    var pct=Math.max(0,Math.min(100,Math.floor((Number(q.progress||0)/Number(q.target||1))*100)));
    html+='<div class="questItem"><div class="questTop"><b>'+escapeHtml(q.title)+'</b><span class="badge">'+Number(q.progress||0)+'/'+Number(q.target||1)+'</span></div>';
    html+='<div class="questDesc">Reward: '+escapeHtml(rewardText(q.reward||{}))+'</div>';
    html+='<div class="progress"><div class="progressFill" style="width:'+pct+'%"></div></div>';
    if(q.claimed)html+='<button disabled style="margin-top:8px">Claimed</button>';
    else if(done)html+='<button class="gold" style="margin-top:8px" onclick="claimQuest(\''+escapeAttr(q.id)+'\')">Claim Reward</button>';
    html+='</div>';
  });
  el('questsPanel').innerHTML=html;
}

function rewardText(r){
  var parts=[];
  if(r.coins)parts.push(r.coins+' coins');
  if(r.xp)parts.push(r.xp+' XP');
  if(r.item)parts.push((r.quantity||1)+' '+itemName(r.item));
  return parts.join(', ')||'Reward';
}

function drawDetails(){
  var pet=activePet();
  var html='<h3>Pet Info</h3><p class="muted">Detailed stats are tucked away here so the main screen stays focused on your companion.</p><div class="detailGrid">';
  html+=detailBox('Stage',pet.stage||'egg');
  html+=detailBox('Type',pet.type||'Mystery');
  html+=detailBox('Personality',personalityLabel(pet.personality));
  html+=detailBox('Bond',Number(pet.affection||0));

  if(pet.stage==='egg'){
    html+=detailBox('Warm',Number(pet.eggTraits.warm||0));
    html+=detailBox('Cold',Number(pet.eggTraits.cold||0));
    html+=detailBox('Wet',Number(pet.eggTraits.wet||0));
    html+=detailBox('Dry',Number(pet.eggTraits.dry||0));
    html+=detailBox('Light',Number(pet.eggTraits.light||0));
    html+=detailBox('Dark',Number(pet.eggTraits.dark||0));
  }else{
    html+=detailBox('HP',Number(pet.stats.hp||0)+' / '+Number(pet.stats.maxHp||0));
    html+=detailBox('Level',Number(pet.stats.level||1));
    html+=detailBox('XP',Number(pet.stats.xp||0));
    html+=detailBox('Attack',Number(pet.stats.attack||0));
    html+=detailBox('Defense',Number(pet.stats.defense||0));
    html+=detailBox('Speed',Number(pet.stats.speed||0));
    html+=detailBox('Cleanliness',Number(pet.needs.cleanliness||0));
  }

  html+='</div><h3 style="margin-top:10px">Moves</h3><div class="moves">';
  (pet.moves||[]).forEach(function(id){
    var move=moves[id]||{name:id,type:'normal'};
    html+='<span class="movePill">'+escapeHtml(move.name)+' · '+escapeHtml(move.type)+'</span>';
  });
  html+='</div>';
  el('detailsPanel').innerHTML=html;
}

function detailBox(k,v){
  return '<div class="detailBox"><b>'+escapeHtml(k)+'</b><span>'+escapeHtml(v)+'</span></div>';
}

function drawZones(){
  var pet=activePet();
  var html='<h3>Exploration Zones</h3><p class="muted">Zones unlock with level and offer different rewards.</p>';
  Object.keys(zones||{}).forEach(function(id){
    var z=zones[id];
    var level=Number((pet.stats&&pet.stats.level)||1);
    var locked=pet.stage==='egg'||level<Number(z.minLevel||1);
    html+='<div class="zoneItem"><div class="zoneTop"><b>'+escapeHtml(z.name)+'</b><span class="badge">Lv '+Number(z.minLevel||1)+' · ⚡ '+Number(z.energyCost||0)+'</span></div>';
    html+='<div class="zoneDesc">'+escapeHtml(z.description||'')+'</div>';
    html+='<button class="gold" onclick="exploreZone(\''+escapeAttr(id)+'\')" '+(locked?'disabled':'')+'>'+(locked?'Locked':'Explore')+'</button></div>';
  });
  el('zonesPanel').innerHTML=html;
}

function drawRoster(){
  var ids=Object.keys(profile.pets||{});
  var max=Number(limits.maxRoster||6);
  var cost=Number(limits.newEggBaseCost||75)+Math.max(0,ids.length-1)*25;
  var html='<h3>Pet Roster</h3><p class="muted">Choose your active companion.</p>';
  html+='<div class="item"><div class="itemTop"><b>Adopt Mystery Egg</b><span class="badge">'+cost+' coins</span></div><div class="itemDesc">Roster: '+ids.length+'/'+max+'</div><button class="gold" onclick="adoptEgg()" '+(ids.length>=max?'disabled':'')+'>Adopt Egg</button></div>';

  ids.forEach(function(pid){
    var pet=profile.pets[pid];
    normalizePet(pet);
    var active=pid===profile.activePetId;
    var img=petAssetPath(pet);
    var sub=(pet.stage||'egg')==='egg'
      ? 'Egg · '+eggProgress(pet)+'% hatch · Bond '+Number(pet.affection||0)
      : (pet.type||'pet')+' · Lv '+Number((pet.stats&&pet.stats.level)||1)+' · '+personalityLabel(pet.personality);

    html+='<div class="rosterCard '+(active?'active':'')+'"><div class="rosterRow">';
    html+='<div class="rosterAvatar"><img src="'+escapeAttr(img)+'" onerror="this.style.display=\'none\'"><span>'+escapeHtml(pet.emoji||'🥚')+'</span></div>';
    html+='<div><div class="rosterTop"><div class="rosterName">'+escapeHtml(pet.name||'Mystery Egg')+'</div>'+(active?'<span class="badge">Active</span>':'')+'</div>';
    html+='<div class="rosterDesc">'+escapeHtml(sub)+'</div><div class="rosterActions">';
    html+='<button class="primary" onclick="setActivePet(\''+escapeAttr(pid)+'\')" '+(active?'disabled':'')+'>Set Active</button>';
    html+='<button class="ghost" disabled>Gift Soon</button><button class="ghost" disabled>Trade Soon</button>';
    html+='</div></div></div></div>';
  });
  el('rosterPanel').innerHTML=html;
}

function drawItems(){
  var inv=profile.inventory||{};
  var keys=Object.keys(inv).filter(function(k){return inv[k]>0;});
  var html='<h3>Inventory</h3>';
  if(!keys.length)html+='<p class="muted">No items yet. Explore or visit the shop.</p>';
  keys.forEach(function(id){
    var item=shop[id]||{name:id,description:'Item'};
    html+='<div class="item"><div class="itemTop"><div class="itemName">'+escapeHtml(item.name)+'</div><span class="badge">x'+inv[id]+'</span></div>';
    html+='<div class="itemDesc">'+escapeHtml(item.description||'')+'</div><button class="primary" onclick="useItem(\''+id+'\')">Use Item</button></div>';
  });
  el('itemsPanel').innerHTML=html;
}

function drawShop(){
  var html='<h3>Shop</h3><p class="muted">Buy food, care tools, and comfort items.</p>';
  Object.keys(shop).forEach(function(id){
    var item=shop[id];
    html+='<div class="item"><div class="itemTop"><div class="itemName">'+escapeHtml(item.name)+'</div><div class="badge">🪙 '+Number(item.price||0)+'</div></div>';
    html+='<div class="itemDesc">'+escapeHtml(item.description||'')+'</div><button class="gold" onclick="buyItem(\''+id+'\')">Buy</button></div>';
  });
  el('shopPanel').innerHTML=html;
}

function setTab(tab){
  currentTab=tab;
  ['quests','details','roster','items','shop','zones'].forEach(function(t){
    el(t+'Tab').classList.toggle('active',tab===t);
    el(t+'Panel').classList.toggle('hidden',tab!==t);
  });
}

async function careEgg(action){
  var before=activePet();
  var beforeStage=before?before.stage:null;
  try{
    var res=await fetch('/api/pet/care-egg',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,action:action})});
    var data=await res.json();
    if(data.error)return notify(data.error);
    profile=data.profile;
    var pet=activePet();
    addLog(data.message||careMessage(action));
    notify(data.message||careMessage(action));
    animateCare(action);
    triggerPetReaction('egg');
    localState.prompt=null;
    if(data.hatched||beforeStage==='egg'&&pet.stage!=='egg'){
      showHatch(pet);
      addLog('A new companion hatched: '+(pet.name||'New pet')+'!');
    }
    draw();
  }catch(err){notify('Care failed: '+err.message)}
}

async function playPet(){
  try{
    var res=await fetch('/api/pet/play',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username})});
    var data=await res.json();
    if(data.error)return notify(data.error);
    profile=data.profile;
    addLog(data.message||'You played together.');
    handleRewardResult(data.reward&&data.reward.xpResult);
    notify(data.message||'Play complete!');
    animateCare('play');
    triggerPetReaction('play');
    draw();
  }catch(err){notify('Play failed: '+err.message)}
}

async function trainPet(stat){
  try{
    var res=await fetch('/api/pet/train',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,stat:stat})});
    var data=await res.json();
    if(data.error)return notify(data.error);
    profile=data.profile;
    addLog(data.message||'Training complete.');
    handleRewardResult(data.result&&data.result.xpResult);
    notify(data.message||'Training complete!');
    animateCare(stat==='attack'?'attack':stat==='defense'?'defense':'speed');
    triggerPetReaction('train');
    draw();
  }catch(err){notify('Train failed: '+err.message)}
}

function exploreSelectedZone(){
  exploreZone(selectedZoneId||'meadow');
}

async function exploreZone(zoneId){
  try{
    selectedZoneId=zoneId;
    var res=await fetch('/api/pet/explore-zone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,zoneId:zoneId})});
    var data=await res.json();
    if(data.error)return notify(data.error);
    profile=data.profile;
    addLog(data.message||'Exploration complete.');
    if(data.result&&data.result.bonus&&data.result.bonus.length)data.result.bonus.forEach(function(x){addLog(x)});
    handleRewardResult(data.result&&data.result.xpResult);
    if(data.result&&data.result.learnedMove)showMoveLearned(data.result.learnedMove);
    notify(data.message||'Exploration complete!');
    animateCare('explore');
    triggerPetReaction('explore');
    draw();
  }catch(err){notify('Explore failed: '+err.message)}
}

async function claimQuest(questId){
  try{
    var res=await fetch('/api/pet/claim-quest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,questId:questId})});
    var data=await res.json();
    if(data.error)return notify(data.error);
    profile=data.profile;
    addLog(data.message||'Quest reward claimed!');
    notify(data.message||'Quest claimed!');
    if(data.reward&&data.reward.xpResult)handleRewardResult(data.reward.xpResult);
    floatFx('✅');
    draw();
  }catch(err){notify('Claim failed: '+err.message)}
}

function handleRewardResult(xpResult){
  if(!xpResult)return;
  if(xpResult.leveled){addLog('Level up! Your companion grew stronger.');floatFx('LEVEL!')}
  if(xpResult.learnedMove)showMoveLearned(xpResult.learnedMove);
}

async function useItem(itemId){
  try{
    var beforeStage=activePet()?activePet().stage:null;
    var res=await fetch('/api/pet/use-item',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,itemId:itemId})});
    var data=await res.json();
    if(data.error)return notify(data.error);
    profile=data.profile;
    var pet=activePet();
    addLog('Used '+itemName(itemId)+'.');
    notify('Used '+itemName(itemId)+'.');
    animateItemUse(itemId);
    if(itemId==='berry')triggerPetReaction('feed');
    else if(itemId==='nap_blanket')triggerPetReaction('rest');
    else if(itemId==='soap')triggerPetReaction('clean');
    else triggerPetReaction(pet.stage==='egg'?'egg':'happy');
    if(data.hatched||beforeStage==='egg'&&pet.stage!=='egg'){
      showHatch(pet);
      addLog('A new companion hatched: '+(pet.name||'New pet')+'!');
    }
    draw();
  }catch(err){notify('Use item failed: '+err.message)}
}

    profile=data.profile;
    addLog('Renamed companion to '+name+'.');
    notify('Renamed!');

function comfortPet(){
  var now=Date.now();
  if(now-localState.lastComfort<3000){animateTap();return}
  localState.lastComfort=now;
  animateTap();
  var pet=activePet();
  if(!pet)return;
  if(pet.stage==='egg'){
    addLog('You gently comforted the egg.');
    notify('The egg settled.');
    speak('The egg gives a tiny wiggle. It seems reassured.');
  }else{
    addLog('You bonded with '+(pet.name||'your pet')+'.');
    notify('Bond moment.');
    speak((pet.name||'Your pet')+' leans into your attention.');
  }
  floatFx('♡');
}

function updatePetVisual(pet){
  var img=el('petImg');
  var emojiEl=el('petEmoji');
  var src=petAssetPath(pet);
  img.onload=function(){img.classList.remove('hide');emojiEl.classList.add('hide')};
  img.onerror=function(){img.classList.add('hide');emojiEl.classList.remove('hide')};
  if(img.src.indexOf(src)===-1)img.src=src;
}

function petAssetPath(pet){
  if(!pet)return '';
  if((pet.stage||'egg')==='egg')return eggProgress(pet)>=80?'/assets/pets/egg/egg_cracked.png':'/assets/pets/egg/egg_idle.png';
  var species=pet.species||'egg';
  var stage=pet.stage||'baby';
  var file=stage==='adult'?'adult':stage==='young'||stage==='teen'?'young':'baby';
  return '/assets/pets/'+species+'/'+file+'.png';
}

function itemAssetPath(itemId){return '/assets/items/'+itemId+'.png'}

function normalizePet(pet){
  if(!pet.needs)pet.needs={hunger:80,happiness:70,energy:80,cleanliness:90};
  if(!pet.stats)pet.stats={level:1,xp:0,hp:20,maxHp:20,attack:5,defense:4,speed:5};
  if(!pet.eggTraits)pet.eggTraits={warm:0,cold:0,wet:0,dry:0,light:0,dark:0};
  if(!pet.moves)pet.moves=['tackle'];
  if(pet.affection===undefined)pet.affection=0;
}

function getMood(pet){
  if(pet.stage==='egg'){
    var prog=eggProgress(pet);
    if(prog>=80)return {icon:'✨',label:'Restless'};
    if(prog>=45)return {icon:'💫',label:'Growing'};
    return {icon:'😌',label:'Calm'};
  }
  var n=pet.needs||{};
  if(Number(n.energy||0)<25)return {icon:'😴',label:'Tired'};
  if(Number(n.hunger||0)<25)return {icon:'🍽️',label:'Hungry'};
  var avg=(Number(n.hunger||0)+Number(n.happiness||0)+Number(n.energy||0)+Number(n.cleanliness||0))/4;
  if(avg>=82)return {icon:'😄',label:'Thriving'};
  if(avg>=62)return {icon:'🙂',label:'Content'};
  if(avg>=38)return {icon:'😐',label:'Needy'};
  return {icon:'😟',label:'Struggling'};
}

function setAura(pet){
  var a=el('aura');
  a.className='aura';
  if(pet.stage==='egg'){
    var strongest=strongestTrait(pet.eggTraits||{});
    if(strongest==='warm')a.classList.add('fire');
    else if(strongest==='cold'||strongest==='wet')a.classList.add('water');
    else if(strongest==='light')a.classList.add('nature');
    else if(strongest==='dark')a.classList.add('shadow');
    else if(strongest==='dry')a.classList.add('earth');
  }else{
    if(pet.type==='fire')a.classList.add('fire');
    else if(pet.type==='water')a.classList.add('water');
    else if(pet.type==='nature')a.classList.add('nature');
    else if(pet.type==='shadow')a.classList.add('shadow');
    else if(pet.type==='earth')a.classList.add('earth');
  }
}

function eggInfluenceSummary(pet){
  var traits=pet.eggTraits||{};
  var total=traitTotal(traits);
  var strongest=strongestTrait(traits);
  var pairs=[];
  Object.keys(traits).forEach(function(k){pairs.push({key:k,value:Number(traits[k]||0)})});
  pairs.sort(function(a,b){return b.value-a.value});

  var likely={
    warm:{label:'Fire-leaning',species:['Flarecub','Emberwing','Chompasaur'],hint:'Warmth is shaping a bold, heated companion.'},
    cold:{label:'Water-leaning',species:['Frostfin','Pebblet'],hint:'Cold care is shaping a calm, resilient companion.'},
    wet:{label:'Water/Nature-leaning',species:['Frostfin','Leafbun'],hint:'Moisture is shaping a gentle, adaptable companion.'},
    dry:{label:'Earth/Shadow-leaning',species:['Pebblet','Chompasaur','Shadepup'],hint:'Dry care is shaping something sturdy or mysterious.'},
    light:{label:'Light-touched',species:['Leafbun','Emberwing','Flarecub'],hint:'Light is shaping a bright, energetic companion.'},
    dark:{label:'Shadow-touched',species:['Shadepup','Pebblet'],hint:'Shade is shaping a quiet, mysterious companion.'}
  };

  var top=likely[strongest]||likely.warm;
  var balanced=pairs.length>1&&pairs[0].value-pairs[1].value<=2&&total>=8;

  return {
    strongest:strongest,
    label:balanced?'Balanced aura':top.label,
    hint:balanced?'No single trait fully dominates. This egg may hatch into something less predictable.':top.hint,
    species:balanced?['Any species weighted by care mix'].concat(top.species.slice(0,2)):top.species,
    total:total
  };
}

function eggInfluenceCard(pet){
  var info=eggInfluenceSummary(pet);
  var html='<div class="eggInfluence"><b>Egg Influence: '+escapeHtml(info.label)+'</b>';
  html+='<div class="hint">'+escapeHtml(info.hint)+' Hatch result is influenced by care, but never guaranteed.</div>';
  html+='<div class="tags">';
  info.species.forEach(function(x){html+='<span>'+escapeHtml(x)+'</span>'});
  html+='</div></div>';
  return html;
}

function triggerPetReaction(type){
  var orb=el('petOrb');
  if(!orb)return;

  ['reactHappy','reactExcited','reactFocus','reactSleep','reactExplore','reactEgg'].forEach(function(c){orb.classList.remove(c)});
  void orb.offsetWidth;

  if(type==='feed'||type==='happy'||type==='clean')orb.classList.add('reactHappy');
  else if(type==='play')orb.classList.add('reactExcited');
  else if(type==='train')orb.classList.add('reactFocus');
  else if(type==='rest')orb.classList.add('reactSleep');
  else if(type==='explore')orb.classList.add('reactExplore');
  else if(type==='egg')orb.classList.add('reactEgg');

  setTimeout(function(){
    if(!orb)return;
    ['reactHappy','reactExcited','reactFocus','reactSleep','reactExplore','reactEgg'].forEach(function(c){orb.classList.remove(c)});
  },1700);
}

function setPetPersonalityMotion(pet,mood){
  var orb=el('petOrb');
  clearWanderClasses(orb);
  orb.className='petOrb';

  if(pet.stage==='egg'){
    orb.classList.add('eggStill');

    var strongest=strongestTrait(pet.eggTraits||{});
    if(strongest){
      orb.classList.add('egg'+strongest.charAt(0).toUpperCase()+strongest.slice(1));
    }

    if(eggProgress(pet)>=80)orb.classList.add('curious');
    else orb.classList.add('calm');

    return;
  }

  if(mood.label==='Tired'||mood.label==='Struggling')orb.classList.add('napping');
  else if(pet.personality)orb.classList.add(pet.personality);
  else orb.classList.add('calm');
}

function idleSpeech(pet,mood){
  var name=pet.name||'Your pet';

  if(pet.stage==='egg'){
    var info=eggInfluenceSummary(pet);
    if(eggProgress(pet)>=80)return 'The egg trembles. '+info.label+' energy is close to hatching.';
    return info.hint;
  }

  if(mood.label==='Tired')return name+' curls up and looks ready for a rest.';
  if(mood.label==='Hungry')return name+' watches your bag very carefully. Snack time?';
  if(mood.label==='Struggling')return name+' needs a little extra care today.';

  var lines={
    playful:name+' trots around happily, looking for something fun.',
    lazy:name+' wanders a few steps, then decides that was enough effort.',
    aggressive:name+' paces with focused energy, ready to train.',
    calm:name+' strolls peacefully through the grass.',
    curious:name+' explores the stage, inspecting every little detail.',
    moody:name+' moves around unpredictably, like it has plans of its own.'
  };

  return lines[pet.personality]||name+' watches you closely. Consistent care builds a stronger bond.';
}

function tickPetLife(){
  var pet=activePet();
  if(!pet)return;
  maybeWanderPet(pet);
  if(Math.random()<.28&&!localState.prompt)speak(pet.stage==='egg'?'The egg gives a tiny wiggle.':idleSpeech(pet,getMood(pet)));
}

function maybeWanderPet(pet){
  var now=Date.now();
  if(now-localState.lastWanderAt<5200)return;

  localState.lastWanderAt=now;
  var orb=el('petOrb');

  clearWanderClasses(orb);

  if(pet.stage==='egg'){
    if(eggProgress(pet)>=80){
      orb.classList.add('hop');
      setTimeout(function(){clearWanderClasses(orb)},700);
    }
    return;
  }

  var personality=pet.personality||'calm';

  var choices=['wanderNearLeft','wanderNearRight','wanderLeft','wanderRight','hop',''];
  if(personality==='lazy')choices=['wanderNearLeft','wanderNearRight','','',''];
  if(personality==='playful')choices=['wanderLeft','wanderRight','hop','wanderNearLeft','wanderNearRight'];
  if(personality==='curious')choices=['wanderLeft','wanderRight','wanderNearLeft','wanderNearRight','hop'];
  if(personality==='calm')choices=['wanderNearLeft','wanderNearRight','','wanderLeft','wanderRight'];
  if(personality==='aggressive')choices=['wanderLeft','wanderRight','wanderLeft','wanderRight','hop'];
  if(personality==='moody')choices=['wanderLeft','wanderRight','hop','','wanderNearLeft','wanderNearRight'];

  var c=choices[Math.floor(Math.random()*choices.length)];

  if(c){
    orb.classList.add('walking');
    orb.classList.add(c);
  }

  var duration=c==='hop'?800:2600;

  setTimeout(function(){
    if(orb)clearWanderClasses(orb);
  },duration);
}

function clearWanderClasses(orb){
  if(!orb)return;
  [
    'wanderLeft',
    'wanderRight',
    'wanderNearLeft',
    'wanderNearRight',
    'wanderUp',
    'hop',
    'walking'
  ].forEach(function(c){
    orb.classList.remove(c);
  });
}

function tickLocalPrompt(){
  var pet=activePet();
  if(!pet||pet.stage!=='egg')return;
  if(localState.prompt&&Date.now()-localState.lastPromptAt<120000)return;
  var prompts=[
    {title:'The egg feels chilly.',help:'Warm care may help.',text:'The egg shivers gently. Maybe it needs warmth.'},
    {title:'The shell feels warm.',help:'Cooling care may help.',text:'The egg feels a little hot. Cooling it may calm it.'},
    {title:'The shell looks dry.',help:'Misting may help.',text:'The shell has a dry shimmer. Moisture may help.'},
    {title:'The shell looks damp.',help:'Drying may help.',text:'Tiny droplets gather on the shell. Dry care may help.'},
    {title:'The egg seems sleepy.',help:'Light may help.',text:'The egg grows quiet. A little light might wake it.'},
    {title:'The egg hides from the glow.',help:'Shade may help.',text:'The egg dims its glow. It may want shade.'}
  ];
  if(Math.random()<.55){
    localState.prompt=prompts[Math.floor(Math.random()*prompts.length)];
    localState.lastPromptAt=Date.now();
    addLog(localState.prompt.title);
    draw();
  }
}

function traitTotal(t){return Number(t.warm||0)+Number(t.cold||0)+Number(t.wet||0)+Number(t.dry||0)+Number(t.light||0)+Number(t.dark||0)}
function eggProgress(pet){return Math.min(100,Math.floor(traitTotal(pet.eggTraits||{})/18*100))}
function strongestTrait(t){
  var best='warm', bestVal=-1;
  ['warm','cold','wet','dry','light','dark'].forEach(function(k){
    var v=Number(t[k]||0);
    if(v>bestVal){best=k;bestVal=v}
  });
  return best;
}
function personalityLabel(p){if(!p)return 'Unknown';return String(p).charAt(0).toUpperCase()+String(p).slice(1)}
function itemName(id){return shop[id]?shop[id].name:id}
function careMessage(action){
  var map={warm:'You warmed the egg.',cold:'You cooled the egg.',wet:'You misted the egg.',dry:'You dried the egg.',light:'You gave the egg light.',dark:'You shaded the egg.'};
  return map[action]||'You cared for the egg.';
}

function animateCare(action){
  var p=visiblePetEl();
  p.classList.remove('carePulse');
  void p.offsetWidth;
  p.classList.add('carePulse');
  var icons={warm:'🔥',cold:'❄️',wet:'💧',dry:'🌵',light:'☀️',dark:'🌙',item:'✨',play:'🎾',explore:'🧭',attack:'⚔️',defense:'🛡',speed:'💨'};
  floatFx(icons[action]||'✨');
}

function animateItemUse(itemId){
  flyItem(itemId);
  animateCare('item');
  if(itemId==='berry')floatFx('🍓');
  else if(itemId==='soap')floatFx('🫧');
  else if(itemId==='nap_blanket')floatFx('💤');
  else floatFx('✨');
}

function flyItem(itemId){
  var img=document.createElement('img');
  img.className='flyingItem';
  img.src=itemAssetPath(itemId);
  img.onerror=function(){img.remove()};
  el('petStage').appendChild(img);
  setTimeout(function(){if(img&&img.parentNode)img.parentNode.removeChild(img)},950);
}

function visiblePetEl(){
  var img=el('petImg');
  if(img&&!img.classList.contains('hide'))return img;
  return el('petEmoji');
}

function animateTap(){
  var p=visiblePetEl();
  p.classList.remove('tapPulse');
  void p.offsetWidth;
  p.classList.add('tapPulse');
}

function floatFx(text){
  var f=el('floatingFx');
  f.innerText=text;
  f.classList.remove('floatingFx');
  void f.offsetWidth;
  f.classList.add('floatingFx');
}

function showHatch(pet){
  var img=el('hatchImg');
  var emoji=el('hatchEmoji');
  var src=petAssetPath(pet);
  img.onload=function(){img.classList.remove('hidden');emoji.classList.add('hidden')};
  img.onerror=function(){img.classList.add('hidden');emoji.classList.remove('hidden')};
  img.src=src;
  emoji.innerText=pet.emoji||'🐣';
  hatchTitle.innerText='Your egg hatched!';
  hatchText.innerText=(pet.name||'A new companion')+' joined you. Your care shaped its path through the egg. Personality: '+personalityLabel(pet.personality)+'.';
  hatchOverlay.classList.add('show');
  setTimeout(function(){hatchOverlay.classList.remove('show')},2200);
}

function showMoveLearned(move){
  if(!move)return;
  moveTitle.innerText='New Move Learned!';
  moveText.innerText='Your companion learned '+(move.name||move.id)+'!';
  moveOverlay.classList.add('show');
  addLog('New move learned: '+(move.name||move.id)+'!');
  setTimeout(function(){moveOverlay.classList.remove('show')},2200);
}

function speak(text){el('speech').innerText=text}
function addLog(text){
  logs.push(text);
  if(logs.length>80)logs.shift();
  drawLog();
}
function drawLog(){
  var html='';
  logs.slice(-9).forEach(function(x){html+='• '+escapeHtml(x)+'<br>'});
  el('log').innerHTML=html;
  el('log').scrollTop=el('log').scrollHeight;
}
function notify(text){
  var t=el('toast');
  t.innerText=text;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2200);
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]});
}
function escapeAttr(s){return escapeHtml(s)}

window.addEventListener('message',function(event){
  var msg=event.data||{};
  if(msg.type==='gameSetup'){
    username=getPlayerName();
    el('userBadge').innerText='👤 '+username;
    loadProfile();
  }
  if(msg.type==='petUpdate'&&msg.profile){
    profile=msg.profile;
    addLog('Profile updated.');
    draw();
  }
});

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
