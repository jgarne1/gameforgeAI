<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pet World</title>

<style>
/*
GameForge PetWorld UI Rules:
- Keep pet ALWAYS visible (center stage)
- Actions must be visible WITHOUT scrolling
- Side panels hold systems (quests, explore, training)
- Avoid vertical stacking — use horizontal layout
*/

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
  overflow:hidden;
}

/* ===== MAIN LAYOUT ===== */

.wrapper{
  display:flex;
  height:100vh;
}

/* LEFT PANEL */
.leftPanel{
  width:260px;
  padding:12px;
  background:rgba(0,0,0,0.35);
  border-right:1px solid rgba(255,255,255,0.05);
  overflow-y:auto;
}

/* CENTER STAGE */
.centerStage{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* RIGHT PANEL */
.rightPanel{
  width:320px;
  padding:12px;
  background:rgba(0,0,0,0.35);
  border-left:1px solid rgba(255,255,255,0.05);
  overflow-y:auto;
}

/* ===== PET DISPLAY ===== */

.petContainer{
  position:relative;
  text-align:center;
}

.petImage{
  width:180px;
  height:180px;
  object-fit:contain;
  transition:transform .2s ease;
}

.petImage.bounce{
  transform:translateY(-10px);
}

.petName{
  font-size:20px;
  font-weight:bold;
  margin-top:8px;
}

.petMeta{
  font-size:12px;
  opacity:.7;
}

/* ===== QUICK STATS ===== */

.statRow{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.stat{
  flex:1;
  height:8px;
  border-radius:4px;
  background:#111;
  overflow:hidden;
}

.statFill{
  height:100%;
}

/* ===== BUTTONS ===== */

.btn{
  background:#1f2937;
  border:none;
  padding:10px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  margin-top:6px;
  width:100%;
}

.btn:hover{
  background:#374151;
}

.btn.gold{
  background:#facc15;
  color:#000;
  font-weight:bold;
}

/* ===== PANELS ===== */

.card{
  background:rgba(255,255,255,0.04);
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
}

/* ===== QUESTS ===== */

.quest{
  font-size:13px;
  margin-bottom:6px;
}

/* ===== EXPLORE ===== */

.zone{
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;
  padding:8px;
  margin-bottom:8px;
  cursor:pointer;
}

.zone:hover{
  background:rgba(255,255,255,0.05);
}

/* ===== LOG ===== */

.log{
  height:120px;
  overflow-y:auto;
  font-size:12px;
  opacity:.85;
}

.logEntry{
  margin-bottom:4px;
}

/* ===== FLOAT TEXT ===== */

.floatText{
  position:absolute;
  color:#fff;
  animation:floatUp 1s ease forwards;
  pointer-events:none;
}

@keyframes floatUp{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-40px);}
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- LEFT PANEL -->
  <div class="leftPanel">

    <div class="card">
      <b>Actions</b>
      <button class="btn gold" onclick="play()">Play</button>
      <button class="btn" onclick="train('attack')">Train Attack</button>
      <button class="btn" onclick="train('defense')">Train Defense</button>
      <button class="btn" onclick="train('speed')">Train Speed</button>
    </div>

    <div class="card">
      <b>Inventory</b>
      <div id="inventory"></div>
    </div>

  </div>

  <!-- CENTER -->
  <div class="centerStage">

    <div class="petContainer">
      <img id="petImage" class="petImage">
      <div id="petName" class="petName"></div>
      <div id="petMeta" class="petMeta"></div>

      <div class="statRow">
        <div class="stat"><div id="hunger" class="statFill"></div></div>
        <div class="stat"><div id="happy" class="statFill"></div></div>
        <div class="stat"><div id="energy" class="statFill"></div></div>
        <div class="stat"><div id="clean" class="statFill"></div></div>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="rightPanel">

    <div class="card">
      <b>Daily Quests</b>
      <div id="quests"></div>
    </div>

    <div class="card">
      <b>Explore</b>
      <div id="zones"></div>
    </div>

    <div class="card">
      <b>Log</b>
      <div id="log" class="log"></div>
    </div>

  </div>

</div>

<script>

/*
PetWorld Script Rules:
- Always update UI from server state
- Never assume client is authoritative
- All rewards come from server responses
*/

let USER=localStorage.getItem('gf_user');
let profile=null;
let zonesData={};

function api(url,data){
  return fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({...data,username:USER})
  }).then(r=>r.json());
}

function get(url){
  return fetch(url+'?user='+USER).then(r=>r.json());
}

/* ===== INIT ===== */

async function init(){
  let res=await get('/api/pet/profile');

  profile=res.profile;
  zonesData=res.zones;

  draw();
}

window.onload=init;
  /* ===== HELPERS ===== */

function activePet(){
  if(!profile || !profile.pets)return null;
  return profile.pets[profile.activePetId];
}

function imgPath(pet){
  if(!pet)return '';
  if(pet.stage==='egg'){
    const total=Object.values(pet.eggTraits||{}).reduce((a,b)=>a+Number(b||0),0);
    return total>=14?'/assets/pets/egg/egg_cracked.png':'/assets/pets/egg/egg_idle.png';
  }

  let stage=pet.stage==='adult'?'adult':(pet.stage==='young'||pet.stage==='teen')?'young':'baby';
  return '/assets/pets/'+pet.species+'/'+stage+'.png';
}

function log(msg){
  let box=document.getElementById('log');
  let div=document.createElement('div');
  div.className='logEntry';
  div.textContent='• '+msg;
  box.prepend(div);
}

function floatText(text){
  let wrap=document.querySelector('.petContainer');
  let div=document.createElement('div');
  div.className='floatText';
  div.textContent=text;
  div.style.left='50%';
  div.style.top='20px';
  wrap.appendChild(div);
  setTimeout(()=>div.remove(),1000);
}

function bounce(){
  let img=document.getElementById('petImage');
  img.classList.add('bounce');
  setTimeout(()=>img.classList.remove('bounce'),220);
}

function pct(v){
  return Math.max(0,Math.min(100,Number(v||0)))+'%';
}

function setBar(id,val,color){
  let el=document.getElementById(id);
  el.style.width=pct(val);
  el.style.background=color;
}

function itemName(id){
  const names={
    berry:'Berry',
    sparkle_treat:'Sparkle Treat',
    soap:'Bubble Soap',
    nap_blanket:'Nap Blanket',
    warm_pad:'Warm Pad',
    cool_cloth:'Cool Cloth',
    mist_spray:'Mist Spray',
    dry_towel:'Dry Towel',
    sun_lamp:'Sun Lamp',
    shade_cover:'Shade Cover'
  };
  return names[id]||id;
}

/* ===== DRAW ===== */

function draw(){
  let pet=activePet();
  if(!pet)return;

  document.getElementById('petImage').src=imgPath(pet);
  document.getElementById('petName').textContent=pet.name||'Mystery Egg';

  document.getElementById('petMeta').textContent=
    pet.stage==='egg'
      ? 'Egg • Hatch progress '+eggProgress(pet)+'%'
      : `${pet.type||'pet'} • Lv ${pet.stats.level||1} • ${pet.personality||'mystery'}`;

  if(pet.stage==='egg'){
    setBar('hunger',eggTrait(pet,'warm')*5,'#f97316');
    setBar('happy',eggTrait(pet,'wet')*5,'#38bdf8');
    setBar('energy',eggTrait(pet,'light')*5,'#facc15');
    setBar('clean',eggTrait(pet,'dark')*5,'#a855f7');
  }else{
    setBar('hunger',pet.needs.hunger,'#22c55e');
    setBar('happy',pet.needs.happiness,'#facc15');
    setBar('energy',pet.needs.energy,'#38bdf8');
    setBar('clean',pet.needs.cleanliness,'#a855f7');
  }

  drawInventory();
  drawQuests();
  drawZones();
}

function eggTrait(pet,k){
  return Number((pet.eggTraits||{})[k]||0);
}

function eggProgress(pet){
  let total=Object.values(pet.eggTraits||{}).reduce((a,b)=>a+Number(b||0),0);
  return Math.min(100,Math.floor(total/18*100));
}

function drawInventory(){
  let inv=profile.inventory||{};
  let box=document.getElementById('inventory');
  box.innerHTML='';

  let keys=Object.keys(inv).filter(k=>inv[k]>0);

  if(!keys.length){
    box.innerHTML='<div style="font-size:12px;opacity:.65">No items yet.</div>';
    return;
  }

  keys.forEach(id=>{
    let btn=document.createElement('button');
    btn.className='btn';
    btn.textContent=itemName(id)+' x'+inv[id];
    btn.onclick=()=>useItem(id);
    box.appendChild(btn);
  });
}

function drawQuests(){
  let daily=profile.daily;
  let box=document.getElementById('quests');
  box.innerHTML='';

  if(!daily || !daily.quests || !daily.quests.length){
    box.innerHTML='<div style="font-size:12px;opacity:.65">No quests loaded.</div>';
    return;
  }

  daily.quests.forEach(q=>{
    let div=document.createElement('div');
    div.className='quest';

    let complete=Number(q.progress||0)>=Number(q.target||1);
    let reward=rewardText(q.reward||{});

    div.innerHTML=`
      <b>${escapeHtml(q.title)}</b><br>
      <span>${q.progress||0}/${q.target} • ${escapeHtml(reward)}</span>
    `;

    if(q.claimed){
      let claimed=document.createElement('div');
      claimed.style.opacity='.55';
      claimed.textContent='Claimed';
      div.appendChild(claimed);
    }else if(complete){
      let btn=document.createElement('button');
      btn.className='btn gold';
      btn.textContent='Claim Reward';
      btn.onclick=()=>claimQuest(q.id);
      div.appendChild(btn);
    }

    box.appendChild(div);
  });
}

function rewardText(r){
  let parts=[];
  if(r.coins)parts.push(r.coins+' coins');
  if(r.xp)parts.push(r.xp+' XP');
  if(r.item)parts.push((r.quantity||1)+' '+itemName(r.item));
  return parts.join(', ')||'Reward';
}

function drawZones(){
  let box=document.getElementById('zones');
  box.innerHTML='';

  Object.keys(zonesData||{}).forEach(id=>{
    let z=zonesData[id];
    let div=document.createElement('div');
    div.className='zone';
    div.innerHTML=`
      <b>${escapeHtml(z.name)}</b><br>
      <span style="font-size:12px;opacity:.7">
        Lv ${z.minLevel} • Energy ${z.energyCost}<br>
        ${escapeHtml(z.description||'')}
      </span>
    `;
    div.onclick=()=>exploreZone(id);
    box.appendChild(div);
  });
}

/* ===== ACTIONS ===== */

async function play(){
  let res=await api('/api/pet/play',{});
  handleResponse(res,'Played together!');
}

async function train(stat){
  let res=await api('/api/pet/train',{stat});
  handleResponse(res,'Training complete!');
}

async function exploreZone(zoneId){
  let res=await api('/api/pet/explore-zone',{zoneId});
  handleResponse(res,'Exploration complete!');
}

async function useItem(itemId){
  let res=await api('/api/pet/use-item',{itemId});
  handleResponse(res,'Used '+itemName(itemId)+'.');
}

async function claimQuest(id){
  let res=await api('/api/pet/claim-quest',{questId:id});
  handleResponse(res,'Quest claimed!');
}

/* ===== RESPONSE HANDLING ===== */

function handleResponse(res,fallback){
  if(!res){
    log('No server response.');
    return;
  }

  if(res.error){
    log(res.error);
    floatText('!');
    return;
  }

  if(res.profile){
    profile=res.profile;
  }

  let msg=res.message||fallback;
  log(msg);
  floatText(rewardFloat(res));
  bounce();

  if(res.result && res.result.bonus && res.result.bonus.length){
    res.result.bonus.forEach(b=>log(b));
  }

  if(res.result && res.result.learnedMove){
    log('New move learned: '+res.result.learnedMove.name+'!');
    floatText('✨ '+res.result.learnedMove.name);
  }

  if(res.reward && res.reward.xpResult && res.reward.xpResult.learnedMove){
    log('New move learned: '+res.reward.xpResult.learnedMove.name+'!');
    floatText('✨ '+res.reward.xpResult.learnedMove.name);
  }

  draw();
}

function rewardFloat(res){
  if(res.result){
    if(res.result.kind==='coins')return '+'+res.result.amount+' coins';
    if(res.result.kind==='item')return '+'+(res.result.quantity||1)+' '+itemName(res.result.item);
    if(res.result.kind==='xp')return '+'+res.result.amount+' XP';
    if(res.result.kind==='move')return '✨ Move';
  }

  if(res.reward){
    if(res.reward.coins)return '+'+res.reward.coins+' coins';
    if(res.reward.items && res.reward.items.length)return '+ item';
  }

  return '✨';
}

/* ===== SAFE TEXT ===== */

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

</script>
</body>
</html>
