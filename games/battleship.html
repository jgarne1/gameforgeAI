<!DOCTYPE html>
<html>
<head>
<title>Battleship</title>
<style>
:root{--bg:#071827;--panel:#0f2a3d;--line:#31556e;--blue:#38bdf8;--hit:#ef4444;--miss:#e5e7eb;--ship:#64748b;--gold:#facc15;--green:#22c55e}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#123b55,#071827);color:white;text-align:center;overflow:hidden}
.wrap{height:650px;padding:10px;display:grid;grid-template-rows:auto auto 1fr auto;gap:8px;position:relative}
.top,.status,.controls,.log{background:rgba(15,42,61,.92);border:1px solid var(--line);border-radius:16px;padding:9px;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.top{display:flex;justify-content:space-between;align-items:center}
h2{margin:0}
button{padding:8px 11px;border-radius:10px;border:1px solid #94a3b8;background:#f8fafc;color:#111;font-weight:bold;cursor:pointer}
button.primary{background:var(--blue);border-color:var(--blue)}
button.gold{background:var(--gold);border-color:var(--gold)}
button.good{background:var(--green);border-color:var(--green)}
button:disabled{opacity:.45;cursor:not-allowed}
.boards{display:grid;grid-template-columns:1fr 1fr;gap:10px;min-height:0}
.boardPanel{background:rgba(15,42,61,.8);border:1px solid var(--line);border-radius:18px;padding:10px;min-height:0}
.boardTitle{font-weight:bold;margin-bottom:5px}
.grid{display:grid;grid-template-columns:repeat(10,30px);grid-template-rows:repeat(10,30px);gap:3px;justify-content:center}
.cell{width:30px;height:30px;border-radius:7px;background:#0b5f82;border:1px solid rgba(255,255,255,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:15px;position:relative}
.cell:hover{outline:2px solid var(--gold)}
.cell.ship{background:var(--ship)}
.cell.hit{background:var(--hit)}
.cell.miss{background:rgba(229,231,235,.9);color:#111}
.cell.sunk{background:#7f1d1d}
.cell.disabled{cursor:not-allowed;opacity:.75}
.cell.lastShot{outline:3px solid var(--gold);animation:pulseShot .9s ease-in-out 3}
.cell.lastShot:after{content:"";position:absolute;inset:-5px;border:3px solid var(--gold);border-radius:10px;animation:ripple .9s ease-in-out 3;pointer-events:none}
@keyframes pulseShot{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes ripple{0%{opacity:.9;transform:scale(.8)}100%{opacity:0;transform:scale(1.45)}}
.turnFlash{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(250,204,21,.96);color:#111;border:4px solid white;border-radius:22px;padding:22px 36px;font-size:34px;font-weight:900;z-index:50;box-shadow:0 18px 40px rgba(0,0,0,.45);pointer-events:none;opacity:0}
.turnFlash.show{animation:turnPop 1.8s ease forwards}
@keyframes turnPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.9)}}
.statusMain{font-size:18px;font-weight:bold}
.muted{font-size:12px;color:#cbd5e1}
.controls{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap}
.log{height:62px;overflow:auto;text-align:left;font-size:13px;background:#fffbea;color:#1f2937}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(56,189,248,.18);border:1px solid rgba(56,189,248,.35);font-size:12px}
@media(max-width:800px){.grid{grid-template-columns:repeat(10,24px);grid-template-rows:repeat(10,24px)}.cell{width:24px;height:24px}.boards{gap:6px}.turnFlash{font-size:26px;padding:18px 28px}}
</style>
</head>

<body>
<div class="wrap">
  <div id="turnFlash" class="turnFlash">YOUR TURN</div>

  <div class="top">
    <h2>Battleship</h2>
    <div>
      <span id="meLabel" class="badge"></span>
      <button class="gold" onclick="newGame(true)">New Game</button>
    </div>
  </div>

  <div class="status">
    <div id="statusMain" class="statusMain">Loading players...</div>
    <div id="statusHelp" class="muted">Sink all enemy ships.</div>
  </div>

  <div class="boards">
    <div class="boardPanel">
      <div class="boardTitle">Your Fleet</div>
      <div id="myBoard" class="grid"></div>
    </div>

    <div class="boardPanel">
      <div class="boardTitle">Enemy Waters</div>
      <div id="enemyBoard" class="grid"></div>
    </div>
  </div>

  <div>
    <div class="controls">
      <span id="fleetStatus" class="badge"></span>
      <button id="placeBtn" class="primary" onclick="autoPlaceAndSync()">Auto Place Ships</button>
    </div>
    <div id="log" class="log"></div>
  </div>
</div>

<script>
const GAME_META={id:'battleship',name:'Battleship',minPlayers:2,maxPlayers:2,seats:2};

const SIZE=10;
const SHIPS=[
  {name:'Carrier',size:5},
  {name:'Battleship',size:4},
  {name:'Cruiser',size:3},
  {name:'Submarine',size:3},
  {name:'Destroyer',size:2}
];

let players=[];
let mySeat=null;
let state=null;
let lastSeenTurn=null;

function el(id){
  return document.getElementById(id);
}

window.onerror=function(msg){
  el('statusMain').innerText='Game error: '+msg;
  el('statusHelp').innerText='Check the browser console for details.';
};

function receiveSetup(setupPlayers,setupSeat){
  if(Array.isArray(setupPlayers)&&setupPlayers.length){
    players=setupPlayers.slice(0,2).map(p=>({
      seat:p.seat,
      name:p.name||('Seat '+(p.seat+1))
    }));
  }

  mySeat=setupSeat;

  if(players.length<2){
    el('statusMain').innerText='Waiting for 2 players...';
    el('statusHelp').innerText='Both seats must be filled before starting Battleship.';
    drawEmptyBoards();
    updatePlaceButton();
    return;
  }

  if(!state){
    state=fresh();
  }

  ensurePlayerState();
  draw();
}

function fresh(){
  let boards={};
  let shots={};
  let ready={};

  players.forEach(p=>{
    boards[p.seat]=emptyBoard();
    shots[p.seat]=[];
    ready[p.seat]=false;
  });

  return {
    boards,
    shots,
    ready,
    turn:players[0].seat,
    phase:'setup',
    winner:null,
    lastShot:null,
    log:['New game started. Place your fleet.']
  };
}

function emptyBoard(){
  return Array.from({length:SIZE},()=>Array(SIZE).fill(null));
}

function ensurePlayerState(){
  if(!state.boards)state.boards={};
  if(!state.shots)state.shots={};
  if(!state.ready)state.ready={};

  players.forEach(p=>{
    if(!state.boards[p.seat])state.boards[p.seat]=emptyBoard();
    if(!state.shots[p.seat])state.shots[p.seat]=[];
    if(state.ready[p.seat]===undefined)state.ready[p.seat]=false;
  });
}

function drawEmptyBoards(){
  el('myBoard').innerHTML='';
  el('enemyBoard').innerHTML='';

  for(let i=0;i<SIZE*SIZE;i++){
    let a=document.createElement('div');
    a.className='cell disabled';
    el('myBoard').appendChild(a);

    let b=document.createElement('div');
    b.className='cell disabled';
    el('enemyBoard').appendChild(b);
  }

  el('fleetStatus').innerText='Waiting for players';
  el('log').innerHTML='';
}

function autoPlaceAndSync(){
  if(!state||state.phase!=='setup'||state.ready[mySeat]||state.winner!==null)return;

  state.boards[mySeat]=placeFleet();
  state.ready[mySeat]=true;

  if(players.every(p=>state.ready[p.seat])){
    state.phase='battle';
    add('Both fleets are ready. Battle begins!');
  }else{
    add(name(mySeat)+' placed their fleet.');
  }

  draw();
  sync();
}

function placeFleet(){
  let board=emptyBoard();

  SHIPS.forEach(ship=>{
    let placed=false;

    while(!placed){
      let horizontal=Math.random()<.5;
      let r=Math.floor(Math.random()*SIZE);
      let c=Math.floor(Math.random()*SIZE);

      if(canPlace(board,r,c,ship.size,horizontal)){
        for(let i=0;i<ship.size;i++){
          let rr=r+(horizontal?0:i);
          let cc=c+(horizontal?i:0);
          board[rr][cc]={ship:ship.name,size:ship.size};
        }
        placed=true;
      }
    }
  });

  return board;
}

function canPlace(board,r,c,size,horizontal){
  for(let i=0;i<size;i++){
    let rr=r+(horizontal?0:i);
    let cc=c+(horizontal?i:0);

    if(rr<0||rr>=SIZE||cc<0||cc>=SIZE)return false;
    if(board[rr][cc])return false;
  }

  return true;
}

function draw(){
  if(!state||players.length<2){
    drawEmptyBoards();
    return;
  }

  ensurePlayerState();

  let enemy=opponentSeat();

  el('meLabel').innerText=mySeat===null||mySeat===undefined?'Watching':'You are '+name(mySeat);

  if(state.winner!==null){
    el('statusMain').innerText=name(state.winner)+' wins!';
    el('statusHelp').innerText='Start a new game to play again.';
  }else if(state.phase==='setup'){
    el('statusMain').innerText='Fleet Setup';
    el('statusHelp').innerText=state.ready[mySeat]
      ? 'Your fleet is locked. Waiting for opponent to place ships.'
      : 'Click Auto Place Ships to lock your fleet.';
  }else{
    el('statusMain').innerText='Current Turn: '+name(state.turn);
    el('statusHelp').innerText=state.turn===mySeat
      ? 'Fire on the enemy grid.'
      : 'Waiting for '+name(state.turn)+'.';

    if(state.turn===mySeat && lastSeenTurn!==mySeat){
      showTurnFlash();
    }
  }

  lastSeenTurn=state.turn;

  el('fleetStatus').innerText=players
    .map(p=>name(p.seat)+': '+(state.ready[p.seat]?'Ready':'Placing'))
    .join(' | ');

  updatePlaceButton();
  drawMyBoard();
  drawEnemyBoard(enemy);
  drawLog();
}

function showTurnFlash(){
  let f=el('turnFlash');
  f.classList.remove('show');
  void f.offsetWidth;
  f.classList.add('show');
}

function updatePlaceButton(){
  let btn=el('placeBtn');
  if(!btn)return;

  btn.disabled=!state||state.phase!=='setup'||state.ready[mySeat]||state.winner!==null||players.length<2;

  if(!state||players.length<2){
    btn.innerText='Auto Place Ships';
  }else if(state.ready[mySeat]){
    btn.innerText='Fleet Locked';
  }else{
    btn.innerText='Auto Place Ships';
  }
}

function drawMyBoard(){
  el('myBoard').innerHTML='';

  let board=state.boards[mySeat]||emptyBoard();
  let enemyShots=state.shots[opponentSeat()]||[];

  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      let cell=document.createElement('div');
      let shot=hasShot(enemyShots,r,c);
      let hasShip=!!board[r][c];
      let isLast=state.lastShot&&state.lastShot.target===mySeat&&state.lastShot.r===r&&state.lastShot.c===c;

      cell.className='cell disabled '+
        (hasShip?'ship ':'')+
        (shot&&hasShip?'hit ':'')+
        (shot&&!hasShip?'miss ':'')+
        (isLast?'lastShot ':'');

      cell.innerText=shot&&hasShip?'✕':shot?'•':'';

      el('myBoard').appendChild(cell);
    }
  }
}

function drawEnemyBoard(enemy){
  el('enemyBoard').innerHTML='';

  let myShots=state.shots[mySeat]||[];
  let enemyBoardData=state.boards[enemy]||emptyBoard();

  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      let cell=document.createElement('div');
      let shot=hasShot(myShots,r,c);
      let hit=shot&&enemyBoardData[r][c];
      let miss=shot&&!enemyBoardData[r][c];
      let isLast=state.lastShot&&state.lastShot.shooter===mySeat&&state.lastShot.r===r&&state.lastShot.c===c;

      cell.className='cell '+
        (hit?'hit ':'')+
        (miss?'miss ':'')+
        (state.phase!=='battle'||state.turn!==mySeat||state.winner!==null||shot?'disabled ':'')+
        (isLast?'lastShot ':'');

      cell.innerText=hit?'✕':miss?'•':'';

      cell.onclick=()=>fire(r,c);

      el('enemyBoard').appendChild(cell);
    }
  }
}

function fire(r,c){
  if(!state||state.phase!=='battle'||state.turn!==mySeat||state.winner!==null)return;

  let shots=state.shots[mySeat];
  if(hasShot(shots,r,c))return;

  let enemy=opponentSeat();
  let target=state.boards[enemy][r][c];

  shots.push({r,c});
  state.lastShot={shooter:mySeat,target:enemy,r,c,hit:!!target};

  if(target){
    add(name(mySeat)+' hit '+name(enemy)+'\'s '+target.ship+'!');
  }else{
    add(name(mySeat)+' missed.');
  }

  if(allShipsSunk(enemy)){
    state.winner=mySeat;
    add(name(mySeat)+' sank the final ship and wins!');
  }else{
    state.turn=enemy;
  }

  draw();
  sync();
}

function allShipsSunk(seat){
  let board=state.boards[seat];
  let incoming=state.shots[opponentOf(seat)]||[];

  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]&&!hasShot(incoming,r,c))return false;
    }
  }

  return true;
}

function opponentSeat(){
  let other=players.find(p=>p.seat!==mySeat);
  return other?other.seat:null;
}

function opponentOf(seat){
  let other=players.find(p=>p.seat!==seat);
  return other?other.seat:null;
}

function hasShot(shots,r,c){
  return (shots||[]).some(s=>s.r===r&&s.c===c);
}

function newGame(sendIt){
  if(players.length<2)return;

  state=fresh();
  lastSeenTurn=null;
  draw();

  if(sendIt)sync();
}

function sync(){
  window.sendMove({type:'state',state});
}

window.sendMove=function(data){
  parent.postMessage({type:'move',data:data},'*');
};

window.onMove=function(data){
  if(!data)return;

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
    return;
  }

  if(data.type==='state'){
    state=data.state;
    ensurePlayerState();
    draw();
  }
};

window.addEventListener('message',function(event){
  let data=event.data||{};

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
  }

  if(data.type==='gameMove'&&window.onMove){
    window.onMove(data.data);
  }
});

function drawLog(){
  el('log').innerHTML=state.log.slice(-6).map(x=>'• '+escapeHtml(x)).join('<br>');
  el('log').scrollTop=el('log').scrollHeight;
}

function add(t){
  state.log.push(t);
  if(state.log.length>50)state.log.shift();
}

function name(seat){
  let p=players.find(x=>x.seat===seat);
  return p?p.name:'Seat '+(Number(seat)+1);
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[c]));
}

drawEmptyBoards();
receiveSetup(window.GAME_PLAYERS||[],window.GAME_MY_SEAT);

setTimeout(function(){
  if((!players||!players.length)&&window.GAME_PLAYERS){
    receiveSetup(window.GAME_PLAYERS,window.GAME_MY_SEAT);
  }
},150);
</script>


<!-- ===== GameForge Standard Compatibility HUD v1 =====
     Safe overlay: does not own chat and does not change gameplay logic.
     Reads GAME_CONTEXT/gameSetup payloads from parent and displays room, players, seats, and active pets when provided.
-->
<style id="gfStandardHudStyle">
  :root{
    --gf-hud-bg:rgba(2,6,23,.72);
    --gf-hud-panel:rgba(15,23,42,.82);
    --gf-hud-line:rgba(56,189,248,.30);
    --gf-hud-text:#e5e7eb;
    --gf-hud-muted:#94a3b8;
    --gf-hud-accent:#38bdf8;
    --gf-hud-gold:#facc15;
  }
  #gfStandardHud{
    position:fixed;
    left:10px;
    right:10px;
    top:8px;
    z-index:99990;

    box-shadow:0 14px 38px rgba(0,0,0,.24);

  }
  #gfStandardHud .gfHudTitle{
    display:flex;
    flex-direction:column;
    min-width:120px;
    max-width:210px;
  }
  #gfStandardHud .gfHudTitle b{
    font-size:14px;
    letter-spacing:.2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #gfStandardHud .gfHudTitle span{
    color:var(--gf-hud-muted);
    font-size:11px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #gfStandardHud .gfHudPlayers{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:7px;
    min-width:0;
    overflow:hidden;
  }
  #gfStandardHud .gfHudPlayer{
    display:flex;
    align-items:center;
    gap:7px;
    min-width:0;
    max-width:210px;
    padding:6px 8px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.22);
    background:rgba(2,6,23,.55);
  }
  #gfStandardHud .gfHudPlayer.me{
    border-color:rgba(56,189,248,.65);
    box-shadow:0 0 16px rgba(56,189,248,.14);
  }
  #gfStandardHud .gfHudPet{
    width:28px;
    height:28px;
    border-radius:10px;
    object-fit:contain;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    flex:0 0 auto;
  }
  #gfStandardHud .gfHudAvatar{
    width:28px;
    height:28px;
    border-radius:10px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,rgba(56,189,248,.22),rgba(124,58,237,.20));
    border:1px solid rgba(255,255,255,.08);
    flex:0 0 auto;
  }
  #gfStandardHud .gfHudInfo{
    display:flex;
    flex-direction:column;
    min-width:0;
    line-height:1.1;
  }
  #gfStandardHud .gfHudName{
    font-size:12px;
    font-weight:900;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #gfStandardHud .gfHudSub{
    color:var(--gf-hud-muted);
    font-size:10px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  @media(max-width:700px){
    #gfStandardHud{left:6px;right:6px;top:6px;padding:7px;border-radius:15px;gap:6px}
    #gfStandardHud .gfHudTitle{min-width:88px;max-width:120px}
    #gfStandardHud .gfHudPlayer{max-width:120px;padding:5px 6px;gap:5px}
    #gfStandardHud .gfHudPet,#gfStandardHud .gfHudAvatar{width:24px;height:24px;border-radius:8px}
    #gfStandardHud .gfHudName{font-size:11px}
    #gfStandardHud .gfHudSub{font-size:9px}
  }
</style>
<script id="gfStandardHudScript">
(function(){
  var GAME_TITLE = 'Battleship';
  window.GAME_CONTEXT = window.GAME_CONTEXT || {username:'',roomId:'',players:[],seats:[],mySeat:-1,activePets:{}};

  function esc(s){
    return String(s==null?'':s).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});
  }

  function normPlayers(input){
    var list = input || window.GAME_PLAYERS || [];
    return (Array.isArray(list)?list:[]).map(function(p,i){
      if(typeof p==='string')return {name:p,seat:i};
      return {name:p&&p.name?p.name:('Seat '+(i+1)), seat:(p&&p.seat!=null?p.seat:i)};
    });
  }

  function absorbContext(raw){
    var data = raw || {};
    if(data.data) data = data.data;
    var ctx = window.GAME_CONTEXT || {};
    ctx.username = data.username || data.me || ctx.username || '';
    ctx.roomId = data.roomId || data.room || data.roomCode || ctx.roomId || '';
    ctx.players = normPlayers(data.players || ctx.players);
    ctx.seats = data.seats || ctx.seats || [];
    ctx.mySeat = data.mySeat!=null ? Number(data.mySeat) : (window.GAME_MY_SEAT!=null ? Number(window.GAME_MY_SEAT) : (ctx.mySeat!=null?ctx.mySeat:-1));
    ctx.activePets = data.activePets || ctx.activePets || {};
    window.GAME_CONTEXT = ctx;
    render();
  }

  function normalizePetMap(raw){
    var map={};
    if(!raw)return map;
    if(Array.isArray(raw)){
      raw.forEach(function(item){
        if(!item)return;
        var name=item.username||item.user||item.owner||item.player||item.name;
        if(name){ map[name]=item; map[String(name).toLowerCase()]=item; }
        if(item.seat!=null)map['seat:'+item.seat]=item;
      });
      return map;
    }
    Object.keys(raw).forEach(function(k){
      map[k]=raw[k];
      map[String(k).toLowerCase()]=raw[k];
    });
    return map;
  }

  function playerPet(player){
    var ctx=window.GAME_CONTEXT||{};
    var name=typeof player==='string'?player:(player&&player.name)||'';
    var seat=typeof player==='object'&&player?player.seat:null;
    var pets=normalizePetMap(ctx.activePets || ctx.pets || ctx.playerPets || {});
    return pets[name] || pets[String(name||'').toLowerCase()] || (seat!=null?pets['seat:'+seat]:null) || ctx.activePet || ctx.pet || null;
  }

  function petImage(pet){
    if(!pet)return '';
    if(typeof pet==='string')return pet;
    return pet.image || pet.img || pet.sprite || pet.photo || pet.icon || pet.src || pet.imageUrl || pet.url || '';
  }

  function render(){
    var hud=document.getElementById('gfStandardHud');
    if(!hud){
      hud=document.createElement('div');
      hud.id='gfStandardHud';
      document.body.appendChild(hud);
    }
    var ctx=window.GAME_CONTEXT||{};
    var players=normPlayers(ctx.players);
    if(!players.length && window.GAME_PLAYERS) players=normPlayers(window.GAME_PLAYERS);
    var room=ctx.roomId || '';
    var mySeat=ctx.mySeat;
    var playerHtml=players.slice(0,4).map(function(p){
      var pet=playerPet(p);
      var img=petImage(pet);
      var petName=pet && pet.name ? pet.name : '';
      var seatText='Seat '+(Number(p.seat)+1);
      var isMe=(Number(p.seat)===Number(mySeat)) || (ctx.username && p.name===ctx.username);
      return '<div class="gfHudPlayer '+(isMe?'me':'')+'">'+
        (img?'<img class="gfHudPet" src="'+esc(img)+'" alt="">':'<span class="gfHudAvatar">🎮</span>')+
        '<span class="gfHudInfo"><span class="gfHudName">'+esc(p.name||'Player')+'</span><span class="gfHudSub">'+esc(seatText+(petName?' · '+petName:''))+'</span></span>'+ 
      '</div>';
    }).join('');
    if(!playerHtml){
      playerHtml='<div class="gfHudPlayer"><span class="gfHudAvatar">🎮</span><span class="gfHudInfo"><span class="gfHudName">Solo / Local</span><span class="gfHudSub">Waiting for room context</span></span></div>';
    }
    hud.innerHTML='<div class="gfHudTitle"><b>'+esc(GAME_TITLE)+'</b><span>'+(room?'Room '+esc(room):'GameForge table')+'</span></div><div class="gfHudPlayers">'+playerHtml+'</div>';
  }

  window.addEventListener('message',function(e){
    var msg=e.data||{};
    if(msg.type==='GAME_CONTEXT' || msg.type==='gameSetup' || msg.type==='gameContext'){
      absorbContext(msg);
    }
  });

  window.addEventListener('load',function(){
    absorbContext({});
    try{ parent.postMessage({type:'gameReady'},'*'); }catch(e){}
  });

  setTimeout(function(){absorbContext({});},250);
  setTimeout(function(){absorbContext({});},900);
})();
</script>

</body>
</html>
