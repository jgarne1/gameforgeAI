<!DOCTYPE html>
<html>
<head>
<title>UNO Royale</title>
<style>
:root{
  --bg:#050816;--panel:#101827;--panel2:#172033;--line:rgba(255,255,255,.14);
  --red:#ef4444;--yellow:#facc15;--green:#22c55e;--blue:#3b82f6;
  --text:#f8fafc;--muted:#cbd5e1;--gold:#facc15;
}
*{box-sizing:border-box}
body{
  margin:0;font-family:Inter,Arial,Helvetica,sans-serif;color:var(--text);
  background:
    radial-gradient(circle at 20% 10%,rgba(59,130,246,.35),transparent 28%),
    radial-gradient(circle at 80% 12%,rgba(250,204,21,.20),transparent 25%),
    radial-gradient(circle at 50% 100%,rgba(34,197,94,.22),transparent 30%),
    linear-gradient(135deg,#050816,#0f172a 45%,#111827);
  overflow:hidden;text-align:center;
}
.wrap{height:650px;padding:10px;display:grid;grid-template-rows:auto 1fr auto;gap:8px}
.top,.table,.controls,.log{
  background:linear-gradient(180deg,rgba(15,23,42,.94),rgba(2,6,23,.92));
  border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 45px rgba(0,0,0,.36)
}
.top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
.title{font-size:24px;font-weight:1000;letter-spacing:.5px}
.title span{color:var(--gold)}
button{
  padding:9px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.18);
  cursor:pointer;font-weight:900;color:white;background:rgba(255,255,255,.10);
  box-shadow:0 8px 18px rgba(0,0,0,.25)
}
button.primary{background:linear-gradient(135deg,#38bdf8,#2563eb)}
button.gold{background:linear-gradient(135deg,#fde047,#f59e0b);color:#111}
button.red{background:#ef4444}
button.yellow{background:#facc15;color:#111}
button.green{background:#22c55e}
button.blue{background:#3b82f6}
button:disabled{opacity:.42;cursor:not-allowed}
.table{
  position:relative;overflow:hidden;min-height:405px;
  background:
    radial-gradient(circle at center,rgba(34,197,94,.35),transparent 28%),
    radial-gradient(ellipse at center,#14532d,#052e16 68%,#03170d);
}
.table:before{
  content:"";position:absolute;inset:26px;border:2px solid rgba(255,255,255,.09);
  border-radius:42%;pointer-events:none;
}
.center{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:390px;padding:14px;border-radius:24px;
  background:rgba(2,6,23,.34);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(6px)
}
.status{font-size:18px;font-weight:1000;margin-bottom:4px}
.muted{font-size:12px;color:var(--muted)}
.badge{
  display:inline-block;padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.20);font-size:12px;font-weight:800
}
.pileRow{display:flex;justify-content:center;align-items:center;gap:26px;margin:10px 0}
.card{
  display:inline-flex;align-items:center;justify-content:center;width:64px;height:94px;
  border-radius:14px;border:3px solid rgba(255,255,255,.95);margin:4px;
  font-weight:1000;font-size:15px;box-shadow:0 9px 0 rgba(0,0,0,.35),0 18px 28px rgba(0,0,0,.26);
  cursor:pointer;color:white;position:relative;overflow:hidden;transition:.15s transform,.15s filter
}
.card:after{
  content:"";position:absolute;inset:13px 8px;border-radius:50%;
  border:2px solid rgba(255,255,255,.65);transform:rotate(-14deg)
}
.card.small{width:28px;height:42px;font-size:9px;border-radius:7px;margin:1px;border-width:2px;box-shadow:0 4px 0 rgba(0,0,0,.35)}
.card.back{background:linear-gradient(135deg,#111827,#2563eb 48%,#ef4444);color:white}
.card.red{background:linear-gradient(135deg,#fb7185,#dc2626)}
.card.yellow{background:linear-gradient(135deg,#fde047,#eab308);color:#111}
.card.green{background:linear-gradient(135deg,#4ade80,#16a34a)}
.card.blue{background:linear-gradient(135deg,#60a5fa,#2563eb)}
.card.wild{background:conic-gradient(from 45deg,#ef4444,#facc15,#22c55e,#3b82f6,#ef4444)}
.card.playable{outline:4px solid var(--gold);transform:translateY(-8px) scale(1.03);filter:drop-shadow(0 0 12px rgba(250,204,21,.55))}
.card.playable:hover{transform:translateY(-12px) scale(1.08)}
.label{position:absolute;top:5px;left:6px;font-size:10px;z-index:2;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.big{font-size:27px;z-index:2;text-shadow:0 2px 3px rgba(0,0,0,.55)}
.player{
  position:absolute;background:rgba(2,6,23,.46);border:1px solid rgba(255,255,255,.18);
  border-radius:18px;padding:8px;min-width:155px;box-shadow:0 10px 25px rgba(0,0,0,.24)
}
.player.turn{outline:3px solid var(--gold);box-shadow:0 0 28px rgba(250,204,21,.32)}
.p0{left:50%;bottom:8px;transform:translateX(-50%);width:86%;max-width:840px}
.p1{left:8px;top:86px}
.p2{left:50%;top:8px;transform:translateX(-50%)}
.p3{right:8px;top:86px}
.handArea{
  background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.15);
  border-radius:16px;padding:7px;min-height:106px;overflow:hidden
}
.controls{padding:8px;display:flex;justify-content:center;gap:8px;align-items:center;flex-wrap:wrap}
.log{height:58px;overflow:auto;text-align:left;background:#fffbea;color:#1f2937;padding:8px;font-size:13px}
#colorPicker{display:none;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title"><span>UNO</span> ROYALE</div>
    <div>
      <span id="meLabel" class="badge"></span>
      <span id="hostLabel" class="badge"></span>
      <button class="gold" onclick="requestNewGame()">New Game</button>
    </div>
  </div>

  <div class="table">
    <div id="playersLayer"></div>

    <div class="center">
      <div id="status" class="status">Loading players...</div>
      <div id="hint" class="muted">Match color, number, or symbol.</div>

      <div class="pileRow">
        <div>
          <div class="muted">Draw Pile</div>
          <div id="drawPile" class="card back" onclick="drawCardAction()">UNO</div>
          <div id="deckCount" class="muted"></div>
        </div>
        <div>
          <div class="muted">Discard</div>
          <div id="discardPile"></div>
          <div id="directionLabel" class="muted"></div>
        </div>
      </div>

      <div id="colorPicker">
        <div class="muted">Choose wild color</div>
        <button class="red" onclick="chooseColor('red')">Red</button>
        <button class="yellow" onclick="chooseColor('yellow')">Yellow</button>
        <button class="green" onclick="chooseColor('green')">Green</button>
        <button class="blue" onclick="chooseColor('blue')">Blue</button>
      </div>
    </div>
  </div>

  <div>
    <div class="controls">
      <button id="drawBtn" class="primary" onclick="drawCardAction()">Draw Card</button>
      <button id="passBtn" onclick="passTurn()">Pass</button>
      <span id="currentColorLabel" class="badge"></span>
    </div>
    <div id="log" class="log"></div>
  </div>
</div>

<script>
const GAME_META={id:'uno',name:'UNO Royale',minPlayers:2,maxPlayers:4,seats:4};
const COLORS=['red','yellow','green','blue'];

let players=[];
let mySeat=null;
let hostSeat=null;
let state=null;
let pendingWildIndex=null;
let lastSeenVersion=0;

function el(id){return document.getElementById(id);}
function isHost(){return mySeat!==null && mySeat===hostSeat;}
function name(seat){let p=players.find(x=>x.seat===seat);return p?p.name:'Seat '+(Number(seat)+1);}
function setStatus(a,b){el('status').innerText=a;el('hint').innerText=b||'';}

window.onerror=function(msg){setStatus('Game error: '+msg,'Check console for details.');};

function receiveSetup(setupPlayers,setupSeat){
  if(Array.isArray(setupPlayers)&&setupPlayers.length){
    players=setupPlayers.slice(0,4).map(p=>({seat:Number(p.seat),name:p.name||('Seat '+(Number(p.seat)+1))}))
      .sort((a,b)=>a.seat-b.seat);
  }

  if(setupSeat!==undefined && setupSeat!==null)mySeat=Number(setupSeat);
  hostSeat=players.length?Math.min(...players.map(p=>p.seat)):null;

  el('meLabel').innerText=mySeat!==null?'You: '+name(mySeat):'Spectator';
  el('hostLabel').innerText=hostSeat!==null?'Host: '+name(hostSeat):'';

  if(players.length<2){
    setStatus('Waiting for 2 players...','UNO needs at least 2 seated players.');
    drawEmpty();
    return;
  }

  if(!state && isHost()){
    state=fresh();
    publishState('host-start');
  }

  draw();
}

function fresh(){
  let deck=buildDeck(); shuffle(deck);
  let hands={};
  players.forEach(p=>hands[p.seat]=deck.splice(0,7));

  let first=deck.pop();
  while(first.wild||first.action){
    deck.unshift(first); shuffle(deck); first=deck.pop();
  }

  return {
    gameId:Date.now()+'-'+Math.random().toString(16).slice(2),
    version:1,
    deck,discard:[first],hands,
    turn:players[0].seat,direction:1,currentColor:first.color,
    pendingDraw:0,drewThisTurn:false,winner:null,
    log:['New UNO Royale game started.']
  };
}

function buildDeck(){
  let deck=[];
  COLORS.forEach(color=>{
    deck.push({color,value:'0'});
    for(let i=1;i<=9;i++){deck.push({color,value:String(i)});deck.push({color,value:String(i)});}
    ['skip','reverse','draw2'].forEach(v=>{
      deck.push({color,value:v,action:true});deck.push({color,value:v,action:true});
    });
  });
  for(let i=0;i<4;i++){
    deck.push({color:'wild',value:'wild',wild:true});
    deck.push({color:'wild',value:'draw4',wild:true,draw4:true});
  }
  return deck;
}

function draw(){
  if(!state||players.length<2){
    if(players.length>=2&&!isHost())setStatus('Syncing table...','Waiting for host game state.');
    drawEmpty(); return;
  }

  ensureState();
  drawPlayers(); drawCenter(); drawControls(); drawLog();

  if(state.winner!==null)setStatus(name(state.winner)+' wins!','Start a new game to play again.');
  else if(state.turn===mySeat){
    if(state.pendingDraw>0)setStatus('Your Turn — Draw '+state.pendingDraw,'Penalty cards must be drawn.');
    else setStatus('Your Turn','Play a glowing card or draw.');
  }else setStatus('Current Turn: '+name(state.turn),'Watching the shared discard pile.');
}

function drawEmpty(){
  el('playersLayer').innerHTML='';
  el('discardPile').innerHTML='';
  el('deckCount').innerText='';
  el('directionLabel').innerText='';
  el('currentColorLabel').innerText='';
  el('drawBtn').disabled=true;
  el('passBtn').disabled=true;
  el('colorPicker').style.display='none';
}

function ensureState(){
  if(!state.hands)state.hands={};
  players.forEach(p=>{if(!state.hands[p.seat])state.hands[p.seat]=[];});
  if(!Array.isArray(state.discard))state.discard=[];
  if(!Array.isArray(state.deck))state.deck=[];
}

function drawPlayers(){
  let layer=el('playersLayer'); layer.innerHTML='';
  let ordered=[mySeat,...players.map(p=>p.seat).filter(s=>s!==mySeat)];
  if(mySeat===null||mySeat===undefined)ordered=players.map(p=>p.seat);

  ordered.forEach((seat,idx)=>{
    let p=players.find(x=>x.seat===seat); if(!p)return;
    let hand=state.hands[seat]||[];
    let box=document.createElement('div');
    box.className='player p'+idx+(state.turn===seat?' turn':'');

    let html='<div><b>'+escapeHtml(p.name)+'</b></div>';
    html+='<div class="muted">'+hand.length+' cards'+(hand.length===1?' · UNO!':'')+'</div>';

    if(seat===mySeat){
      html+='<div class="handArea">';
      hand.forEach((card,i)=>{
        let playable=state.turn===mySeat&&canPlay(card)&&state.pendingDraw===0&&state.winner===null&&!pendingWildIndex;
        html+=cardHtml(card,'card '+(playable?'playable':''),'playCard('+i+')');
      });
      html+='</div>';
    }else{
      html+='<div>';
      hand.forEach(()=>html+='<span class="card small back">UNO</span>');
      html+='</div>';
    }

    box.innerHTML=html;
    layer.appendChild(box);
  });
}

function drawCenter(){
  let top=topDiscard();
  el('discardPile').innerHTML=top?cardHtml(top,'card',''):'';
  el('deckCount').innerText=state.deck.length+' cards left';
  el('directionLabel').innerText=state.direction===1?'Clockwise':'Counter-clockwise';
  el('currentColorLabel').innerText='Current Color: '+String(state.currentColor||'').toUpperCase();
  el('colorPicker').style.display=pendingWildIndex!==null?'block':'none';
}

function drawControls(){
  let isTurn=state.turn===mySeat&&state.winner===null&&!pendingWildIndex;
  el('drawBtn').disabled=!isTurn;
  el('passBtn').disabled=!isTurn||!state.drewThisTurn||state.pendingDraw>0;
}

function drawLog(){
  el('log').innerHTML=state.log.slice(-5).map(x=>'• '+escapeHtml(x)).join('<br>');
  el('log').scrollTop=el('log').scrollHeight;
}

function canPlay(card){
  let top=topDiscard();
  if(!card||!top)return false;
  return card.wild||card.color===state.currentColor||card.value===top.value;
}

function playCard(index){
  if(!state||state.turn!==mySeat||state.winner!==null||state.pendingDraw>0||pendingWildIndex!==null)return;
  let hand=state.hands[mySeat]||[];
  let card=hand[index];
  if(!card||!canPlay(card))return;

  if(card.wild){
    pendingWildIndex=index;
    draw();
    return;
  }

  commitPlay(index,card.color);
}

function chooseColor(color){
  if(pendingWildIndex===null)return;
  commitPlay(pendingWildIndex,color);
  pendingWildIndex=null;
}

function commitPlay(index,wildColor){
  let hand=state.hands[mySeat]||[];
  let card=hand[index];
  if(!card)return;

  hand.splice(index,1);
  state.discard.push(card);
  state.drewThisTurn=false;
  state.currentColor=card.wild?wildColor:card.color;

  add(name(mySeat)+' played '+cardLabel(card)+(card.wild?' and chose '+wildColor:'')+'.');

  if(hand.length===0){
    state.winner=mySeat;
    add(name(mySeat)+' wins!');
  }else{
    applyCardEffect(card);
    if(!['skip','reverse','draw2','draw4'].includes(card.value))nextTurn();
  }

  publishState('play-card');
  draw();
}

function applyCardEffect(card){
  if(card.value==='skip'){
    add(name(nextSeat())+' was skipped.');
    advanceTurn(2); return;
  }
  if(card.value==='reverse'){
    state.direction*=-1;
    add('Direction reversed.');
    players.length===2?advanceTurn(2):nextTurn();
    return;
  }
  if(card.value==='draw2'){
    let target=nextSeat();
    state.pendingDraw=2; state.turn=target;
    add(name(target)+' must draw 2.');
    return;
  }
  if(card.value==='draw4'){
    let target=nextSeat();
    state.pendingDraw=4; state.turn=target;
    add(name(target)+' must draw 4.');
    return;
  }
}

function drawCardAction(){
  if(!state||state.turn!==mySeat||state.winner!==null||pendingWildIndex!==null)return;

  if(state.pendingDraw>0){
    let count=state.pendingDraw;
    for(let i=0;i<count;i++)drawOne(mySeat);
    add(name(mySeat)+' drew '+count+' penalty cards.');
    state.pendingDraw=0; state.drewThisTurn=false; nextTurn();
    publishState('penalty-draw'); draw(); return;
  }

  drawOne(mySeat);
  state.drewThisTurn=true;
  add(name(mySeat)+' drew a card.');
  publishState('draw-card'); draw();
}

function passTurn(){
  if(!state||state.turn!==mySeat||!state.drewThisTurn||state.pendingDraw>0||state.winner!==null)return;
  state.drewThisTurn=false;
  add(name(mySeat)+' passed.');
  nextTurn();
  publishState('pass'); draw();
}

function drawOne(seat){
  if(state.deck.length===0)recycleDeck();
  if(state.deck.length)state.hands[seat].push(state.deck.pop());
}

function recycleDeck(){
  if(state.discard.length<=1)return;
  let top=state.discard.pop();
  state.deck=state.discard;
  state.discard=[top];
  shuffle(state.deck);
  add('Discard pile reshuffled into draw pile.');
}

function requestNewGame(){
  if(players.length<2)return;
  if(isHost()){
    state=fresh();
    pendingWildIndex=null;
    publishState('new-game');
    draw();
  }else{
    sendMove({type:'requestNewGame',from:mySeat});
    setStatus('New game requested','Waiting for host to reset the table.');
  }
}

function nextTurn(){advanceTurn(1);}
function nextSeat(){
  let i=players.findIndex(p=>p.seat===state.turn);
  let ni=(i+state.direction+players.length)%players.length;
  return players[ni].seat;
}
function advanceTurn(steps){
  let i=players.findIndex(p=>p.seat===state.turn);
  for(let s=0;s<steps;s++)i=(i+state.direction+players.length)%players.length;
  state.turn=players[i].seat;
}
function topDiscard(){return state.discard[state.discard.length-1];}

function publishState(reason){
  if(!state)return;
  state.version=(Number(state.version)||0)+1;
  state.hostSeat=hostSeat;
  state.reason=reason;
  lastSeenVersion=state.version;
  sendMove({type:'state',state:clone(state)});
}

function sendMove(data){
  parent.postMessage({type:'move',data:data},'*');
}
window.sendMove=sendMove;

window.onMove=function(data){
  if(!data)return;

  if(data.type==='gameSetup'){receiveSetup(data.players,data.mySeat);return;}

  if(data.type==='requestNewGame'&&isHost()){
    state=fresh(); pendingWildIndex=null; publishState('new-game-requested'); draw(); return;
  }

  if(data.type==='state'&&data.state){
    if(state&&data.state.gameId===state.gameId&&Number(data.state.version)<=Number(state.version))return;
    pendingWildIndex=null;
    state=data.state;
    lastSeenVersion=Number(state.version)||0;
    ensureState();
    draw();
  }
};

window.addEventListener('message',function(event){
  let data=event.data||{};
  if(data.type==='gameSetup')receiveSetup(data.players,data.mySeat);
  if(data.type==='gameMove'&&window.onMove)window.onMove(data.data);
});

function cardLabel(card){
  if(card.value==='wild')return 'Wild';
  if(card.value==='draw4')return 'Wild Draw 4';
  if(card.value==='draw2')return card.color+' Draw 2';
  return card.color+' '+card.value;
}

function cardHtml(card,classes,onclick){
  let color=card.color==='wild'?'wild':card.color;
  let symbol=card.value;
  if(card.value==='skip')symbol='⊘';
  if(card.value==='reverse')symbol='↺';
  if(card.value==='draw2')symbol='+2';
  if(card.value==='draw4')symbol='+4';
  if(card.value==='wild')symbol='W';

  return '<span '+(onclick?'onclick="'+onclick+'"':'')+' class="'+classes+' '+color+'">'+
    '<span class="label">'+escapeHtml(card.color==='wild'?'WILD':card.color.toUpperCase())+'</span>'+
    '<span class="big">'+escapeHtml(symbol)+'</span>'+
  '</span>';
}

function add(t){
  if(!state.log)state.log=[];
  state.log.push(t);
  if(state.log.length>60)state.log.shift();
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}
function clone(x){return JSON.parse(JSON.stringify(x));}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

drawEmpty();
receiveSetup(window.GAME_PLAYERS||[],window.GAME_MY_SEAT);
setTimeout(()=>receiveSetup(window.GAME_PLAYERS||players||[],window.GAME_MY_SEAT),250);
</script>

    overflow:hidden;
  }
  #gfStandardHud .gfHudPlayer{

    gap:7px;

    max-width:210px;
    padding:6px 8px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.22);

  }
  #gfStandardHud .gfHudPlayer.me{
    border-color:rgba(56,189,248,.65);

  }
  #gfStandardHud .gfHudPet{
    width:28px;
    height:28px;
    border-radius:10px;
    object-fit:contain;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    flex:0 0 auto;
  }
  #gfStandardHud .gfHudAvatar{
    width:28px;
    height:28px;
    border-radius:10px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,rgba(56,189,248,.22),rgba(124,58,237,.20));
    border:1px solid rgba(255,255,255,.08);
    flex:0 0 auto;
  }
  #gfStandardHud .gfHudInfo{
    display:flex;
    flex-direction:column;
    min-width:0;
    line-height:1.1;
  }
  #gfStandardHud .gfHudName{
    font-size:12px;
    font-weight:900;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #gfStandardHud .gfHudSub{
    color:var(--gf-hud-muted);
    font-size:10px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  @media(max-width:700px){
    #gfStandardHud{left:6px;right:6px;top:6px;padding:7px;border-radius:15px;gap:6px}
    #gfStandardHud .gfHudTitle{min-width:88px;max-width:120px}
    #gfStandardHud .gfHudPlayer{max-width:120px;padding:5px 6px;gap:5px}
    #gfStandardHud .gfHudPet,#gfStandardHud .gfHudAvatar{width:24px;height:24px;border-radius:8px}
    #gfStandardHud .gfHudName{font-size:11px}
    #gfStandardHud .gfHudSub{font-size:9px}
  }
</style>
<script id="gfStandardHudScript">
(function(){
  var GAME_TITLE = 'UNO';
  window.GAME_CONTEXT = window.GAME_CONTEXT || {username:'',roomId:'',players:[],seats:[],mySeat:-1,activePets:{}};

  function esc(s){
    return String(s==null?'':s).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});
  }

  function normPlayers(input){
    var list = input || window.GAME_PLAYERS || [];
    return (Array.isArray(list)?list:[]).map(function(p,i){
      if(typeof p==='string')return {name:p,seat:i};
      return {name:p&&p.name?p.name:('Seat '+(i+1)), seat:(p&&p.seat!=null?p.seat:i)};
    });
  }

  function absorbContext(raw){
    var data = raw || {};
    if(data.data) data = data.data;
    var ctx = window.GAME_CONTEXT || {};
    ctx.username = data.username || data.me || ctx.username || '';
    ctx.roomId = data.roomId || data.room || data.roomCode || ctx.roomId || '';
    ctx.players = normPlayers(data.players || ctx.players);
    ctx.seats = data.seats || ctx.seats || [];
    ctx.mySeat = data.mySeat!=null ? Number(data.mySeat) : (window.GAME_MY_SEAT!=null ? Number(window.GAME_MY_SEAT) : (ctx.mySeat!=null?ctx.mySeat:-1));
    ctx.activePets = data.activePets || ctx.activePets || {};
    window.GAME_CONTEXT = ctx;
    render();
  }

  function normalizePetMap(raw){
    var map={};
    if(!raw)return map;
    if(Array.isArray(raw)){
      raw.forEach(function(item){
        if(!item)return;
        var name=item.username||item.user||item.owner||item.player||item.name;
        if(name){ map[name]=item; map[String(name).toLowerCase()]=item; }
        if(item.seat!=null)map['seat:'+item.seat]=item;
      });
      return map;
    }
    Object.keys(raw).forEach(function(k){
      map[k]=raw[k];
      map[String(k).toLowerCase()]=raw[k];
    });
    return map;
  }

  function playerPet(player){
    var ctx=window.GAME_CONTEXT||{};
    var name=typeof player==='string'?player:(player&&player.name)||'';
    var seat=typeof player==='object'&&player?player.seat:null;
    var pets=normalizePetMap(ctx.activePets || ctx.pets || ctx.playerPets || {});
    return pets[name] || pets[String(name||'').toLowerCase()] || (seat!=null?pets['seat:'+seat]:null) || ctx.activePet || ctx.pet || null;
  }

  function petImage(pet){
    if(!pet)return '';
    if(typeof pet==='string')return pet;
    return pet.image || pet.img || pet.sprite || pet.photo || pet.icon || pet.src || pet.imageUrl || pet.url || '';
  }

  function render(){
    var hud=document.getElementById('gfStandardHud');
    if(!hud){
      hud=document.createElement('div');
      hud.id='gfStandardHud';
      document.body.appendChild(hud);
    }
    var ctx=window.GAME_CONTEXT||{};
    var players=normPlayers(ctx.players);
    if(!players.length && window.GAME_PLAYERS) players=normPlayers(window.GAME_PLAYERS);
    var room=ctx.roomId || '';
    var mySeat=ctx.mySeat;
    var playerHtml=players.slice(0,4).map(function(p){
      var pet=playerPet(p);
      var img=petImage(pet);
      var petName=pet && pet.name ? pet.name : '';
      var seatText='Seat '+(Number(p.seat)+1);
      var isMe=(Number(p.seat)===Number(mySeat)) || (ctx.username && p.name===ctx.username);
      return '<div class="gfHudPlayer '+(isMe?'me':'')+'">'+
        (img?'<img class="gfHudPet" src="'+esc(img)+'" alt="">':'<span class="gfHudAvatar">🎮</span>')+
        '<span class="gfHudInfo"><span class="gfHudName">'+esc(p.name||'Player')+'</span><span class="gfHudSub">'+esc(seatText+(petName?' · '+petName:''))+'</span></span>'+ 
      '</div>';
    }).join('');
    if(!playerHtml){
      playerHtml='<div class="gfHudPlayer"><span class="gfHudAvatar">🎮</span><span class="gfHudInfo"><span class="gfHudName">Solo / Local</span><span class="gfHudSub">Waiting for room context</span></span></div>';
    }
    hud.innerHTML='<div class="gfHudTitle"><b>'+esc(GAME_TITLE)+'</b><span>'+(room?'Room '+esc(room):'GameForge table')+'</span></div><div class="gfHudPlayers">'+playerHtml+'</div>';
  }

  window.addEventListener('message',function(e){
    var msg=e.data||{};
    if(msg.type==='GAME_CONTEXT' || msg.type==='gameSetup' || msg.type==='gameContext'){
      absorbContext(msg);
    }
  });

  window.addEventListener('load',function(){
    absorbContext({});
    try{ parent.postMessage({type:'gameReady'},'*'); }catch(e){}
  });

  setTimeout(function(){absorbContext({});},250);
  setTimeout(function(){absorbContext({});},900);
})();
</script>

</body>
</html>
