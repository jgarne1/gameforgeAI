<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GameForge Inventory</title>

<style>
/*
GameForge Inventory notes:
- Single-file inventory page.
- Loads profile from /api/pet/profile.
- Uses /api/pet/use-item.
- Lists marketplace items through /api/market/list.
- Item images load from /assets/items/<itemId>.png.
*/

:root{
  --bg:#070b18;
  --panel:#101827;
  --panel2:#0b1120;
  --panel3:#020617;
  --card:#111827;
  --line:rgba(148,163,184,.24);
  --line2:rgba(255,255,255,.10);
  --blue:#3b82f6;
  --blue2:#2563eb;
  --cyan:#38bdf8;
  --green:#22c55e;
  --red:#ef4444;
  --gold:#facc15;
  --purple:#7c3aed;
  --pink:#ec4899;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --soft:#cbd5e1;
  --shadow:0 24px 70px rgba(0,0,0,.38);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:
    radial-gradient(circle at 12% 8%,rgba(56,189,248,.18),transparent 26%),
    radial-gradient(circle at 80% 16%,rgba(124,58,237,.15),transparent 28%),
    radial-gradient(circle at 50% 100%,rgba(34,197,94,.10),transparent 32%),
    linear-gradient(135deg,#020617,#0f172a 55%,#111827);
  color:var(--text);
  overflow:hidden;
}

button,input,select{font-family:inherit}

.wrap{
  height:650px;
  min-height:650px;
  display:grid;
  grid-template-columns:235px minmax(0,1fr);
  overflow:hidden;
}

.left{
  background:
    linear-gradient(180deg,rgba(2,6,23,.98),rgba(15,23,42,.96)),
    radial-gradient(circle at top,rgba(56,189,248,.12),transparent 30%);
  border-right:1px solid var(--line);
  padding:16px;
  overflow:auto;
}

.profile{
  padding:14px;
  border:1px solid rgba(56,189,248,.24);
  border-radius:20px;
  background:
    radial-gradient(circle at top right,rgba(250,204,21,.12),transparent 35%),
    rgba(15,23,42,.72);
  margin-bottom:14px;
  box-shadow:0 12px 30px rgba(0,0,0,.22);
}

.profile h2{
  margin:0;
  color:#fff;
  font-size:20px;
  letter-spacing:-.4px;
}

.profile p{
  margin:5px 0 0;
  color:var(--muted);
  font-size:12px;
}

.coins{
  display:inline-flex;
  margin-top:10px;
  padding:6px 10px;
  border-radius:999px;
  color:#fde68a;
  background:rgba(250,204,21,.12);
  border:1px solid rgba(250,204,21,.28);
  font-size:12px;
  font-weight:1000;
}

.navTitle{
  margin:16px 0 7px;
  color:var(--cyan);
  font-size:12px;
  font-weight:1000;
  letter-spacing:1.4px;
  text-transform:uppercase;
}

.navBtn{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid transparent;
  border-radius:14px;
  background:transparent;
  color:var(--muted);
  padding:10px;
  text-align:left;
  cursor:pointer;
  font-weight:900;
}

.navBtn:hover{
  color:#fff;
  background:rgba(56,189,248,.08);
  border-color:rgba(56,189,248,.20);
}

.navBtn.active{
  color:#fff;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  border-color:#60a5fa;
  box-shadow:0 10px 24px rgba(37,99,235,.25);
}

.count{
  color:#fff;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;
  padding:3px 8px;
  font-size:11px;
}

.main{
  min-width:0;
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr);
  background:
    radial-gradient(circle at 90% 0%,rgba(56,189,248,.10),transparent 30%),
    linear-gradient(180deg,rgba(15,23,42,.96),rgba(2,6,23,.96));
}

.top{
  padding:20px 24px 10px;
}

.titleRow{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:12px;
}

.title h1{
  margin:0;
  font-size:38px;
  line-height:1;
  letter-spacing:-1.4px;
  color:#fff;
}

.title h1 span{
  color:var(--cyan);
}

.title p{
  margin:7px 0 0;
  color:var(--muted);
  font-size:13px;
}

.capacity{
  text-align:right;
  font-weight:900;
  color:#fff;
  font-size:14px;
}

.capacity span{
  color:var(--gold);
}

.rule{
  height:1px;
  margin-top:13px;
  background:linear-gradient(90deg,rgba(56,189,248,.45),rgba(124,58,237,.20),transparent);
}

.tabbar{
  padding:10px 24px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid var(--line);
}

.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tab{
  border:1px solid rgba(148,163,184,.24);
  background:rgba(15,23,42,.72);
  color:var(--soft);
  border-radius:999px;
  padding:8px 11px;
  font-size:12px;
  font-weight:1000;
  cursor:pointer;
}

.tab:hover,
.tab.active{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  border-color:#60a5fa;
  color:#fff;
}

.filters{
  display:flex;
  gap:8px;
  align-items:center;
}

.search{width:220px}

input,select{
  border:1px solid #475569;
  background:#020617;
  color:var(--text);
  border-radius:13px;
  padding:10px 12px;
  min-width:0;
}

.content{
  min-height:0;
  overflow:auto;
  padding:15px 24px 24px;
}

.sectionTitle{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
  gap:12px;
}

.sectionTitle h2{
  margin:0;
  color:#fff;
  font-size:24px;
  letter-spacing:-.8px;
}

.hint{
  color:var(--muted);
  font-size:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(176px,1fr));
  gap:12px;
}

.itemCell{
  min-height:185px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:22px;
  background:
    radial-gradient(circle at 80% 12%,rgba(56,189,248,.10),transparent 34%),
    linear-gradient(180deg,rgba(15,23,42,.90),rgba(2,6,23,.90));
  cursor:pointer;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:.15s ease;
  box-shadow:0 10px 28px rgba(0,0,0,.18);
}

.itemCell:hover{
  transform:translateY(-2px);
  border-color:rgba(56,189,248,.42);
  box-shadow:0 16px 38px rgba(0,0,0,.28),0 0 24px rgba(56,189,248,.10);
}

.itemQty{
  position:absolute;
  top:10px;
  right:10px;
  padding:4px 8px;
  border-radius:999px;
  background:rgba(250,204,21,.14);
  border:1px solid rgba(250,204,21,.28);
  color:#fde68a;
  font-size:12px;
  font-weight:1000;
}

.iconShell{
  width:82px;
  height:82px;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 35% 25%,rgba(255,255,255,.16),transparent 35%),
    linear-gradient(135deg,rgba(30,41,59,.95),rgba(2,6,23,.95));
  border:1px solid rgba(148,163,184,.26);
  overflow:hidden;
  position:relative;
}

.iconShell img{
  width:74px;
  height:74px;
  object-fit:contain;
  position:relative;
  z-index:2;
  filter:drop-shadow(0 10px 10px rgba(0,0,0,.45));
}

.iconFallback{
  font-size:38px;
  position:relative;
  z-index:2;
}

.iconShell.common{box-shadow:0 0 0 1px rgba(148,163,184,.10)}
.iconShell.uncommon{box-shadow:0 0 18px rgba(34,197,94,.18)}
.iconShell.rare{box-shadow:0 0 20px rgba(59,130,246,.25)}
.iconShell.epic{box-shadow:0 0 22px rgba(168,85,247,.28)}
.iconShell.legendary{box-shadow:0 0 26px rgba(250,204,21,.32)}

.itemName{
  margin-top:11px;
  color:#fff;
  font-weight:1000;
  text-align:center;
  line-height:1.18;
}

.itemType{
  color:var(--muted);
  text-align:center;
  font-size:11px;
  margin-top:5px;
}

.rarity{
  margin-top:auto;
  font-size:10px;
  font-weight:1000;
  letter-spacing:.8px;
  text-transform:uppercase;
}

.rarity.common{color:#cbd5e1}
.rarity.uncommon{color:#86efac}
.rarity.rare{color:#93c5fd}
.rarity.epic{color:#d8b4fe}
.rarity.legendary{color:#fde68a}

.empty{
  border:1px dashed rgba(148,163,184,.35);
  background:rgba(255,255,255,.04);
  border-radius:20px;
  padding:28px;
  color:var(--muted);
  text-align:center;
}

.petGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:12px;
}

.petCard{
  background:
    radial-gradient(circle at top right,rgba(56,189,248,.08),transparent 32%),
    rgba(15,23,42,.82);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  display:grid;
  grid-template-columns:82px 1fr;
  gap:13px;
}

.petCard.active{
  border-color:var(--cyan);
  box-shadow:0 0 0 2px rgba(56,189,248,.16);
}

.petAvatar{
  width:82px;
  height:82px;
  border-radius:24px;
  background:#020617;
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  overflow:hidden;
}

.petAvatar img{
  width:78px;
  height:78px;
  object-fit:contain;
  filter:drop-shadow(0 9px 9px rgba(0,0,0,.35));
}

.petName{
  font-weight:1000;
  color:#fff;
  font-size:17px;
  margin-bottom:4px;
}

.petDesc{
  color:var(--muted);
  font-size:12px;
  line-height:1.35;
}

button{
  padding:10px 13px;
  border-radius:13px;
  border:1px solid #475569;
  background:#0f172a;
  color:white;
  cursor:pointer;
  font-weight:900;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
  border-color:rgba(56,189,248,.45);
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

button.primary{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  border-color:#60a5fa;
}

button.gold{
  background:linear-gradient(135deg,#facc15,#f59e0b);
  border-color:#facc15;
  color:#111827;
}

button.ghost{
  background:rgba(15,23,42,.55);
}

.modalBG{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}

.modalBG.show{display:flex}

.modal{
  width:min(680px,94vw);
  max-height:92vh;
  overflow:auto;
  background:
    radial-gradient(circle at 82% 8%,rgba(56,189,248,.14),transparent 35%),
    linear-gradient(180deg,#111827,#020617);
  border:1px solid rgba(56,189,248,.32);
  border-radius:26px;
  box-shadow:0 28px 90px rgba(0,0,0,.70);
  padding:24px;
}

.modalTop{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:18px;
  align-items:center;
  margin-bottom:18px;
}

.modalIcon{
  width:120px;
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modalIcon .iconShell{
  width:115px;
  height:115px;
  border-radius:30px;
}

.modalIcon .iconShell img{
  width:100px;
  height:100px;
}

.modal h2{
  margin:0;
  color:#fff;
  font-size:34px;
  letter-spacing:-1px;
}

.modalSub{
  font-size:13px;
  color:var(--cyan);
  margin-top:6px;
  font-weight:1000;
  text-transform:uppercase;
  letter-spacing:1px;
}

.modalInfo{
  font-size:14px;
  color:#cbd5e1;
  line-height:1.55;
  margin-top:9px;
}

.modalInfo b{color:var(--gold)}

.question{
  text-align:center;
  font-size:20px;
  font-weight:1000;
  margin:22px 0 16px;
}

.actions{
  display:grid;
  gap:10px;
  margin:0 auto;
  max-width:480px;
}

.action{
  width:100%;
  text-align:left;
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(15,23,42,.70);
  border:1px solid rgba(148,163,184,.24);
  padding:12px;
  border-radius:16px;
  font-size:15px;
}

.action:hover,
.action.selected{
  background:rgba(56,189,248,.10);
  border-color:rgba(56,189,248,.42);
}

.radio{
  width:21px;
  height:21px;
  border-radius:50%;
  background:#fff;
  border:2px solid #94a3b8;
  flex:0 0 auto;
}

.action.selected .radio{
  background:var(--cyan);
  box-shadow:inset 0 0 0 5px #fff;
}

.sellBox{
  display:none;
  max-width:480px;
  margin:14px auto 0;
  padding:14px;
  border:1px solid rgba(56,189,248,.24);
  background:rgba(2,6,23,.55);
  border-radius:18px;
}

.sellBox.show{display:block}

.sellGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:5px;
}

.sellSummary{
  font-size:13px;
  color:var(--muted);
  margin:9px 0 0;
}

.modalFooter{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:22px;
  flex-wrap:wrap;
}

.toast{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  background:#111827;
  color:white;
  border-radius:999px;
  padding:11px 16px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
  box-shadow:0 15px 40px rgba(0,0,0,.45);
  z-index:60;
}

.toast.show{
  opacity:1;
  bottom:30px;
}

@media(max-width:900px){
  body{overflow:auto}
  .wrap{
    height:auto;
    grid-template-columns:1fr;
  }
  .left{display:none}
  .main{min-height:650px}
  .titleRow{
    align-items:flex-start;
    flex-direction:column;
  }
  .tabbar{
    align-items:flex-start;
    flex-direction:column;
  }
  .filters{
    width:100%;
    flex-direction:column;
    align-items:stretch;
  }
  .search{width:100%}
  .grid{
    grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  }
  .modalTop{
    grid-template-columns:1fr;
    text-align:center;
    justify-items:center;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <aside class="left">
    <div class="profile">
      <h2 id="profileName">Player</h2>
      <p>Inventory Keeper</p>
      <div class="coins" id="profileCoins">0 coins</div>
    </div>

    <div class="navTitle">Collection</div>
    <button class="navBtn active" onclick="setTab('items')">Items <span id="leftItems" class="count">0</span></button>
    <button class="navBtn" onclick="setTab('pets')">Pets <span id="leftPets" class="count">0</span></button>
    <button class="navBtn" onclick="setTab('collections')">Collectibles <span id="leftCollections" class="count">0</span></button>

    <div class="navTitle">Actions</div>
    <button class="navBtn" onclick="showToast('Click an item to sell it on the marketplace.')">Sell Items</button>
    <button class="navBtn" onclick="showToast('Open Marketplace from GameForge nav to browse stalls.')">Marketplace</button>
  </aside>

  <main class="main">
    <section class="top">
      <div class="titleRow">
        <div class="title">
          <h1><span>Inventory</span></h1>
          <p id="pageSub">Manage items, pets, and collectibles.</p>
        </div>
        <div class="capacity">
          MY ITEMS<br>
          <span id="capacityNow">0</span> / <span id="capacityMax">100</span>
        </div>
      </div>
      <div class="rule"></div>
    </section>

    <section class="tabbar">
      <div class="tabs">
        <button id="top-items" class="tab active" onclick="setTab('items')">Items</button>
        <button id="top-pets" class="tab" onclick="setTab('pets')">Pets</button>
        <button id="top-collections" class="tab" onclick="setTab('collections')">Collectibles</button>
        <button class="tab" onclick="showToast('Marketplace browsing opens from the main GameForge nav.')">Market</button>
      </div>

      <div class="filters">
        <input id="searchBox" class="search" placeholder="Search inventory..." oninput="draw()">
        <select id="viewMode" onchange="draw()">
          <option value="mine">My Items</option>
          <option value="usable">Usable</option>
          <option value="materials">Materials</option>
          <option value="egg">Egg Care</option>
        </select>
      </div>
    </section>

    <section class="content">
      <div class="sectionTitle">
        <div>
          <h2 id="sectionTitle">Items</h2>
          <div id="sectionHint" class="hint">Item images load from /assets/items/&lt;itemId&gt;.png.</div>
        </div>
        <button class="ghost" onclick="loadInventory()">Refresh</button>
      </div>

      <div id="contentArea"></div>
    </section>
  </main>
</div>

<div id="modalBG" class="modalBG" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modalTop">
      <div id="modalIcon" class="modalIcon"></div>
      <div>
        <h2 id="modalName">Item</h2>
        <div id="modalQuality" class="modalSub">Inventory item</div>
        <div id="modalInfo" class="modalInfo"></div>
      </div>
    </div>

    <div class="question">Choose an action</div>

    <div class="actions">
      <button id="actionUse" class="action" onclick="selectAction('use')"><span class="radio"></span><span>🐾 Use on active pet</span></button>
      <button id="actionSell" class="action" onclick="selectAction('sell')"><span class="radio"></span><span>🏪 Sell on Marketplace</span></button>
    </div>

    <div id="sellBox" class="sellBox">
      <div class="sellGrid">
        <div>
          <label>Quantity to sell</label>
          <input id="sellQty" type="number" min="1" value="1">
        </div>
        <div>
          <label>Price per item</label>
          <input id="sellPrice" type="number" min="1" value="10">
        </div>
      </div>
      <p id="sellSummary" class="sellSummary">Listing total: 10 coins.</p>
    </div>

    <div class="modalFooter">
      <button class="primary" onclick="runSelectedAction()">Submit</button>
      <button class="ghost" onclick="hideModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let username='';
let profile=null;
let shop={};
let selectedItemId='';
let selectedAction='';
let currentTab='items';
const INVENTORY_LIMIT=100;

const ITEM_META={
  berry:{name:'Berry',fallback:'🍓',type:'Food',rarity:'common',desc:'A simple snack used to feed your pet.'},
  soap:{name:'Soap',fallback:'🫧',type:'Care',rarity:'common',desc:'Used to clean your pet.'},
  nap_blanket:{name:'Nap Blanket',fallback:'💤',type:'Rest',rarity:'common',desc:'Helps your pet recover energy.'},
  warm_pad:{name:'Warm Pad',fallback:'🔥',type:'Egg Care',rarity:'uncommon',desc:'Adds warmth influence to an egg.'},
  cool_cloth:{name:'Cool Cloth',fallback:'❄️',type:'Egg Care',rarity:'uncommon',desc:'Adds cold influence to an egg.'},
  mist_spray:{name:'Mist Spray',fallback:'💧',type:'Egg Care',rarity:'uncommon',desc:'Adds wet influence to an egg.'},
  dry_towel:{name:'Dry Towel',fallback:'🌵',type:'Egg Care',rarity:'uncommon',desc:'Adds dry influence to an egg.'},
  sun_lamp:{name:'Sun Lamp',fallback:'☀️',type:'Egg Care',rarity:'rare',desc:'Adds light influence to an egg.'},
  shade_cover:{name:'Shade Cover',fallback:'🌙',type:'Egg Care',rarity:'rare',desc:'Adds dark influence to an egg.'},
  sparkle_treat:{name:'Sparkle Treat',fallback:'✨',type:'Treat',rarity:'uncommon',desc:'A special treat that boosts happiness.'},
  toy_ball:{name:'Toy Ball',fallback:'🎾',type:'Toy',rarity:'common',desc:'A toy for play and happiness.'},
  ember_shell:{name:'Ember Shell',fallback:'🔥',type:'Fragment',rarity:'uncommon',desc:'A warm shell fragment for future fire egg crafting.'},
  tide_pearl:{name:'Tide Pearl',fallback:'💧',type:'Fragment',rarity:'uncommon',desc:'A cool pearl tied to water companions.'},
  moon_wisp:{name:'Moon Wisp',fallback:'🌙',type:'Fragment',rarity:'rare',desc:'A shadowy collectible for future rare eggs.'},
  fossil_shard:{name:'Fossil Shard',fallback:'🪨',type:'Fragment',rarity:'rare',desc:'An ancient shard tied to earth companions.'},
  first_hatch_badge:{name:'First Hatch Badge',fallback:'🏅',type:'Badge',rarity:'rare',desc:'A badge for hatching your first companion.'}
};

function el(id){return document.getElementById(id)}

function getUsername(){
  if(window.GAME_PLAYERS&&window.GAME_PLAYERS.length){
    let s=window.GAME_MY_SEAT||0;
    return (window.GAME_PLAYERS[s]&&window.GAME_PLAYERS[s].name) ||
           (window.GAME_PLAYERS[0]&&window.GAME_PLAYERS[0].name) ||
           localStorage.getItem('gf_user') ||
           '';
  }
  try{return localStorage.getItem('gf_user')||''}
  catch(e){return ''}
}

function meta(id){
  let fromShop=shop[id]||{};
  let local=ITEM_META[id]||{};
  return {
    id:id,
    name:fromShop.name||local.name||prettyName(id),
    fallback:local.fallback||'🎁',
    type:local.type||itemType(id,fromShop),
    rarity:local.rarity||itemRarity(id,fromShop),
    desc:fromShop.description||local.desc||'Inventory item.',
    price:Number(fromShop.price||0),
    image:'/assets/items/'+id+'.png'
  };
}

async function loadInventory(){
  username=getUsername();

  if(!username){
    contentArea.innerHTML='<div class="empty">Log in first.</div>';
    return;
  }

  try{
    let res=await fetch('/api/pet/profile?user='+encodeURIComponent(username));
    let data=await res.json();

    if(data.error){
      showToast(data.error);
      return;
    }

    profile=data.profile;
    shop=data.shop||{};
    draw();
  }catch(err){
    showToast('Inventory failed to load.');
  }
}

function setTab(tab){
  ['items','pets','collections'].forEach(t=>{
    let top=el('top-'+t);
    if(top)top.classList.toggle('active',t===tab);
  });

  document.querySelectorAll('.left .navBtn').forEach(b=>b.classList.remove('active'));

  let navs=document.querySelectorAll('.left .navBtn');
  let index=tab==='items'?0:tab==='pets'?1:2;
  if(navs[index])navs[index].classList.add('active');

  currentTab=tab;
  draw();
}

function draw(){
  if(!profile){
    contentArea.innerHTML='<div class="empty">Loading inventory...</div>';
    return;
  }

  let inv=profile.inventory||{};
  let ids=Object.keys(inv).filter(id=>Number(inv[id]||0)>0);
  let total=ids.reduce((sum,id)=>sum+Number(inv[id]||0),0);
  let pets=profile.pets?Object.values(profile.pets):[];
  let collections=ids.filter(id=>isCollectionType(meta(id).type));

  profileName.innerText=username;
  profileCoins.innerText=Number(profile.money||0).toLocaleString()+' coins';
  leftItems.innerText=ids.length;
  leftPets.innerText=pets.length;
  leftCollections.innerText=collections.length;
  capacityNow.innerText=total;
  capacityMax.innerText=INVENTORY_LIMIT;

  if(currentTab==='pets')drawPets();
  else if(currentTab==='collections')drawCollections();
  else drawItems();
}

function filteredItems(list){
  let q=(searchBox.value||'').toLowerCase().trim();
  let mode=viewMode.value||'mine';

  return list.filter(id=>{
    let m=meta(id);
    let txt=(m.name+' '+m.desc+' '+m.type+' '+id).toLowerCase();

    if(q&&!txt.includes(q))return false;
    if(mode==='usable'&&!shop[id])return false;
    if(mode==='materials'&&!isCollectionType(m.type))return false;
    if(mode==='egg'&&m.type!=='Egg Care')return false;

    return true;
  }).sort((a,b)=>meta(a).name.localeCompare(meta(b).name));
}

function drawItems(){
  pageSub.innerText='Manage items, pets, and collectibles.';
  sectionTitle.innerText='Items';
  sectionHint.innerText='Item images load from /assets/items/<itemId>.png.';

  let inv=profile.inventory||{};
  let ids=Object.keys(inv).filter(id=>Number(inv[id]||0)>0&&!isCollectionType(meta(id).type));
  ids=filteredItems(ids);

  if(!ids.length){
    contentArea.innerHTML='<div class="empty">No items found. Buy supplies, explore, or complete quests to fill your inventory.</div>';
    return;
  }

  contentArea.innerHTML='<div class="grid">'+ids.map(id=>itemCard(id,Number(inv[id]||0))).join('')+'</div>';
}

function drawCollections(){
  pageSub.innerText='Fragments, badges, trophies, cosmetics, and event items can grow here.';
  sectionTitle.innerText='Collectibles';
  sectionHint.innerText='Future collection systems should use server-owned items and transparent PNG art.';

  let inv=profile.inventory||{};
  let ids=Object.keys(inv).filter(id=>Number(inv[id]||0)>0&&isCollectionType(meta(id).type));
  ids=filteredItems(ids);

  if(!ids.length){
    contentArea.innerHTML='<div class="empty"><h3 style="margin-top:0;color:#fff">No collectibles yet</h3>Future drops can include egg fragments, badges, trophies, event tokens, cosmetics, and crafting materials.</div>';
    return;
  }

  contentArea.innerHTML='<div class="grid">'+ids.map(id=>itemCard(id,Number(inv[id]||0))).join('')+'</div>';
}

function drawPets(){
  pageSub.innerText='View your current pet roster.';
  sectionTitle.innerText='Pets';
  sectionHint.innerText='Pet art loads from /assets/pets/<species>/<stage>.png.';

  let pets=profile.pets?Object.values(profile.pets):[];
  let q=(searchBox.value||'').toLowerCase().trim();

  pets=pets.filter(p=>{
    let txt=((p.name||'')+' '+(p.stage||'')+' '+(p.species||'')+' '+(p.type||'')).toLowerCase();
    return !q||txt.includes(q);
  });

  if(!pets.length){
    contentArea.innerHTML='<div class="empty">No pets found.</div>';
    return;
  }

  pets.sort((a,b)=>{
    if(a.id===profile.activePetId)return -1;
    if(b.id===profile.activePetId)return 1;
    return String(a.name||'').localeCompare(String(b.name||''));
  });

  contentArea.innerHTML='<div class="petGrid">'+pets.map(petCard).join('')+'</div>';
}

function itemCard(id,qty){
  let m=meta(id);

  return `
    <div class="itemCell" onclick="openItem('${escAttr(id)}')">
      <span class="itemQty">x${qty}</span>
      ${itemIcon(m)}
      <div class="itemName">${esc(m.name)}</div>
      <div class="itemType">${esc(m.type)}</div>
      <div class="rarity ${escAttr(m.rarity)}">${esc(m.rarity)}</div>
    </div>
  `;
}

function itemIcon(m){
  return `
    <div class="iconShell ${escAttr(m.rarity)}">
      <img src="${escAttr(m.image)}" alt="${escAttr(m.name)}"
           onerror="this.outerHTML='<span class=&quot;iconFallback&quot;>${escAttr(m.fallback)}</span>'">
    </div>
  `;
}

function petCard(p){
  let active=p.id===profile.activePetId;
  let img=petAssetPath(p);

  let desc=(p.stage||'egg')==='egg'
    ? 'Mystery Egg · '+eggProgress(p)+'% hatch progress'
    : prettyName(p.type||'pet')+' · Lv '+Number((p.stats&&p.stats.level)||1)+' · '+prettyName(p.personality||'unknown');

  return `
    <div class="petCard ${active?'active':''}">
      <div class="petAvatar">
        <img src="${escAttr(img)}" onerror="this.style.display='none';this.parentNode.innerHTML='${escAttr(p.emoji||'🥚')}';">
      </div>
      <div>
        <div class="petName">${esc(p.name||'Mystery Egg')}</div>
        <div class="petDesc">${esc(desc)}</div>
        <div style="margin-top:10px">
          <button class="gold" onclick="showToast('Open PetWorld from the main nav.')">Open PetWorld</button>
        </div>
      </div>
    </div>
  `;
}

function openItem(id){
  selectedItemId=id;
  selectedAction='';

  let m=meta(id);
  let qty=Number((profile.inventory||{})[id]||0);

  modalName.innerText=m.name;
  modalQuality.innerText=itemFlavor(m);
  modalInfo.innerHTML=
    'Type: <b>'+esc(m.type)+'</b><br>'+
    'Rarity: <b>'+esc(m.rarity)+'</b><br>'+
    'Owned: <b>'+qty+'</b><br>'+
    esc(m.desc);

  modalIcon.innerHTML=itemIcon(m);

  sellQty.value=1;
  sellQty.max=qty;
  sellPrice.value=Math.max(1,Number(m.price||10));

  sellBox.classList.remove('show');
  updateActionStyles();
  updateSellSummary();

  modalBG.classList.add('show');
}

function selectAction(action){
  selectedAction=action;
  updateActionStyles();

  if(action==='sell'){
    sellBox.classList.add('show');
    updateSellSummary();
  }else{
    sellBox.classList.remove('show');
  }
}

function updateActionStyles(){
  [actionUse,actionSell].forEach(b=>b.classList.remove('selected'));

  if(selectedAction==='use')actionUse.classList.add('selected');
  if(selectedAction==='sell')actionSell.classList.add('selected');
}

function updateSellSummary(){
  let q=Math.max(1,Math.floor(Number(sellQty.value||1)));
  let p=Math.max(1,Math.floor(Number(sellPrice.value||1)));
  sellSummary.innerText='Listing total: '+(q*p).toLocaleString()+' coins.';
}

sellQty.addEventListener('input',updateSellSummary);
sellPrice.addEventListener('input',updateSellSummary);

async function runSelectedAction(){
  if(!selectedItemId)return;

  if(!selectedAction){
    showToast('Choose an action first.');
    return;
  }

  if(selectedAction==='use'){
    await useItem(selectedItemId);
    return;
  }

  if(selectedAction==='sell'){
    await sellItem(selectedItemId);
    return;
  }
}

async function useItem(itemId){
  try{
    let res=await fetch('/api/pet/use-item',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,itemId})
    });

    let data=await res.json();

    if(data.error){
      showToast(data.error);
      return;
    }

    profile=data.profile;
    parent.postMessage({type:'petUpdated'},'*');

    showToast('Used '+meta(itemId).name+'.');
    hideModal();
    draw();
  }catch(err){
    showToast('Use failed.');
  }
}

async function sellItem(itemId){
  let owned=Number((profile.inventory||{})[itemId]||0);
  let quantity=Math.floor(Number(sellQty.value||1));
  let price=Math.floor(Number(sellPrice.value||1));

  if(quantity<1)return showToast('Quantity must be at least 1.');
  if(price<1)return showToast('Price must be at least 1.');
  if(quantity>owned)return showToast('You do not have that many.');

  try{
    let res=await fetch('/api/market/list',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        user:username,
        username:username,
        itemId:itemId,
        quantity:quantity,
        price:price
      })
    });

    let data=await res.json();

    if(data.error){
      showToast(data.error);
      return;
    }

    if(data.profile){
      profile=data.profile;
    }else{
      await loadInventory();
    }

    parent.postMessage({type:'petUpdated'},'*');
    parent.postMessage({type:'marketUpdated'},'*');

    showToast('Listed '+quantity+' '+meta(itemId).name+' for '+price+' each.');
    hideModal();
    draw();
  }catch(err){
    showToast('Listing failed.');
  }
}

function hideModal(){
  modalBG.classList.remove('show');
  selectedItemId='';
  selectedAction='';
}

function closeModal(e){
  if(e.target.id==='modalBG')hideModal();
}

function isCollectionType(type){
  type=String(type||'').toLowerCase();
  return ['fragment','badge','trophy','cosmetic','material'].includes(type);
}

function itemType(id,def){
  if(def&&def.eggTrait)return 'Egg Care';
  if(def&&def.effect&&def.effect.hunger)return 'Food';
  if(def&&def.effect&&def.effect.happiness)return 'Treat';
  if(def&&def.effect&&def.effect.energy)return 'Rest';
  if(def&&def.effect&&def.effect.cleanliness)return 'Care';
  return 'Supply';
}

function itemRarity(id,def){
  if(def&&def.rarity)return def.rarity;
  if(['shade_cover','sun_lamp'].includes(id))return 'rare';
  if(['warm_pad','cool_cloth','mist_spray','dry_towel','sparkle_treat'].includes(id))return 'uncommon';
  if(String(id).includes('wisp')||String(id).includes('shard')||String(id).includes('badge'))return 'rare';
  return 'common';
}

function itemFlavor(m){
  if(m.rarity==='legendary')return 'LEGENDARY FIND!';
  if(m.rarity==='epic')return 'EPIC FIND!';
  if(m.rarity==='rare')return 'RARE FIND!';
  if(m.type==='Egg Care')return 'EGG CARE!';
  if(m.type==='Food')return 'FOOD ITEM';
  return 'SUPPLY';
}

function petAssetPath(p){
  if(!p)return '';

  if((p.stage||'egg')==='egg'){
    return eggProgress(p)>=80
      ? '/assets/pets/egg/egg_cracked.png'
      : '/assets/pets/egg/egg_idle.png';
  }

  let species=p.species||'egg';
  let stage=p.stage||'baby';
  let file=stage==='adult'?'adult':stage==='young'||stage==='teen'?'young':'baby';

  return '/assets/pets/'+species+'/'+file+'.png';
}

function eggProgress(p){
  let t=p.eggTraits||{};
  let total=
    Number(t.warm||0)+
    Number(t.cold||0)+
    Number(t.wet||0)+
    Number(t.dry||0)+
    Number(t.light||0)+
    Number(t.dark||0);

  return Math.min(100,Math.floor(total/18*100));
}

function prettyName(id){
  return String(id||'')
    .replace(/_/g,' ')
    .replace(/\b\w/g,c=>c.toUpperCase());
}

function esc(s){
  return String(s||'').replace(/[&<>"']/g,c=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[c]));
}

function escAttr(s){
  return String(s||'')
    .replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'")
    .replace(/</g,'');
}

function showToast(text){
  toast.innerText=text;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2300);
}

window.addEventListener('message',function(event){
  let msg=event.data||{};

  if(msg.type==='gameSetup'){
    loadInventory();
  }

  if(msg.type==='petUpdate'&&msg.profile){
    profile=msg.profile;
    draw();
  }
});

loadInventory();
</script>
</body>
</html>
