<!DOCTYPE html>
<html>
<head>
<title>Pet Battle</title>

<!--
GameForge AI / Pet World maintainer notes for future AI chats/editors:
- Keep comments useful. Add, edit, or remove comments whenever behavior changes.
- Do not add comments that simply repeat obvious code.
- PetWorld is a direct account companion experience, not a multiplayer room game.
- PetWorld should always load and display the account's activePetId from the server profile.
- Accounts can own multiple pets. Roster actions must call server APIs; do not switch pets by editing local data only.
- Pets store only move IDs. Move names/details come from server-provided moves.
- Future social systems should build on this roster foundation: egg help, gifting, trading, and storage.
- Keep the experience emotional: clear feedback, pet movement, speech, journal entries, and rewarding collection moments.
-->

<style>
:root{
  --ink:#172033;
  --muted:#64748b;
  --line:rgba(255,255,255,.34);
  --glass:rgba(255,255,255,.76);
  --blue:#2563eb;
  --blue2:#1d4ed8;
  --green:#16a34a;
  --gold:#facc15;
  --red:#dc2626;
  --purple:#7c3aed;
  --sky:#38bdf8;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--ink);
  overflow:hidden;
  background:
    radial-gradient(circle at 16% 14%,rgba(56,189,248,.36),transparent 28%),
    radial-gradient(circle at 84% 18%,rgba(250,204,21,.32),transparent 24%),
    radial-gradient(circle at 50% 92%,rgba(34,197,94,.24),transparent 34%),
    linear-gradient(135deg,#dbeafe,#f8fafc 54%,#dcfce7);
}

button,input{font-family:inherit}

.wrap{
  height:100vh;
  min-height:650px;
  padding:14px;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:14px;
}

.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:26px;
  padding:14px 18px;
  box-shadow:0 20px 50px rgba(15,23,42,.12);
}

.brand h1{margin:0;font-size:30px;letter-spacing:-1px}
.brand span{color:var(--muted);font-size:13px}

.topStats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 11px;
  border-radius:999px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(148,163,184,.35);
  font-size:12px;
  font-weight:900;
  color:#334155;
}

.main{
  min-height:0;
  display:grid;
  grid-template-columns:330px minmax(0,1fr)390px;
  gap:14px;
}

.panel{
  min-height:0;
  overflow:auto;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:28px;
  padding:15px;
  box-shadow:0 20px 55px rgba(15,23,42,.13);
}

.panel h2,.panel h3{margin:0 0 10px}

.muted{color:var(--muted);font-size:13px;line-height:1.35}

.stage{
  position:relative;
  min-height:0;
  overflow:hidden;
  border-radius:34px;
  background:
    radial-gradient(circle at 50% 42%,rgba(255,255,255,.92),rgba(255,255,255,.25) 29%,transparent 51%),
    linear-gradient(180deg,#93c5fd 0%,#bfdbfe 42%,#86efac 100%);
  border:1px solid rgba(255,255,255,.55);
  box-shadow:inset 0 0 60px rgba(255,255,255,.5),0 24px 70px rgba(15,23,42,.18);
  display:grid;
  grid-template-rows:1fr auto auto;
}

.clouds{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.65;
  background:
    radial-gradient(ellipse at 16% 18%,rgba(255,255,255,.9),transparent 7%),
    radial-gradient(ellipse at 26% 20%,rgba(255,255,255,.75),transparent 8%),
    radial-gradient(ellipse at 78% 16%,rgba(255,255,255,.88),transparent 8%),
    radial-gradient(ellipse at 68% 18%,rgba(255,255,255,.68),transparent 7%);
}

.sparkles{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 20% 36%,rgba(255,255,255,.9),transparent 1.3%),
    radial-gradient(circle at 72% 33%,rgba(255,255,255,.85),transparent 1%),
    radial-gradient(circle at 62% 62%,rgba(255,255,255,.8),transparent 1.2%),
    radial-gradient(circle at 34% 70%,rgba(255,255,255,.8),transparent 1%);
  animation:twinkle 2.8s ease-in-out infinite;
}

@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.85}}

.petZone{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:360px;
  padding:24px;
}

.ground{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:130px;
  background:
    radial-gradient(ellipse at center,rgba(21,128,61,.42),transparent 58%),
    linear-gradient(180deg,rgba(34,197,94,.18),rgba(22,101,52,.72));
}

.aura{
  position:absolute;
  width:380px;
  height:380px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.88),rgba(255,255,255,.18) 45%,transparent 70%);
  filter:blur(2px);
  animation:auraPulse 4s ease-in-out infinite;
}

.aura.fire{background:radial-gradient(circle,rgba(254,215,170,.95),rgba(251,146,60,.22) 46%,transparent 70%)}
.aura.water{background:radial-gradient(circle,rgba(186,230,253,.95),rgba(14,165,233,.25) 46%,transparent 70%)}
.aura.nature{background:radial-gradient(circle,rgba(187,247,208,.95),rgba(34,197,94,.25) 46%,transparent 70%)}
.aura.shadow{background:radial-gradient(circle,rgba(221,214,254,.9),rgba(124,58,237,.25) 46%,transparent 70%)}
.aura.earth{background:radial-gradient(circle,rgba(254,243,199,.95),rgba(120,113,108,.25) 46%,transparent 70%)}

@keyframes auraPulse{
  0%,100%{transform:scale(.94);opacity:.75}
  50%{transform:scale(1.06);opacity:1}
}

.petOrb{
  position:relative;
  width:290px;
  height:290px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.42);
  box-shadow:0 0 80px rgba(255,255,255,.85), inset 0 0 50px rgba(255,255,255,.62);
  animation:floaty 3.3s ease-in-out infinite;
  transition:transform .6s ease;
}

.petOrb.wanderLeft{transform:translateX(-42px)}
.petOrb.wanderRight{transform:translateX(42px)}
.petOrb.wanderUp{transform:translateY(-22px)}
.petOrb.napping{animation:napFloat 4.4s ease-in-out infinite}
.petOrb.playful{animation:playfulFloat 2.1s ease-in-out infinite}
.petOrb.lazy{animation:napFloat 4.8s ease-in-out infinite}
.petOrb.aggressive{animation:sharpFloat 2.2s ease-in-out infinite}
.petOrb.calm{animation:calmFloat 4s ease-in-out infinite}
.petOrb.curious{animation:curiousFloat 2.8s ease-in-out infinite}
.petOrb.moody{animation:moodyFloat 2.9s ease-in-out infinite}

@keyframes floaty{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-14px)}
}

@keyframes playfulFloat{
  0%,100%{transform:translateY(0) rotate(-2deg)}
  35%{transform:translateY(-18px) rotate(3deg)}
  70%{transform:translateY(-6px) rotate(-4deg)}
}

@keyframes napFloat{
  0%,100%{transform:translateY(3px) scale(.99)}
  50%{transform:translateY(-5px) scale(1.01)}
}

@keyframes sharpFloat{
  0%,100%{transform:translateY(0) rotate(0)}
  45%{transform:translateY(-11px) rotate(-2deg)}
  55%{transform:translateY(-11px) rotate(2deg)}
}

@keyframes calmFloat{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-9px) scale(1.025)}
}

@keyframes curiousFloat{
  0%,100%{transform:translateY(0) rotate(0)}
  25%{transform:translateY(-8px) rotate(-4deg)}
  75%{transform:translateY(-8px) rotate(4deg)}
}

@keyframes moodyFloat{
  0%,100%{transform:translateY(0) rotate(0)}
  20%{transform:translateY(-16px) rotate(5deg)}
  55%{transform:translateY(-3px) rotate(-6deg)}
}

.petImg{
  position:absolute;
  width:190px;
  height:190px;
  object-fit:contain;
  z-index:2;
  pointer-events:none;
  filter:drop-shadow(0 18px 18px rgba(15,23,42,.25));
  transition:.25s ease;
  animation:breatheImg 2.4s ease-in-out infinite;
}

.petImg.hide{display:none}

.petEmoji{
  font-size:124px;
  filter:drop-shadow(0 18px 18px rgba(15,23,42,.23));
  animation:breathe 2.4s ease-in-out infinite;
  transform-origin:center;
}

.petEmoji.hide{display:none}

.petEmoji.eggNearHatch,.petImg.eggNearHatch{animation:eggWobble 1.1s ease-in-out infinite}
.petEmoji.carePulse,.petImg.carePulse{animation:carePop .62s ease}
.petEmoji.tapPulse,.petImg.tapPulse{animation:tapBounce .44s ease}

@keyframes breathe{
  0%,100%{transform:scale(1) rotate(-1deg)}
  50%{transform:scale(1.08) rotate(1deg)}
}

@keyframes breatheImg{
  0%,100%{transform:scale(1) rotate(-1deg)}
  50%{transform:scale(1.06) rotate(1deg)}
}

@keyframes eggWobble{
  0%,100%{transform:rotate(0deg) scale(1.06)}
  20%{transform:rotate(-7deg) scale(1.07)}
  40%{transform:rotate(7deg) scale(1.08)}
  60%{transform:rotate(-5deg) scale(1.07)}
  80%{transform:rotate(5deg) scale(1.08)}
}

@keyframes carePop{
  0%{transform:scale(1)}
  35%{transform:scale(1.28) rotate(-4deg)}
  70%{transform:scale(.98) rotate(3deg)}
  100%{transform:scale(1)}
}

@keyframes tapBounce{
  0%{transform:scale(1)}
  45%{transform:scale(1.13) translateY(-8px)}
  100%{transform:scale(1)}
}

.flyingItem{
  position:absolute;
  width:56px;
  height:56px;
  object-fit:contain;
  z-index:6;
  pointer-events:none;
  animation:itemFly .85s ease forwards;
  filter:drop-shadow(0 10px 10px rgba(15,23,42,.22));
}

@keyframes itemFly{
  0%{opacity:0;transform:translate(210px,70px) scale(.6) rotate(-18deg)}
  20%{opacity:1}
  100%{opacity:0;transform:translate(0,0) scale(1.25) rotate(16deg)}
}

.floatingFx{
  position:absolute;
  left:50%;
  top:45%;
  transform:translate(-50%,-50%);
  font-weight:900;
  font-size:28px;
  pointer-events:none;
  opacity:0;
  animation:floatUp 1.1s ease forwards;
  text-shadow:0 3px 10px rgba(15,23,42,.18);
  z-index:8;
}

@keyframes floatUp{
  0%{opacity:0;transform:translate(-50%,-20%) scale(.8)}
  15%{opacity:1}
  100%{opacity:0;transform:translate(-50%,-160%) scale(1.22)}
}

.speech{
  position:relative;
  margin:0 auto 12px;
  max-width:680px;
  background:rgba(255,255,255,.88);
  border:1px solid rgba(148,163,184,.35);
  border-radius:22px;
  padding:13px 16px;
  text-align:center;
  font-weight:900;
  color:#334155;
  box-shadow:0 12px 25px rgba(15,23,42,.09);
}

.nameBar{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  padding:14px;
  background:rgba(255,255,255,.48);
  border-top:1px solid rgba(255,255,255,.52);
}

input{
  padding:10px 12px;
  border-radius:14px;
  border:1px solid #cbd5e1;
  background:#fff;
  font-size:14px;
}

button{
  padding:10px 12px;
  border-radius:14px;
  border:1px solid #cbd5e1;
  background:#fff;
  cursor:pointer;
  font-weight:900;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 16px rgba(15,23,42,.12);
}

button.primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;border-color:var(--blue)}
button.good{background:linear-gradient(135deg,#16a34a,#22c55e);color:white;border-color:#16a34a}
button.gold{background:linear-gradient(135deg,#facc15,#f59e0b);color:#111827;border-color:#facc15}
button.purple{background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border-color:#7c3aed}
button.danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:white;border-color:#dc2626}
button.sky{background:linear-gradient(135deg,#38bdf8,#0284c7);color:white;border-color:#38bdf8}
button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

.statLine{margin:10px 0}

.statTop{
  display:flex;
  justify-content:space-between;
  gap:8px;
  color:#475569;
  font-size:12px;
  margin-bottom:4px;
}

.statBar{
  height:12px;
  border-radius:999px;
  background:#e5e7eb;
  overflow:hidden;
}

.statFill{
  height:100%;
  width:50%;
  border-radius:999px;
  background:linear-gradient(90deg,#22c55e,#86efac);
  transition:width .35s ease;
}

.statFill.mid{background:linear-gradient(90deg,#facc15,#fb923c)}
.statFill.low{background:linear-gradient(90deg,#ef4444,#f97316)}

.progress{
  height:12px;
  border-radius:999px;
  background:#e5e7eb;
  overflow:hidden;
  margin:8px 0;
}

.progressFill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#38bdf8,#facc15,#fb7185);
  transition:width .35s ease;
}

.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.tabs button{padding:9px 6px;font-size:12px}
.tabs button.active{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}
.hidden{display:none!important}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.actionTile{
  padding:12px;
  border-radius:18px;
  background:rgba(255,255,255,.74);
  border:1px solid rgba(148,163,184,.32);
  text-align:left;
  min-height:92px;
}

.actionTile strong{display:block;font-size:14px}
.actionTile span{display:block;margin-top:3px;color:var(--muted);font-size:12px;line-height:1.28}
.actionTile small{display:block;margin-top:7px;font-size:11px;color:#475569;font-weight:900}

.promptCard{
  border:1px solid rgba(56,189,248,.38);
  background:rgba(224,242,254,.72);
  border-radius:18px;
  padding:12px;
  margin-bottom:12px;
}

.promptCard strong{display:block;margin-bottom:4px}

.item,.rosterCard{
  border:1px solid rgba(148,163,184,.28);
  background:rgba(255,255,255,.76);
  border-radius:18px;
  padding:11px;
  margin:8px 0;
}

.itemTop,.rosterTop{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
}

.itemName,.rosterName{font-weight:900}

.itemDesc,.rosterDesc{
  font-size:12px;
  color:var(--muted);
  margin:5px 0 9px;
  line-height:1.3;
}

.rosterCard.active{
  border-color:#38bdf8;
  box-shadow:0 0 0 3px rgba(56,189,248,.14);
}

.rosterRow{
  display:grid;
  grid-template-columns:58px 1fr;
  gap:10px;
  align-items:center;
}

.rosterAvatar{
  width:58px;
  height:58px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.78);
  border:1px solid rgba(148,163,184,.30);
  position:relative;
  overflow:hidden;
  font-size:32px;
}

.rosterAvatar img{
  width:54px;
  height:54px;
  object-fit:contain;
  position:absolute;
}

.rosterActions{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
}

.rosterActions button{
  padding:8px 10px;
  font-size:12px;
}

.coin{font-weight:900;color:#92400e}
.moves{display:flex;flex-wrap:wrap;gap:7px}

.movePill{
  padding:7px 10px;
  border-radius:999px;
  background:#eef2ff;
  border:1px solid #c7d2fe;
  color:#3730a3;
  font-size:12px;
  font-weight:900;
}

.timeline{
  margin-top:12px;
  display:grid;
  gap:8px;
}

.timelineStep{
  padding:9px 10px;
  border-radius:14px;
  background:rgba(255,255,255,.70);
  border:1px solid rgba(148,163,184,.25);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  font-weight:900;
}

.timelineStep.now{
  border-color:#38bdf8;
  box-shadow:0 0 0 3px rgba(56,189,248,.13);
}

.log{
  height:130px;
  overflow:auto;
  background:#fffbea;
  border:1px solid #d6bd6b;
  border-radius:17px;
  padding:9px;
  font-size:13px;
  color:#1f2937;
  line-height:1.35;
}

.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  transform:translateX(-50%);
  background:#111827;
  color:#fff;
  border-radius:999px;
  padding:11px 16px;
  font-weight:900;
  box-shadow:0 15px 40px rgba(15,23,42,.35);
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
  z-index:99;
}

.toast.show{opacity:1;bottom:32px}

.hatchOverlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle,rgba(255,255,255,.95),rgba(250,204,21,.85) 26%,rgba(37,99,235,.78) 70%);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:98;
  color:white;
  text-align:center;
}

.hatchOverlay.show{
  display:flex;
  animation:hatchFlash 2.2s ease forwards;
}

.hatchBox{
  background:rgba(15,23,42,.72);
  border:1px solid rgba(255,255,255,.32);
  backdrop-filter:blur(14px);
  border-radius:30px;
  padding:32px;
  box-shadow:0 30px 80px rgba(15,23,42,.35);
}

.hatchBox .bigImg{
  width:150px;
  height:150px;
  object-fit:contain;
  animation:hatchPop 1.4s ease infinite;
}

.hatchBox .bigEmoji{
  font-size:96px;
  animation:hatchPop 1.4s ease infinite;
}

.hatchBox h1{margin:10px 0 4px}

@keyframes hatchFlash{
  0%{opacity:0}
  10%{opacity:1}
  86%{opacity:1}
  100%{opacity:0}
}

@keyframes hatchPop{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.16)}
}

@media(max-width:1050px){
  body{overflow:auto}
  .wrap{height:auto}
  .main{grid-template-columns:1fr}
  .stage{min-height:620px}
  .petZone{min-height:360px}
}
</style>
</head>

<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <h1>Pet World</h1>
      <span>Raise, collect, switch, and bond with your account companions.</span>
    </div>
    <div class="topStats">
      <span id="userBadge" class="badge">👤 Loading</span>
      <span id="coinBadge" class="badge">🪙 0</span>
      <span id="stageBadge" class="badge">🥚 Egg</span>
      <span id="moodBadge" class="badge">🙂 Calm</span>
      <span id="rosterBadge" class="badge">🐾 1/6</span>
    </div>
  </div>

  <div class="main">
    <div class="panel">
      <h2>Companion</h2>
      <p id="profileSub" class="muted">Loading pet profile...</p>
      <div id="statsBox"></div>

      <h3 style="margin-top:16px">Growth Path</h3>
      <div id="timeline" class="timeline"></div>

      <h3 style="margin-top:16px">Moves</h3>
      <div id="movesBox" class="moves"></div>

      <h3 style="margin-top:16px">Journal</h3>
      <div id="log" class="log"></div>
    </div>

    <div class="stage">
      <div class="clouds"></div>
      <div class="sparkles"></div>

      <div class="petZone" id="petZone">
        <div class="ground"></div>
        <div id="aura" class="aura"></div>
        <div id="petOrb" class="petOrb" onclick="comfortPet()">
          <img id="petImg" class="petImg hide" src="">
          <div id="petEmoji" class="petEmoji">🥚</div>
        </div>
        <div id="floatingFx" class="floatingFx">+1</div>
      </div>

      <div id="speech" class="speech">Loading your companion...</div>

      <div class="nameBar">
        <input id="renameInput" placeholder="Pet name">
        <button onclick="renamePet()" class="primary">Rename</button>
      </div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button id="careTab" onclick="setTab('care')" class="active">Care</button>
        <button id="rosterTab" onclick="setTab('roster')">Roster</button>
        <button id="itemsTab" onclick="setTab('items')">Items</button>
        <button id="shopTab" onclick="setTab('shop')">Shop</button>
      </div>

      <div id="carePanel"></div>
      <div id="rosterPanel" class="hidden"></div>
      <div id="itemsPanel" class="hidden"></div>
      <div id="shopPanel" class="hidden"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div id="hatchOverlay" class="hatchOverlay">
  <div class="hatchBox">
    <img id="hatchImg" class="bigImg hidden" src="">
    <div id="hatchEmoji" class="bigEmoji">🐣</div>
    <h1 id="hatchTitle">Your egg hatched!</h1>
    <p id="hatchText">A new companion has joined you.</p>
  </div>
</div>

<script>
var GAME_META={id:'petworld',name:'Pet World',minPlayers:1,maxPlayers:1,seats:1};

var username='guest';
var profile=null;
var shop={};
var moves={};
var limits={maxRoster:6,newEggBaseCost:75};
var currentTab='care';
var logs=[];
var localState={
  lastComfort:0,
  lastPromptAt:0,
  lastWanderAt:0,
  prompt:null
};

function el(id){return document.getElementById(id);}

function getPlayerName(){
  if(window.GAME_PLAYERS&&window.GAME_PLAYERS.length){
    var s=window.GAME_MY_SEAT;
    for(var i=0;i<window.GAME_PLAYERS.length;i++){
      if(window.GAME_PLAYERS[i].seat===s)return window.GAME_PLAYERS[i].name||'guest';
    }
    return window.GAME_PLAYERS[0].name||'guest';
  }

  try{
    return localStorage.getItem('gf_user')||'guest';
  }catch(e){
    return 'guest';
  }
}

function boot(){
  username=getPlayerName();
  el('userBadge').innerText='👤 '+username;
  loadProfile();
  setInterval(tickLocalPrompt,30000);
  setInterval(tickPetLife,7000);
}

async function loadProfile(){
  try{
    var res=await fetch('/api/pet/profile?user='+encodeURIComponent(username));
    var data=await res.json();

    if(data.error){
      speak('Could not load pet: '+data.error);
      addLog('Load failed: '+data.error);
      return;
    }

    profile=data.profile;
    shop=data.shop||{};
    moves=data.moves||{};
    limits=data.limits||limits;

    addLog('Loaded pet profile.');
    draw();
  }catch(err){
    speak('Server error loading pet profile.');
    addLog('Error: '+err.message+' | URL: /api/pet/profile?user='+username);
  }
}

function activePet(){
  if(!profile)return null;
  return profile.pets[profile.activePetId];
}

function draw(){
  var pet=activePet();
  if(!pet)return;

  normalizePet(pet);

  var emoji=pet.emoji||'🥚';
  var stage=pet.stage||'egg';
  var mood=getMood(pet);
  var rosterCount=Object.keys(profile.pets||{}).length;

  el('petEmoji').innerText=emoji;
  updatePetVisual(pet);

  el('coinBadge').innerText='🪙 '+Number(profile.money||0);
  el('stageBadge').innerText=(stage==='egg'?'🥚 ':'🐾 ')+stage;
  el('moodBadge').innerText=mood.icon+' '+mood.label;
  el('rosterBadge').innerText='🐾 '+rosterCount+'/'+Number(limits.maxRoster||6);
  el('renameInput').value=pet.name||'';

  var nearHatch=stage==='egg'&&eggProgress(pet)>=80;
  el('petEmoji').classList.toggle('eggNearHatch',nearHatch);
  el('petImg').classList.toggle('eggNearHatch',nearHatch);

  setAura(pet);
  setPetPersonalityMotion(pet,mood);

  el('profileSub').innerHTML=
    '<b>'+escapeHtml(pet.name||'Mystery Egg')+'</b><br>'+
    escapeHtml(stage==='egg'
      ? 'Mystery egg · Bond '+Number(pet.affection||0)
      : ((pet.type||'pet')+' type · Level '+Number((pet.stats&&pet.stats.level)||1)+' · '+personalityLabel(pet.personality)+' · Bond '+Number(pet.affection||0)));

  if(localState.prompt){
    speak(localState.prompt.text);
  }else if(stage==='egg'){
    var prog=eggProgress(pet);
    if(prog>=80)speak('The egg trembles. Something inside is ready to meet you soon.');
    else if(prog>=45)speak('The egg responds to your care. Its personality is beginning to form.');
    else speak('Your egg is listening. Every care choice nudges what it may become.');
  }else{
    speak(idleSpeech(pet,mood));
  }

  drawStats();
  drawMoves();
  drawCare();
  drawRoster();
  drawItems();
  drawShop();
  drawTimeline();
  drawLog();
}

function setPetPersonalityMotion(pet,mood){
  var orb=el('petOrb');
  orb.className='petOrb';

  if(pet.stage==='egg'){
    if(eggProgress(pet)>=80)orb.classList.add('curious');
    return;
  }

  if(mood.label==='Tired'||mood.label==='Struggling')orb.classList.add('napping');
  else if(pet.personality)orb.classList.add(pet.personality);
}

function idleSpeech(pet,mood){
  var name=pet.name||'Your pet';

  if(mood.label==='Tired')return name+' curls up and looks ready for a rest.';
  if(mood.label==='Hungry')return name+' watches your bag very carefully. Snack time?';
  if(mood.label==='Struggling')return name+' needs a little extra care today.';

  var personality=pet.personality||'';
  var lines={
    playful:name+' bounces around, waiting for something fun.',
    lazy:name+' gives you a slow blink and settles in comfortably.',
    aggressive:name+' looks fired up and ready to train.',
    calm:name+' breathes steadily and seems peaceful near you.',
    curious:name+' studies every corner of the room with bright eyes.',
    moody:name+' changes expressions like it is deciding what kind of day this is.'
  };

  return lines[personality]||name+' watches you closely. Consistent care builds a stronger bond.';
}

function tickPetLife(){
  var pet=activePet();
  if(!pet)return;

  maybeWanderPet(pet);

  if(Math.random()<.28&&!localState.prompt){
    var mood=getMood(pet);
    if(pet.stage==='egg'){
      speak('The egg gives a tiny wiggle.');
    }else{
      speak(idleSpeech(pet,mood));
    }
  }
}

function maybeWanderPet(pet){
  var now=Date.now();
  if(now-localState.lastWanderAt<6500)return;
  localState.lastWanderAt=now;

  var orb=el('petOrb');
  ['wanderLeft','wanderRight','wanderUp'].forEach(function(c){orb.classList.remove(c);});

  if(pet.stage==='egg'&&eggProgress(pet)<80)return;

  var moves=['wanderLeft','wanderRight','wanderUp',''];
  var c=moves[Math.floor(Math.random()*moves.length)];
  if(c)orb.classList.add(c);

  setTimeout(function(){
    if(orb){
      orb.classList.remove('wanderLeft');
      orb.classList.remove('wanderRight');
      orb.classList.remove('wanderUp');
    }
  },2800);
}

function updatePetVisual(pet){
  var img=el('petImg');
  var emojiEl=el('petEmoji');

  if(!pet){
    img.classList.add('hide');
    emojiEl.classList.remove('hide');
    return;
  }

  var src=petAssetPath(pet);

  img.onload=function(){
    img.classList.remove('hide');
    emojiEl.classList.add('hide');
  };

  img.onerror=function(){
    img.classList.add('hide');
    emojiEl.classList.remove('hide');
  };

  if(img.src.indexOf(src)===-1){
    img.src=src;
  }
}

function petAssetPath(pet){
  if(!pet)return '';
  if((pet.stage||'egg')==='egg'){
    return eggProgress(pet)>=80?'/assets/pets/egg/egg_cracked.png':'/assets/pets/egg/egg_idle.png';
  }

  var species=pet.species||'egg';
  var stage=pet.stage||'baby';
  var file=stage==='adult'?'adult':stage==='young'||stage==='teen'?'young':'baby';
  return '/assets/pets/'+species+'/'+file+'.png';
}

function itemAssetPath(itemId){
  return '/assets/items/'+itemId+'.png';
}

function normalizePet(pet){
  if(!pet.needs)pet.needs={hunger:80,happiness:70,energy:80,cleanliness:90};
  if(!pet.stats)pet.stats={level:1,xp:0,hp:20,maxHp:20,attack:5,defense:4,speed:5};
  if(!pet.eggTraits)pet.eggTraits={warm:0,cold:0,wet:0,dry:0,light:0,dark:0};
  if(!pet.moves)pet.moves=['tackle'];
  if(pet.affection===undefined)pet.affection=0;
}

function getMood(pet){
  if(pet.stage==='egg'){
    var prog=eggProgress(pet);
    if(prog>=80)return {icon:'✨',label:'Restless'};
    if(prog>=45)return {icon:'💫',label:'Growing'};
    return {icon:'😌',label:'Calm'};
  }

  var n=pet.needs||{};
  if(Number(n.energy||0)<25)return {icon:'😴',label:'Tired'};
  if(Number(n.hunger||0)<25)return {icon:'🍽️',label:'Hungry'};

  var avg=(Number(n.hunger||0)+Number(n.happiness||0)+Number(n.energy||0)+Number(n.cleanliness||0))/4;

  if(avg>=82)return {icon:'😄',label:'Thriving'};
  if(avg>=62)return {icon:'🙂',label:'Content'};
  if(avg>=38)return {icon:'😐',label:'Needy'};
  return {icon:'😟',label:'Struggling'};
}

function setAura(pet){
  var a=el('aura');
  a.className='aura';

  if(pet.stage==='egg'){
    var strongest=strongestTrait(pet.eggTraits||{});
    if(strongest==='warm')a.classList.add('fire');
    else if(strongest==='cold'||strongest==='wet')a.classList.add('water');
    else if(strongest==='light')a.classList.add('nature');
    else if(strongest==='dark')a.classList.add('shadow');
    else if(strongest==='dry')a.classList.add('earth');
  }else{
    if(pet.type==='fire')a.classList.add('fire');
    else if(pet.type==='water')a.classList.add('water');
    else if(pet.type==='nature')a.classList.add('nature');
    else if(pet.type==='shadow')a.classList.add('shadow');
    else if(pet.type==='earth')a.classList.add('earth');
  }
}

function drawStats(){
  var pet=activePet();
  var html='';

  if(pet.stage==='egg'){
    var traits=pet.eggTraits||{};
    var total=traitTotal(traits);
    var pct=eggProgress(pet);

    html+='<h3>Hatch Progress</h3>';
    html+='<div class="progress"><div class="progressFill" style="width:'+pct+'%"></div></div>';
    html+='<p class="muted">'+total+' / 18 care points. Egg phase should feel active and short; later growth becomes long-term.</p>';

    html+=eggTraitLine('🔥 Warm',traits.warm);
    html+=eggTraitLine('❄️ Cold',traits.cold);
    html+=eggTraitLine('💧 Wet',traits.wet);
    html+=eggTraitLine('🌵 Dry',traits.dry);
    html+=eggTraitLine('☀️ Light',traits.light);
    html+=eggTraitLine('🌙 Dark',traits.dark);
    html+=statBar('Bond',pet.affection||0,100);
  }else{
    html+=statBar('HP',pet.stats.hp,pet.stats.maxHp);
    html+=statBar('Hunger',pet.needs.hunger,100);
    html+=statBar('Happiness',pet.needs.happiness,100);
    html+=statBar('Energy',pet.needs.energy,100);
    html+=statBar('Cleanliness',pet.needs.cleanliness,100);
    html+=statBar('Bond',pet.affection||0,100);
    html+=statBar('Attack',pet.stats.attack,20);
    html+=statBar('Defense',pet.stats.defense,20);
    html+=statBar('Speed',pet.stats.speed,20);
    html+=statBar('XP',pet.stats.xp,pet.stats.level*20);
  }

  el('statsBox').innerHTML=html;
}

function eggTraitLine(name,val){
  val=Number(val||0);
  return '<div class="statLine"><div class="statTop"><span>'+name+'</span><b>'+val+'</b></div><div class="statBar"><div class="statFill" style="width:'+Math.min(100,val*8)+'%"></div></div></div>';
}

function statBar(name,val,max){
  val=Number(val||0);
  max=Number(max||100);
  var pct=Math.max(0,Math.min(100,Math.floor((val/max)*100)));
  var cls=pct<30?'low':pct<60?'mid':'';

  return '<div class="statLine"><div class="statTop"><span>'+escapeHtml(name)+'</span><b>'+val+'/'+max+'</b></div><div class="statBar"><div class="statFill '+cls+'" style="width:'+pct+'%"></div></div></div>';
}

function drawMoves(){
  var pet=activePet();
  var html='';

  (pet.moves||[]).forEach(function(id){
    var move=moves[id]||{name:id,type:'normal'};
    html+='<span class="movePill">'+escapeHtml(move.name)+' · '+escapeHtml(move.type)+'</span>';
  });

  if(!html)html='<span class="muted">No moves learned yet.</span>';

  el('movesBox').innerHTML=html;
}

function drawTimeline(){
  var pet=activePet();
  var stage=pet.stage||'egg';
  var html='';

  var steps=[
    ['egg','Egg','Hours'],
    ['baby','Baby','Days to weeks'],
    ['young','Young','Weeks to months'],
    ['teen','Teen','Months'],
    ['adult','Adult','Year-scale goal']
  ];

  steps.forEach(function(s){
    html+='<div class="timelineStep '+(s[0]===stage?'now':'')+'"><span>'+s[1]+'</span><span>'+s[2]+'</span></div>';
  });

  el('timeline').innerHTML=html;
}

function drawCare(){
  var pet=activePet();
  var html='';

  if(pet.stage==='egg'){
    html+='<h2>Egg Care</h2>';
    html+='<p class="muted">Pick care based on the personality you want. Hatching uses weighted chance, so care nudges the outcome without fully guaranteeing it.</p>';

    if(localState.prompt){
      html+='<div class="promptCard"><strong>'+escapeHtml(localState.prompt.title)+'</strong><span class="muted">'+escapeHtml(localState.prompt.help)+'</span></div>';
    }

    html+='<div class="grid2">';
    html+=careTile('🔥 Warm It','warm','Fire, boldness, affection.','Good when the egg shivers.');
    html+=careTile('❄️ Cool It','cold','Water, calm, focus.','Good when the egg feels too hot.');
    html+=careTile('💧 Mist It','wet','Water, nature, softness.','Good when the shell looks dry.');
    html+=careTile('🌵 Dry It','dry','Earth, shadow, toughness.','Good when the shell is damp.');
    html+=careTile('☀️ Give Light','light','Bright, brave, social.','Good when the egg seems sleepy.');
    html+=careTile('🌙 Shade It','dark','Mysterious, fast, independent.','Good when the egg hides from light.');
    html+='</div>';
  }else{
    html+='<h2>Daily Care</h2>';
    html+='<p class="muted">Use a few meaningful actions to build bond, XP, mood, and coins. Later this will become daily-limited.</p>';
    html+='<div class="grid2">';
    html+='<button class="actionTile primary" onclick="playPet()"><strong>🎾 Play</strong><span>Bond, happiness, coins, and XP. Costs energy.</span><small>Best when energy is high.</small></button>';
    html+='<button class="actionTile good" onclick="useItem(\'berry\')"><strong>🍓 Feed</strong><span>Restores hunger and builds trust.</span><small>Use when hunger is low.</small></button>';
    html+='<button class="actionTile sky" onclick="useItem(\'soap\')"><strong>🫧 Clean</strong><span>Raises cleanliness and comfort.</span><small>Prevents bad mood later.</small></button>';
    html+='<button class="actionTile purple" onclick="useItem(\'nap_blanket\')"><strong>💤 Rest</strong><span>Restores energy for training.</span><small>Use before harder tasks.</small></button>';
    html+='</div>';
  }

  el('carePanel').innerHTML=html;
}

function careTile(title,action,desc,tip){
  return '<button class="actionTile" onclick="careEgg(\''+action+'\')"><strong>'+title+'</strong><span>'+desc+'</span><small>'+tip+'</small></button>';
}

function drawRoster(){
  var html='<h2>Pet Roster</h2>';
  var ids=Object.keys(profile.pets||{});
  var max=Number(limits.maxRoster||6);
  var cost=Number(limits.newEggBaseCost||75)+Math.max(0,ids.length-1)*25;

  html+='<p class="muted">Choose which companion is active. PetWorld and Pet Battle use your active pet.</p>';
  html+='<div class="promptCard"><strong>Adopt a New Egg</strong><span class="muted">Cost: '+cost+' coins · Roster: '+ids.length+'/'+max+'</span><br><button class="gold" style="margin-top:8px" onclick="adoptEgg()" '+(ids.length>=max?'disabled':'')+'>Adopt Mystery Egg</button></div>';

  ids.forEach(function(pid){
    var pet=profile.pets[pid];
    normalizePet(pet);

    var active=pid===profile.activePetId;
    var img=petAssetPath(pet);
    var sub=(pet.stage||'egg')==='egg'
      ? 'Egg · '+eggProgress(pet)+'% hatch progress · Bond '+Number(pet.affection||0)
      : (pet.type||'pet')+' · Lv '+Number((pet.stats&&pet.stats.level)||1)+' · '+personalityLabel(pet.personality)+' · Bond '+Number(pet.affection||0);

    html+='<div class="rosterCard '+(active?'active':'')+'">';
    html+='<div class="rosterRow">';
    html+='<div class="rosterAvatar"><img src="'+escapeAttr(img)+'" onerror="this.style.display=\'none\'"><span>'+escapeHtml(pet.emoji||'🥚')+'</span></div>';
    html+='<div>';
    html+='<div class="rosterTop"><div class="rosterName">'+escapeHtml(pet.name||'Mystery Egg')+'</div>'+(active?'<span class="badge">Active</span>':'')+'</div>';
    html+='<div class="rosterDesc">'+escapeHtml(sub)+'</div>';
    html+='<div class="rosterActions">';
    html+='<button class="primary" onclick="setActivePet(\''+escapeAttr(pid)+'\')" '+(active?'disabled':'')+'>Set Active</button>';
    html+='<button class="ghost" disabled>Gift Soon</button>';
    html+='<button class="ghost" disabled>Trade Soon</button>';
    html+='</div>';
    html+='</div>';
    html+='</div>';
    html+='</div>';
  });

  el('rosterPanel').innerHTML=html;
}

function drawItems(){
  var inv=profile.inventory||{};
  var keys=Object.keys(inv).filter(function(k){return inv[k]>0;});
  var html='<h2>Inventory</h2>';

  if(!keys.length){
    html+='<p class="muted">No items yet. Visit the shop to buy supplies.</p>';
  }

  keys.forEach(function(id){
    var item=shop[id]||{name:id,description:'Item'};
    html+='<div class="item">';
    html+='<div class="itemTop"><div class="itemName">'+escapeHtml(item.name)+'</div><span class="badge">x'+inv[id]+'</span></div>';
    html+='<div class="itemDesc">'+escapeHtml(item.description||'')+'</div>';
    html+='<button class="primary" onclick="useItem(\''+id+'\')">Use Item</button>';
    html+='</div>';
  });

  el('itemsPanel').innerHTML=html;
}

function drawShop(){
  var html='<h2>Shop</h2><p class="muted">Buy food, care tools, and comfort items. Later we will add rotating stock and rare items.</p>';

  Object.keys(shop).forEach(function(id){
    var item=shop[id];

    html+='<div class="item">';
    html+='<div class="itemTop"><div class="itemName">'+escapeHtml(item.name)+'</div><div class="coin">'+Number(item.price||0)+' coins</div></div>';
    html+='<div class="itemDesc">'+escapeHtml(item.description||'')+'</div>';
    html+='<button class="gold" onclick="buyItem(\''+id+'\')">Buy</button>';
    html+='</div>';
  });

  el('shopPanel').innerHTML=html;
}

function drawLog(){
  var html='';
  logs.slice(-10).forEach(function(x){
    html+='• '+escapeHtml(x)+'<br>';
  });
  el('log').innerHTML=html;
  el('log').scrollTop=el('log').scrollHeight;
}

function setTab(tab){
  currentTab=tab;

  careTab.classList.toggle('active',tab==='care');
  rosterTab.classList.toggle('active',tab==='roster');
  itemsTab.classList.toggle('active',tab==='items');
  shopTab.classList.toggle('active',tab==='shop');

  carePanel.classList.toggle('hidden',tab!=='care');
  rosterPanel.classList.toggle('hidden',tab!=='roster');
  itemsPanel.classList.toggle('hidden',tab!=='items');
  shopPanel.classList.toggle('hidden',tab!=='shop');
}

async function careEgg(action){
  var before=activePet();
  var beforeStage=before?before.stage:null;

  try{
    var res=await fetch('/api/pet/care-egg',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:username,action:action})
    });

    var data=await res.json();
    if(data.error)return notify(data.error);

    profile=data.profile;
    var pet=activePet();

    var line=data.message||careMessage(action);
    addLog(line);
    notify(line);
    animateCare(action);
    localState.prompt=null;

    if(data.hatched||beforeStage==='egg'&&pet.stage!=='egg'){
      showHatch(pet);
      addLog('A new companion hatched: '+(pet.name||'New pet')+'!');
    }

    draw();
  }catch(err){
    notify('Care failed: '+err.message);
  }
}

async function setActivePet(petId){
  try{
    var res=await fetch('/api/pet/set-active',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:username,petId:petId})
    });

    var data=await res.json();
    if(data.error)return notify(data.error);

    profile=data.profile;
    var pet=activePet();
    addLog('Switched active companion to '+(pet.name||'Mystery Egg')+'.');
    notify('Active companion switched!');
    floatFx('🐾');
    draw();
  }catch(err){
    notify('Switch failed: '+err.message);
  }
}

async function adoptEgg(){
  try{
    var res=await fetch('/api/pet/new-egg',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:username})
    });

    var data=await res.json();
    if(data.error)return notify(data.error);

    profile=data.profile;
    addLog(data.message||'You adopted a new Mystery Egg.');
    notify(data.message||'New egg adopted!');
    setTab('care');
    floatFx('🥚');
    draw();
  }catch(err){
    notify('Adopt failed: '+err.message);
  }
}

async function useItem(itemId){
  try{
    var res=await fetch('/api/pet/use-item',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:username,itemId:itemId})
    });

    var data=await res.json();
    if(data.error)return notify(data.error);

    var beforeStage=activePet()?activePet().stage:null;
    profile=data.profile;
    var pet=activePet();

    addLog('Used '+itemName(itemId)+'.');
    notify('Used '+itemName(itemId)+'.');
    animateItemUse(itemId);

    if(beforeStage==='egg'&&pet.stage!=='egg'){
      showHatch(pet);
      addLog('A new companion hatched: '+(pet.name||'New pet')+'!');
    }

    draw();
  }catch(err){
    notify('Use item failed: '+err.message);
  }
}

async function buyItem(itemId){
  try{
    var res=await fetch('/api/pet/buy',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:username,itemId:itemId})
    });

    var data=await res.json();
    if(data.error)return notify(data.error);

    profile=data.profile;
    addLog('Bought '+itemName(itemId)+'.');
    notify('Bought '+itemName(itemId)+'.');
    floatFx('🪙');
    draw();
  }catch(err){
    notify('Buy failed: '+err.message);
  }
}

async function playPet(){
  try{
    var res=await fetch('/api/pet/play',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:username})
    });

    var data=await res.json();
    if(data.error)return notify(data.error);

    profile=data.profile;
    addLog('You played together. Bond, coins, and XP increased.');
    notify('Play complete! +5 coins.');
    floatFx('+XP');
    animateCare('play');
    draw();
  }catch(err){
    notify('Play failed: '+err.message);
  }
}

async function renamePet(){
  var name=el('renameInput').value.trim();
  if(!name)return notify('Enter a pet name.');

  try{
    var res=await fetch('/api/pet/rename',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:username,name:name})
    });

    var data=await res.json();
    if(data.error)return notify(data.error);

    profile=data.profile;
    addLog('Renamed companion to '+name+'.');
    notify('Renamed!');
    draw();
  }catch(err){
    notify('Rename failed: '+err.message);
  }
}

function comfortPet(){
  var now=Date.now();

  if(now-localState.lastComfort<3000){
    animateTap();
    return;
  }

  localState.lastComfort=now;
  animateTap();

  var pet=activePet();
  if(!pet)return;

  if(pet.stage==='egg'){
    addLog('You gently comforted the egg.');
    notify('The egg settled.');
    speak('The egg gives a tiny wiggle. It seems reassured.');
    floatFx('♡');
  }else{
    addLog('You bonded with '+(pet.name||'your pet')+'.');
    notify('Bond moment.');
    speak((pet.name||'Your pet')+' leans into your attention.');
    floatFx('♡');
  }
}

function tickLocalPrompt(){
  var pet=activePet();
  if(!pet||pet.stage!=='egg')return;

  if(localState.prompt&&Date.now()-localState.lastPromptAt<120000)return;

  var prompts=[
    {title:'The egg feels chilly.',help:'Warm care may help.',text:'The egg shivers gently. Maybe it needs warmth.',suggest:'warm'},
    {title:'The shell feels warm.',help:'Cooling care may help.',text:'The egg feels a little hot. Cooling it may calm it.',suggest:'cold'},
    {title:'The shell looks dry.',help:'Misting may help.',text:'The shell has a dry shimmer. Moisture may help.',suggest:'wet'},
    {title:'The shell looks damp.',help:'Drying may help.',text:'Tiny droplets gather on the shell. Dry care may help.',suggest:'dry'},
    {title:'The egg seems sleepy.',help:'Light may help.',text:'The egg grows quiet. A little light might wake it.',suggest:'light'},
    {title:'The egg hides from the glow.',help:'Shade may help.',text:'The egg dims its glow. It may want shade.',suggest:'dark'}
  ];

  if(Math.random()<.55){
    localState.prompt=prompts[Math.floor(Math.random()*prompts.length)];
    localState.lastPromptAt=Date.now();
    addLog(localState.prompt.title);
    draw();
  }
}

function itemName(id){
  return shop[id]?shop[id].name:id;
}

function personalityLabel(p){
  if(!p)return 'Personality unknown';
  return String(p).charAt(0).toUpperCase()+String(p).slice(1);
}

function traitTotal(t){
  return Number(t.warm||0)+Number(t.cold||0)+Number(t.wet||0)+Number(t.dry||0)+Number(t.light||0)+Number(t.dark||0);
}

function eggProgress(pet){
  return Math.min(100,Math.floor(traitTotal(pet.eggTraits||{})/18*100));
}

function strongestTrait(t){
  var best='warm';
  var bestVal=-1;

  ['warm','cold','wet','dry','light','dark'].forEach(function(k){
    var v=Number(t[k]||0);
    if(v>bestVal){
      best=k;
      bestVal=v;
    }
  });

  return best;
}

function careMessage(action){
  var map={
    warm:'You warmed the egg.',
    cold:'You cooled the egg.',
    wet:'You misted the egg.',
    dry:'You dried the egg.',
    light:'You gave the egg light.',
    dark:'You shaded the egg.'
  };
  return map[action]||'You cared for the egg.';
}

function animateCare(action){
  var p=visiblePetEl();
  p.classList.remove('carePulse');
  void p.offsetWidth;
  p.classList.add('carePulse');

  var icons={
    warm:'🔥',
    cold:'❄️',
    wet:'💧',
    dry:'🌵',
    light:'☀️',
    dark:'🌙',
    item:'✨',
    play:'🎾'
  };

  floatFx(icons[action]||'✨');
}

function animateItemUse(itemId){
  flyItem(itemId);
  animateCare('item');

  if(itemId==='berry')floatFx('🍓');
  else if(itemId==='soap')floatFx('🫧');
  else if(itemId==='nap_blanket')floatFx('💤');
  else floatFx('✨');
}

function flyItem(itemId){
  var img=document.createElement('img');
  img.className='flyingItem';
  img.src=itemAssetPath(itemId);
  img.onerror=function(){img.remove();};
  el('petZone').appendChild(img);

  setTimeout(function(){
    if(img&&img.parentNode)img.parentNode.removeChild(img);
  },950);
}

function visiblePetEl(){
  var img=el('petImg');
  if(img&&!img.classList.contains('hide'))return img;
  return el('petEmoji');
}

function animateTap(){
  var p=visiblePetEl();
  p.classList.remove('tapPulse');
  void p.offsetWidth;
  p.classList.add('tapPulse');
}

function floatFx(text){
  var f=el('floatingFx');
  f.innerText=text;
  f.classList.remove('floatingFx');
  void f.offsetWidth;
  f.classList.add('floatingFx');
}

function showHatch(pet){
  var img=el('hatchImg');
  var emoji=el('hatchEmoji');
  var src=petAssetPath(pet);

  img.onload=function(){
    img.classList.remove('hidden');
    emoji.classList.add('hidden');
  };

  img.onerror=function(){
    img.classList.add('hidden');
    emoji.classList.remove('hidden');
  };

  img.src=src;
  emoji.innerText=pet.emoji||'🐣';

  hatchTitle.innerText='Your egg hatched!';
  hatchText.innerText=(pet.name||'A new companion')+' has joined you. Personality: '+personalityLabel(pet.personality)+'.';
  hatchOverlay.classList.add('show');

  setTimeout(function(){
    hatchOverlay.classList.remove('show');
  },2200);
}

function speak(text){
  el('speech').innerText=text;
}

function addLog(text){
  logs.push(text);
  if(logs.length>80)logs.shift();
  drawLog();
}

function notify(text){
  var t=el('toast');
  t.innerText=text;
  t.classList.add('show');
  setTimeout(function(){
    t.classList.remove('show');
  },2200);
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function escapeAttr(s){
  return String(s||'').replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

window.addEventListener('message',function(event){
  var msg=event.data||{};
  if(msg.type==='gameSetup'){
    username=getPlayerName();
    el('userBadge').innerText='👤 '+username;
    loadProfile();
  }
});

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',boot);
}else{
  boot();
}
</script>
</body>
