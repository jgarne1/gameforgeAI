<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pet Battle Arena</title>
<style>
:root{
  --bg:#07111f;
  --card:rgba(255,255,255,.88);
  --glass:rgba(255,255,255,.72);
  --line:rgba(255,255,255,.35);
  --ink:#172033;
  --muted:#64748b;
  --blue:#2563eb;
  --red:#dc2626;
  --green:#16a34a;
  --gold:#facc15;
  --purple:#7c3aed;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--ink);
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 12%,rgba(56,189,248,.35),transparent 25%),
    radial-gradient(circle at 82% 18%,rgba(248,113,113,.32),transparent 26%),
    radial-gradient(circle at 50% 90%,rgba(34,197,94,.25),transparent 35%),
    linear-gradient(135deg,#dbeafe,#f8fafc 48%,#fee2e2);
}

.wrap{
  height:100vh;
  min-height:650px;
  padding:14px;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:12px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:24px;
  padding:12px 16px;
  box-shadow:0 20px 50px rgba(15,23,42,.14);
}

h1,h2,h3{margin:0}

.muted{
  color:var(--muted);
  font-size:13px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.75);
  border:1px solid rgba(148,163,184,.35);
  font-size:12px;
  font-weight:900;
}

.arena{
  min-height:0;
  display:grid;
  grid-template-columns:1fr 320px 1fr;
  gap:12px;
}

.side{
  min-height:0;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:28px;
  padding:14px;
  box-shadow:0 20px 55px rgba(15,23,42,.13);
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:10px;
}

.center{
  min-height:0;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:12px;
}

.statusCard,.logCard{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:24px;
  padding:14px;
  box-shadow:0 20px 55px rgba(15,23,42,.13);
}

.log{
  height:100%;
  min-height:300px;
  overflow:auto;
  background:#fffbea;
  border:1px solid #d6bd6b;
  border-radius:18px;
  padding:10px;
  line-height:1.35;
  font-size:13px;
}

.petStage{
  position:relative;
  overflow:hidden;
  border-radius:26px;
  background:
    radial-gradient(circle at 50% 40%,rgba(255,255,255,.95),rgba(255,255,255,.28) 35%,transparent 62%),
    linear-gradient(180deg,#bfdbfe,#dcfce7);
  border:1px solid rgba(255,255,255,.55);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:clamp(190px,32vh,270px);
}

.petStage.enemy{
  background:
    radial-gradient(circle at 50% 40%,rgba(255,255,255,.95),rgba(255,255,255,.28) 35%,transparent 62%),
    linear-gradient(180deg,#fecaca,#fde68a);
}

.petImg{
  width:clamp(130px,20vh,180px);
  height:clamp(130px,20vh,180px);
  object-fit:contain;
  filter:drop-shadow(0 20px 20px rgba(15,23,42,.25));
  animation:idle 2.4s ease-in-out infinite;
}

.petEmoji{
  font-size:clamp(76px,13vh,108px);
  filter:drop-shadow(0 20px 20px rgba(15,23,42,.25));
  animation:idle 2.4s ease-in-out infinite;
}

.petImg.hide,.petEmoji.hide{display:none}

@keyframes idle{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-10px) scale(1.04)}
}

.attackAnim{animation:attack .45s ease}
.hitAnim{animation:hit .45s ease}

@keyframes attack{
  0%{transform:translateX(0) scale(1)}
  50%{transform:translateX(26px) scale(1.12)}
  100%{transform:translateX(0) scale(1)}
}

@keyframes hit{
  0%{filter:brightness(1)}
  25%{filter:brightness(2) drop-shadow(0 0 16px rgba(220,38,38,.8))}
  50%{transform:translateX(-10px)}
  100%{filter:brightness(1)}
}

.hpBar{
  height:14px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  margin:8px 0;
}

.hpFill{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#16a34a,#86efac);
  border-radius:999px;
  transition:width .35s ease;
}

.hpFill.mid{background:linear-gradient(90deg,#facc15,#fb923c)}
.hpFill.low{background:linear-gradient(90deg,#dc2626,#fb7185)}

.meterBar{
  height:8px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  margin:6px 0 2px;
}

.meterFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#38bdf8,#2563eb);
  transition:width .25s ease;
}

.statGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  font-size:12px;
}

.stat{
  background:rgba(255,255,255,.68);
  border:1px solid rgba(148,163,184,.28);
  border-radius:14px;
  padding:8px;
}

.statusTags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  min-height:22px;
  margin-top:6px;
}

.statusTag{
  font-size:11px;
  font-weight:900;
  padding:4px 7px;
  border-radius:999px;
  background:#eef2ff;
  color:#3730a3;
  border:1px solid #c7d2fe;
}

.controls{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:24px;
  padding:8px;
  box-shadow:0 20px 55px rgba(15,23,42,.13);
}

.moves{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.combatControls{display:block}

button{
  border:1px solid #cbd5e1;
  background:#fff;
  border-radius:16px;
  padding:11px;
  cursor:pointer;
  font-weight:900;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(15,23,42,.14);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

.moveBtn{text-align:left}
.moveBtn strong{display:block}
.moveBtn span{display:block;color:var(--muted);font-size:12px;margin-top:3px}

.primary{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:white;border-color:var(--blue)}
.good{background:linear-gradient(135deg,var(--green),#22c55e);color:white;border-color:var(--green)}
.gold{background:linear-gradient(135deg,var(--gold),#f59e0b);color:#111827;border-color:var(--gold)}
.danger{background:linear-gradient(135deg,var(--red),#ef4444);color:white;border-color:var(--red)}

.winner{
  font-size:22px;
  font-weight:900;
  text-align:center;
  padding:12px;
  border-radius:18px;
  background:rgba(250,204,21,.35);
  border:1px solid rgba(245,158,11,.5);
}

@media(max-width:1000px){
  body{overflow:auto}
  .wrap{height:auto}

  .arena{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:auto auto;
    gap:8px;
  }

  .arena > .side:nth-child(1){
    grid-column:1;
    grid-row:1;
  }

  .arena > .side:nth-child(3){
    grid-column:2;
    grid-row:1;
  }

  .arena > .center{
    grid-column:1 / span 2;
    grid-row:2;
  }

  .moves{
    grid-template-columns:1fr 1fr;
  }

  .petImg{
    width:110px;
    height:110px;
  }

  .petEmoji{
    font-size:70px;
  }

  .side{
    padding:8px;
  }
}


/* ===== AI MOBILE USABILITY PATCH v1 =====
   Phone layout only. Keeps the battle readable in the iframe. */
@media (max-width:700px){
  html,body{height:auto;min-height:100%;overflow:auto;}
  .wrap{height:auto;min-height:100dvh;padding:8px;gap:8px;}
  .top{align-items:flex-start;flex-direction:column;border-radius:18px;padding:10px;}
  .top h1{font-size:20px;margin-bottom:4px;}

  /* Phone layout: keep battlers side-by-side and move status/log below. */
  .arena{
    display:grid;
    grid-template-columns:1fr 1fr!important;
    grid-template-rows:auto auto;
    gap:8px;
  }
  .arena > .side:nth-child(1){grid-column:1;grid-row:1;}
  .arena > .side:nth-child(3){grid-column:2;grid-row:1;}
  .arena > .center{grid-column:1 / span 2;grid-row:2;}

  .side{min-width:0;gap:7px;}
  .side,.log,.controls{border-radius:18px;padding:8px;}
  .side h2{font-size:16px;margin:0 0 4px;}
  .side .muted{font-size:11px;}
  .statusTags{gap:4px;}
  .statusTag{font-size:10px;padding:3px 6px;}
  .hpBar{height:11px;margin:6px 0;}
  .meterBar{height:7px;margin:5px 0 2px;}
  .petStage{min-height:165px;border-radius:20px;}
  .petImg{width:104px;height:104px;}
  .petEmoji{font-size:68px;}
  .statGrid{grid-template-columns:1fr 1fr;gap:5px;font-size:10px;}
  .stat{padding:6px;border-radius:12px;}
  .resourceGrid{grid-column:1 / span 2;gap:5px;}
  .resourcePill{padding:5px 6px;font-size:10px;}
  .resourcePill b{font-size:12px;}
  .center{gap:8px;}
  .statusCard,.logCard{border-radius:18px;padding:9px;}
  .statusCard h2,.logCard h3{font-size:16px;}
  .log{min-height:92px;max-height:120px;font-size:12px;}

  .moves{grid-template-columns:1fr 1fr!important;gap:7px;}
  .moveBtn{min-height:68px;padding:9px;border-radius:14px;}
  .moveBtn strong{font-size:13px}
  .moveBtn span{font-size:11px;}
  .winner{font-size:18px;}
  button{font-size:15px;}
}
@media (max-width:420px){
  .wrap{padding:6px;}
  .arena{gap:6px;}
  .side{padding:6px;}
  .petStage{min-height:135px;}
  .petImg{width:88px;height:88px;}
  .petEmoji{font-size:58px;}
  .moves{grid-template-columns:1fr 1fr!important;}
  .moveBtn span{display:none;}
}




/* ===== COMBAT v1: stance + stamina + energy UI ===== */
.resourceGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:6px;
}
.resourcePill{
  border-radius:12px;
  padding:6px 8px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(148,163,184,.3);
  font-size:11px;
  font-weight:900;
  color:#334155;
}
.resourcePill b{display:block;font-size:14px;color:#0f172a;line-height:1.05}
.stancePanel{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:8px;
}
.stanceBtn{
  text-align:left;
  min-height:58px;
  border-radius:16px;
  background:rgba(255,255,255,.82);
}
.stanceBtn strong{display:block;font-size:13px}
.stanceBtn span{display:block;font-size:11px;color:#64748b;margin-top:3px;line-height:1.2}
.stanceBtn.active{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,.16),0 10px 22px rgba(37,99,235,.12);
  background:linear-gradient(180deg,#eff6ff,#fff);
}
.moveBtn small{display:block;color:rgba(255,255,255,.86);font-size:11px;margin-top:3px;line-height:1.15}
.moveBtn.disabledMove{opacity:.52;filter:grayscale(.15)}
@media(max-width:700px){
  .stancePanel{grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:7px}
  .stanceBtn{min-height:54px;padding:8px;border-radius:14px}
  .stanceBtn strong{font-size:12px}.stanceBtn span{font-size:10px}
}
@media(max-width:420px){.stancePanel{grid-template-columns:1fr 1fr 1fr}.stanceBtn{padding:7px}.stanceBtn span{display:none}}


/* ===== COMBAT v1.2: Care Window UI ===== */
.modePanel{
  transition:opacity .18s ease, transform .18s ease;
}
.carePanel{
  display:grid;
  grid-template-columns:minmax(0,1.45fr) minmax(220px,.55fr);
  gap:6px;
  align-items:stretch;
}
.careHeader{
  grid-column:1 / span 2;
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
  padding:5px 9px;
  border-radius:14px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(148,163,184,.28);
}
.careHeader strong{display:block;color:#0f172a;font-size:14px}.careHeader span{font-size:10px;color:#64748b;font-weight:800}
.careMeter{
  min-width:118px;
  height:8px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  border:1px solid rgba(148,163,184,.25);
}
.careMeterFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#86efac,#22c55e);
  transition:width .2s linear;
}
.careOptions,.battleItems{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
.battleItems{grid-template-columns:repeat(2,1fr)}
.careSectionTitle{
  grid-column:1 / -1;
  font-size:11px;
  color:#64748b;
  font-weight:1000;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.careBtn,.battleItemBtn{
  text-align:left;
  min-height:46px;
  padding:7px 8px;
  border-radius:14px;
  background:rgba(255,255,255,.86);
}
.careBtn strong,.battleItemBtn strong{display:block;font-size:12px}.careBtn span,.battleItemBtn span{display:block;font-size:9px;color:#64748b;margin-top:1px;line-height:1.1}
.careBtn.activeCare{
  border-color:#16a34a;
  box-shadow:0 0 0 2px rgba(22,163,74,.16),0 10px 22px rgba(22,163,74,.12);
  background:linear-gradient(180deg,#f0fdf4,#fff);
}
.battleItemBtn.usedCare{
  opacity:.6;
}
.careFxSoothe{box-shadow:0 0 0 3px rgba(34,197,94,.18),0 0 28px rgba(34,197,94,.28)!important}
.careFxTreat{box-shadow:0 0 0 3px rgba(14,165,233,.18),0 0 28px rgba(14,165,233,.28)!important}
.careFxSteady{box-shadow:0 0 0 3px rgba(250,204,21,.2),0 0 28px rgba(250,204,21,.25)!important}
.careFxItem{box-shadow:0 0 0 3px rgba(124,58,237,.18),0 0 28px rgba(124,58,237,.28)!important}
.careFxLock{box-shadow:0 0 0 3px rgba(249,115,22,.22),0 0 34px rgba(249,115,22,.34)!important}
.careFxGuard{box-shadow:0 0 0 3px rgba(59,130,246,.20),0 0 34px rgba(59,130,246,.30)!important}
.finisherReadyStage{box-shadow:0 0 0 3px rgba(250,204,21,.26),0 0 36px rgba(250,204,21,.48)!important;animation:finisherStagePulse 1.15s ease-in-out infinite}
.enemyFinisherReady{box-shadow:0 0 0 3px rgba(239,68,68,.22),0 0 36px rgba(249,115,22,.45)!important;animation:finisherStagePulse 1.15s ease-in-out infinite}
@keyframes finisherStagePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.08)}}
.finisherAction{grid-column:1 / -1;background:linear-gradient(135deg,#f97316,#facc15,#ef4444);color:#111827;border-color:#f59e0b;text-align:center;box-shadow:0 12px 28px rgba(249,115,22,.22);animation:finisherPulse .9s ease-in-out infinite}
.finisherAction small{color:rgba(17,24,39,.78)!important}
.finisherBar{
  height:9px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  margin:5px 0 2px;
  border:1px solid rgba(148,163,184,.22);
}
.finisherFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#f59e0b,#facc15,#f97316);
  transition:width .25s ease, box-shadow .25s ease;
}
.finisherFill.ready{animation:finisherPulse .85s ease-in-out infinite;box-shadow:0 0 14px rgba(250,204,21,.9)}
@keyframes finisherPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.45)}}
.careMiniMeter{
  height:5px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  margin-top:4px;
  border:1px solid rgba(148,163,184,.22);
}
.careMiniFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#94a3b8,#64748b);
  transition:width .4s ease;
}
.careMiniText{
  margin-top:2px;
  font-size:9px;
  color:#64748b;
  font-weight:900;
}
.careBtn.activeCare .careMiniFill{filter:brightness(1.12)}
.damageFloat{
  position:absolute;
  left:50%;
  top:38%;
  z-index:5;
  pointer-events:none;
  font-size:30px;
  font-weight:1000;
  color:#dc2626;
  text-shadow:0 3px 0 rgba(255,255,255,.95),0 8px 18px rgba(15,23,42,.28);
  transform:translate(-50%,0) scale(.92);
  animation:damageFloatUp .95s ease-out forwards;
}
.damageFloat.heal{color:#16a34a}
.damageFloat.miss{color:#64748b;font-size:24px}
.damageFloat.finisher{color:#f59e0b;font-size:34px;text-shadow:0 3px 0 rgba(255,255,255,.95),0 0 18px rgba(250,204,21,.7),0 8px 20px rgba(15,23,42,.32)}
.typeFx{
  position:absolute;
  left:50%;
  top:46%;
  z-index:4;
  width:88px;
  height:88px;
  pointer-events:none;
  border-radius:999px;
  transform:translate(-50%,-50%) scale(.55);
  opacity:0;
  mix-blend-mode:multiply;
  animation:typeFxPop .72s ease-out forwards;
}
.typeFx.finisherFx{width:128px;height:128px;animation:typeFxPop 1.05s ease-out forwards}
.typeFx.fire{background:radial-gradient(circle,rgba(251,113,133,.9),rgba(249,115,22,.48) 42%,transparent 72%)}
.typeFx.water{background:radial-gradient(circle,rgba(125,211,252,.95),rgba(14,165,233,.42) 45%,transparent 74%)}
.typeFx.grass{background:radial-gradient(circle,rgba(134,239,172,.95),rgba(22,163,74,.38) 45%,transparent 74%)}
.typeFx.electric{background:radial-gradient(circle,rgba(254,240,138,.95),rgba(250,204,21,.52) 38%,transparent 68%)}
.typeFx.shadow{background:radial-gradient(circle,rgba(167,139,250,.82),rgba(76,29,149,.34) 48%,transparent 76%);mix-blend-mode:normal}
.typeFx.earth{background:radial-gradient(circle,rgba(217,119,6,.62),rgba(120,53,15,.28) 48%,transparent 75%)}
.typeFx.light{background:radial-gradient(circle,rgba(255,255,255,.95),rgba(250,204,21,.55) 42%,transparent 72%)}
.typeFx.normal{background:radial-gradient(circle,rgba(203,213,225,.95),rgba(100,116,139,.34) 48%,transparent 74%)}
.typeFx.rest{background:radial-gradient(circle,rgba(187,247,208,.9),rgba(34,197,94,.32) 48%,transparent 74%)}
.typeFx:after{content:'';position:absolute;inset:18%;border:2px solid rgba(255,255,255,.72);border-radius:999px;animation:typeFxRing .72s ease-out forwards}
.typeFx.finisherFx:after{inset:8%;border-color:rgba(250,204,21,.9);border-width:3px}
@keyframes typeFxPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.35)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.45)}}
@keyframes typeFxRing{0%{opacity:.9;transform:scale(.45)}100%{opacity:0;transform:scale(1.65)}}
@keyframes damageFloatUp{
  0%{opacity:0;transform:translate(-50%,8px) scale(.82)}
  18%{opacity:1;transform:translate(-50%,-4px) scale(1.08)}
  100%{opacity:0;transform:translate(-50%,-52px) scale(1)}
}
@media(max-width:700px){
  .damageFloat{font-size:23px;top:34%}
  .damageFloat.finisher{font-size:27px}
  .carePanel{grid-template-columns:1fr;gap:6px}
  .careHeader{grid-column:1;align-items:center;flex-direction:row;padding:6px 8px}
  .careHeader span{font-size:10px}
  .careMeter{width:110px;min-width:90px}
  .careOptions{grid-template-columns:repeat(5,1fr);gap:5px}
  .battleItems{grid-template-columns:1fr 1fr;gap:5px}
  .careBtn,.battleItemBtn{min-height:48px;padding:7px;border-radius:13px}
  .careBtn strong,.battleItemBtn strong{font-size:11px}.careBtn span,.battleItemBtn span{font-size:9px}
  .careMiniMeter{height:5px;margin-top:4px}
  .careMiniText{font-size:9px}
}
@media(max-width:420px){
  .careOptions{grid-template-columns:1fr 1fr}
  .careBtn span{display:none}
}
.exhaustedNotice{
  grid-column:1 / -1;
  padding:9px 10px;
  border-radius:16px;
  background:rgba(15,23,42,.07);
  border:1px solid rgba(148,163,184,.28);
  font-size:12px;
  color:#475569;
  font-weight:900;
}
.restAction{background:linear-gradient(135deg,#16a34a,#86efac);color:#052e16;border-color:#22c55e}
.flailAction{background:linear-gradient(135deg,#64748b,#cbd5e1);color:#0f172a;border-color:#94a3b8}



.stanceHint{grid-column:1 / -1;font-size:11px;font-weight:900;color:#475569;background:rgba(255,255,255,.62);border:1px solid rgba(148,163,184,.25);border-radius:12px;padding:6px 8px}

  border-color:#fecaca;
}

}

}

.resultActions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}

<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Pet Battle Arena</h1>
      <div class="muted">Turn-based companion battles with initiative, status effects, and slower pacing.</div>
    </div>
    <div class="battleActions">
      <span id="meBadge" class="badge">Loading</span>
      <span id="turnBadge" class="badge">Waiting</span>
      <button id="forfeitBtn" class="forfeitBtn" onclick="requestForfeitBattle()">🏳 Forfeit Battle</button>
    </div>
  </div>

  <div class="arena">
    <div class="side">
      <div>
        <h2 id="p0Name">Player 1</h2>
        <div id="p0Sub" class="muted">Loading...</div>
        <div class="hpBar"><div id="p0Hp" class="hpFill"></div></div>
        <div id="p0HpText" class="muted"></div>
        <div class="meterBar"><div id="p0Meter" class="meterFill"></div></div>
        <div id="p0MeterText" class="muted"></div>
        <div class="finisherBar"><div id="p0Finisher" class="finisherFill"></div></div>
        <div id="p0FinisherText" class="muted"></div>
        <div id="p0Statuses" class="statusTags"></div>
      </div>

      <div class="petStage">
        <img id="p0Img" class="petImg hide">
        <div id="p0Emoji" class="petEmoji">🥚</div>
      </div>

      <div id="p0Stats" class="statGrid"></div>
    </div>

    <div class="center">
      <div class="statusCard">
        <h2 id="statusTitle">Loading pets...</h2>
        <p id="statusText" class="muted">Both seated players need active pets.</p>
        <div id="winnerBox"></div>
      </div>

      <div class="logCard">
        <h3>Battle Log</h3>
        <div id="battleLog" class="log"></div>
      </div>
    </div>

    <div class="side">
      <div>
        <h2 id="p1Name">Player 2</h2>
        <div id="p1Sub" class="muted">Loading...</div>
        <div class="hpBar"><div id="p1Hp" class="hpFill"></div></div>
        <div id="p1HpText" class="muted"></div>
        <div class="meterBar"><div id="p1Meter" class="meterFill"></div></div>
        <div id="p1MeterText" class="muted"></div>
        <div class="finisherBar"><div id="p1Finisher" class="finisherFill"></div></div>
        <div id="p1FinisherText" class="muted"></div>
        <div id="p1Statuses" class="statusTags"></div>
      </div>

      <div class="petStage enemy">
        <img id="p1Img" class="petImg hide">
        <div id="p1Emoji" class="petEmoji">🥚</div>
      </div>

      <div id="p1Stats" class="statGrid"></div>
    </div>
  </div>

  <div class="controls">
    <div id="moveButtons" class="combatControls"></div>
  </div>
</div>

<div id="resultOverlay" class="resultOverlay" role="dialog" aria-modal="true">
  <div class="resultCard" id="resultCard"></div>
</div>

<script>
var GAME_META={id:'petbattle',name:'Pet Battle Arena',minPlayers:2,maxPlayers:2,seats:2};

var players=[];
var mySeat=null;
var profiles={};
var moveBook={};
var itemCatalog={};
var careUiTimer=null;
var lastControlModeKey='';
var lastActionFxKey='';
var lastStateRequestAt=0;
var lastSeenRemoteVersion=0;
var lastCareSyncAt=0;
var state=null;
var ready=false;
var battleInstanceId=new URLSearchParams(location.search).get('battleInstance')||'';
var instanceSocket=null;
var lockedInstance=null;
var battleEnded=false;
var lastServerResult=null;
var selectedStance=localStorage.getItem('gf_petbattle_stance')||'balanced';

function el(id){return document.getElementById(id);}
function seatIndex(v){
  if(v===null||v===undefined||v==='')return null;
  var n=Number(v);
  return Number.isFinite(n)?n:null;
}
function currentTurnIndex(){return state?seatIndex(state.turn):null;}
function isMyTurn(){return mySeat!==null&&mySeat!==undefined&&currentTurnIndex()===mySeat;}

function receiveSetup(setupPlayers,setupSeat){
  players=(setupPlayers||[]).slice(0,2);
  mySeat=seatIndex(setupSeat);

  meBadge.innerText=mySeat===null||mySeat===undefined?'Spectator':'Seat '+(mySeat+1);

  if(players.length<2){
    setStatus('Waiting for 2 players','Pet Battle needs two seated players.');
    if(!careUiTimer){careUiTimer=setInterval(refreshCareMeter,500);}

drawEmpty();
    return;
  }

  loadProfiles();
}

async function loadProfiles(){
  // Normal launcher/private-table path:
  // The legacy launcher tells Pet Battle who is seated, then this file loads each
  // player's active pet profile. Battle Hall bypasses this with locked snapshots.
  try{
    profiles={};
    moveBook={};

    for(var i=0;i<players.length;i++){
      var name=players[i].name;
      var res=await fetch('/api/pet/profile?user='+encodeURIComponent(name));
      var data=await res.json();

      if(data.error||!data.ok){
        setStatus('Could not load '+name,data.error||'Pet profile unavailable.');
        return;
      }

      profiles[i]=data.profile;
      moveBook=data.moves||moveBook||{};
      itemCatalog=Object.assign(itemCatalog||{},data.shop||{});
    }

    ready=true;

    if(mySeat===0&&!state){
      state=freshBattle();
      sync();
    }

    if(state)draw();
    else setStatus('Waiting for host','Seat 1 is preparing the battle.');
  }catch(err){
    setStatus('Battle load failed',err.message);
  }
}

function loadLockedInstance(instance){
  // Battle Hall / Direct Challenge path:
  // The server has already chosen the two battlers and frozen battle pet snapshots.
  // We wrap those snapshots in the same profile shape used by the older battle UI
  // so the renderer can stay simple and readable.
  lockedInstance=instance;
  players=(instance.players||[]).map(function(p){return {name:p.username||p.name};}).slice(0,2);
  mySeat=seatIndex(instance.mySeat);
  profiles={};
  moveBook=instance.moves||{};
  itemCatalog=instance.items||itemCatalog||{};

  (instance.players||[]).forEach(function(p,index){
    var pet=p.lockedPet||{};
    profiles[index]={
      username:p.username,
      activePetId:pet.id,
      pets:{}
    };
    profiles[index].pets[pet.id]=pet;
  });

  meBadge.innerText=mySeat===null||mySeat===undefined?'Spectator':'Seat '+(mySeat+1);
  ready=true;

  if(instance.state){
    state=instance.state;
    draw();
  }else if(mySeat===0&&!state){
    state=freshBattle();
    sync();
  }else{
    setStatus('Battle ready','Waiting for the first battler to open the arena.');
    if(!careUiTimer){careUiTimer=setInterval(refreshCareMeter,500);}

drawEmpty();
  }
}

function connectBattleInstance(){
  if(!battleInstanceId)return false;

  var username=localStorage.getItem('gf_user')||'';
  if(!username){
    setStatus('Login required','Log in before joining a locked battle instance.');
    return true;
  }

  setStatus('Joining locked battle','Loading server-approved pets and opponent.');
  var protocol=location.protocol==='https:'?'wss://':'ws://';
  instanceSocket=new WebSocket(protocol+location.host);

  instanceSocket.onopen=function(){
    instanceSocket.send(JSON.stringify({type:'hello',username:username}));
    instanceSocket.send(JSON.stringify({type:'battleInstanceJoin',instanceId:battleInstanceId}));
  };

  instanceSocket.onmessage=function(event){
    var msg;
    try{msg=JSON.parse(event.data||'{}');}catch(e){return;}

    if(msg.type==='battleInstanceSetup'){
      loadLockedInstance(msg.instance);
      return;
    }

    if(msg.type==='battleInstanceResult'){
      handleServerBattleResult(msg.result,msg.role,msg.reward);
      return;
    }

    if(msg.type==='battleInstanceMove'&&window.onMove){
      if(msg.version!==undefined)lastSeenRemoteVersion=Number(msg.version||0);
      window.onMove(msg.data);
      return;
    }

    if(msg.type==='error')setStatus('Battle error',msg.message||'Something went wrong.');
  };

  instanceSocket.onclose=function(){
    if(!state)setStatus('Connection closed','Could not stay connected to the battle instance.');
  };

  return true;
}

function activePetForSeat(seat){
  var profile=profiles[seat];
  if(!profile)return null;
  return profile.pets[profile.activePetId];
}

function battlePet(seat){
  var p=activePetForSeat(seat);
  if(!p)return null;

  var stats=p.stats||{};
  var stage=p.stage||'egg';

  return {
    owner:players[seat].name,
    name:p.name||'Pet',
    stage:stage,
    species:p.species||'egg',
    type:p.type||'normal',
    emoji:p.emoji||'🥚',
    stats:{
      level:Number(stats.level||1),
      hp:Number(stats.hp||20),
      maxHp:Number(stats.maxHp||20),
      attack:Number(stats.attack||5),
      defense:Number(stats.defense||4),
      speed:Number(stats.speed||5)
    },
    moves:(p.moves&&p.moves.length?p.moves:['tackle']).slice(0,4)
  };
}

function freshBattle(){
  var a=battlePet(0);
  var b=battlePet(1);

  if(!a||!b)return null;

  if(a.stage==='egg'||b.stage==='egg'){
    return {
      pets:[a,b],
      hp:[a.stats.maxHp,b.stats.maxHp],
      meter:[0,0],
      stamina:[100,100],
      energy:[5,5],
      stance:['balanced','balanced'],
      status:[{},{}],
      care:[emptyCare(),emptyCare()],
      finisher:[0,0],
      finisherReady:[false,false],
      guard:[false,false],
      turn:null,
      round:1,
      winner:null,
      blocked:true,
      log:['Eggs cannot battle yet. Hatch both companions first.'],
      lastAction:null
    };
  }

  var first=a.stats.speed>=b.stats.speed?0:1;
  var second=first===0?1:0;

  return {
    pets:[a,b],
    hp:[a.stats.maxHp,b.stats.maxHp],
    meter:[
      first===0?72:52,
      first===1?72:52
    ],
    stamina:[100,100],
    energy:[5,5],
    stance:['balanced','balanced'],
    status:[{},{}],
    care:[emptyCare(),emptyCare()],
    finisher:[0,0],
    finisherReady:[false,false],
    guard:[false,false],
    turn:null,
    round:1,
    winner:null,
    blocked:false,
    log:[
      'Battle started: '+a.name+' vs '+b.name+'.',
      'New combat rules: stance, stamina, and energy now decide momentum.',
      'Brace punishes reckless attacks. Focus builds energy but is risky. Push hits harder but drains stamina.'
    ],
    lastAction:null
  };
}

function drawEmpty(){
  p0Name.innerText=players[0]?players[0].name:'Seat 1';
  p1Name.innerText=players[1]?players[1].name:'Seat 2';
  p0Sub.innerText='No pet loaded';
  p1Sub.innerText='No pet loaded';
  moveButtons.innerHTML='';
}

function draw(){
  if(!state)return;

  if(!state.blocked&&state.winner===null&&state.turn===null){
    advanceInitiative();
  }

  drawPetSide(0);
  drawPetSide(1);
  drawLog();
  drawMoves();

  if(state.blocked){
    setStatus('Battle unavailable','Eggs cannot battle. Hatch both companions first.');
    winnerBox.innerHTML='';
    turnBadge.innerText='Blocked';
    return;
  }

  if(state.winner!==null){
    var winnerName=players[state.winner].name;
    setStatus('Battle Complete',winnerName+' wins the battle!');
    winnerBox.innerHTML='<div class="winner">🏆 '+escapeHtml(winnerName)+' wins!</div>';
    turnBadge.innerText='Finished';
  }else{
    winnerBox.innerHTML='';
    var turnName=state.turn===null?'Charging':players[state.turn].name;
    setStatus(state.turn===null?'Charging Initiative':'Current Turn',state.turn===null?'Pets are building initiative.':turnName+' chooses a move.');
    turnBadge.innerText=state.turn===null?'Charging':'Turn: '+turnName;
  }

  playLastActionFxOnce();
}

function drawPetSide(seat){
  var pet=state.pets[seat];
  var hp=state.hp[seat];
  var pct=Math.max(0,Math.min(100,Math.floor(hp/pet.stats.maxHp*100)));
  var hpFill=el('p'+seat+'Hp');
  var meter=state.meter?Number(state.meter[seat]||0):0;

  el('p'+seat+'Name').innerText=players[seat]?players[seat].name:'Seat '+(seat+1);
  el('p'+seat+'Sub').innerText=pet.name+' · '+pet.type+' · Lv '+pet.stats.level;
  el('p'+seat+'HpText').innerText=formatHp(hp)+' / '+pet.stats.maxHp+' HP';

  hpFill.style.width=pct+'%';
  hpFill.className='hpFill '+(pct<30?'low':pct<60?'mid':'');

  el('p'+seat+'Meter').style.width=Math.max(0,Math.min(100,meter))+'%';
  el('p'+seat+'MeterText').innerText='Initiative '+Math.floor(Math.max(0,Math.min(100,meter)))+'%';

  var fin=Math.floor(Math.max(0,Math.min(100,Number(state.finisher&&state.finisher[seat]!==undefined?state.finisher[seat]:0))));
  var finFill=el('p'+seat+'Finisher');
  if(finFill){
    finFill.style.width=fin+'%';
    finFill.className='finisherFill '+(fin>=100?'ready':'');
  }
  var finText=el('p'+seat+'FinisherText');
  if(finText)finText.innerText=fin>=100?'🔥 FINISHER READY':'Finisher '+fin+'%';

  el('p'+seat+'Statuses').innerHTML=statusTags(seat);

  var stamina=Math.floor(Math.max(0,Math.min(100,Number(state.stamina&&state.stamina[seat]!==undefined?state.stamina[seat]:100))));
  var energy=Math.floor(Math.max(0,Math.min(10,Number(state.energy&&state.energy[seat]!==undefined?state.energy[seat]:5))));

  el('p'+seat+'Stats').innerHTML=
    stat('Attack',effectiveAttack(seat))+
    stat('Defense',effectiveDefense(seat))+
    stat('Speed',effectiveSpeed(seat))+
    stat('Stance',stanceLabel(currentStance(seat)))+
    '<div class="resourceGrid"><div class="resourcePill"><b>'+energy+'/10</b>Energy</div><div class="resourcePill"><b>'+stamina+'%</b>Stamina</div></div>';

  setPetVisual(seat,pet);
  updatePetStageState(seat);
}

function formatHp(v){
  v=Number(v||0);
  return Math.abs(v-Math.round(v))<0.05 ? String(Math.round(v)) : String(Math.round(v*10)/10);
}

function updatePetStageState(seat){
  var stage=document.querySelectorAll('.petStage')[seat];
  if(!stage||!state)return;
  stage.classList.remove('finisherReadyStage','enemyFinisherReady');
  var ready=state.finisherReady&&state.finisherReady[seat];
  if(!ready)return;
  stage.classList.add(seat===mySeat?'finisherReadyStage':'enemyFinisherReady');
}

function statusTags(seat){
  var s=(state&&state.status&&state.status[seat])?state.status[seat]:{};
  var labels=[];

  if(s.burn>0)labels.push('🔥 Burn');
  if(s.slow>0)labels.push('🐢 Slow');
  if(s.sleep>0)labels.push('💤 Sleep');
  if(s.stun>0)labels.push('💫 Stun');
  if(s.snare>0)labels.push('🌿 Snare');
  if(s.attack_up>0)labels.push('⚔️ Atk+');
  if(s.attack_down>0)labels.push('⚔️ Atk-');
  if(s.defense_up>0)labels.push('🛡️ Def+');
  if(s.defense_down>0)labels.push('🛡️ Def-');
  if(s.speed_up>0)labels.push('💨 Spd+');

  if(state&&state.guard&&state.guard[seat])labels.push('🛡️ Guarding');
  labels.unshift(stanceIcon(currentStance(seat))+' '+stanceLabel(currentStance(seat)));

  if(!labels.length)return '<span class="muted">No status</span>';

  return labels.map(function(x){
    return '<span class="statusTag">'+escapeHtml(x)+'</span>';
  }).join('');
}

function setPetVisual(seat,pet){
  var img=el('p'+seat+'Img');
  var emoji=el('p'+seat+'Emoji');

  emoji.innerText=pet.emoji||'🥚';

  var src=petAssetPath(pet);

  img.onload=function(){
    img.classList.remove('hide');
    emoji.classList.add('hide');
  };

  img.onerror=function(){
    img.classList.add('hide');
    emoji.classList.remove('hide');
  };

  if(img.src.indexOf(src)===-1){
    img.src=src;
  }
}

function petAssetPath(pet){
  if(!pet||pet.stage==='egg'){
    return '/assets/pets/egg/egg_idle.png';
  }

  var species=pet.species||'egg';
  var stage=pet.stage||'baby';
  var file=stage==='adult'?'adult':(stage==='young'||stage==='teen')?'young':'baby';

  return '/assets/pets/'+species+'/'+file+'.png';
}

function stat(k,v){
  return '<div class="stat"><b>'+escapeHtml(k)+'</b><br>'+escapeHtml(v)+'</div>';
}

function drawLog(){
  battleLog.innerHTML=state.log.slice(-24).map(function(x){
    return '• '+escapeHtml(x);
  }).join('<br>');
  battleLog.scrollTop=battleLog.scrollHeight;
}


function requestFreshBattleState(reason){
  var now=Date.now();
  if(now-lastStateRequestAt<1200)return;
  lastStateRequestAt=now;
  try{
    if(battleInstanceId&&instanceSocket&&instanceSocket.readyState===1){
      instanceSocket.send(JSON.stringify({type:'battleInstanceRequestState',instanceId:battleInstanceId,reason:reason||'care-sync'}));
    }else{
      parent.postMessage({type:'move',data:{type:'gameStateRequest',reason:reason||'care-sync'}},'*');
    }
  }catch(e){}
}

function drawMoves(){
  var html='';

  if(!state||state.blocked){
    var blockedKey='blocked';
    if(lastControlModeKey!==blockedKey){
      moveButtons.innerHTML='<button disabled>Battle unavailable</button>';
      lastControlModeKey=blockedKey;
    }
    return;
  }

  if(state.winner!==null){
    var finishedKey='finished:'+state.winner;
    if(lastControlModeKey!==finishedKey){
      moveButtons.innerHTML='<button class="gold" onclick="showLocalBattleResult()">Show Results</button><button onclick="returnToHub()">Return to Hub</button>';
      lastControlModeKey=finishedKey;
    }
    return;
  }

  ensureBattleShape();

  if(!isMyTurn()){
    var care=state.care&&state.care[mySeat]?state.care[mySeat]:emptyCare();
    var itemIds=battleItemsForSeat(mySeat).slice(0,4).map(function(x){return x.id+':'+x.quantity;}).join('|');
    var careKey='care:r'+state.round+':turn'+state.turn+':mine'+mySeat+':type'+(care.type||'none')+':item'+(care.itemId||'')+':'+itemIds;
    if(lastControlModeKey!==careKey){
      drawCareControls();
      lastControlModeKey=careKey;
    }else{
      refreshCareLiveUI();
    }
    requestFreshBattleState('care-window');
    return;
  }

  var pet=state.pets[mySeat];
  var attackKey='attack:r'+state.round+':turn'+state.turn+':stance'+selectedStance+':e'+Math.floor(Number(state.energy[mySeat]||0))+':s'+Math.floor(Number(state.stamina[mySeat]||0))+':fin'+Math.floor(Number(state.finisher&&state.finisher[mySeat]||0))+':ready'+(state.finisherReady&&state.finisherReady[mySeat]?'1':'0');
  if(lastControlModeKey===attackKey)return;
  lastControlModeKey=attackKey;

  html+='<div class="stancePanel modePanel">';
  html+='<div class="stanceHint">Stance choice is queued for your next attack. Current: '+escapeHtml(stanceLabel(currentStance(mySeat)))+'</div>';
  ['balanced','brace','focus'].forEach(function(id){
    var info=STANCE[id];
    var queued=selectedStance===id;
    var live=currentStance(mySeat)===id;
    html+='<button class="stanceBtn '+(queued?'active':'')+' '+(live?'liveStance':'')+'" onclick="selectStance(\''+id+'\')">'+
      '<strong>'+escapeHtml(info.icon+' '+info.name)+(queued?' · Queued':'')+'</strong><span>'+escapeHtml(info.short+' · '+info.detail)+'</span></button>';
  });
  html+='</div>';

  html+='<div class="moves modePanel">';

  if(isExhaustedForMoves(pet)){
    html+='<div class="exhaustedNotice">⚠️ Too tired for trained moves. Use Flail as a weak desperation hit, or Rest to recover stamina.</div>';
    html+='<button class="moveBtn flailAction" onclick="useMove(\'__flail__\')"><strong>😵 Flail</strong><span>Weak hit when exhausted.</span><small>Energy 0 · Stamina 0 · emergency only</small></button>';
    html+='<button class="moveBtn restAction" onclick="useMove(\'__rest__\')"><strong>🌿 Rest</strong><span>Recover stamina and reset your footing.</span><small>Restores stamina · uses your attack turn</small></button>';
    html+='</div>';
    moveButtons.innerHTML=html;
    return;
  }

  if(state.finisherReady&&state.finisherReady[mySeat]&&Number(state.stamina[mySeat]||0)>=22&&Number(state.energy[mySeat]||0)>=2){
    html+='<button class="moveBtn finisherAction" onclick="useFinisher()"><strong>🔥 FINISHER</strong><span>Spend Fury for a major swing.</span><small>Manual use · costs 2 energy / 22 stamina</small></button>';
  }
  pet.moves.forEach(function(id){
    var m=moveBook[id]||{name:id,type:'normal',category:'physical',power:30,accuracy:95};
    var category=m.category||'physical';
    var powerText=Number(m.power||0)>0?'Power '+Number(m.power||30):'Status';
    var cost=moveInitiativeCost(m);
    var energyCost=moveEnergyCost(m);
    var staminaCost=moveStaminaCost(m,selectedStance);
    var enoughEnergy=Number(state.energy[mySeat]||0)>=energyCost;
    var enoughStamina=Number(state.stamina[mySeat]||0)>=staminaCost;
    var canUse=enoughEnergy&&enoughStamina;
    var disabledClass=canUse?'':' disabledMove';
    var disabledAttr=canUse?'':'disabled title="Not enough '+(!enoughEnergy?'energy':'stamina')+'"';

    html+='<button class="moveBtn primary'+disabledClass+'" onclick="useMove(\''+id+'\')" '+disabledAttr+'>'+
      '<strong>'+escapeHtml(m.name)+'</strong>'+ 
      '<span>'+escapeHtml(m.type||'normal')+' · '+escapeHtml(category)+' · '+powerText+'</span>'+ 
      '<small>Energy '+energyCost+' · Stamina '+staminaCost+' · Init '+cost+'</small>'+ 
    '</button>';
  });
  html+='</div>';

  moveButtons.innerHTML=html;
}

function isExhaustedForMoves(pet){
  if(!state||mySeat===null||mySeat===undefined||!pet)return false;
  var stamina=Number(state.stamina&&state.stamina[mySeat]!==undefined?state.stamina[mySeat]:100);
  var energy=Number(state.energy&&state.energy[mySeat]!==undefined?state.energy[mySeat]:5);
  var moves=(pet.moves&&pet.moves.length?pet.moves:[]);
  if(stamina<=0)return true;
  if(!moves.length)return stamina<8;
  return !moves.some(function(id){
    var m=moveBook[id]||{name:id,type:'normal',category:'physical',power:30,accuracy:95};
    return stamina>=moveStaminaCost(m,selectedStance) && energy>=moveEnergyCost(m);
  });
}

}

function selectCare(type){
  if(!state||state.winner!==null||state.blocked)return;
  if(isMyTurn())return;
  ensureBattleShape();

  if(!CARE_ACTIONS[type])type='soothe';

  // Bank whatever the previous care action earned before switching.
  applyCareTick(mySeat,true);

  if(state.guard)state.guard[mySeat]=(type==='guard');
  state.care[mySeat]={
    type:type,
    start:Date.now(),
    lastTick:Date.now(),
    itemId:null,
    locked:false,
    baseHp:state.hp&&state.hp[mySeat]!==undefined?Number(state.hp[mySeat]||0):0,
    gain:0,
    treatProgress:0
  };
  addLog(state.pets[mySeat].name+' begins '+CARE_ACTIONS[type].label+'.');
  selectedCareFx(mySeat,type);
  lastControlModeKey='';
  draw();
  sync();
}

function battleItemsForSeat(seat){
  var profile=profiles&&profiles[seat]?profiles[seat]:null;
  var inv=(profile&&profile.inventory)||{};
  var out=[];
  Object.keys(inv).forEach(function(id){
    var qty=Number(inv[id]||0);
    if(qty<=0)return;
    var item=(itemCatalog&&itemCatalog[id])||{};
    if(isBattleEnabledItem(item))out.push({id:id,quantity:qty,item:item});
  });
  return out.sort(function(a,b){return String(a.item.name||a.id).localeCompare(String(b.item.name||b.id));});
}

function isBattleEnabledItem(item){
  item=item||{};
  var tags=item.tags||[];
  return item.battleEnabled===true || item.category==='battle' || tags.indexOf('battle')>=0 || !!item.battleEffect;
}

function useBattleItem(itemId){
  if(!state||state.winner!==null||state.blocked)return;
  if(isMyTurn())return;
  ensureBattleShape();

  var profile=profiles&&profiles[mySeat]?profiles[mySeat]:null;
  if(!profile||!profile.inventory||Number(profile.inventory[itemId]||0)<=0)return;
  var item=(itemCatalog&&itemCatalog[itemId])||{};
  if(!isBattleEnabledItem(item))return;
  if(state.care[mySeat]&&state.care[mySeat].type==='item')return;

  profile.inventory[itemId]=Math.max(0,Number(profile.inventory[itemId]||0)-1);
  if(profile.inventory[itemId]<=0)delete profile.inventory[itemId];

  state.care[mySeat]={type:'item',itemId:itemId,start:Date.now(),lastTick:Date.now(),locked:true,gain:0,treatProgress:0};
  applyBattleItemEffect(mySeat,itemId,item);
  selectedCareFx(mySeat,'item');
  addLog(state.pets[mySeat].name+' used '+(item.name||itemId)+' during the Care Window.');
  lastControlModeKey='';
  draw();
  sync();
}

function applyCareBeforeIncoming(seat){
  ensureBattleShape();
  var care=state.care&&state.care[seat]?state.care[seat]:emptyCare();
  if(!care.type || care.type==='item')return;

  // Care effects are now live while selected. This call simply banks the final
  // partial tick before the incoming attack resolves.
  applyCareTick(seat,true);

  if(care.type==='guard'){
    state.guard[seat]=true;
    addLog(state.pets[seat].name+' held guard at impact.');
  }

  state.care[seat]=emptyCare();
}

function applyCareTick(seat,force){
  if(!state||seat===null||seat===undefined)return false;
  ensureBattleShape();
  var care=state.care&&state.care[seat]?state.care[seat]:emptyCare();
  if(!care.type || care.type==='item')return false;
  var pet=state.pets&&state.pets[seat]?state.pets[seat]:null;
  if(!pet||!pet.stats)return false;

  var now=Date.now();
  var last=Number(care.lastTick||care.start||now);
  var deltaMs=Math.max(0,Math.min(1500,now-last));
  if(deltaMs<450 && !force)return false;
  var seconds=deltaMs/1000;
  var changed=false;

  if(care.type==='soothe'){
    var maxGain=Number(pet.stats.maxHp||1)*0.05;
    var currentGain=Number(care.gain||0);
    var tickGain=Number(pet.stats.maxHp||1)*0.005*seconds;
    var allowed=Math.max(0,Math.min(maxGain-currentGain,tickGain));
    if(allowed>0 && Number(state.hp[seat]||0)<Number(pet.stats.maxHp||0)){
      var before=Number(state.hp[seat]||0);
      state.hp[seat]=Math.min(Number(pet.stats.maxHp||before),before+allowed);
      care.gain=currentGain+(state.hp[seat]-before);
      changed=state.hp[seat]!==before;
    }
  }else if(care.type==='steady'){
    var staminaGain=2.25*seconds;
    var beforeStam=Number(state.stamina[seat]||0);
    state.stamina[seat]=clampResource(beforeStam+staminaGain,0,100);
    care.gain=Number(care.gain||0)+(state.stamina[seat]-beforeStam);
    changed=state.stamina[seat]!==beforeStam;
  }else if(care.type==='lockin'){
    var furyGain=1.6*seconds;
    var beforeFury=Number(state.finisher[seat]||0);
    state.finisher[seat]=clampResource(beforeFury+furyGain,0,100);
    state.finisherReady[seat]=state.finisher[seat]>=100;
    care.gain=Number(care.gain||0)+(state.finisher[seat]-beforeFury);
    changed=state.finisher[seat]!==beforeFury;
  }else if(care.type==='treat'){
    care.treatProgress=Number(care.treatProgress||0)+seconds;
    if(care.treatProgress>=4){
      var reduced=reduceWorstAilment(seat,1);
      care.treatProgress=0;
      if(reduced){
        addLog(state.pets[seat].name+' treated '+reduced+' during the Care Window.');
        changed=true;
      }
    }
  }else if(care.type==='guard'){
    if(state.guard && !state.guard[seat])changed=true;
    if(state.guard)state.guard[seat]=true;
  }

  care.lastTick=now;
  state.care[seat]=care;

  if(changed && seat===mySeat){
    var syncNow=Date.now();
    if(syncNow-lastCareSyncAt>900){
      lastCareSyncAt=syncNow;
      sync();
    }
  }
  return changed;
}

function reduceWorstAilment(seat,amount){
  var s=state.status&&state.status[seat]?state.status[seat]:{};
  var order=['burn','stun','sleep','snare','slow','attack_down','defense_down'];
  for(var i=0;i<order.length;i++){
    var k=order[i];
    if(s[k]&&s[k]>0){
      s[k]=Math.max(0,Number(s[k]||0)-amount);
      if(s[k]<=0){delete s[k];delete s[k+'_amount'];}
      return k.replace('_',' ');
    }
  }
  return '';
}

function applyBattleItemEffect(seat,itemId,item){
  ensureBattleShape();
  item=item||{};
  var effect=item.battleEffect||battleEffectFromLegacyItem(item)||{kind:'stamina',amount:10};
  var pet=state.pets[seat];

  if(effect.kind==='heal'){
    var heal=Math.max(1,Number(effect.amount||12));
    state.hp[seat]=Math.min(pet.stats.maxHp,Number(state.hp[seat]||0)+heal);
  }else if(effect.kind==='stamina'){
    state.stamina[seat]=clampResource(Number(state.stamina[seat]||0)+Number(effect.amount||14),0,100);
  }else if(effect.kind==='energy'){
    state.energy[seat]=clampResource(Number(state.energy[seat]||0)+Number(effect.amount||2),0,10);
  }else if(effect.kind==='cleanse'){
    reduceWorstAilment(seat,Number(effect.amount||1));
  }else if(effect.kind==='attack_up'){
    applyTempBuff(seat,'attack_up',Number(effect.amount||2),Number(effect.duration||2));
  }else if(effect.kind==='defense_up'){
    applyTempBuff(seat,'defense_up',Number(effect.amount||2),Number(effect.duration||2));
  }else if(effect.kind==='speed_up'){
    applyTempBuff(seat,'speed_up',Number(effect.amount||2),Number(effect.duration||2));
  }
}

function battleEffectFromLegacyItem(item){
  var effects=item.effects||[];
  for(var i=0;i<effects.length;i++){
    var e=effects[i]||{};
    if(e.type==='battle_boost'){
      if(e.target==='recover')return {kind:'heal',amount:Number(e.value||12)};
      if(e.target==='defense')return {kind:'defense_up',amount:2,duration:Number(e.durationTurns||3)};
      if(e.target==='speed')return {kind:'speed_up',amount:2,duration:Number(e.durationTurns||3)};
      if(e.target==='strength')return {kind:'attack_up',amount:2,duration:Number(e.durationTurns||3)};
      if(e.target==='magic')return {kind:'energy',amount:2};
    }
  }
  return null;
}

function applyTempBuff(seat,key,amount,duration){
  var s=state.status[seat]||{};
  s[key]=Math.max(Number(s[key]||0),duration);
  s[key+'_amount']=Math.max(Number(s[key+'_amount']||0),amount);
  state.status[seat]=s;
}

function battleItemSummary(item){
  var e=item.battleEffect||battleEffectFromLegacyItem(item)||{};
  if(e.kind==='heal')return 'Restore HP';
  if(e.kind==='stamina')return 'Restore stamina';
  if(e.kind==='energy')return 'Restore energy';
  if(e.kind==='cleanse')return 'Treat an ailment';
  if(e.kind)return 'Battle effect: '+e.kind.replace('_',' ');
  return 'Battle-enabled item';
}

function selectedCareFx(seat,type){
  var stage=document.querySelectorAll('.petStage')[seat];
  if(!stage)return;
  stage.classList.remove('careFxSoothe','careFxTreat','careFxSteady','careFxItem','careFxLock','careFxGuard');
  var cls={soothe:'careFxSoothe',treat:'careFxTreat',steady:'careFxSteady',item:'careFxItem',lockin:'careFxLock',guard:'careFxGuard'}[type];
  if(cls){stage.classList.add(cls);setTimeout(function(){stage.classList.remove(cls);},900);}
}

  refreshCareLiveUI();
}

function refreshCareLiveUI(){
  var fill=document.getElementById('careMeterFill');
  if(!state||mySeat===null||mySeat===undefined)return;
  ensureBattleShape();
  var care=state.care&&state.care[mySeat]?state.care[mySeat]:emptyCare();
  var elapsed=(care.type&&care.start)?Math.max(0,Math.min(CARE_WINDOW_MS,Date.now()-Number(care.start||0))):0;
  var pct=Math.min(100,Math.floor(elapsed/CARE_WINDOW_MS*100));

  if(fill){
    fill.style.width=pct+'%';
    fill.style.background=(care.type==='lockin')?'linear-gradient(90deg,#f97316,#facc15)':(care.type==='guard')?'linear-gradient(90deg,#93c5fd,#2563eb)':'linear-gradient(90deg,#86efac,#22c55e)';
  }

  updateCareMiniBars(care,elapsed);
  refreshProjectedPetSide(mySeat,projectedCarePreview(mySeat,care,elapsed));
}

function updateCareMiniBars(care,elapsed){
  if(!state||mySeat===null||mySeat===undefined||!state.pets||!state.pets[mySeat])return;
  var pet=state.pets[mySeat];
  var active=care&&care.type?care.type:'';

  var hpNow=Number(state.hp[mySeat]||0);
  var hpPct=Math.floor(Math.max(0,Math.min(100,hpNow/pet.stats.maxHp*100)));
  var sootheGain=active==='soothe'?Number(care.gain||0):0;
  setCareMini('soothe',hpPct,'HP '+hpPct+'%'+(active==='soothe'?' · +'+formatHp(sootheGain):''),'linear-gradient(90deg,#86efac,#16a34a)');

  var ailment=findWorstAilment(mySeat);
  var treatProgress=active==='treat'?Math.min(100,Math.floor(Number(care.treatProgress||0)/4*100)):0;
  var treatText=ailment?(ailment.label+' '+ailment.turns+'t'):'No ailment';
  if(active==='treat')treatText+=(ailment?' · treating':'');
  setCareMini('treat',treatProgress,treatText,'linear-gradient(90deg,#bae6fd,#0284c7)');

  var staminaNow=Number(state.stamina&&state.stamina[mySeat]!==undefined?state.stamina[mySeat]:100);
  var staminaPct=Math.floor(Math.max(0,Math.min(100,staminaNow)));
  setCareMini('steady',staminaPct,'Stamina '+staminaPct+'%'+(active==='steady'?' · +'+Math.floor(Number(care.gain||0)):''),'linear-gradient(90deg,#fde68a,#f59e0b)');

  var guardPct=(active==='guard')?100:0;
  setCareMini('guard',guardPct,(active==='guard'?'Guard ready · next hit reduced':'Guard next hit'),'linear-gradient(90deg,#93c5fd,#2563eb)');

  var furyNow=Number(state.finisher&&state.finisher[mySeat]!==undefined?state.finisher[mySeat]:0);
  var furyPct=Math.floor(Math.max(0,Math.min(100,furyNow)));
  setCareMini('lockin',furyPct,(furyPct>=100?'Fury READY':'Fury '+furyPct+'%'+(active==='lockin'?' · +'+Math.floor(Number(care.gain||0)):'')),'linear-gradient(90deg,#f97316,#facc15)');
}

function setCareMini(id,pct,text,bg){
  var fill=document.getElementById('careMiniFill_'+id);
  var label=document.getElementById('careMiniText_'+id);
  if(fill){
    fill.style.width=Math.max(0,Math.min(100,pct))+'%';
    if(bg)fill.style.background=bg;

}

function projectedCarePreview(seat,care,elapsed){
  ensureBattleShape();
  if(seat===null||seat===undefined||!state||!state.pets||!state.pets[seat])return null;
  var pet=state.pets[seat];

    hp:Number(state.hp&&state.hp[seat]!==undefined?state.hp[seat]:pet.stats.maxHp),

  };
