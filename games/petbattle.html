<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pet Battle Arena</title>
<style>
:root{
  --bg:#07111f;
  --card:rgba(255,255,255,.88);
  --glass:rgba(255,255,255,.72);
  --line:rgba(255,255,255,.35);
  --ink:#172033;
  --muted:#64748b;
  --blue:#2563eb;
  --red:#dc2626;
  --green:#16a34a;
  --gold:#facc15;
  --purple:#7c3aed;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--ink);
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 12%,rgba(56,189,248,.35),transparent 25%),
    radial-gradient(circle at 82% 18%,rgba(248,113,113,.32),transparent 26%),
    radial-gradient(circle at 50% 90%,rgba(34,197,94,.25),transparent 35%),
    linear-gradient(135deg,#dbeafe,#f8fafc 48%,#fee2e2);
}

.wrap{
  height:100vh;
  min-height:650px;
  padding:14px;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:12px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:24px;
  padding:12px 16px;
  box-shadow:0 20px 50px rgba(15,23,42,.14);
}

h1,h2,h3{margin:0}

.muted{
  color:var(--muted);
  font-size:13px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.75);
  border:1px solid rgba(148,163,184,.35);
  font-size:12px;
  font-weight:900;
}

.arena{
  min-height:0;
  display:grid;
  grid-template-columns:1fr 320px 1fr;
  gap:12px;
}

.side{
  min-height:0;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:28px;
  padding:14px;
  box-shadow:0 20px 55px rgba(15,23,42,.13);
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:10px;
}

.center{
  min-height:0;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:12px;
}

.statusCard,.logCard{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:24px;
  padding:14px;
  box-shadow:0 20px 55px rgba(15,23,42,.13);
}

.log{
  height:100%;
  min-height:300px;
  overflow:auto;
  background:#fffbea;
  border:1px solid #d6bd6b;
  border-radius:18px;
  padding:10px;
  line-height:1.35;
  font-size:13px;
}

.petStage{
  position:relative;
  overflow:hidden;
  border-radius:26px;
  background:
    radial-gradient(circle at 50% 40%,rgba(255,255,255,.95),rgba(255,255,255,.28) 35%,transparent 62%),
    linear-gradient(180deg,#bfdbfe,#dcfce7);
  border:1px solid rgba(255,255,255,.55);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:300px;
}

.petStage.enemy{
  background:
    radial-gradient(circle at 50% 40%,rgba(255,255,255,.95),rgba(255,255,255,.28) 35%,transparent 62%),
    linear-gradient(180deg,#fecaca,#fde68a);
}

.petImg{
  width:190px;
  height:190px;
  object-fit:contain;
  filter:drop-shadow(0 20px 20px rgba(15,23,42,.25));
  animation:idle 2.4s ease-in-out infinite;
}

.petEmoji{
  font-size:110px;
  filter:drop-shadow(0 20px 20px rgba(15,23,42,.25));
  animation:idle 2.4s ease-in-out infinite;
}

.petImg.hide,.petEmoji.hide{display:none}

@keyframes idle{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-10px) scale(1.04)}
}

.attackAnim{animation:attack .45s ease}
.hitAnim{animation:hit .45s ease}

@keyframes attack{
  0%{transform:translateX(0) scale(1)}
  50%{transform:translateX(26px) scale(1.12)}
  100%{transform:translateX(0) scale(1)}
}

@keyframes hit{
  0%{filter:brightness(1)}
  25%{filter:brightness(2) drop-shadow(0 0 16px rgba(220,38,38,.8))}
  50%{transform:translateX(-10px)}
  100%{filter:brightness(1)}
}

.hpBar{
  height:14px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  margin:8px 0;
}

.hpFill{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#16a34a,#86efac);
  border-radius:999px;
  transition:width .35s ease;
}

.hpFill.mid{background:linear-gradient(90deg,#facc15,#fb923c)}
.hpFill.low{background:linear-gradient(90deg,#dc2626,#fb7185)}

.meterBar{
  height:8px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  margin:6px 0 2px;
}

.meterFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#38bdf8,#2563eb);
  transition:width .25s ease;
}

.statGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  font-size:12px;
}

.stat{
  background:rgba(255,255,255,.68);
  border:1px solid rgba(148,163,184,.28);
  border-radius:14px;
  padding:8px;
}

.statusTags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  min-height:22px;
  margin-top:6px;
}

.statusTag{
  font-size:11px;
  font-weight:900;
  padding:4px 7px;
  border-radius:999px;
  background:#eef2ff;
  color:#3730a3;
  border:1px solid #c7d2fe;
}

.controls{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--line);
  border-radius:24px;
  padding:12px;
  box-shadow:0 20px 55px rgba(15,23,42,.13);
}

.moves{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.combatControls{display:block}

button{
  border:1px solid #cbd5e1;
  background:#fff;
  border-radius:16px;
  padding:11px;
  cursor:pointer;
  font-weight:900;
  transition:.15s ease;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(15,23,42,.14);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

.moveBtn{text-align:left}
.moveBtn strong{display:block}
.moveBtn span{display:block;color:var(--muted);font-size:12px;margin-top:3px}

.primary{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:white;border-color:var(--blue)}
.good{background:linear-gradient(135deg,var(--green),#22c55e);color:white;border-color:var(--green)}
.gold{background:linear-gradient(135deg,var(--gold),#f59e0b);color:#111827;border-color:var(--gold)}
.danger{background:linear-gradient(135deg,var(--red),#ef4444);color:white;border-color:var(--red)}

.winner{
  font-size:22px;
  font-weight:900;
  text-align:center;
  padding:12px;
  border-radius:18px;
  background:rgba(250,204,21,.35);
  border:1px solid rgba(245,158,11,.5);
}

@media(max-width:1000px){
  body{overflow:auto}
  .wrap{height:auto}

  .arena{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:auto auto;
    gap:8px;
  }

  .arena > .side:nth-child(1){
    grid-column:1;
    grid-row:1;
  }

  .arena > .side:nth-child(3){
    grid-column:2;
    grid-row:1;
  }

  .arena > .center{
    grid-column:1 / span 2;
    grid-row:2;
  }

  .moves{
    grid-template-columns:1fr 1fr;
  }

  .petImg{
    width:110px;
    height:110px;
  }

  .petEmoji{
    font-size:70px;
  }

  .side{
    padding:8px;
  }
}


/* ===== AI MOBILE USABILITY PATCH v1 =====
   Phone layout only. Keeps the battle readable in the iframe. */
@media (max-width:700px){
  html,body{height:auto;min-height:100%;overflow:auto;}
  .wrap{height:auto;min-height:100dvh;padding:8px;gap:8px;}
  .top{align-items:flex-start;flex-direction:column;border-radius:18px;padding:10px;}
  .top h1{font-size:20px;margin-bottom:4px;}

  /* Phone layout: keep battlers side-by-side and move status/log below. */
  .arena{
    display:grid;
    grid-template-columns:1fr 1fr!important;
    grid-template-rows:auto auto;
    gap:8px;
  }
  .arena > .side:nth-child(1){grid-column:1;grid-row:1;}
  .arena > .side:nth-child(3){grid-column:2;grid-row:1;}
  .arena > .center{grid-column:1 / span 2;grid-row:2;}

  .side{min-width:0;gap:7px;}
  .side,.log,.controls{border-radius:18px;padding:8px;}
  .side h2{font-size:16px;margin:0 0 4px;}
  .side .muted{font-size:11px;}
  .statusTags{gap:4px;}
  .statusTag{font-size:10px;padding:3px 6px;}
  .hpBar{height:11px;margin:6px 0;}
  .meterBar{height:7px;margin:5px 0 2px;}
  .petStage{min-height:165px;border-radius:20px;}
  .petImg{width:104px;height:104px;}
  .petEmoji{font-size:68px;}
  .statGrid{grid-template-columns:1fr 1fr;gap:5px;font-size:10px;}
  .stat{padding:6px;border-radius:12px;}
  .resourceGrid{grid-column:1 / span 2;gap:5px;}
  .resourcePill{padding:5px 6px;font-size:10px;}
  .resourcePill b{font-size:12px;}
  .center{gap:8px;}
  .statusCard,.logCard{border-radius:18px;padding:9px;}
  .statusCard h2,.logCard h3{font-size:16px;}
  .log{min-height:92px;max-height:120px;font-size:12px;}

  .moves{grid-template-columns:1fr 1fr!important;gap:7px;}
  .moveBtn{min-height:68px;padding:9px;border-radius:14px;}
  .moveBtn strong{font-size:13px}
  .moveBtn span{font-size:11px;}
  .winner{font-size:18px;}
  button{font-size:15px;}
}
@media (max-width:420px){
  .wrap{padding:6px;}
  .arena{gap:6px;}
  .side{padding:6px;}
  .petStage{min-height:135px;}
  .petImg{width:88px;height:88px;}
  .petEmoji{font-size:58px;}
  .moves{grid-template-columns:1fr 1fr!important;}
  .moveBtn span{display:none;}
}




/* ===== COMBAT v1: stance + stamina + energy UI ===== */
.resourceGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:6px;
}
.resourcePill{
  border-radius:12px;
  padding:6px 8px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(148,163,184,.3);
  font-size:11px;
  font-weight:900;
  color:#334155;
}
.resourcePill b{display:block;font-size:14px;color:#0f172a;line-height:1.05}
.stancePanel{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:8px;
}
.stanceBtn{
  text-align:left;
  min-height:58px;
  border-radius:16px;
  background:rgba(255,255,255,.82);
}
.stanceBtn strong{display:block;font-size:13px}
.stanceBtn span{display:block;font-size:11px;color:#64748b;margin-top:3px;line-height:1.2}
.stanceBtn.active{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,.16),0 10px 22px rgba(37,99,235,.12);
  background:linear-gradient(180deg,#eff6ff,#fff);
}
.moveBtn small{display:block;color:rgba(255,255,255,.86);font-size:11px;margin-top:3px;line-height:1.15}
.moveBtn.disabledMove{opacity:.52;filter:grayscale(.15)}
@media(max-width:700px){
  .stancePanel{grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:7px}
  .stanceBtn{min-height:54px;padding:8px;border-radius:14px}
  .stanceBtn strong{font-size:12px}.stanceBtn span{font-size:10px}
}
@media(max-width:420px){.stancePanel{grid-template-columns:1fr 1fr 1fr}.stanceBtn{padding:7px}.stanceBtn span{display:none}}


/* ===== COMBAT v1.2: Care Window UI ===== */
.modePanel{
  transition:opacity .18s ease, transform .18s ease;
}
.carePanel{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:10px;
  align-items:stretch;
}
.careHeader{
  grid-column:1 / span 2;
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  padding:8px 10px;
  border-radius:16px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(148,163,184,.28);
}
.careHeader strong{display:block;color:#0f172a}.careHeader span{font-size:12px;color:#64748b;font-weight:800}
.careMeter{
  min-width:120px;
  height:10px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  border:1px solid rgba(148,163,184,.25);
}
.careMeterFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#86efac,#22c55e);
  transition:width .2s linear;
}
.careOptions,.battleItems{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.battleItems{grid-template-columns:repeat(2,1fr)}
.careSectionTitle{
  grid-column:1 / -1;
  font-size:12px;
  color:#64748b;
  font-weight:1000;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.careBtn,.battleItemBtn{
  text-align:left;
  min-height:64px;
  border-radius:16px;
  background:rgba(255,255,255,.86);
}
.careBtn strong,.battleItemBtn strong{display:block;font-size:13px}.careBtn span,.battleItemBtn span{display:block;font-size:11px;color:#64748b;margin-top:3px;line-height:1.2}
.careBtn.activeCare{
  border-color:#16a34a;
  box-shadow:0 0 0 2px rgba(22,163,74,.16),0 10px 22px rgba(22,163,74,.12);
  background:linear-gradient(180deg,#f0fdf4,#fff);
}
.battleItemBtn.usedCare{
  opacity:.6;
}
.careFxSoothe{box-shadow:0 0 0 3px rgba(34,197,94,.18),0 0 28px rgba(34,197,94,.28)!important}
.careFxTreat{box-shadow:0 0 0 3px rgba(14,165,233,.18),0 0 28px rgba(14,165,233,.28)!important}
.careFxSteady{box-shadow:0 0 0 3px rgba(250,204,21,.2),0 0 28px rgba(250,204,21,.25)!important}
.careFxItem{box-shadow:0 0 0 3px rgba(124,58,237,.18),0 0 28px rgba(124,58,237,.28)!important}
.careFxLock{box-shadow:0 0 0 3px rgba(249,115,22,.22),0 0 34px rgba(249,115,22,.34)!important}
.finisherBar{
  height:9px;
  border-radius:999px;
  overflow:hidden;
  background:#e5e7eb;
  margin:5px 0 2px;
  border:1px solid rgba(148,163,184,.22);
}
.finisherFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#f59e0b,#facc15,#f97316);
  transition:width .25s ease, box-shadow .25s ease;
}
.finisherFill.ready{animation:finisherPulse .85s ease-in-out infinite;box-shadow:0 0 14px rgba(250,204,21,.9)}
@keyframes finisherPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.45)}}
@media(max-width:700px){
  .carePanel{grid-template-columns:1fr;gap:8px}
  .careHeader{grid-column:1;align-items:flex-start;flex-direction:column}
  .careMeter{width:100%}
  .careOptions{grid-template-columns:repeat(4,1fr);gap:6px}
  .battleItems{grid-template-columns:1fr 1fr;gap:6px}
  .careBtn,.battleItemBtn{min-height:56px;padding:8px;border-radius:14px}
  .careBtn strong,.battleItemBtn strong{font-size:12px}.careBtn span,.battleItemBtn span{font-size:10px}
}
@media(max-width:420px){
  .careOptions{grid-template-columns:1fr 1fr}
  .careBtn span{display:none}
}


/* ===== BATTLE END / NO-TRAP RESULT UI ===== */
.forfeitBtn{
  background:linear-gradient(135deg,#dc2626,#ef4444);
  color:#fff;
  border-color:#fecaca;
}
.battleActions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.resultOverlay{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  background:rgba(2,6,23,.72);
  backdrop-filter:blur(16px);
}
.resultOverlay.show{display:flex;animation:resultFade .18s ease-out both}
@keyframes resultFade{from{opacity:0}to{opacity:1}}
.resultCard{
  width:min(520px,100%);
  border-radius:28px;
  padding:22px;
  background:
    radial-gradient(circle at 20% 0%,rgba(56,189,248,.18),transparent 32%),
    radial-gradient(circle at 90% 20%,rgba(250,204,21,.16),transparent 30%),
    linear-gradient(180deg,rgba(255,255,255,.96),rgba(248,250,252,.94));
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 30px 90px rgba(15,23,42,.36);
  text-align:center;
}
.resultTitle{font-size:34px;letter-spacing:-1px;margin:0 0 6px;color:#0f172a}
.resultReason{margin:0 0 14px;color:#64748b;font-weight:900}
.resultMatchup{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:14px 0}
.resultPet{
  border:1px solid rgba(148,163,184,.32);
  border-radius:20px;
  padding:12px;
  background:rgba(255,255,255,.7);
}
.resultPet b{display:block;color:#0f172a}.resultPet span{color:#64748b;font-size:12px;font-weight:900}.resultVs{font-weight:1000;color:#7c3aed}
.rewardBox{
  margin:14px 0;
  padding:14px;
  border-radius:20px;
  background:rgba(2,6,23,.06);
  border:1px solid rgba(148,163,184,.25);
}
.rewardGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.rewardItem{border-radius:16px;background:#fff;padding:10px;border:1px solid rgba(148,163,184,.25)}
.rewardItem b{display:block;font-size:22px;color:#0f172a}.rewardItem span{font-size:12px;color:#64748b;font-weight:900}
.resultActions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.resultActions button{min-width:145px}
.safeExitNote{font-size:12px;color:#64748b;margin-top:10px;line-height:1.35}
@media(max-width:640px){.battleActions{width:100%;justify-content:space-between}.resultTitle{font-size:26px}.resultMatchup{grid-template-columns:1fr}.resultVs{display:none}.rewardGrid{grid-template-columns:1fr}.resultActions button{width:100%}}

</style>
</head>

<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Pet Battle Arena</h1>
      <div class="muted">Turn-based companion battles with initiative, status effects, and slower pacing.</div>
    </div>
    <div class="battleActions">
      <span id="meBadge" class="badge">Loading</span>
      <span id="turnBadge" class="badge">Waiting</span>
      <button id="forfeitBtn" class="forfeitBtn" onclick="requestForfeitBattle()">🏳 Forfeit Battle</button>
    </div>
  </div>

  <div class="arena">
    <div class="side">
      <div>
        <h2 id="p0Name">Player 1</h2>
        <div id="p0Sub" class="muted">Loading...</div>
        <div class="hpBar"><div id="p0Hp" class="hpFill"></div></div>
        <div id="p0HpText" class="muted"></div>
        <div class="meterBar"><div id="p0Meter" class="meterFill"></div></div>
        <div id="p0MeterText" class="muted"></div>
        <div class="finisherBar"><div id="p0Finisher" class="finisherFill"></div></div>
        <div id="p0FinisherText" class="muted"></div>
        <div id="p0Statuses" class="statusTags"></div>
      </div>

      <div class="petStage">
        <img id="p0Img" class="petImg hide">
        <div id="p0Emoji" class="petEmoji">🥚</div>
      </div>

      <div id="p0Stats" class="statGrid"></div>
    </div>

    <div class="center">
      <div class="statusCard">
        <h2 id="statusTitle">Loading pets...</h2>
        <p id="statusText" class="muted">Both seated players need active pets.</p>
        <div id="winnerBox"></div>
      </div>

      <div class="logCard">
        <h3>Battle Log</h3>
        <div id="battleLog" class="log"></div>
      </div>
    </div>

    <div class="side">
      <div>
        <h2 id="p1Name">Player 2</h2>
        <div id="p1Sub" class="muted">Loading...</div>
        <div class="hpBar"><div id="p1Hp" class="hpFill"></div></div>
        <div id="p1HpText" class="muted"></div>
        <div class="meterBar"><div id="p1Meter" class="meterFill"></div></div>
        <div id="p1MeterText" class="muted"></div>
        <div class="finisherBar"><div id="p1Finisher" class="finisherFill"></div></div>
        <div id="p1FinisherText" class="muted"></div>
        <div id="p1Statuses" class="statusTags"></div>
      </div>

      <div class="petStage enemy">
        <img id="p1Img" class="petImg hide">
        <div id="p1Emoji" class="petEmoji">🥚</div>
      </div>

      <div id="p1Stats" class="statGrid"></div>
    </div>
  </div>

  <div class="controls">
    <div id="moveButtons" class="combatControls"></div>
  </div>
</div>

<div id="resultOverlay" class="resultOverlay" role="dialog" aria-modal="true">
  <div class="resultCard" id="resultCard"></div>
</div>

<script>
var GAME_META={id:'petbattle',name:'Pet Battle Arena',minPlayers:2,maxPlayers:2,seats:2};

var players=[];
var mySeat=null;
var profiles={};
var moveBook={};
var itemCatalog={};
var careUiTimer=null;
var state=null;
var ready=false;
var battleInstanceId=new URLSearchParams(location.search).get('battleInstance')||'';
var instanceSocket=null;
var lockedInstance=null;
var battleEnded=false;
var lastServerResult=null;
var selectedStance=localStorage.getItem('gf_petbattle_stance')||'balanced';

function el(id){return document.getElementById(id);}

function receiveSetup(setupPlayers,setupSeat){
  players=(setupPlayers||[]).slice(0,2);
  mySeat=setupSeat;

  meBadge.innerText=mySeat===null||mySeat===undefined?'Spectator':'Seat '+(mySeat+1);

  if(players.length<2){
    setStatus('Waiting for 2 players','Pet Battle needs two seated players.');
    if(!careUiTimer){careUiTimer=setInterval(refreshCareMeter,500);}

drawEmpty();
    return;
  }

  loadProfiles();
}

async function loadProfiles(){
  // Normal launcher/private-table path:
  // The legacy launcher tells Pet Battle who is seated, then this file loads each
  // player's active pet profile. Battle Hall bypasses this with locked snapshots.
  try{
    profiles={};
    moveBook={};

    for(var i=0;i<players.length;i++){
      var name=players[i].name;
      var res=await fetch('/api/pet/profile?user='+encodeURIComponent(name));
      var data=await res.json();

      if(data.error||!data.ok){
        setStatus('Could not load '+name,data.error||'Pet profile unavailable.');
        return;
      }

      profiles[i]=data.profile;
      moveBook=data.moves||moveBook||{};
      itemCatalog=Object.assign(itemCatalog||{},data.shop||{});
    }

    ready=true;

    if(mySeat===0&&!state){
      state=freshBattle();
      sync();
    }

    if(state)draw();
    else setStatus('Waiting for host','Seat 1 is preparing the battle.');
  }catch(err){
    setStatus('Battle load failed',err.message);
  }
}

function loadLockedInstance(instance){
  // Battle Hall / Direct Challenge path:
  // The server has already chosen the two battlers and frozen battle pet snapshots.
  // We wrap those snapshots in the same profile shape used by the older battle UI
  // so the renderer can stay simple and readable.
  lockedInstance=instance;
  players=(instance.players||[]).map(function(p){return {name:p.username||p.name};}).slice(0,2);
  mySeat=instance.mySeat;
  profiles={};
  moveBook=instance.moves||{};
  itemCatalog=instance.items||itemCatalog||{};

  (instance.players||[]).forEach(function(p,index){
    var pet=p.lockedPet||{};
    profiles[index]={
      username:p.username,
      activePetId:pet.id,
      pets:{}
    };
    profiles[index].pets[pet.id]=pet;
  });

  meBadge.innerText=mySeat===null||mySeat===undefined?'Spectator':'Seat '+(mySeat+1);
  ready=true;

  if(instance.state){
    state=instance.state;
    draw();
  }else if(mySeat===0&&!state){
    state=freshBattle();
    sync();
  }else{
    setStatus('Battle ready','Waiting for the first battler to open the arena.');
    if(!careUiTimer){careUiTimer=setInterval(refreshCareMeter,500);}

drawEmpty();
  }
}

function connectBattleInstance(){
  if(!battleInstanceId)return false;

  var username=localStorage.getItem('gf_user')||'';
  if(!username){
    setStatus('Login required','Log in before joining a locked battle instance.');
    return true;
  }

  setStatus('Joining locked battle','Loading server-approved pets and opponent.');
  var protocol=location.protocol==='https:'?'wss://':'ws://';
  instanceSocket=new WebSocket(protocol+location.host);

  instanceSocket.onopen=function(){
    instanceSocket.send(JSON.stringify({type:'hello',username:username}));
    instanceSocket.send(JSON.stringify({type:'battleInstanceJoin',instanceId:battleInstanceId}));
  };

  instanceSocket.onmessage=function(event){
    var msg;
    try{msg=JSON.parse(event.data||'{}');}catch(e){return;}

    if(msg.type==='battleInstanceSetup'){
      loadLockedInstance(msg.instance);
      return;
    }

    if(msg.type==='battleInstanceResult'){
      handleServerBattleResult(msg.result,msg.role,msg.reward);
      return;
    }

    if(msg.type==='battleInstanceMove'&&window.onMove){
      window.onMove(msg.data);
      return;
    }

    if(msg.type==='error')setStatus('Battle error',msg.message||'Something went wrong.');
  };

  instanceSocket.onclose=function(){
    if(!state)setStatus('Connection closed','Could not stay connected to the battle instance.');
  };

  return true;
}

function activePetForSeat(seat){
  var profile=profiles[seat];
  if(!profile)return null;
  return profile.pets[profile.activePetId];
}

function battlePet(seat){
  var p=activePetForSeat(seat);
  if(!p)return null;

  var stats=p.stats||{};
  var stage=p.stage||'egg';

  return {
    owner:players[seat].name,
    name:p.name||'Pet',
    stage:stage,
    species:p.species||'egg',
    type:p.type||'normal',
    emoji:p.emoji||'🥚',
    stats:{
      level:Number(stats.level||1),
      hp:Number(stats.hp||20),
      maxHp:Number(stats.maxHp||20),
      attack:Number(stats.attack||5),
      defense:Number(stats.defense||4),
      speed:Number(stats.speed||5)
    },
    moves:(p.moves&&p.moves.length?p.moves:['tackle']).slice(0,4)
  };
}

function freshBattle(){
  var a=battlePet(0);
  var b=battlePet(1);

  if(!a||!b)return null;

  if(a.stage==='egg'||b.stage==='egg'){
    return {
      pets:[a,b],
      hp:[a.stats.maxHp,b.stats.maxHp],
      meter:[0,0],
      stamina:[100,100],
      energy:[5,5],
      stance:['balanced','balanced'],
      status:[{},{}],
      care:[emptyCare(),emptyCare()],
      finisher:[0,0],
      finisherReady:[false,false],
      turn:null,
      round:1,
      winner:null,
      blocked:true,
      log:['Eggs cannot battle yet. Hatch both companions first.'],
      lastAction:null
    };
  }

  var first=a.stats.speed>=b.stats.speed?0:1;
  var second=first===0?1:0;

  return {
    pets:[a,b],
    hp:[a.stats.maxHp,b.stats.maxHp],
    meter:[
      first===0?72:52,
      first===1?72:52
    ],
    stamina:[100,100],
    energy:[5,5],
    stance:['balanced','balanced'],
    status:[{},{}],
    care:[emptyCare(),emptyCare()],
    finisher:[0,0],
    finisherReady:[false,false],
    turn:null,
    round:1,
    winner:null,
    blocked:false,
    log:[
      'Battle started: '+a.name+' vs '+b.name+'.',
      'New combat rules: stance, stamina, and energy now decide momentum.',
      'Brace punishes reckless attacks. Focus builds energy but is risky. Push hits harder but drains stamina.'
    ],
    lastAction:null
  };
}

function drawEmpty(){
  p0Name.innerText=players[0]?players[0].name:'Seat 1';
  p1Name.innerText=players[1]?players[1].name:'Seat 2';
  p0Sub.innerText='No pet loaded';
  p1Sub.innerText='No pet loaded';
  moveButtons.innerHTML='';
}

function draw(){
  if(!state)return;

  if(!state.blocked&&state.winner===null&&state.turn===null){
    advanceInitiative();
  }

  drawPetSide(0);
  drawPetSide(1);
  drawLog();
  drawMoves();

  if(state.blocked){
    setStatus('Battle unavailable','Eggs cannot battle. Hatch both companions first.');
    winnerBox.innerHTML='';
    turnBadge.innerText='Blocked';
    return;
  }

  if(state.winner!==null){
    var winnerName=players[state.winner].name;
    setStatus('Battle Complete',winnerName+' wins the battle!');
    winnerBox.innerHTML='<div class="winner">🏆 '+escapeHtml(winnerName)+' wins!</div>';
    turnBadge.innerText='Finished';
  }else{
    winnerBox.innerHTML='';
    var turnName=state.turn===null?'Charging':players[state.turn].name;
    setStatus(state.turn===null?'Charging Initiative':'Current Turn',state.turn===null?'Pets are building initiative.':turnName+' chooses a move.');
    turnBadge.innerText=state.turn===null?'Charging':'Turn: '+turnName;
  }

  if(state.lastAction){
    pulseAction(state.lastAction.actor,state.lastAction.target);
  }
}

function drawPetSide(seat){
  var pet=state.pets[seat];
  var hp=state.hp[seat];
  var pct=Math.max(0,Math.min(100,Math.floor(hp/pet.stats.maxHp*100)));
  var hpFill=el('p'+seat+'Hp');
  var meter=state.meter?Number(state.meter[seat]||0):0;

  el('p'+seat+'Name').innerText=players[seat]?players[seat].name:'Seat '+(seat+1);
  el('p'+seat+'Sub').innerText=pet.name+' · '+pet.type+' · Lv '+pet.stats.level;
  el('p'+seat+'HpText').innerText=hp+' / '+pet.stats.maxHp+' HP';

  hpFill.style.width=pct+'%';
  hpFill.className='hpFill '+(pct<30?'low':pct<60?'mid':'');

  el('p'+seat+'Meter').style.width=Math.max(0,Math.min(100,meter))+'%';
  el('p'+seat+'MeterText').innerText='Initiative '+Math.floor(Math.max(0,Math.min(100,meter)))+'%';

  var fin=Math.floor(Math.max(0,Math.min(100,Number(state.finisher&&state.finisher[seat]!==undefined?state.finisher[seat]:0))));
  var finFill=el('p'+seat+'Finisher');
  if(finFill){
    finFill.style.width=fin+'%';
    finFill.className='finisherFill '+(fin>=100?'ready':'');
  }
  var finText=el('p'+seat+'FinisherText');
  if(finText)finText.innerText=fin>=100?'🔥 FINISHER READY':'Finisher '+fin+'%';

  el('p'+seat+'Statuses').innerHTML=statusTags(seat);

  var stamina=Math.floor(Math.max(0,Math.min(100,Number(state.stamina&&state.stamina[seat]!==undefined?state.stamina[seat]:100))));
  var energy=Math.floor(Math.max(0,Math.min(10,Number(state.energy&&state.energy[seat]!==undefined?state.energy[seat]:5))));

  el('p'+seat+'Stats').innerHTML=
    stat('Attack',effectiveAttack(seat))+
    stat('Defense',effectiveDefense(seat))+
    stat('Speed',effectiveSpeed(seat))+
    stat('Stance',stanceLabel(currentStance(seat)))+
    '<div class="resourceGrid"><div class="resourcePill"><b>'+energy+'/10</b>Energy</div><div class="resourcePill"><b>'+stamina+'%</b>Stamina</div></div>';

  setPetVisual(seat,pet);
}

function statusTags(seat){
  var s=(state&&state.status&&state.status[seat])?state.status[seat]:{};
  var labels=[];

  if(s.burn>0)labels.push('🔥 Burn');
  if(s.slow>0)labels.push('🐢 Slow');
  if(s.sleep>0)labels.push('💤 Sleep');
  if(s.stun>0)labels.push('💫 Stun');
  if(s.snare>0)labels.push('🌿 Snare');
  if(s.attack_up>0)labels.push('⚔️ Atk+');
  if(s.attack_down>0)labels.push('⚔️ Atk-');
  if(s.defense_up>0)labels.push('🛡️ Def+');
  if(s.defense_down>0)labels.push('🛡️ Def-');
  if(s.speed_up>0)labels.push('💨 Spd+');

  labels.unshift(stanceIcon(currentStance(seat))+' '+stanceLabel(currentStance(seat)));

  if(!labels.length)return '<span class="muted">No status</span>';

  return labels.map(function(x){
    return '<span class="statusTag">'+escapeHtml(x)+'</span>';
  }).join('');
}

function setPetVisual(seat,pet){
  var img=el('p'+seat+'Img');
  var emoji=el('p'+seat+'Emoji');

  emoji.innerText=pet.emoji||'🥚';

  var src=petAssetPath(pet);

  img.onload=function(){
    img.classList.remove('hide');
    emoji.classList.add('hide');
  };

  img.onerror=function(){
    img.classList.add('hide');
    emoji.classList.remove('hide');
  };

  if(img.src.indexOf(src)===-1){
    img.src=src;
  }
}

function petAssetPath(pet){
  if(!pet||pet.stage==='egg'){
    return '/assets/pets/egg/egg_idle.png';
  }

  var species=pet.species||'egg';
  var stage=pet.stage||'baby';
  var file=stage==='adult'?'adult':(stage==='young'||stage==='teen')?'young':'baby';

  return '/assets/pets/'+species+'/'+file+'.png';
}

function stat(k,v){
  return '<div class="stat"><b>'+escapeHtml(k)+'</b><br>'+escapeHtml(v)+'</div>';
}

function drawLog(){
  battleLog.innerHTML=state.log.slice(-24).map(function(x){
    return '• '+escapeHtml(x);
  }).join('<br>');
  battleLog.scrollTop=battleLog.scrollHeight;
}

function drawMoves(){
  var html='';

  if(!state||state.blocked){
    moveButtons.innerHTML='<button disabled>Battle unavailable</button>';
    return;
  }

  if(state.winner!==null){
    moveButtons.innerHTML='<button class="gold" onclick="showLocalBattleResult()">Show Results</button><button onclick="returnToHub()">Return to Hub</button>';
    return;
  }

  ensureBattleShape();

  if(mySeat!==state.turn){
    drawCareControls();
    return;
  }

  var pet=state.pets[mySeat];

  html+='<div class="stancePanel">';
  ['balanced','brace','focus'].forEach(function(id){
    var info=STANCE[id];
    html+='<button class="stanceBtn '+(selectedStance===id?'active':'')+'" onclick="selectStance(\''+id+'\')">'+
      '<strong>'+escapeHtml(info.icon+' '+info.name)+'</strong><span>'+escapeHtml(info.short+' · Shift: 1 energy')+'</span></button>';
  });
  html+='</div>';

  html+='<div class="moves">';
  pet.moves.forEach(function(id){
    var m=moveBook[id]||{name:id,type:'normal',category:'physical',power:30,accuracy:95};
    var category=m.category||'physical';
    var powerText=Number(m.power||0)>0?'Power '+Number(m.power||30):'Status';
    var cost=moveInitiativeCost(m);
    var energyCost=moveEnergyCost(m);
    var staminaCost=moveStaminaCost(m,selectedStance);
    var enoughEnergy=Number(state.energy[mySeat]||0)>=energyCost;
    var disabledClass=enoughEnergy?'':' disabledMove';

    html+='<button class="moveBtn primary'+disabledClass+'" onclick="useMove(\''+id+'\')" '+(enoughEnergy?'':'title="Not enough energy"')+'>'+
      '<strong>'+escapeHtml(m.name)+'</strong>'+ 
      '<span>'+escapeHtml(m.type||'normal')+' · '+escapeHtml(category)+' · '+powerText+'</span>'+ 
      '<small>Energy '+energyCost+' · Stamina '+staminaCost+' · Init '+cost+'</small>'+ 
    '</button>';
  });
  html+='</div>';

  moveButtons.innerHTML=html;
}
function drawCareControls(){
  ensureBattleShape();
  var care=state.care&&state.care[mySeat]?state.care[mySeat]:emptyCare();
  var activeType=care.type||'';
  var items=battleItemsForSeat(mySeat).slice(0,4);
  var html='';

  html+='<div class="carePanel modePanel">';
  html+='<div class="careHeader"><div><strong>🌿 Care Window</strong><span>Opponent is choosing. Tend, use an item, or 🔥 Lock In to build a finisher.</span></div><div class="careMeter"><div id="careMeterFill" class="careMeterFill"></div></div></div>';

  html+='<div class="careOptions">';
  html+='<div class="careSectionTitle">Tend</div>';
  html+=careButton('soothe','💚 Soothe','Slow HP recovery',activeType);
  html+=careButton('treat','🩹 Treat','Reduce ailment time',activeType);
  html+=careButton('steady','🧘 Steady','Recover stamina',activeType);
  html+=careButton('lockin','🔥 Lock In','Build finisher. No recovery.',activeType);
  html+='</div>';


  html+='<div class="battleItems">';
  html+='<div class="careSectionTitle">Battle Items</div>';
  if(items.length){
    items.forEach(function(entry){
      var item=entry.item||{};
      html+='<button class="battleItemBtn '+(activeType==='item'?'usedCare':'')+'" onclick="useBattleItem(\''+escapeAttr(entry.id)+'\')" '+(activeType==='item'?'disabled':'')+'>'+ 
        '<strong>'+escapeHtml(item.name||entry.id)+' ×'+entry.quantity+'</strong><span>'+escapeHtml(item.description||battleItemSummary(item))+'</span></button>';
    });
  }else{
    html+='<button class="battleItemBtn" disabled><strong>No battle items</strong><span>Only battleEnabled/battle-tagged items show here.</span></button>';
  }
  html+='</div>';
  html+='</div>';

  moveButtons.innerHTML=html;
  refreshCareMeter();
}

function careButton(id,label,sub,activeType){
  return '<button class="careBtn '+(activeType===id?'activeCare':'')+'" onclick="selectCare(\''+id+'\')"><strong>'+escapeHtml(label)+'</strong><span>'+escapeHtml(sub)+'</span></button>';
}

function selectCare(type){
  if(!state||state.winner!==null||state.blocked)return;
  if(mySeat===state.turn)return;
  ensureBattleShape();

  if(!CARE_ACTIONS[type])type='soothe';
  state.care[mySeat]={type:type,start:Date.now(),itemId:null,locked:false};
  addLog(state.pets[mySeat].name+' begins '+CARE_ACTIONS[type].label+'.');
  selectedCareFx(mySeat,type);
  draw();
  sync();
}

function battleItemsForSeat(seat){
  var profile=profiles&&profiles[seat]?profiles[seat]:null;
  var inv=(profile&&profile.inventory)||{};
  var out=[];
  Object.keys(inv).forEach(function(id){
    var qty=Number(inv[id]||0);
    if(qty<=0)return;
    var item=(itemCatalog&&itemCatalog[id])||{};
    if(isBattleEnabledItem(item))out.push({id:id,quantity:qty,item:item});
  });
  return out.sort(function(a,b){return String(a.item.name||a.id).localeCompare(String(b.item.name||b.id));});
}

function isBattleEnabledItem(item){
  item=item||{};
  var tags=item.tags||[];
  return item.battleEnabled===true || item.category==='battle' || tags.indexOf('battle')>=0 || !!item.battleEffect;
}

function useBattleItem(itemId){
  if(!state||state.winner!==null||state.blocked)return;
  if(mySeat===state.turn)return;
  ensureBattleShape();

  var profile=profiles&&profiles[mySeat]?profiles[mySeat]:null;
  if(!profile||!profile.inventory||Number(profile.inventory[itemId]||0)<=0)return;
  var item=(itemCatalog&&itemCatalog[itemId])||{};
  if(!isBattleEnabledItem(item))return;
  if(state.care[mySeat]&&state.care[mySeat].type==='item')return;

  profile.inventory[itemId]=Math.max(0,Number(profile.inventory[itemId]||0)-1);
  if(profile.inventory[itemId]<=0)delete profile.inventory[itemId];

  state.care[mySeat]={type:'item',itemId:itemId,start:Date.now(),locked:true};
  applyBattleItemEffect(mySeat,itemId,item);
  selectedCareFx(mySeat,'item');
  addLog(state.pets[mySeat].name+' used '+(item.name||itemId)+' during the Care Window.');
  draw();
  sync();
}

function applyCareBeforeIncoming(seat){
  ensureBattleShape();
  var care=state.care&&state.care[seat]?state.care[seat]:emptyCare();
  if(!care.type || care.type==='item')return;

  var elapsed=Math.max(0,Math.min(CARE_WINDOW_MS,Date.now()-Number(care.start||Date.now())));
  var seconds=Math.floor(elapsed/1000);
  if(seconds<=0){
    state.care[seat]=emptyCare();
    return;
  }

  var pet=state.pets[seat];
  if(care.type==='soothe'){
    var heal=Math.max(1,Math.min(Math.ceil(pet.stats.maxHp*.08),seconds*2));
    var before=state.hp[seat];
    state.hp[seat]=Math.min(pet.stats.maxHp,Number(state.hp[seat]||0)+heal);
    var gained=state.hp[seat]-before;
    if(gained>0)addLog(pet.name+' recovered '+gained+' HP from soothing care.');
  }else if(care.type==='steady'){
    var staminaGain=Math.max(2,Math.min(18,seconds*3));
    state.stamina[seat]=clampResource(Number(state.stamina[seat]||0)+staminaGain,0,100);
    addLog(pet.name+' recovered '+staminaGain+' stamina from steady care.');
  }else if(care.type==='treat'){
    var reduction=elapsed>=6500?2:1;
    var reduced=reduceWorstAilment(seat,reduction);
    if(reduced)addLog(pet.name+' recovered from '+reduced+' faster through treatment.');
    else addLog(pet.name+' was treated, but had no ailment to reduce.');
  }else if(care.type==='lockin'){
    var gain=Math.max(8,Math.min(75,Math.floor(seconds*11)));
    state.finisher[seat]=clampResource(Number(state.finisher[seat]||0)+gain,0,100);
    state.finisherReady[seat]=state.finisher[seat]>=100;
    addLog(pet.name+' locked in and built '+gain+' finisher charge.');
  }

  state.care[seat]=emptyCare();
}

function reduceWorstAilment(seat,amount){
  var s=state.status&&state.status[seat]?state.status[seat]:{};
  var order=['burn','stun','sleep','snare','slow','attack_down','defense_down'];
  for(var i=0;i<order.length;i++){
    var k=order[i];
    if(s[k]&&s[k]>0){
      s[k]=Math.max(0,Number(s[k]||0)-amount);
      if(s[k]<=0){delete s[k];delete s[k+'_amount'];}
      return k.replace('_',' ');
    }
  }
  return '';
}

function applyBattleItemEffect(seat,itemId,item){
  ensureBattleShape();
  item=item||{};
  var effect=item.battleEffect||battleEffectFromLegacyItem(item)||{kind:'stamina',amount:10};
  var pet=state.pets[seat];

  if(effect.kind==='heal'){
    var heal=Math.max(1,Number(effect.amount||12));
    state.hp[seat]=Math.min(pet.stats.maxHp,Number(state.hp[seat]||0)+heal);
  }else if(effect.kind==='stamina'){
    state.stamina[seat]=clampResource(Number(state.stamina[seat]||0)+Number(effect.amount||14),0,100);
  }else if(effect.kind==='energy'){
    state.energy[seat]=clampResource(Number(state.energy[seat]||0)+Number(effect.amount||2),0,10);
  }else if(effect.kind==='cleanse'){
    reduceWorstAilment(seat,Number(effect.amount||1));
  }else if(effect.kind==='attack_up'){
    applyTempBuff(seat,'attack_up',Number(effect.amount||2),Number(effect.duration||2));
  }else if(effect.kind==='defense_up'){
    applyTempBuff(seat,'defense_up',Number(effect.amount||2),Number(effect.duration||2));
  }else if(effect.kind==='speed_up'){
    applyTempBuff(seat,'speed_up',Number(effect.amount||2),Number(effect.duration||2));
  }
}

function battleEffectFromLegacyItem(item){
  var effects=item.effects||[];
  for(var i=0;i<effects.length;i++){
    var e=effects[i]||{};
    if(e.type==='battle_boost'){
      if(e.target==='recover')return {kind:'heal',amount:Number(e.value||12)};
      if(e.target==='defense')return {kind:'defense_up',amount:2,duration:Number(e.durationTurns||3)};
      if(e.target==='speed')return {kind:'speed_up',amount:2,duration:Number(e.durationTurns||3)};
      if(e.target==='strength')return {kind:'attack_up',amount:2,duration:Number(e.durationTurns||3)};
      if(e.target==='magic')return {kind:'energy',amount:2};
    }
  }
  return null;
}

function applyTempBuff(seat,key,amount,duration){
  var s=state.status[seat]||{};
  s[key]=Math.max(Number(s[key]||0),duration);
  s[key+'_amount']=Math.max(Number(s[key+'_amount']||0),amount);
  state.status[seat]=s;
}

function battleItemSummary(item){
  var e=item.battleEffect||battleEffectFromLegacyItem(item)||{};
  if(e.kind==='heal')return 'Restore HP';
  if(e.kind==='stamina')return 'Restore stamina';
  if(e.kind==='energy')return 'Restore energy';
  if(e.kind==='cleanse')return 'Treat an ailment';
  if(e.kind)return 'Battle effect: '+e.kind.replace('_',' ');
  return 'Battle-enabled item';
}

function selectedCareFx(seat,type){
  var stage=document.querySelectorAll('.petStage')[seat];
  if(!stage)return;
  stage.classList.remove('careFxSoothe','careFxTreat','careFxSteady','careFxItem');
  var cls={soothe:'careFxSoothe',treat:'careFxTreat',steady:'careFxSteady',item:'careFxItem',lockin:'careFxLock'}[type];
  if(cls){stage.classList.add(cls);setTimeout(function(){stage.classList.remove(cls);},900);}
}

function refreshCareMeter(){
  var fill=document.getElementById('careMeterFill');
  if(!fill||!state||mySeat===null||mySeat===undefined)return;
  ensureBattleShape();
  var care=state.care&&state.care[mySeat]?state.care[mySeat]:emptyCare();
  var pct=0;
  if(care.type&&care.start)pct=Math.min(100,Math.floor((Date.now()-Number(care.start||0))/CARE_WINDOW_MS*100));
  fill.style.width=pct+'%';
  fill.style.background=(care.type==='lockin')?'linear-gradient(90deg,#f97316,#facc15)':'linear-gradient(90deg,#86efac,#22c55e)';
}

var CARE_WINDOW_MS=8000;
var CARE_ACTIONS={
  soothe:{label:'soothing care'},
  treat:{label:'treatment'},
  steady:{label:'steady breathing'},
  lockin:{label:'Lock In focus'}
};

function emptyCare(){return {type:null,start:0,itemId:null,locked:false};}

function escapeAttr(s){return String(s||'').replace(/[\\'\"]/g,'');}

function useMove(moveId){
  if(!state||state.winner!==null||state.blocked)return;
  if(mySeat!==state.turn)return;

  var actor=mySeat;
  var target=actor===0?1:0;
  var attacker=state.pets[actor];
  var move=moveBook[moveId]||{name:moveId,type:'normal',category:'physical',power:30,accuracy:95};
  var moveName=move.name||moveId;

  ensureBattleShape();

  var stance=selectedStance||'balanced';
  state.stance[actor]=stance;
  applyStanceStart(actor,stance);

  var energyCost=moveEnergyCost(move);
  if(Number(state.energy[actor]||0)<energyCost){
    addLog(attacker.name+' tried '+moveName+' but lacked energy.');
    draw();
    return;
  }

  state.energy[actor]=clampResource(Number(state.energy[actor]||0)-energyCost,0,10);
  state.stamina[actor]=clampResource(Number(state.stamina[actor]||100)-moveStaminaCost(move,stance),0,100);

  var blocked=startTurnStatus(actor);

  if(blocked){
    addLog(attacker.name+' could not move because of '+blocked+'.');
  }else{
    applyCareBeforeIncoming(target);
    var roll=Math.random()*100;

    if(roll>Number(move.accuracy||95)){
      addLog(attacker.name+' used '+moveName+' but missed!');
      applyMissRecovery(actor);
    }else{
      resolveMove(actor,target,moveId,move);
    }
  }

  state.lastAction={actor:actor,target:target,move:moveId,stance:stance,time:Date.now()};

  checkWinner(actor,target);

  if(state.winner===null){
    endTurnStatus(actor);
    endRoundResourceTick(actor,target);
    spendInitiative(actor,move);
    state.turn=null;
    state.round++;
    advanceInitiative();
  }

  draw();
  sync();
}
function resolveMove(actor,target,moveId,move){
  var attacker=state.pets[actor];
  var moveName=move.name||moveId;
  var category=move.category||'physical';
  var power=Number(move.power||0);
  var stance=currentStance(actor);

  if(category==='status'||category==='buff'||category==='debuff'||power<=0){
    var applied=applyMoveStatus(actor,target,move);
    addLog(attacker.name+' used '+moveName+' from '+stanceLabel(stance)+'.'+(applied?' '+applied:''));
    return;
  }

  var result=damage(actor,target,move);
  state.hp[target]=Math.max(0,state.hp[target]-result.damage);
  addLog(attacker.name+' used '+moveName+' from '+stanceLabel(stance)+' and dealt '+result.damage+' damage.');
  if(result.note)addLog(result.note);

  var appliedAfterDamage=applyMoveStatus(actor,target,move);
  if(appliedAfterDamage)addLog(appliedAfterDamage);
}
function damage(actor,target,move){
  var attacker=state.pets[actor];

  var power=Number(move.power||30);
  var atk=effectiveAttack(actor);
  var def=effectiveDefense(target);
  var level=Number(attacker.stats.level||1);
  var actorStance=currentStance(actor);
  var targetStance=currentStance(target);
  var stamina=Number(state.stamina&&state.stamina[actor]!==undefined?state.stamina[actor]:100);

  var base=(power*0.28)+(atk*.78)+(level*.75);
  var reduction=def*.92;
  var variance=0.92+(Math.random()*0.17);
  var typeBonus=(move.type&&move.type===attacker.type)?1.06:1;
  var staminaScale=0.62+(Math.max(0,Math.min(100,stamina))/180);
  var stanceScale=STANCE[actorStance]?STANCE[actorStance].damage:1;
  var clashScale=1;
  var note='';
  var finisherActive=state.finisherReady&&state.finisherReady[actor];
  var finisherScale=finisherActive?1.45:1;

  if(targetStance==='brace'){
    var drain=power>=48?20:power>=40?16:12;
    clashScale*=0.66;
    state.stamina[actor]=clampResource(Number(state.stamina[actor]||0)-drain,0,100);
    state.energy[target]=clampResource(Number(state.energy[target]||0)+1,0,10);
    note=state.pets[target].name+' braced the hit. '+attacker.name+' lost '+drain+' stamina and the defender gained energy.';
  }else if(targetStance==='focus'){
    clashScale*=1.14;
    var eLoss=power>=44?2:1;
    state.energy[target]=clampResource(Number(state.energy[target]||0)-eLoss,0,10);
    note=state.pets[target].name+' was caught focusing and lost '+eLoss+' energy.';
  }else if(actorStance==='focus'){
    state.energy[actor]=clampResource(Number(state.energy[actor]||0)+1,0,10);
    note=attacker.name+' converted focus into +1 energy.';
  }

  var dmg=Math.floor((base-reduction)*variance*typeBonus*staminaScale*stanceScale*clashScale*finisherScale);
  dmg=Math.max(2,dmg);
  if(finisherActive){
    state.finisher[actor]=0;
    state.finisherReady[actor]=false;
    note=(note?note+' ':'')+'🔥 FINISHER unleashed! '+attacker.name+' turned locked-in focus into a huge swing.';
  }
  if(dmg>0&&state.finisher){
    var loss=Math.min(22,Math.max(6,Math.floor(dmg*.5)));
    state.finisher[target]=clampResource(Number(state.finisher[target]||0)-loss,0,100);
    state.finisherReady[target]=state.finisher[target]>=100;
  }
  return {damage:dmg,note:note};
}

var STANCE={
  balanced:{name:'Push',icon:'⚔️',short:'Hit harder, spend stamina',damage:1.14,defense:1},
  brace:{name:'Brace',icon:'🛡️',short:'Cut damage, punish attacks',damage:.82,defense:1.22},
  focus:{name:'Focus',icon:'✨',short:'Gain energy, risky if hit',damage:.96,defense:.86}
};

function clampResource(v,min,max){
  v=Number(v||0);
  if(!Number.isFinite(v))v=min;
  return Math.max(min,Math.min(max,v));
}

function currentStance(seat){
  ensureBattleShape();
  return state.stance&&state.stance[seat]?state.stance[seat]:'balanced';
}

function stanceLabel(id){return (STANCE[id]&&STANCE[id].name)||'Push';}
function stanceIcon(id){return (STANCE[id]&&STANCE[id].icon)||'⚔️';}

function selectStance(id){
  if(!STANCE[id])id='balanced';

  if(!state || mySeat===null || mySeat===undefined){
    selectedStance=id;
    try{localStorage.setItem('gf_petbattle_stance',id);}catch(e){}
    drawMoves();
    return;
  }

  ensureBattleShape();

  if(selectedStance===id){
    drawMoves();
    return;
  }

  if(mySeat===state.turn){
    if(Number(state.energy[mySeat]||0)<1){
      addLog(state.pets[mySeat].name+' tried to shift stance, but lacked energy.');
      drawMoves();
      return;
    }

    state.energy[mySeat]=clampResource(Number(state.energy[mySeat]||0)-1,0,10);
    state.stamina[mySeat]=clampResource(Number(state.stamina[mySeat]||100)-5,0,100);
    state.stance[mySeat]=id;

    addLog(state.pets[mySeat].name+' shifted stance to '+stanceLabel(id)+' (-1 energy, -5 stamina).');
    sync();
  }

  selectedStance=id;
  try{localStorage.setItem('gf_petbattle_stance',id);}catch(e){}

  draw();
}

function moveEnergyCost(move){
  var category=move.category||'physical';
  var power=Number(move.power||0);
  if(category==='status'||category==='buff'||category==='debuff'||power<=0)return 1;
  if(power>=50)return 4;
  if(power>=42)return 3;
  if(power>=34)return 2;
  return 1;
}

function moveStaminaCost(move,stance){
  var category=move.category||'physical';
  var power=Number(move.power||0);
  var cost=(category==='status'||category==='buff'||category==='debuff'||power<=0)?8:Math.round(10+(power*.38));
  if(stance==='balanced')cost+=6;
  if(stance==='brace')cost=Math.max(5,cost-8);
  if(stance==='focus')cost=Math.max(4,cost-5);
  return cost;
}

function applyStanceStart(seat,stance){
  ensureBattleShape();
  if(stance==='brace'){
    state.stamina[seat]=clampResource(Number(state.stamina[seat]||0)+10,0,100);
    addLog(state.pets[seat].name+' braces and steadies their footing.');
  }else if(stance==='focus'){
    state.energy[seat]=clampResource(Number(state.energy[seat]||0)+2,0,10);
    state.stamina[seat]=clampResource(Number(state.stamina[seat]||0)+5,0,100);
    addLog(state.pets[seat].name+' focuses, gaining energy before acting.');
  }
}

function applyMissRecovery(seat){
  ensureBattleShape();
  state.stamina[seat]=clampResource(Number(state.stamina[seat]||0)+4,0,100);
}

function endRoundResourceTick(actor,target){
  ensureBattleShape();
  for(var i=0;i<2;i++){
    state.stamina[i]=clampResource(Number(state.stamina[i]||0)+9,0,100);
    state.energy[i]=clampResource(Number(state.energy[i]||0)+1,0,10);
  }
}

function moveInitiativeCost(move){
  var category=move.category||'physical';
  var power=Number(move.power||0);

  if(category==='status'||category==='buff'||category==='debuff'||power<=0)return 72;
  if(power>=52)return 112;
  if(power>=44)return 100;
  if(power<=28)return 78;
  return 90;
}

function spendInitiative(actor,move){
  ensureBattleShape();
  var cost=moveInitiativeCost(move);
  state.meter[actor]=Math.max(0,Number(state.meter[actor]||0)-cost);
}

function advanceInitiative(){
  ensureBattleShape();

  var safety=0;

  while(state.winner===null&&state.turn===null&&safety<80){
    safety++;

    for(var i=0;i<2;i++){
      if(state.hp[i]>0){
        state.meter[i]=Number(state.meter[i]||0)+initiativeGain(i);
      }
    }

    if(state.meter[0]>=100||state.meter[1]>=100){
      if(state.meter[0]>=100&&state.meter[1]>=100){
        if(effectiveSpeed(0)===effectiveSpeed(1)){
          state.turn=Math.random()<.5?0:1;
        }else{
          state.turn=effectiveSpeed(0)>effectiveSpeed(1)?0:1;
        }
      }else{
        state.turn=state.meter[0]>=100?0:1;
      }
      return;
    }
  }

  if(state.turn===null){
    state.turn=effectiveSpeed(0)>=effectiveSpeed(1)?0:1;
  }
}

function initiativeGain(seat){
  var spd=effectiveSpeed(seat);
  return 18+Math.floor(spd*2.4);
}

function effectiveAttack(seat){
  var pet=state.pets[seat];
  var s=state.status&&state.status[seat]?state.status[seat]:{};
  var atk=Number(pet.stats.attack||5);

  if(s.attack_up&&s.attack_up>0)atk+=Number(s.attack_up_amount||1);
  if(s.attack_down&&s.attack_down>0)atk-=Number(s.attack_down_amount||1);

  return Math.max(1,atk);
}

function effectiveDefense(seat){
  var pet=state.pets[seat];
  var s=state.status&&state.status[seat]?state.status[seat]:{};
  var def=Number(pet.stats.defense||4);

  if(s.defense_up&&s.defense_up>0)def+=Number(s.defense_up_amount||1);
  if(s.defense_down&&s.defense_down>0)def-=Number(s.defense_down_amount||1);

  var stance=currentStance(seat);
  if(STANCE[stance]&&STANCE[stance].defense)def*=STANCE[stance].defense;

  return Math.max(1,Math.round(def));
}

function effectiveSpeed(seat){
  var pet=state.pets[seat];
  var s=state.status&&state.status[seat]?state.status[seat]:{};
  var spd=Number(pet.stats.speed||5);

  if(s.slow&&s.slow>0)spd=Math.max(1,Math.floor(spd*.65));
  if(s.snare&&s.snare>0)spd=Math.max(1,Math.floor(spd*.75));
  if(s.speed_up&&s.speed_up>0)spd+=Number(s.speed_up_amount||2);

  return Math.max(1,spd);
}

function ensureBattleShape(){
  if(!state.status)state.status=[{},{}];
  if(!state.status[0])state.status[0]={};
  if(!state.status[1])state.status[1]={};
  if(!state.meter)state.meter=[0,0];
  if(state.meter[0]===undefined)state.meter[0]=0;
  if(state.meter[1]===undefined)state.meter[1]=0;
  if(!state.stamina)state.stamina=[100,100];
  if(state.stamina[0]===undefined)state.stamina[0]=100;
  if(state.stamina[1]===undefined)state.stamina[1]=100;
  if(!state.energy)state.energy=[5,5];
  if(state.energy[0]===undefined)state.energy[0]=5;
  if(state.energy[1]===undefined)state.energy[1]=5;
  if(!state.stance)state.stance=['balanced','balanced'];
  if(!state.stance[0])state.stance[0]='balanced';
  if(!state.stance[1])state.stance[1]='balanced';
  if(!state.care)state.care=[emptyCare(),emptyCare()];
  if(!state.care[0])state.care[0]=emptyCare();
  if(!state.care[1])state.care[1]=emptyCare();
  if(!state.finisher)state.finisher=[0,0];
  if(state.finisher[0]===undefined)state.finisher[0]=0;
  if(state.finisher[1]===undefined)state.finisher[1]=0;
  if(!state.finisherReady)state.finisherReady=[false,false];
  state.finisherReady[0]=Number(state.finisher[0]||0)>=100;
  state.finisherReady[1]=Number(state.finisher[1]||0)>=100;
}

function startTurnStatus(seat){
  ensureBattleShape();
  var s=state.status[seat]||{};
  var pet=state.pets[seat];

  if(s.burn&&s.burn>0){
    var burnDmg=Math.max(2,Math.floor(state.pets[seat].stats.maxHp*.055));
    state.hp[seat]=Math.max(0,state.hp[seat]-burnDmg);
    addLog(pet.name+' is hurt by burn for '+burnDmg+' damage.');
  }

  if(state.hp[seat]<=0){
    state.winner=seat===0?1:0;
    addLog(pet.name+' fainted from lingering damage.');
    return 'burn';
  }

  if(s.sleep&&s.sleep>0)return 'sleep';
  if(s.stun&&s.stun>0)return 'stun';

  return null;
}

function endTurnStatus(seat){
  ensureBattleShape();
  var s=state.status[seat]||{};

  ['burn','slow','sleep','stun','snare','attack_up','attack_down','defense_up','defense_down','speed_up'].forEach(function(k){
    if(s[k]&&s[k]>0){
      s[k]--;
      if(s[k]<=0){
        delete s[k];
        delete s[k+'_amount'];
      }
    }
  });
}

function applyMoveStatus(actor,target,move){
  if(!move.status)return '';

  ensureBattleShape();

  var status=move.status;
  var effect=status.effect;
  var chance=Number(status.chance||0);
  var duration=Number(status.duration||1);
  var amount=Number(status.amount||1);

  if(!effect)return '';
  if(Math.random()*100>chance)return '';

  var recipient=target;

  if(effect==='attack_up'||effect==='defense_up'){
    recipient=actor;
  }

  var s=state.status[recipient]||{};
  s[effect]=Math.max(Number(s[effect]||0),duration);

  if(effect==='attack_up'||effect==='attack_down'||effect==='defense_up'||effect==='defense_down'){
    s[effect+'_amount']=Math.max(Number(s[effect+'_amount']||0),amount);
  }

  state.status[recipient]=s;

  var pet=state.pets[recipient];
  return pet.name+' is affected by '+effect.replace('_',' ')+'.';
}

function checkWinner(actor,target){
  if(state.winner!==null)return;

  if(state.hp[target]<=0){
    state.winner=actor;
    addLog(state.pets[target].name+' fainted.');
    addLog(players[actor].name+' wins!');
    addRewardPreview(actor,target);
    submitBattleComplete(actor);
    return;
  }

  if(state.hp[actor]<=0){
    state.winner=target;
    addLog(state.pets[actor].name+' fainted.');
    addLog(players[target].name+' wins!');
    addRewardPreview(target,actor);
    submitBattleComplete(target);
  }
}

function addRewardPreview(winner,loser){
  addLog('Battle complete. Results are being finalized by the server.');
}

function pulseAction(actor,target){
  var a=visiblePetEl(actor);
  var t=visiblePetEl(target);

  if(a){
    a.classList.remove('attackAnim');
    void a.offsetWidth;
    a.classList.add('attackAnim');
  }

  if(t){
    setTimeout(function(){
      t.classList.remove('hitAnim');
      void t.offsetWidth;
      t.classList.add('hitAnim');
    },180);
  }
}

function visiblePetEl(seat){
  var img=el('p'+seat+'Img');
  if(img&&!img.classList.contains('hide'))return img;
  return el('p'+seat+'Emoji');
}

function addLog(t){
  state.log.push(t);
  if(state.log.length>90)state.log.shift();
}

function setStatus(a,b){
  statusTitle.innerText=a;
  statusText.innerText=b||'';
}

function currentUsername(){
  return localStorage.getItem('gf_user')||'';
}

function myPlayerName(){
  if(mySeat!==null&&mySeat!==undefined&&players[mySeat])return players[mySeat].name;
  return currentUsername();
}

function opponentName(){
  if(mySeat===0&&players[1])return players[1].name;
  if(mySeat===1&&players[0])return players[0].name;
  return 'Opponent';
}

function resultPetLine(seat){
  var pet=state&&state.pets?state.pets[seat]:null;
  var player=players[seat]?players[seat].name:'Seat '+(seat+1);
  if(!pet)return {player:player,pet:'Unknown pet',sub:''};
  return {player:player,pet:pet.name||'Pet',sub:'Lv '+(pet.stats&&pet.stats.level||1)+' · '+(pet.type||'normal')};
}

function requestForfeitBattle(){
  if(battleEnded){
    showLocalBattleResult();
    return;
  }
  if(!ready||!players.length){
    returnToHub();
    return;
  }
  if(!confirm('Forfeit this battle? This counts as a loss, but you will not be trapped in the game.'))return;
  forfeitBattle();
}

function forfeitBattle(){
  battleEnded=true;
  if(state){
    var loser=(mySeat===0||mySeat===1)?mySeat:0;
    var winner=loser===0?1:0;
    state.winner=winner;
    state.forfeit={by:myPlayerName(),seat:loser,time:Date.now()};
    addLog(myPlayerName()+' forfeited the battle.');
    draw();
  }

  if(battleInstanceId&&instanceSocket&&instanceSocket.readyState===1){
    instanceSocket.send(JSON.stringify({type:'battleInstanceForfeit',instanceId:battleInstanceId,state:state}));
    return;
  }

  window.sendMove({type:'battleForfeit',by:myPlayerName(),seat:mySeat,state:state});
  showLocalBattleResult({forfeit:true,forfeiter:myPlayerName(),winner:opponentName(),loser:myPlayerName(),message:'You forfeited the battle.'});
}

function submitBattleComplete(winnerSeat){
  if(battleEnded)return;
  battleEnded=true;
  if(battleInstanceId&&instanceSocket&&instanceSocket.readyState===1){
    instanceSocket.send(JSON.stringify({type:'battleInstanceComplete',instanceId:battleInstanceId,winnerSeat:winnerSeat,state:state}));
  }else{
    setTimeout(function(){showLocalBattleResult();},450);
  }
}

function handleServerBattleResult(result,role,reward){
  if(!result)return;
  lastServerResult=result;
  battleEnded=true;
  if(state&&result.winner){
    var winnerIndex=players.findIndex(function(p){return p&&p.name===result.winner;});
    if(winnerIndex>=0)state.winner=winnerIndex;
    if(result.forfeit&&result.forfeiter)addLog(result.forfeiter+' forfeited the battle.');
    draw();
  }
  setTimeout(function(){showBattleResults(result);},350);
}

function showLocalBattleResult(extra){
  if(lastServerResult){showBattleResults(lastServerResult);return;}
  if(!state||state.winner===null){
    showBattleResults(extra||{winner:opponentName(),loser:myPlayerName(),forfeit:true,forfeiter:myPlayerName(),rewards:null,reason:'forfeit'});
    return;
  }
  var winner=players[state.winner]?players[state.winner].name:'Winner';
  var loser=players[state.winner===0?1:0]?players[state.winner===0?1:0].name:'Loser';
  showBattleResults(Object.assign({winner:winner,loser:loser,forfeit:false,turns:state.round||1,rewards:null},extra||{}));
}

function showBattleResults(result){
  result=result||{};
  var mine=myPlayerName();
  var isWinner=result.winner===mine;
  var isForfeiter=result.forfeiter===mine;
  var title=isWinner?'🏆 You Win':'Battle Result';
  if(!isWinner)title=isForfeiter?'🏳 You Forfeited':'😔 You Lost';

  var reason=result.message||'';
  if(result.forfeit&&!reason){
    reason=result.forfeiter ? result.forfeiter+' forfeited the battle.' : 'Battle ended by forfeit.';
  }
  if(!reason)reason='Battle complete.';

  var p0=resultPetLine(0);
  var p1=resultPetLine(1);
  var rewards=result.rewards||null;
  var myReward=null;
  if(rewards){
    if(rewards.winner&&rewards.winner.username===mine)myReward=rewards.winner;
    if(rewards.loser&&rewards.loser.username===mine)myReward=rewards.loser;
  }
  var xp=myReward?Number(myReward.xp||0):0;
  var coins=myReward?Number(myReward.coins||0):0;
  var scale=rewards&&rewards.scale?Math.round(Number(rewards.scale||1)*100):100;

  var rewardHtml=rewards
    ? '<div class="rewardBox"><b>Your Rewards</b><div class="rewardGrid"><div class="rewardItem"><b>+'+xp+'</b><span>XP</span></div><div class="rewardItem"><b>+'+coins+'</b><span>Coins</span></div></div><div class="muted" style="margin-top:8px">Reward scale: '+scale+'%</div></div>'
    : '<div class="rewardBox"><b>Practice Result</b><div class="muted" style="margin-top:6px">Rewards are finalized for server-locked Battle Hall and live challenge battles.</div></div>';

  resultCard.innerHTML=
    '<h2 class="resultTitle">'+escapeHtml(title)+'</h2>'+ 
    '<p class="resultReason">'+escapeHtml(reason)+'</p>'+ 
    '<div class="resultMatchup">'+ 
      '<div class="resultPet"><b>'+escapeHtml(p0.player)+'</b><span>'+escapeHtml(p0.pet)+' · '+escapeHtml(p0.sub)+'</span></div>'+ 
      '<div class="resultVs">VS</div>'+ 
      '<div class="resultPet"><b>'+escapeHtml(p1.player)+'</b><span>'+escapeHtml(p1.pet)+' · '+escapeHtml(p1.sub)+'</span></div>'+ 
    '</div>'+ 
    rewardHtml+ 
    '<div class="resultActions"><button class="primary" onclick="returnToBattleHall()">Battle Again</button><button class="gold" onclick="returnToHub()">Return to Hub</button></div>'+ 
    '<div class="safeExitNote">No trap rule: this screen always has a safe way back. If a battle connection ends, use Return to Hub.</div>';
  resultOverlay.classList.add('show');
}

function returnToBattleHall(){
  notifyBattleLeave();
  try{parent.postMessage({type:'petBattleReturn',target:'battlehall'},'*');}catch(e){}
  location.href='/games/battlehall.html?v='+Date.now();
}

function returnToHub(){
  notifyBattleLeave();
  try{parent.postMessage({type:'petBattleReturn',target:'home'},'*');}catch(e){}
  // If embedded in the GameForge shell, the parent will exit the iframe. If not,
  // this fallback prevents standalone players from being trapped.
  setTimeout(function(){
    if(window.parent===window)location.href='/';
  },120);
}

function notifyBattleLeave(){
  if(battleInstanceId&&instanceSocket&&instanceSocket.readyState===1){
    instanceSocket.send(JSON.stringify({type:'battleInstanceLeave',instanceId:battleInstanceId}));
  }
}

function newBattle(){
  if(mySeat!==0){
    alert('Seat 1 starts new battles.');
    return;
  }

  state=freshBattle();
  draw();
  sync();
}

function sync(){
  window.sendMove({type:'battleState',state:state});
}

window.sendMove=function(data){
  // Battle Hall instances sync directly through the server-owned battle instance.
  // Classic launcher rooms keep using parent.postMessage so pre-planned/private
  // room battles continue to work exactly like before.
  if(battleInstanceId&&instanceSocket&&instanceSocket.readyState===1){
    instanceSocket.send(JSON.stringify({type:'battleInstanceMove',instanceId:battleInstanceId,data:data}));
    return;
  }
  parent.postMessage({type:'move',data:data},'*');
};

window.onMove=function(data){
  if(!data)return;

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
    return;
  }

  if(data.type==='battleState'){
    state=data.state;
    draw();
  }

  if(data.type==='battleForfeit'){
    battleEnded=true;
    if(data.state)state=data.state;
    var forfeiter=data.by||'Opponent';
    var winnerSeat=(data.seat===0||data.seat===1)?(data.seat===0?1:0):mySeat;
    if(state){
      state.winner=winnerSeat;
      addLog(forfeiter+' forfeited the battle.');
      draw();
    }
    showLocalBattleResult({forfeit:true,forfeiter:forfeiter,message:forfeiter+' forfeited the battle.'});
  }
};

window.addEventListener('message',function(event){
  var data=event.data||{};

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
  }

  if(data.type==='gameMove'&&window.onMove){
    window.onMove(data.data);
  }

  if(data.type==='petBattleForfeitRequest'){
    requestForfeitBattle();
  }

  if(data.type==='petBattleShowResults'){
    showLocalBattleResult();
  }
});

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

if(!careUiTimer){careUiTimer=setInterval(refreshCareMeter,500);}

drawEmpty();
if(!connectBattleInstance()){
  receiveSetup(window.GAME_PLAYERS||[],window.GAME_MY_SEAT);

  setTimeout(function(){
    receiveSetup(window.GAME_PLAYERS||players||[],window.GAME_MY_SEAT);
  },250);
}
</script>
