function refreshProjectedPetSide(seat,preview){
  if(!preview||!state||!state.pets||!state.pets[seat])return;
  var pet=state.pets[seat];
  var hp=Math.max(0,Math.min(pet.stats.maxHp,Number(preview.hp||0)));
  var hpPct=Math.max(0,Math.min(100,Math.floor(hp/pet.stats.maxHp*100)));
  var hpFill=el('p'+seat+'Hp');
  if(hpFill){
    hpFill.style.width=hpPct+'%';
    hpFill.className='hpFill '+(hpPct<30?'low':hpPct<60?'mid':'');
  }
  var hpText=el('p'+seat+'HpText');
  if(hpText)hpText.innerText=formatHp(hp)+' / '+pet.stats.maxHp+' HP';

  var fin=Math.floor(Math.max(0,Math.min(100,Number(preview.finisher||0))));
  var finFill=el('p'+seat+'Finisher');
  if(finFill){
    finFill.style.width=fin+'%';
    finFill.className='finisherFill '+(fin>=100?'ready':'');
  }
  var finText=el('p'+seat+'FinisherText');
  if(finText)finText.innerText=(fin>=100?'Finisher READY':'Finisher '+fin+'%');

  var stats=el('p'+seat+'Stats');
  if(stats){
    var energy=Math.floor(Math.max(0,Math.min(10,Number(preview.energy||0))));
    var stamina=Math.floor(Math.max(0,Math.min(100,Number(preview.stamina||0))));
    stats.innerHTML=
      stat('Attack',effectiveAttack(seat))+
      stat('Defense',effectiveDefense(seat))+
      stat('Speed',effectiveSpeed(seat))+
      stat('Stance',stanceLabel(currentStance(seat)))+
      '<div class="resourceGrid"><div class="resourcePill"><b>'+energy+'/10</b>Energy</div><div class="resourcePill"><b>'+stamina+'%</b>Stamina</div></div>';
  }
}

function findWorstAilment(seat){
  var s=state&&state.status&&state.status[seat]?state.status[seat]:{};
  var order=['burn','stun','sleep','snare','slow','attack_down','defense_down'];
  for(var i=0;i<order.length;i++){
    var k=order[i];
    if(s[k]&&s[k]>0)return {key:k,label:k.replace('_',' '),turns:Number(s[k]||0)};
  }
  return null;
}

var CARE_WINDOW_MS=8000;
var CARE_ACTIONS={
  soothe:{label:'soothing care'},
  treat:{label:'treatment'},
  steady:{label:'steady breathing'},
  guard:{label:'guarding'},
  lockin:{label:'Lock In focus'}
};

function emptyCare(){return {type:null,start:0,lastTick:0,itemId:null,locked:false,baseHp:null,gain:0,treatProgress:0};}

function escapeAttr(s){return String(s||'').replace(/[\\'\"]/g,'');}

function clearGuard(seat){
  if(state&&state.guard&&seat!==null&&seat!==undefined)state.guard[seat]=false;
}

function useFinisher(){
  if(!state||mySeat===null||mySeat===undefined)return;
  ensureBattleShape();
  if(!(state.finisherReady&&state.finisherReady[mySeat]))return;
  useMove('__finisher__',{finisher:true});
}

function useMove(moveId,opts){
  opts=opts||{};
  if(!state||state.winner!==null||state.blocked)return;
  if(!isMyTurn())return;

  var actor=mySeat;
  var target=actor===0?1:0;
  var attacker=state.pets[actor];
  var move;
  if(moveId==='__finisher__'){
    move={name:'Fury Finisher',type:(state.pets[mySeat]&&state.pets[mySeat].type)||'normal',category:'finisher',power:56,accuracy:100,energyCost:2,staminaCost:22,initiativeCost:118};
    opts.finisher=true;
  }else if(moveId==='__flail__'){
    move={name:'Flail',type:'normal',category:'physical',power:14,accuracy:92,energyCost:0,staminaCost:0,initiativeCost:86};
  }else if(moveId==='__rest__'){
    move={name:'Rest',type:'rest',category:'rest',power:0,accuracy:100,energyCost:0,staminaCost:0,initiativeCost:96};
  }else{
    move=moveBook[moveId]||{name:moveId,type:'normal',category:'physical',power:30,accuracy:95};
  }
  var moveName=move.name||moveId;
  var actionResult={damage:0,finisher:false,miss:false,type:(move&&move.type)||'normal',rest:false};

  ensureBattleShape();

  var stance=selectedStance||currentStance(actor)||'balanced';
  var oldStance=currentStance(actor);
  var stanceChanged=stance!==oldStance;

  var energyCost=moveEnergyCost(move)+(stanceChanged?1:0);
  if(Number(state.energy[actor]||0)<energyCost){
    addLog(attacker.name+' tried '+moveName+' but lacked energy.');
    draw();
    return;
  }

  var staminaCost=moveStaminaCost(move,stance)+(stanceChanged?5:0);
  if(Number(state.stamina[actor]||0)<staminaCost){
    addLog(attacker.name+' tried '+moveName+' but was too exhausted.');
    lastControlModeKey='';
    draw();
    return;
  }

  state.energy[actor]=clampResource(Number(state.energy[actor]||0)-energyCost,0,10);
  state.stamina[actor]=clampResource(Number(state.stamina[actor]||100)-staminaCost,0,100);
  if(stanceChanged){
    state.stance[actor]=stance;
    addLog(attacker.name+' shifted stance to '+stanceLabel(stance)+' as they attacked (-1 energy, -5 stamina).');
  }
  applyStanceStart(actor,stance);

  var blocked=startTurnStatus(actor);

  if(blocked){
    addLog(attacker.name+' could not move because of '+blocked+'.');
  }else{
    applyCareBeforeIncoming(target);
    var roll=Math.random()*100;

    if(roll>Number(move.accuracy||95)){
      addLog(attacker.name+' used '+moveName+' but missed!');
      applyMissRecovery(actor);
      clearGuard(target);
      actionResult={damage:0,finisher:false,miss:true};
    }else{
      actionResult=resolveMove(actor,target,moveId,move,opts)||actionResult;
    }
  }

  state.lastAction={actor:actor,target:target,move:moveId,stance:stance,time:Date.now(),damage:Number(actionResult.damage||0),finisher:!!actionResult.finisher,miss:!!actionResult.miss,type:actionResult.type||move.type||'normal',rest:!!actionResult.rest};

  checkWinner(actor,target);

  if(state.winner===null){
    endTurnStatus(actor);
    endRoundResourceTick(actor,target);
    spendInitiative(actor,move);
    state.turn=null;
    state.round++;
    advanceInitiative();
  }

  lastControlModeKey='';
  draw();
  sync();
}
function resolveMove(actor,target,moveId,move,opts){
  opts=opts||{};
  var attacker=state.pets[actor];
  var moveName=move.name||moveId;
  var category=move.category||'physical';
  var power=Number(move.power||0);
  var stance=currentStance(actor);

  if(category==='rest'){
    var beforeStamina=Number(state.stamina[actor]||0);
    var gain=38;
    state.stamina[actor]=clampResource(beforeStamina+gain,0,100);
    state.energy[actor]=clampResource(Number(state.energy[actor]||0)+1,0,10);
    addLog(attacker.name+' rested and recovered '+Math.floor(state.stamina[actor]-beforeStamina)+' stamina.');
    showFloatingNumber(actor,'REST','heal');
    return {damage:0,finisher:false,type:'rest',rest:true};
  }

  if(category==='status'||category==='buff'||category==='debuff'||power<=0){
    var applied=applyMoveStatus(actor,target,move);
    addLog(attacker.name+' used '+moveName+' from '+stanceLabel(stance)+'.'+(applied?' '+applied:''));
    return {damage:0,finisher:false,type:move.type||'normal'};
  }

  var result=damage(actor,target,move,!!opts.finisher);
  state.hp[target]=Math.max(0,state.hp[target]-result.damage);
  addLog(attacker.name+' used '+moveName+' from '+stanceLabel(stance)+' and dealt '+result.damage+' damage.');
  if(result.note)addLog(result.note);

  var appliedAfterDamage=applyMoveStatus(actor,target,move);
  if(appliedAfterDamage)addLog(appliedAfterDamage);
  return {damage:result.damage,finisher:!!result.finisher,type:move.type||'normal'};
}
function damage(actor,target,move,forceFinisher){
  var attacker=state.pets[actor];

  var power=Number(move.power||30);
  var atk=effectiveAttack(actor);
  var def=effectiveDefense(target);
  var level=Number(attacker.stats.level||1);
  var actorStance=currentStance(actor);
  var targetStance=currentStance(target);
  var stamina=Number(state.stamina&&state.stamina[actor]!==undefined?state.stamina[actor]:100);

  var base=(power*0.28)+(atk*.78)+(level*.75);
  var reduction=def*.92;
  var variance=0.92+(Math.random()*0.17);
  var typeBonus=(move.type&&move.type===attacker.type)?1.06:1;
  var staminaScale=0.62+(Math.max(0,Math.min(100,stamina))/180);
  var stanceScale=STANCE[actorStance]?STANCE[actorStance].damage:1;
  var clashScale=1;
  var note='';
  var finisherActive=!!forceFinisher && state.finisherReady&&state.finisherReady[actor];
  var finisherScale=finisherActive?1.45:1;

  if(targetStance==='brace'){
    var drain=power>=48?20:power>=40?16:12;
    clashScale*=0.66;
    state.stamina[actor]=clampResource(Number(state.stamina[actor]||0)-drain,0,100);
    state.energy[target]=clampResource(Number(state.energy[target]||0)+1,0,10);
    note=state.pets[target].name+' braced the hit. '+attacker.name+' lost '+drain+' stamina and the defender gained energy.';
  }else if(targetStance==='focus'){
    clashScale*=1.14;
    var eLoss=power>=44?2:1;
    state.energy[target]=clampResource(Number(state.energy[target]||0)-eLoss,0,10);
    note=state.pets[target].name+' was caught focusing and lost '+eLoss+' energy.';
  }else if(actorStance==='focus'){
    state.energy[actor]=clampResource(Number(state.energy[actor]||0)+1,0,10);
    note=attacker.name+' converted focus into +1 energy.';
  }

  var guardActive=state.guard&&state.guard[target];
  var guardNote='';
  var guardScale=1;
  if(guardActive){
    guardScale=finisherActive?0.65:0.50;
    var guardCost=finisherActive?22:12;
    state.stamina[target]=clampResource(Number(state.stamina[target]||0)-guardCost,0,100);
    state.guard[target]=false;
    guardNote=state.pets[target].name+' guarded the hit, reducing damage and spending '+guardCost+' stamina.';
  }

  var dmg=Math.floor((base-reduction)*variance*typeBonus*staminaScale*stanceScale*clashScale*finisherScale*guardScale);
  dmg=Math.max(2,dmg);
  if(finisherActive){
    state.finisher[actor]=0;
    state.finisherReady[actor]=false;
    note=(note?note+' ':'')+'🔥 FINISHER unleashed! '+attacker.name+' turned locked-in focus into a huge swing.';
  }
  if(guardNote){
    note=(note?note+' ':'')+guardNote;
  }
  if(dmg>0&&state.finisher){
    var loss=Math.min(22,Math.max(6,Math.floor(dmg*.5)));
    state.finisher[target]=clampResource(Number(state.finisher[target]||0)-loss,0,100);
    state.finisherReady[target]=state.finisher[target]>=100;
  }
  return {damage:dmg,note:note,finisher:finisherActive};
}

var STANCE={
  balanced:{name:'Push',icon:'⚔️',short:'+14% damage, normal defense',detail:'Next attack hits harder but costs more stamina.',damage:1.14,defense:1},
  brace:{name:'Brace',icon:'🛡️',short:'-18% damage, +22% defense',detail:'Next attack is safer and your defense improves after acting.',damage:.82,defense:1.22},
  focus:{name:'Focus',icon:'✨',short:'Gain energy, risky if hit',detail:'Next attack is steadier and converts focus into energy.',damage:.96,defense:.86}
};

function clampResource(v,min,max){
  v=Number(v||0);
  if(!Number.isFinite(v))v=min;
  return Math.max(min,Math.min(max,v));
}

function currentStance(seat){
  ensureBattleShape();
  return state.stance&&state.stance[seat]?state.stance[seat]:'balanced';
}

function stanceLabel(id){return (STANCE[id]&&STANCE[id].name)||'Push';}
function stanceIcon(id){return (STANCE[id]&&STANCE[id].icon)||'⚔️';}

function selectStance(id){
  if(!STANCE[id])id='balanced';

  // Stance selection is now queued. It does not affect stats immediately.
  // The queued stance is applied when this player actually attacks.
  selectedStance=id;
  try{localStorage.setItem('gf_petbattle_stance',id);}catch(e){}
  lastControlModeKey='';
  drawMoves();
}

function moveEnergyCost(move){
  if(move&&move.energyCost!==undefined)return Number(move.energyCost||0);
  var category=move.category||'physical';
  var power=Number(move.power||0);
  if(category==='status'||category==='buff'||category==='debuff'||power<=0)return 1;
  if(power>=50)return 4;
  if(power>=42)return 3;
  if(power>=34)return 2;
  return 1;
}

function moveStaminaCost(move,stance){
  if(move&&move.staminaCost!==undefined)return Number(move.staminaCost||0);
  var category=move.category||'physical';
  var power=Number(move.power||0);
  var cost=(category==='status'||category==='buff'||category==='debuff'||power<=0)?8:Math.round(10+(power*.38));
  if(stance==='balanced')cost+=6;
  if(stance==='brace')cost=Math.max(5,cost-8);
  if(stance==='focus')cost=Math.max(4,cost-5);
  return cost;
}

function applyStanceStart(seat,stance){
  ensureBattleShape();
  if(stance==='brace'){
    state.stamina[seat]=clampResource(Number(state.stamina[seat]||0)+10,0,100);
    addLog(state.pets[seat].name+' braces and steadies their footing.');
  }else if(stance==='focus'){
    state.energy[seat]=clampResource(Number(state.energy[seat]||0)+2,0,10);
    state.stamina[seat]=clampResource(Number(state.stamina[seat]||0)+5,0,100);
    addLog(state.pets[seat].name+' focuses, gaining energy before acting.');
  }
}

function applyMissRecovery(seat){
  ensureBattleShape();
  state.stamina[seat]=clampResource(Number(state.stamina[seat]||0)+4,0,100);
}

function endRoundResourceTick(actor,target){
  ensureBattleShape();
  for(var i=0;i<2;i++){
    state.stamina[i]=clampResource(Number(state.stamina[i]||0)+9,0,100);
    state.energy[i]=clampResource(Number(state.energy[i]||0)+1,0,10);
  }
}

function moveInitiativeCost(move){
  if(move&&move.initiativeCost!==undefined)return Number(move.initiativeCost||90);
  var category=move.category||'physical';
  var power=Number(move.power||0);

  if(category==='status'||category==='buff'||category==='debuff'||power<=0)return 72;
  if(power>=52)return 112;
  if(power>=44)return 100;
  if(power<=28)return 78;
  return 90;
}

function spendInitiative(actor,move){
  ensureBattleShape();
  var cost=moveInitiativeCost(move);
  state.meter[actor]=Math.max(0,Number(state.meter[actor]||0)-cost);
}

function advanceInitiative(){
  ensureBattleShape();

  var safety=0;

  while(state.winner===null&&state.turn===null&&safety<80){
    safety++;

    for(var i=0;i<2;i++){
      if(state.hp[i]>0){
        state.meter[i]=Number(state.meter[i]||0)+initiativeGain(i);
      }
    }

    if(state.meter[0]>=100||state.meter[1]>=100){
      if(state.meter[0]>=100&&state.meter[1]>=100){
        if(effectiveSpeed(0)===effectiveSpeed(1)){
          state.turn=Math.random()<.5?0:1;
        }else{
          state.turn=effectiveSpeed(0)>effectiveSpeed(1)?0:1;
        }
      }else{
        state.turn=state.meter[0]>=100?0:1;
      }
      return;
    }
  }

  if(state.turn===null){
    state.turn=effectiveSpeed(0)>=effectiveSpeed(1)?0:1;
  }
}

function initiativeGain(seat){
  var spd=effectiveSpeed(seat);
  return 18+Math.floor(spd*2.4);
}

function effectiveAttack(seat){
  var pet=state.pets[seat];
  var s=state.status&&state.status[seat]?state.status[seat]:{};
  var atk=Number(pet.stats.attack||5);

  if(s.attack_up&&s.attack_up>0)atk+=Number(s.attack_up_amount||1);
  if(s.attack_down&&s.attack_down>0)atk-=Number(s.attack_down_amount||1);

  return Math.max(1,atk);
}

function effectiveDefense(seat){
  var pet=state.pets[seat];
  var s=state.status&&state.status[seat]?state.status[seat]:{};
  var def=Number(pet.stats.defense||4);

  if(s.defense_up&&s.defense_up>0)def+=Number(s.defense_up_amount||1);
  if(s.defense_down&&s.defense_down>0)def-=Number(s.defense_down_amount||1);

  var stance=currentStance(seat);
  if(STANCE[stance]&&STANCE[stance].defense)def*=STANCE[stance].defense;

  return Math.max(1,Math.round(def));
}

function effectiveSpeed(seat){
  var pet=state.pets[seat];
  var s=state.status&&state.status[seat]?state.status[seat]:{};
  var spd=Number(pet.stats.speed||5);

  if(s.slow&&s.slow>0)spd=Math.max(1,Math.floor(spd*.65));
  if(s.snare&&s.snare>0)spd=Math.max(1,Math.floor(spd*.75));
  if(s.speed_up&&s.speed_up>0)spd+=Number(s.speed_up_amount||2);

  return Math.max(1,spd);
}

function ensureBattleShape(){
  if(!state.status)state.status=[{},{}];
  if(!state.status[0])state.status[0]={};
  if(!state.status[1])state.status[1]={};
  if(!state.meter)state.meter=[0,0];
  if(state.meter[0]===undefined)state.meter[0]=0;
  if(state.meter[1]===undefined)state.meter[1]=0;
  if(!state.stamina)state.stamina=[100,100];
  if(state.stamina[0]===undefined)state.stamina[0]=100;
  if(state.stamina[1]===undefined)state.stamina[1]=100;
  if(!state.energy)state.energy=[5,5];
  if(state.energy[0]===undefined)state.energy[0]=5;
  if(state.energy[1]===undefined)state.energy[1]=5;
  if(!state.stance)state.stance=['balanced','balanced'];
  if(!state.stance[0])state.stance[0]='balanced';
  if(!state.stance[1])state.stance[1]='balanced';
  if(!state.care)state.care=[emptyCare(),emptyCare()];
  if(!state.care[0])state.care[0]=emptyCare();
  if(!state.care[1])state.care[1]=emptyCare();
  if(!state.finisher)state.finisher=[0,0];
  if(state.finisher[0]===undefined)state.finisher[0]=0;
  if(state.finisher[1]===undefined)state.finisher[1]=0;
  if(!state.finisherReady)state.finisherReady=[false,false];
  if(!state.guard)state.guard=[false,false];
  if(state.guard[0]===undefined)state.guard[0]=false;
  if(state.guard[1]===undefined)state.guard[1]=false;
  state.finisherReady[0]=Number(state.finisher[0]||0)>=100;
  state.finisherReady[1]=Number(state.finisher[1]||0)>=100;
}

function startTurnStatus(seat){
  ensureBattleShape();
  var s=state.status[seat]||{};
  var pet=state.pets[seat];

  if(s.burn&&s.burn>0){
    var burnDmg=Math.max(2,Math.floor(state.pets[seat].stats.maxHp*.055));
    state.hp[seat]=Math.max(0,state.hp[seat]-burnDmg);
    addLog(pet.name+' is hurt by burn for '+burnDmg+' damage.');
  }

  if(state.hp[seat]<=0){
    state.winner=seat===0?1:0;
    addLog(pet.name+' fainted from lingering damage.');
    return 'burn';
  }

  if(s.sleep&&s.sleep>0)return 'sleep';
  if(s.stun&&s.stun>0)return 'stun';

  return null;
}

function endTurnStatus(seat){
  ensureBattleShape();
  var s=state.status[seat]||{};

  ['burn','slow','sleep','stun','snare','attack_up','attack_down','defense_up','defense_down','speed_up'].forEach(function(k){
    if(s[k]&&s[k]>0){
      s[k]--;
      if(s[k]<=0){
        delete s[k];
        delete s[k+'_amount'];
      }
    }
  });
}

function applyMoveStatus(actor,target,move){
  if(!move.status)return '';

  ensureBattleShape();

  var status=move.status;
  var effect=status.effect;
  var chance=Number(status.chance||0);
  var duration=Number(status.duration||1);
  var amount=Number(status.amount||1);

  if(!effect)return '';
  if(Math.random()*100>chance)return '';

  var recipient=target;

  if(effect==='attack_up'||effect==='defense_up'){
    recipient=actor;
  }

  var s=state.status[recipient]||{};
  s[effect]=Math.max(Number(s[effect]||0),duration);

  if(effect==='attack_up'||effect==='attack_down'||effect==='defense_up'||effect==='defense_down'){
    s[effect+'_amount']=Math.max(Number(s[effect+'_amount']||0),amount);
  }

  state.status[recipient]=s;

  var pet=state.pets[recipient];
  return pet.name+' is affected by '+effect.replace('_',' ')+'.';
}

function checkWinner(actor,target){
  if(state.winner!==null)return;

  if(state.hp[target]<=0){
    state.winner=actor;
    addLog(state.pets[target].name+' fainted.');
    addLog(players[actor].name+' wins!');
    addRewardPreview(actor,target);
    submitBattleComplete(actor);
    return;
  }

  if(state.hp[actor]<=0){
    state.winner=target;
    addLog(state.pets[actor].name+' fainted.');
    addLog(players[target].name+' wins!');
    addRewardPreview(target,actor);
    submitBattleComplete(target);
  }
}

function addRewardPreview(winner,loser){
  addLog('Battle complete. Results are being finalized by the server.');
}

function playLastActionFxOnce(){
  if(!state||!state.lastAction)return;
  var a=state.lastAction;
  var key=[a.time,a.actor,a.target,a.move,a.damage,a.finisher,a.miss].join(':');
  if(lastActionFxKey===key)return;
  lastActionFxKey=key;
  pulseAction(a.actor,a.target);
  if(a.rest){
    showTypeEffect(a.actor,'rest',false);
    return;
  }
  showTypeEffect(a.target,a.type||'normal',!!a.finisher);
  if(Number(a.damage||0)>0){
    setTimeout(function(){showFloatingNumber(a.target,a.damage,a.finisher?'finisher':'damage');},230);
  }else if(a.miss){
    setTimeout(function(){showFloatingNumber(a.target,'MISS','miss');},230);
  }
}

function pulseAction(actor,target){
  var a=visiblePetEl(actor);
  var t=visiblePetEl(target);

  if(a){
    a.classList.remove('attackAnim');
    void a.offsetWidth;
    a.classList.add('attackAnim');
  }

  if(t){
    setTimeout(function(){
      t.classList.remove('hitAnim');
      void t.offsetWidth;
      t.classList.add('hitAnim');
    },180);
  }
}

function normalizeEffectType(type){
  type=String(type||'normal').toLowerCase();
  if(type==='fire'||type==='water'||type==='grass'||type==='electric'||type==='shadow'||type==='earth'||type==='light'||type==='rest')return type;
  if(type==='rock'||type==='ground')return 'earth';
  if(type==='ice')return 'water';
  if(type==='dark')return 'shadow';
  return 'normal';
}

function showTypeEffect(seat,type,isFinisher){
  var stage=document.querySelectorAll('.petStage')[seat];
  if(!stage)return;
  var node=document.createElement('div');
  node.className='typeFx '+normalizeEffectType(type)+(isFinisher?' finisherFx':'');
  node.style.left=(46+Math.random()*8)+'%';
  node.style.top=(40+Math.random()*12)+'%';
  stage.appendChild(node);
  setTimeout(function(){if(node&&node.parentNode)node.parentNode.removeChild(node);},1150);
}

function showFloatingNumber(seat,value,kind){
  var stage=document.querySelectorAll('.petStage')[seat];
  if(!stage)return;
  var node=document.createElement('div');
  var cls='damageFloat';
  if(kind==='heal')cls+=' heal';
  if(kind==='miss')cls+=' miss';
  if(kind==='finisher')cls+=' finisher';
  node.className=cls;
  node.textContent=(typeof value==='number'||String(value).match(/^\d+$/))?('-'+value):String(value);
  node.style.left=(44+Math.random()*12)+'%';
  node.style.top=(30+Math.random()*12)+'%';
  stage.appendChild(node);
  setTimeout(function(){if(node&&node.parentNode)node.parentNode.removeChild(node);},1050);
}

function visiblePetEl(seat){
  var img=el('p'+seat+'Img');
  if(img&&!img.classList.contains('hide'))return img;
  return el('p'+seat+'Emoji');
}

function addLog(t){
  state.log.push(t);
  if(state.log.length>90)state.log.shift();
}

function setStatus(a,b){
  statusTitle.innerText=a;
  statusText.innerText=b||'';
}

function currentUsername(){
  return localStorage.getItem('gf_user')||'';
}

function myPlayerName(){
  if(mySeat!==null&&mySeat!==undefined&&players[mySeat])return players[mySeat].name;
  return currentUsername();
}

function opponentName(){
  if(mySeat===0&&players[1])return players[1].name;
  if(mySeat===1&&players[0])return players[0].name;
  return 'Opponent';
}

function resultPetLine(seat){
  var pet=state&&state.pets?state.pets[seat]:null;
  var player=players[seat]?players[seat].name:'Seat '+(seat+1);
  if(!pet)return {player:player,pet:'Unknown pet',sub:''};
  return {player:player,pet:pet.name||'Pet',sub:'Lv '+(pet.stats&&pet.stats.level||1)+' · '+(pet.type||'normal')};
}

function requestForfeitBattle(){
  if(battleEnded){
    showLocalBattleResult();
    return;
  }
  if(!ready||!players.length){
    returnToHub();
    return;
  }
  if(!confirm('Forfeit this battle? This counts as a loss, but you will not be trapped in the game.'))return;
  forfeitBattle();
}

function forfeitBattle(){
  battleEnded=true;
  if(state){
    var loser=(mySeat===0||mySeat===1)?mySeat:0;
    var winner=loser===0?1:0;
    state.winner=winner;
    state.forfeit={by:myPlayerName(),seat:loser,time:Date.now()};
    addLog(myPlayerName()+' forfeited the battle.');
    draw();
  }

  if(battleInstanceId&&instanceSocket&&instanceSocket.readyState===1){
    instanceSocket.send(JSON.stringify({type:'battleInstanceForfeit',instanceId:battleInstanceId,state:state}));
    return;
  }

  window.sendMove({type:'battleForfeit',by:myPlayerName(),seat:mySeat,state:state});
  showLocalBattleResult({forfeit:true,forfeiter:myPlayerName(),winner:opponentName(),loser:myPlayerName(),message:'You forfeited the battle.'});
}

function submitBattleComplete(winnerSeat){
  if(battleEnded)return;
  battleEnded=true;
  if(battleInstanceId&&instanceSocket&&instanceSocket.readyState===1){
    instanceSocket.send(JSON.stringify({type:'battleInstanceComplete',instanceId:battleInstanceId,winnerSeat:winnerSeat,state:state}));
  }else{
    setTimeout(function(){showLocalBattleResult();},450);
  }
}

function handleServerBattleResult(result,role,reward){
  if(!result)return;
  lastServerResult=result;
  battleEnded=true;
  if(state&&result.winner){
    var winnerIndex=players.findIndex(function(p){return p&&p.name===result.winner;});
    if(winnerIndex>=0)state.winner=winnerIndex;
    if(result.forfeit&&result.forfeiter)addLog(result.forfeiter+' forfeited the battle.');
    draw();
  }
  setTimeout(function(){showBattleResults(result);},350);
}

function showLocalBattleResult(extra){
  if(lastServerResult){showBattleResults(lastServerResult);return;}
  if(!state||state.winner===null){
    showBattleResults(extra||{winner:opponentName(),loser:myPlayerName(),forfeit:true,forfeiter:myPlayerName(),rewards:null,reason:'forfeit'});
    return;
  }
  var winner=players[state.winner]?players[state.winner].name:'Winner';
  var loser=players[state.winner===0?1:0]?players[state.winner===0?1:0].name:'Loser';
  showBattleResults(Object.assign({winner:winner,loser:loser,forfeit:false,turns:state.round||1,rewards:null},extra||{}));
}

function showBattleResults(result){
  result=result||{};
  var mine=myPlayerName();
  var isWinner=result.winner===mine;
  var isForfeiter=result.forfeiter===mine;
  var title=isWinner?'🏆 You Win':'Battle Result';
  if(!isWinner)title=isForfeiter?'🏳 You Forfeited':'😔 You Lost';

  var reason=result.message||'';
  if(result.forfeit&&!reason){
    reason=result.forfeiter ? result.forfeiter+' forfeited the battle.' : 'Battle ended by forfeit.';
  }
  if(!reason)reason='Battle complete.';

  var p0=resultPetLine(0);
  var p1=resultPetLine(1);
  var rewards=result.rewards||null;
  var myReward=null;
  if(rewards){
    if(rewards.winner&&rewards.winner.username===mine)myReward=rewards.winner;
    if(rewards.loser&&rewards.loser.username===mine)myReward=rewards.loser;
  }
  var xp=myReward?Number(myReward.xp||0):0;
  var coins=myReward?Number(myReward.coins||0):0;
  var scale=rewards&&rewards.scale?Math.round(Number(rewards.scale||1)*100):100;

  var rewardHtml=rewards
    ? '<div class="rewardBox"><b>Your Rewards</b><div class="rewardGrid"><div class="rewardItem"><b>+'+xp+'</b><span>XP</span></div><div class="rewardItem"><b>+'+coins+'</b><span>Coins</span></div></div><div class="muted" style="margin-top:8px">Reward scale: '+scale+'%</div></div>'
    : '<div class="rewardBox"><b>Practice Result</b><div class="muted" style="margin-top:6px">Rewards are finalized for server-locked Battle Hall and live challenge battles.</div></div>';

  resultCard.innerHTML=
    '<h2 class="resultTitle">'+escapeHtml(title)+'</h2>'+ 
    '<p class="resultReason">'+escapeHtml(reason)+'</p>'+ 
    '<div class="resultMatchup">'+ 
      '<div class="resultPet"><b>'+escapeHtml(p0.player)+'</b><span>'+escapeHtml(p0.pet)+' · '+escapeHtml(p0.sub)+'</span></div>'+ 
      '<div class="resultVs">VS</div>'+ 
      '<div class="resultPet"><b>'+escapeHtml(p1.player)+'</b><span>'+escapeHtml(p1.pet)+' · '+escapeHtml(p1.sub)+'</span></div>'+ 
    '</div>'+ 
    rewardHtml+ 
    '<div class="resultActions"><button class="primary" onclick="returnToBattleHall()">Battle Again</button><button class="gold" onclick="returnToHub()">Return to Hub</button></div>'+ 
    '<div class="safeExitNote">No trap rule: this screen always has a safe way back. If a battle connection ends, use Return to Hub.</div>';
  resultOverlay.classList.add('show');
}

function returnToBattleHall(){
  notifyBattleLeave();
  try{parent.postMessage({type:'petBattleReturn',target:'battlehall'},'*');}catch(e){}
  location.href='/games/battlehall.html?v='+Date.now();
}

function returnToHub(){
  notifyBattleLeave();
  try{parent.postMessage({type:'petBattleReturn',target:'home'},'*');}catch(e){}
  // If embedded in the GameForge shell, the parent will exit the iframe. If not,
  // this fallback prevents standalone players from being trapped.
  setTimeout(function(){
    if(window.parent===window)location.href='/';
  },120);
}

function notifyBattleLeave(){
  if(battleInstanceId&&instanceSocket&&instanceSocket.readyState===1){
    instanceSocket.send(JSON.stringify({type:'battleInstanceLeave',instanceId:battleInstanceId}));
  }
}

function newBattle(){
  if(mySeat!==0){
    alert('Seat 1 starts new battles.');
    return;
  }

  state=freshBattle();
  draw();
  sync();
}

function sync(){
  if(state){
    state.clientVersion=(Number(state.clientVersion||0)+1);
    state.updatedAt=Date.now();
    state.updatedBy=myPlayerName();
  }
  window.sendMove({type:'battleState',state:state});
}

window.sendMove=function(data){
  // Battle Hall instances sync directly through the server-owned battle instance.
  // Classic launcher rooms keep using parent.postMessage so pre-planned/private
  // room battles continue to work exactly like before.
  if(battleInstanceId&&instanceSocket&&instanceSocket.readyState===1){
    instanceSocket.send(JSON.stringify({type:'battleInstanceMove',instanceId:battleInstanceId,data:data}));
    return;
  }
  parent.postMessage({type:'move',data:data},'*');
};

window.onMove=function(data){
  if(!data)return;

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
    return;
  }

  if(data.type==='battleState'){
    state=data.state;
    lastControlModeKey='';
    draw();
  }

  if(data.type==='battleForfeit'){
    battleEnded=true;
    if(data.state)state=data.state;
    var forfeiter=data.by||'Opponent';
    var winnerSeat=(data.seat===0||data.seat===1)?(data.seat===0?1:0):mySeat;
    if(state){
      state.winner=winnerSeat;
      addLog(forfeiter+' forfeited the battle.');
      draw();
    }
    showLocalBattleResult({forfeit:true,forfeiter:forfeiter,message:forfeiter+' forfeited the battle.'});
  }
};

window.addEventListener('message',function(event){
  var data=event.data||{};

  if(data.type==='gameSetup'){
    receiveSetup(data.players,data.mySeat);
  }

  if(data.type==='gameMove'&&window.onMove){
    window.onMove(data.data);
  }

  if(data.type==='petBattleForfeitRequest'){
    requestForfeitBattle();
  }

  if(data.type==='petBattleShowResults'){
    showLocalBattleResult();
  }
});

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

if(!careUiTimer){careUiTimer=setInterval(refreshCareMeter,500);}

drawEmpty();
if(!connectBattleInstance()){
  receiveSetup(window.GAME_PLAYERS||[],window.GAME_MY_SEAT);

  setTimeout(function(){
    receiveSetup(window.GAME_PLAYERS||players||[],window.GAME_MY_SEAT);
  },250);
}
</script>
</body>
</html>
