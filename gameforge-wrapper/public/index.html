<!DOCTYPE html>
<html>
<head>
  <title>GameForge Multiplayer Wrapper</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
    .panel { background: white; border: 1px solid #ccc; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    button, select, input { padding: 8px; }
    iframe { width: 100%; height: 620px; border: 2px solid #333; background: white; border-radius: 10px; }
    #log { min-height: 24px; color: #333; }
  </style>
</head>
<body>
  <h1>GameForge Multiplayer Wrapper</h1>

  <div class="panel">
    <div class="row">
      <label>Name:</label>
      <input id="name" placeholder="Player name">
      <label>Game:</label>
      <select id="gameList"></select>
      <button onclick="createRoom()">Create Room</button>
    </div>
    <div class="row">
      <input id="roomInput" placeholder="Room code">
      <button onclick="joinRoomFromInput()">Join Room</button>
      <strong>Current room:</strong> <span id="roomLabel">None</span>
    </div>
    <div id="log">Choose a game, create a room, then share the room code.</div>
  </div>

  <iframe id="gameFrame" sandbox="allow-scripts"></iframe>

<script>
let socket = null;
let currentRoom = null;
let currentGame = null;

const nameInput = document.getElementById("name");
nameInput.value = localStorage.getItem("gameforgeName") || "Player" + Math.floor(Math.random()*1000);
nameInput.onchange = () => localStorage.setItem("gameforgeName", nameInput.value);

async function loadGames() {
  const res = await fetch("/api/games");
  const games = await res.json();
  const list = document.getElementById("gameList");
  list.innerHTML = "";
  games.forEach(g => {
    const opt = document.createElement("option");
    opt.value = g.id;
    opt.innerText = g.name;
    list.appendChild(opt);
  });
}

async function createRoom() {
  currentGame = document.getElementById("gameList").value;
  const res = await fetch("/api/create-room", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ gameId: currentGame })
  });
  const data = await res.json();
  if (data.error) return setLog(data.error);
  joinRoom(data.roomCode, data.gameId);
}

async function joinRoomFromInput() {
  const code = document.getElementById("roomInput").value.trim().toUpperCase();
  const res = await fetch("/api/room/" + code);
  const data = await res.json();
  if (data.error) return setLog(data.error);
  joinRoom(data.roomCode, data.gameId);
}

function joinRoom(roomCode, gameId) {
  currentRoom = roomCode;
  currentGame = gameId;
  document.getElementById("roomLabel").innerText = roomCode;
  document.getElementById("roomInput").value = roomCode;
  document.getElementById("gameFrame").src = "/game/" + gameId;

  if (socket) socket.close();
  socket = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host);
  socket.onopen = () => {
    socket.send(JSON.stringify({ type: "join", roomCode, playerName: nameInput.value }));
    setLog("Joined room " + roomCode + ". Share this code with another player.");
  };
  socket.onmessage = evt => {
    const msg = JSON.parse(evt.data);
    if (msg.type === "move") {
      const frame = document.getElementById("gameFrame");
      if (frame.contentWindow && frame.contentWindow.onMove) {
        frame.contentWindow.onMove(msg.data);
      }
    }
    if (msg.type === "system") setLog(msg.message + " | Players: " + msg.players);
    if (msg.type === "error") setLog(msg.message);
  };
}

window.addEventListener("message", evt => {
  if (!socket || socket.readyState !== WebSocket.OPEN || !currentRoom) return;
  if (evt.data && evt.data.type === "move") {
    socket.send(JSON.stringify({ type: "move", roomCode: currentRoom, data: evt.data.data }));
  }
});

function setLog(text) {
  document.getElementById("log").innerText = text;
}

loadGames();
</script>
</body>
</html>
